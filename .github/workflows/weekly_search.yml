name: Weekly UAV-CVGL Search

on:
  # Runs every Monday 02:00 UTC = Monday 10:00 Singapore/Beijing time.
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Search window in days"
        required: false
        default: "30"
      limit_per_query:
        description: "Result limit per keyword query"
        required: false
        default: "15"
      classify_limit:
        description: "Max papers to classify in this run, 0 means all"
        required: false
        default: "0"
      citation_limit:
        description: "Recent citing papers per benchmark seed"
        required: false
        default: "100"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-uav-cvgl-search
  cancel-in-progress: false

jobs:
  weekly-search:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation tests
        run: python -m unittest discover -s tests -v

      - name: Validate automation configuration
        env:
          API_BUNDLE: ${{ secrets.API }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
        run: python scripts/uav_cvgl_auto.py preflight --require-llm

      - name: Search recent papers
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO }}
        run: |
          python scripts/uav_cvgl_auto.py weekly \
            --days ${{ github.event.inputs.days || '30' }} \
            --limit-per-query ${{ github.event.inputs.limit_per_query || '15' }} \
            --citation-limit ${{ github.event.inputs.citation_limit || '100' }}

      - name: Classify and summarize candidates
        env:
          API_BUNDLE: ${{ secrets.API }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
        run: |
          python scripts/uav_cvgl_auto.py classify \
            --input data/weekly_candidates.yml \
            --mode weekly \
            --limit ${{ github.event.inputs.classify_limit || '0' }}
          python scripts/uav_cvgl_auto.py stats --input data/weekly_candidates.yml

      - name: Build weekly update and paper classification pages
        run: |
          python scripts/uav_cvgl_auto.py merge --candidates data/weekly_candidates.yml
          python scripts/uav_cvgl_auto.py build-weekly

      - name: Upload weekly diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-uav-cvgl-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            data/weekly_candidates.yml
            data/reports/weekly_search_report.md
            data/reports/weekly_search_report.json
            data/reports/classification_report.md
            data/reports/classification_report.json
            data/papers.yml
            papers/*.md
            weekly_updates/*.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/weekly-uav-cvgl-update
          title: "Weekly UAV-CVGL paper update"
          commit-message: "Update weekly UAV-CVGL candidates"
          body: |
            Automated weekly search.

            Please review before merging:
            - data/weekly_candidates.yml
            - data/reports/weekly_search_report.md
            - data/papers.yml
            - papers/*.md
            - weekly_updates/*.md
            - DeepSeek classification
            - MiniMax summaries

            Parsed papers are added to the paper classification and introduction pages.
            Leaderboard metrics remain unverified candidates and are not promoted automatically.
          labels: automated-update, weekly
