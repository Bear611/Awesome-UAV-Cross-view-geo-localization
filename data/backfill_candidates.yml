- id: 63d26b98064c
  title: 'Triple-objective cross-view geolocalization of disaster-related VGI: the case of Hurricane Ian'
  year: 2025
  venue: International Journal of Geographical Information Systems
  authors:
  - Wenping Yin
  - Fabian Deuser
  - Z. Liu
  - Jiaqi Wei
  - Xuanshu Luo
  - Martin Werner
  - Hao Li
  - Yong Xue
  abstract: Volunteered geographic information (VGI) often contains rich geolocations that are crucial for disaster response
    and post-disaster assessment. However, existing studies on VGI geolocalization have not fully used the potential of multi-source
    and multimodal data. In this paper, we constructed a multimodal disaster dataset (MultiIan) and developed two novel methods
    (i.e. StaGeo and TriGeo) to enhance the cross-view geolocalization accuracy of disaster-related VGI. MultiIan comprised
    VGI texts and images, street view imagery (SVI) and remote sensing imagery (RSI). Large language models (LLMs) were used
    to extract the implicit geoinformation from VGI texts for geotagging. StaGeo was developed using staged training with
    ConvNeXt and vision transformer (ViT), while TriGeo used VGI ↔ SVI ↔ RSI triple-objective joint training of the ViT based
    on DINOv2. Using SVI to link VGI and RSI, our methods significantly improved the geolocalization accuracy of VGI across
    various train–test splits in MultiIan. With a typical 8:2 data split, StaGeo achieved Recall@1, Recall@5, Recall@10 and
    Recall@1% of 54.93%, 71.27%, 77.93% and 80.33%, respectively. TriGeo further improved these metrics, achieving 62.87%,
    85.55%, 90.54% and 90.89%, respectively. These findings demonstrate significant advancements in our cross-view geolocalization
    methods, enabling timely geolocation to support rapid decision-making in emergency response and promoting the broader
    application of GeoAI in geospatial analysis.
