  summary:
    summary_en: This work addresses vision-based UAV geo-localization as a cross-view image retrieval and localization problem
      in GPS-denied environments. Existing drone-satellite datasets rely on a strong one-to-one perfect matching assumption,
      which is unrealistic in practice, and real paired drone-view data at scale are costly or restricted. To close this gap,
      the authors construct GTA-UAV, a large-range contiguous-area dataset collected from the game GTA V, covering multiple
      flight altitudes (80–650 m), attitudes, scenes (urban, mountain, desert, forest, field, coast) and targets, with 33,763
      drone-view images and 14,640 multi-scale satellite tiles, and define a more practical partial-matching (N-to-N) task
      evaluated by retrieval (Recall@K, AP) and meter-level localization (SDM@3, Dis@1). They propose a weighted-InfoNCE loss
      that uses the cross-view ground-area IoU as a soft positive weight, combined with mutually exclusive sampling to prevent
      related pairs appearing in the same batch, trained on a plain weight-sharing ViT-Base/16 encoder. Experiments show best
      R@1, AP, SDM@3 and Dis@1 on GTA-UAV under both cross-area and same-area settings, and improved zero-shot and fine-tuned
      transfer to UAV-VisLoc compared with ImageNet, University-1652, SUES-200 and DenseUAV pre-training. The paper also notes
      generalization to real-world scenarios with limited real data.
