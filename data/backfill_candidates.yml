- id: 1081673544ac
  title: 'International practice of agroecological monitoring using remote sensing: A review'
  year: 2026
  venue: Agrology
  authors:
  - P.V. Lykhovyd
  - R.A. Vozhehova
  - M. M. Stepanova
  - D. O. Maksymov
  abstract: Abstract. Rapid advancements in orbital instrumentation coupled with the fast-pace development of geoinformation
    systems and information technologies in data science have transformed agroecological monitoring into a modern data-driven
    discipline with its own features and specificity, as well as unique knowledge core, reflected in corresponding academic
    publications. However, the sheer volume of international research necessitates a systematic synthesis to identify established
    scientific methodologies, practical applications, and emerging gaps. The primary goal of this study was to perform a systematic
    retrospective review of the international academic publications, spanning from 1990 to the present in the peer-reviewed
    literature related to remote sensing applications in agroecological monitoring. Following the strict rules for manual
    search and quality assessment, a bibliometric and thematic analysis was conducted on 103 carefully curated full-text publications.
    The analysis utilized automated text mining of the publications in Python 3 and Wolfram to establish the historical track
    of remote agroecological monitoring development, analyze contributions of different scientists to the discipline, map
    the evolution of methodological approaches and practical implementations in major fields of agricultural ecology, and
    identify the key research clusters, trends, and gaps. The analysis of technical literature revealed that rapid development
    of the discipline started in 2015. There is a moderate centralization of the knowledge distribution in the field of remote
    sensing in agroecological monitoring, as well as some national dominance of Asian scientists. The findings reveal a shift
    from simple single-index-based monitoring models toward more complex models that include a battery of different satellite
    indicators, based on multispectral and hyperspectral radar sensors, coupled with ground-truth data. There is an evident
    tendency to the development of specific remote sensing indices to improve the evaluation of the studied phenomena and
    ecological objects through more precise targeting of the required features that are not properly reflected by common indices
    such as Normalized Difference Vegetation Index or Normalized Difference Water Index because of their intrinsic limitations.
    Also, there is a tendency toward the implementation of combined models, especially in the field of agroecological climate-related
    events, where satellite data is combined with climate and meteorological indicators, e.g. standardized precipitation index
    or land surface temperature. Another shift relates to data handling. As agroecological monitoring transforms into the
    field where big data becomes increasingly common, simplistic mathematical models are replaced with complex machine learning
    algorithms for data processing, especially artificial neural networks and ensemble learning. The growing importance of
    artificial intelligence in data interpretation and analysis is another observable trend. Therefore, remote sensing coupled
    with robust data engineering using cutting-edge information technologies and the capacities of artificial intelligence
    are irreplaceable tools of modern agroecological monitoring. However, while remote sensing has matured as a powerful tool
    for large-scale observation, it still has some limitations, mainly related to noise in satellite data because of atmospheric
    inference and land surface albedo, and lack of ground-truth validation. Future prospects of the discipline lie in the
    integration of multisource satellite data with ground-based surveys within the framework of complex fusion monitoring
    platforms, as well as standardization of data fusion protocols and enhancing the accuracy, reliability, and interpretability
    of agroecological models. The results of the bibliometric analysis provide a strategic roadmap for researchers and policymakers
    to optimize agricultural sustainability through targeted technological implementation.
