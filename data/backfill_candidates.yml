    summary_en: 'This study addresses UAV-to-satellite cross-view geo-localization for autonomous navigation in GNSS-denied
      environments, where large differences in viewpoint, scale, and visual appearance between low-altitude UAV imagery and
      high-altitude satellite imagery make feature matching difficult. To tackle this, the authors propose a dual-branch deep
      learning framework in which UAV and satellite images are processed independently by two separate feature extractors,
      then projected into 256-dimensional normalized embeddings. Two backbone architectures, ResNet-18 and MLP-Mixer, are
      compared under the same bidirectional InfoNCE contrastive training objective. Experiments are conducted on the UAV-VisLoc
      dataset (768 UAV-satellite pairs, 80/20 train/validation split, 80 epochs, AdamW). MLP-Mixer consistently outperforms
