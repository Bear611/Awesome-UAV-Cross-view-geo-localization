- id: 705e1c1967c9
  title: 'VASTER: The ASKAP real-time fast-imaging pipeline -- overview and discovery of two long period transients'
  year: 2026
  venue: arXiv
  authors:
  - Yuanming Wang
  - Dougal Dobie
  - Tara Murphy
  - Emil Lenc
  - David L. Kaplan
  - Joshua Pritchard
  - Daniel Mitchell
  - Wasim Raja
  - Matthew Whiting
  - Owen Cole
  - Paul J. Hancock
  - Jiting Hu
  - Yu Wing Joshua Lee
  - Alex Massen-Hane
  - Shibli Saleheen
  - Raymond Shao
  - Lei Zhang
  - Adarsh Bathula
  - Manisha Caleb
  - Raghav Girgaonkar
  - Ashna Gulati
  - Natasha Hurley-Walker
  - Iris de Ruiter
  - Ryan M. Shannon
  - Gregory R. Sivakoff
  abstract: 'Recent developments in widefield radio telescopes have enabled searches of a new region of parameter space in
    the time domain: timescales of seconds to minutes, that have been overlooked in traditional surveys. These searches have
    revealed a new population of sources: long period transients, which typically show periodic behaviour of minutes to hours.
    In addition they have detected phenomena ranging from extreme scintillation to stellar radio bursts. However, almost all
    searches to date have involved archival data that has been processed in offline, batch mode. In this context, we present
    VASTER, the first short-timescale imaging and transient detection pipeline running in real time on a widefield radio telescope.
    VASTER has been running on the Australian SKA Pathfinder (ASKAP) since July 2025, and images most of the ASKAP survey
    project data on timescales of 15 minutes. In this paper we describe the VASTER system, and present the results from the
    first two weeks of operation, including the discovery of two long period transients: ASKAP~J165130.3$-$450520 with a period
    of 6.48 hours and ASKAP~J170036.6$-$445758 with a period of 4.69 hours. The detection of these two sources adds to the
    small, but growing, population of long period transients, as well as demonstrating the potential of VASTER to explore
    this region of transient parameter space.'
