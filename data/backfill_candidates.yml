- id: 5b733102f40e
  title: 'FALL: Fine-Grained Alignment and Local Information Aggregation Learning for Drone-Satellite Cross-View Geo-Localization'
  year: 2026
  venue: IEEE Geoscience and Remote Sensing Letters
  authors:
  - Haolin Du
  - Jingfei He
  - Zihan Nan
  - Chenghu Mi
  - Zihao Chen
  abstract: Cross-view geo-localization (CVGL) remains challenging due to severe appearance variations across viewpoints.
    Existing methods primarily rely on global representations, which are insufficient to capture fine-grained semantic correspondences
    under cross-view variations. To address this issue, we propose FALL, a fine-grained alignment and local information aggregation
    framework. FALL first aligns global and local features to alleviate semantic inconsistency across viewpoints. It then
    models implicit local relationships to enrich the global representation through a local information aggregation (LIA)
    module. Finally, a multidimensional collaboration (MDC) module further enhances feature discriminability via cross-dimensional
    responses. Extensive experiments demonstrate that the proposed method achieves robust and consistent performance across
    diverse cross-view scenarios.
