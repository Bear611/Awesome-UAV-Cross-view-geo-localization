- id: 7a8bc3c5028a
  title: 'AI-Driven GPS And Vision-Free Navigation for Military Drones: A Review of the CLAK Framework and Emerging Trends
    in GPS-Denied UAV Autonomy'
  year: 2026
  venue: International Journal of Creative and Open Research in Engineering and Management
  authors:
  - Major Ankur Singh Pathania
  abstract: Reliable navigation in Global Navigation Satellite System denied environments has emerged as a critical requirement
    for modern unmanned aerial vehicle operations, particularly in military scenarios characterized by electronic warfare,
    signal spoofing, and contested electromagnetic environments. Conventional UAV navigation systems rely extensively on GPS
    and optical sensing, making them vulnerable to jamming, low-visibility conditions, and adversarial countermeasures. This
    paper examines the CLAK framework, an artificial intelligence-based navigation architecture that enables drones to perform
    autonomous positioning without dependence on GPS or camera-based systems. The study analyzes the framework’s sensor fusion
    approach, which integrates LiDAR, inertial measurement units, and barometric sensing with deep-learning architectures
    including convolutional neural networks, bidirectional long short-term memory (BiLSTM) networks, and attention mechanisms.
    The paper further situates CLAK within the broader evolution of GPS-denied navigation technologies, including inertial
    navigation systems, visual SLAM, visual-inertial odometry, and learning-based inertial navigation methods. Operational
    implications for military UAV applications such as autonomous swarming, urban reconnaissance, subterranean operations,
    and low-signature missions are evaluated. The study also discusses limitations related to domain adaptation, adversarial
    vulnerability, computational integration, and verification challenges. The paper concludes that AI-enabled non-visual
    navigation frameworks represent a significant advancement in resilient autonomous systems and are likely to become central
    components of future multi-domain military operations
