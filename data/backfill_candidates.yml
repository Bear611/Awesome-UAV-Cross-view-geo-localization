- id: b50b31a85bda
  title: A review of AI-driven phenomics, genomics, and predictive breeding in wheat
  year: 2026
  venue: Discover Plants.
  authors:
  - Mohammad Jafar Tanin
  - Dinesh Kumar Saini
  - Praveenkumar Alagappan
  - Jatinder Kaur
  abstract: Wheat ( Triticum aestivum L.) is a staple crop that feeds billions of people worldwide, but increasing pressure
    from climate change, pests, diseases, and growing food demands is making its improvement more urgent than ever. Traditional
    breeding methods, though valuable, often fall short in meeting these complex challenges quickly and efficiently. In recent
    years, artificial intelligence (AI), particularly machine learning (ML), has emerged as a powerful tool that is reshaping
    wheat breeding. While AI, and specifically ML approaches have advanced substantially in crop improvement, their application
    in wheat breeding remains fragmented, with limited integration across phenotyping, genotyping, and multi-omics layers,
    and insufficient attention to model interpretability and deployment in resource-constrained breeding programs. This review
    critically synthesizes recent ML-based approaches applied throughout modern wheat improvement, from large-scale phenotypic
    and genotypic data analysis to trait prediction and multi-omics integration. We highlight how these methods are being
    used to enhance genetic gain for resistance to biotic stress (e.g., disease and pests) and abiotic stress (e.g., heat
    and drought), while identifying key methodological and infrastructural barriers that currently limit their broader adoption.
    The role of big data, effective data management, and the difficulties in handling complex datasets are also discussed.
    Despite their promise, challenges remain, such as the need for better model transparency, access to computing resources
    in developing regions, and ensuring that these technologies are equitably accessible. Further, the review briefly discusses
    emerging directions, including deep learning (DL)-based frameworks, explainable AI (XAI), and their potential integration
    with genome editing, and digital twin concepts, as future opportunities to further enhance wheat breeding efficiency.
    Finally, we emphasize the importance of collaboration and open-access platforms to ensure these innovations benefit researchers
    and farmers alike. Together, these advancements mark a significant shift toward faster, smarter, and more sustainable
    wheat improvement for the future.
