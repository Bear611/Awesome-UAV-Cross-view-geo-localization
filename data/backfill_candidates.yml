- id: 3b92f1048a9d
  title: 'Landslide Deformation Remote Monitoring in Alpine Mountains Using UAV Photogrammetry and Infrared Thermography:
    A Case Study in Wumeng Mountain Region, China'
  year: 2026
  venue: Remote Sensing
  authors:
  - Cong Zhao
  - M M Wang
  - Yueping Yin
  - Yongbo Tie
  - Sainan Zhu
  - Jingtao Liang
  - Xicheng Zhang
  - Jianguo Feng
  - Ban Song
  - X Li
  abstract: 'Land surface temperature (LST) is crucial for understanding winter landslide evolution. This study combines Unmanned
    Aerial Vehicle (UAV) photogrammetry and infrared thermography (IRT) to monitor winter landslides in China’s Wumeng Mountain
    region. Using the Yangjiazhai landslide—induced by underground coal mining—as a case study, we demonstrate significant
    correlations between IRT-detected LST anomalies and surface cracks: (1) cracks with elevated temperatures are likely connected
    to subsurface goaf zones; (2) excessively widened cracks show no thermal anomalies due to enhanced air convection. The
    research reveals that key landslide components have distinct LST signatures, governed by differential soil–rock moisture
    and crack networks. For accurate high-altitude winter LST acquisition, UAV thermal surveys should be conducted under overcast,
    fog-free conditions to reduce solar interference. This validates UAV visible–infrared fusion for extracting landslide
    boundaries, cracks, slumping zones, bedrock patterns, and moisture distribution. The methodology establishes a new pathway
    for investigating winter landslide deformation and instability, confirming IRT’s operational viability in high-altitude
