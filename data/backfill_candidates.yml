  summary:
    summary_en: This paper tackles cross-view geo-localization (CVGL), a retrieval task that matches UAV and satellite images
      captured from drastically different viewpoints. The authors argue that existing methods over-rely on global semantic
      features and neglect fine-grained local regions, making cross-view feature alignment and discriminative target representation
      difficult. To address this, they propose a Structural Perception Enhancement (SPE) network built upon the DINOv2 backbone.
      The design integrates a Local Region Mining Module (LRMM) that extracts discriminative regional features and enables
      accurate cross-view feature alignment, together with a Sample Rebalancing Strategy (SRS) that mitigates training instability
      caused by satellite image scarcity and sample imbalance. Experiments are conducted on the University-1652 and SUES-200
      benchmarks. The authors report that their method surpasses existing state-of-the-art approaches, achieving an average
      improvement of 0.44% in R@1 and 0.96% in AP, though detailed numerical results and per-split tables are not visible
      in the available preview.
