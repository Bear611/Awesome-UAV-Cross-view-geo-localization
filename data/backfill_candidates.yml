    summary_en: 'Cross-view geo-localization (CVGL) matches an oblique drone image to a geo-referenced satellite tile to enable
      autonomous drone navigation when GNSS is unavailable. The paper identifies three persistent limitations in current CVGL
      methods: global descriptors that conflate view-invariant layout with view-specific texture, altitude-related scale variation
      that leaks into the learned embedding, and multi-objective training driven by hand-tuned scalar weights over incompatible
      loss scales. To address these, it proposes SkyPart, a lightweight swappable head for patch-based ViTs that introduces
