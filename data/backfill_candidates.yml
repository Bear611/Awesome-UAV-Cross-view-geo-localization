- id: 703110c03671
  title: Cooperative Decision-Making Modeling for Manned and Unmanned Aerial Vehicles
  year: 2026
  venue: ''
  authors:
  - Jun Chen
  - Xinyu Zhang
  - Yan Tong
  abstract: 'Focusing on “human-in-the-loop” and “human-on-the-loop” mechanisms, cognitive intelligent interaction, and the
    practical modeling, implementation, and application of limited human intervention in modern aerial systems, this book
    explores cooperative decision-making technologies between manned and unmanned aerial vehicles. It systematically discusses
    two primary approaches to cooperative decision-making mechanisms: limited human intervention and cognitive intelligent
    interaction. The authors introduce modeling methods for applying limited intervention in typical mission scenarios, such
    as obstacle avoidance, threat mitigation, and attack decision-making. They also explain how to assess human workload and
    cognitive load in manned-unmanned operations. Additionally, it outlines interactive cognitive models that support situational
    awareness, threat evaluation, task allocation, route planning, and decision simulation. These insights address the growing
    need for effective human-machine collaboration in complex operational environments driven by rapid advancements in information
    science, control science, cognitive science, and artificial intelligence. This title will appeal to researchers, engineers,
    and professionals specializing in command-and-control systems and intelligent decision-making systems. It will also serve
