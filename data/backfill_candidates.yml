- id: d2714d8c0bdf
  title: Vision-Based UAV Localization by Aerial and Satellite Image Matching
  year: 2026
  venue: IEEE Access
  authors:
  - Huei-Yung Lin
  - Po-Hsun Chen
  - Ching-Wei Yeh
  abstract: The deployment of Unmanned Aerial Vehicles (UAVs) in tasks such as urban surveillance, disaster assessment, and
    logistics necessitates enhanced autonomous navigation capabilities. Traditionally, the localization of UAVs relies on
    Global Navigation Satellite Systems (GNSS). However, in urban canyons, indoor environments, or bad weather conditions,
    GNSS signals are prone to obstruction and interference, leading to degraded navigation performance. To overcome the limitations,
    the development of GNSS-denied alternative localization techniques has become an important topic. In this paper we present
    an UAV visual localization and heading estimation in GNSS-denied environments by matching the UAV overhead imagery with
    satellite maps. The proposed NavCLIP constructs an image database using satellite data and retrieves the best-matched
    by querying with aerial images. A homography matrix is then employed to estimate the UAV location and yaw angle. Due to
    the lack of publicly available datasets, this work collects an aerial and satellite image dataset (UAV-Satellite Dataset)
    for training and validation. The experimental results show strong localization performance on the Google Earth dataset,
    while UAV flight experiments exhibit larger localization errors under the real-world conditions. In addition, the proposed
    technique improves over the GeoCLIP baseline and achieves low heading estimation error. Code and dataset are available
    on GitHub at https://github.com/PHChenGit/NavCLIP
