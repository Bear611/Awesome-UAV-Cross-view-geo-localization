  abstract: Küresel iklim değişikliği ve artan antropojenik baskılar, Akdeniz Havzası’ndaki tatlı su rezervleri üzerinde giderek
    derinleşen hidrolojik sorunlara yol açmaktadır. Bu çalışma Türkiye’nin ekolojik açıdan en hassas bölgelerinden biri olan
    Göller Yöresi’nde yer alan dokuz seçilmiş gölün 1990–2025 yılları arasındaki su yüzey alanı değişimlerini ve bu değişimlerin
    göl ve yakın çevresindeki termal rejim üzerindeki etkilerini uzaktan algılama yöntemleriyle incelemektedir. Çalışmanın
    temel amacı göl yüzeylerinde meydana gelen uzun süreli daralmaların kara ve su yüzey sıcaklıkları üzerinden eğilim analizleri
    ile pozitif bir geri besleme mekanizması oluşturup oluşturmadığını belirlemektir. Bu kapsamda Landsat uydu görüntüleri
    kullanılarak hesaplanan Modifiye Edilmiş Normalize Fark Su İndeksi sonuçları otuz beş yıllık süreçte Göller Yöresi genelinde
    belirgin sistematik ve süreklilik arz eden bir su kaybı eğilimini ortaya koymuştur. Termal süreçlerdeki değişimler Kara
    Yüzeyi Sıcaklık İndeksi ve Su Yüzeyi Sıcaklık İndeksi kullanılarak değerlendirilmiştir. Bulgular Akşehir, Karataş ve Yarışlı
    göllerinin yaz dönemlerinde tamamen kuruyarak karasal yüzeylere dönüştüğünü göstermektedir. Burdur Gölü yaklaşık %40,
    Eber Gölü ise %80 oranında su yüzey alanı kaybı yaşamıştır. Türkiye’nin en büyük tatlı su rezervleri olan Beyşehir ve
    Eğirdir göllerinde alansal değişim fazla olmasa da su hacmi açısından önemli kayıplar gerçekleşmiştir. Buna karşılık Salda
    ve Gölhisar gölleri derin morfolojileri, hidrojeolojik beslenme koşulları ve koruma statülerinin etkisiyle yüzey alanlarını
    görece olarak koruyabilmiştir. Çalışmada kullanılan yöntemlerden Mann–Kendall trend analizleri göl yüzeylerindeki gerileme
    ile yüzey sıcaklıkları arasında güçlü bir pozitif ilişki belirlenmiştir. Sonuçlar göl alanı kayıplarının yalnızca hidrolojik
    bir sorun olmadığını aynı zamanda yüzey enerji dengesini bozarak yerel ve bölgesel ölçekte ısınmayı pekiştiren bir mekanizma
    oluşturduğunu göstermektedir.
