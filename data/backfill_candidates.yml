- id: 6dfe0be64f75
  title: A Comprehensive Review on Pre- and Post-Harvest Perspectives of Potato Quality and Non-Destructive Assessment Approaches
  year: 2025
  venue: Applied Sciences
  authors:
  - Lakshmi Bala Keithellakpam
  - C. Karunakaran
  - C. B. Singh
  - Digvir S. Jayas
  - Renan Danielski
  abstract: Potato (Solanum tuberosum) is an important crop globally, being a starchy, energy-dense food source rich in several
    micronutrients and bioactive compounds. Achieving food security for everyone is highly challenging in the context of growing
    populations and climate change. As a highly adaptable crop, potatoes can significantly contribute to food security for
    vulnerable populations and have outstanding commercial relevance. Specific pre- and post-harvest parameters influence
    potato quality. It is vital to understand how these factors interact to shape potato quality, minimizing post-harvest
    losses, ensuring consumer safety, and enhancing marketability. This review highlights how pre-harvest (cultivation approaches,
    agronomic conditions, biotic and abiotic stresses) and post-harvest factors impact tuber’s microbial stability, physiological
    behaviour, nutritional, functional attributes and frying quality. Quality parameters, such as moisture content, dry matter,
    starch, sugar, protein, antioxidants, and color, are typically measured using both traditional and modern assessment methods.
    However, advanced non-destructive techniques, such as imaging and spectroscopy, enable rapid, high-throughput quality
    inspection from the field to storage. This review integrates recent advancements and specific findings to identify factors
    that contribute to substantial quality degradation or enhancement, as well as current challenges. It also examines how
    pre- and post-harvest factors collectively impact potato quality. It proposes future directions for quality maintenance
    and enhancement across the field and storage, highlighting research gaps in the pre- and post-harvest linkage.
