  abstract: Abstract In India, there is an urgent need to meet the food production due to the country’s rapidly expanding
    population. There is a downturn in the farming sector and the farmers are shifting to other firms due to insufficient
    output in the sector. Furthermore, traditional agricultural practices followed in India are insufficient to meet the increasing
    food demand. The costs and operational times generally increase as the majority of agricultural activities depend significantly
    on human labor. The increasing prevalence of machinery on farms is not a substitute for the necessity for human labor
    completely. This highlights the critical importance of agricultural automation. This study highlights the significant
    impact of UAVs on precision and smart agriculture through automation. The implementation of drones in diverse agricultural
    tasks has the potential to reduce labor demands and streamline operational efficiency. This review offers a comprehensive
    overview of conceptual design, command flow operation, micro-controller boards, remote-control systems, and attachments
    such as sensors, cameras, and motors in UAVs, aimed at automating agricultural activities. The integration of the Internet
    of Things (IoT) in unmanned aerial vehicles (UAVs), alongside artificial intelligence and machine learning, enhances accuracy
    and precision in agricultural operations. This study also addresses future advancements, limitations, and challenges that
