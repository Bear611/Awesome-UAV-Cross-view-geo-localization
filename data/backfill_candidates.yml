  title: 3D Positioning of Drones through Images
  year: 2024
  venue: Sensors
  authors:
  - Jianxing Yang
  - Enhui Zheng
  - Jiqi Fan
  - Yuwen Yao
  abstract: Drones traditionally rely on satellite signals for positioning and altitude. However, when in a special denial
    environment, satellite communication is interrupted, and the traditional positioning and height determination methods
    face challenges. We made a dataset at the height of 80-200 m and proposed a multi-scale input network. The positioning
    index RDS achieved 76.3 points, and the positioning accuracy within 20 m was 81.7%. This paper proposes a method to judge
    the height by image alone, without the support of other sensor data. One height judgment can be made per single image.
    Based on the UAV image-satellite image matching positioning technology, by calculating the actual area represented by
    the UAV image in real space, combined with the fixed parameters of the optical camera, the actual height of the UAV flight
    is calculated, which is 80-200 m, and the relative error rate of height is 18.1%.
