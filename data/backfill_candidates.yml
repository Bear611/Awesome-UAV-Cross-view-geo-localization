- id: c2907ce6f6ec
  title: 'British Military Soil Maps of North-East Italy: Terrain Assessment Before Allied Victory in World War II'
  year: 2026
  venue: The Cartographic Journal
  authors:
  - Edward Rose
  abstract: 'In the final winter of World War II, between October 1944 and January 1945, British forces in Italy supplemented
    their use of topographical maps by generating innovative ‘soil’ maps – used to predict cross-country trafficability and
    potential airfield construction sites. These assisted Allied troops advancing northwards across the valley of the Po:
    a major river that formed a natural obstacle to operational movement. Terrain assessment was aided in theatre by geologist
    Major J.V. Stephens and remotely by the (British) Inter-Service Topographical Department and the (American) Military Geology
    Unit of the US Geological Survey. ‘Soil’ maps at 1:250,000 were overprinted for Venice, Verona, Udine and Belluno areas
    after geological guidance; five maps for the Po region at 1:100,000 were drawn by Middle East Forces. Poor weather delayed
    the final Allied offensive in northern Italy until April 1945. Advance to victory was then rapid – across British and
    German thematic map areas.'
