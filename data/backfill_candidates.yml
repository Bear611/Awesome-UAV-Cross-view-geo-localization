  summary:
    summary_en: This paper addresses UAV geolocalization in GNSS-denied environments, where the goal is to estimate the aerial
      vehicle's position by matching its onboard camera view against a database of geo-referenced aerial/satellite imagery.
      The authors observe that current embedding-based methods, which encode the UAV view and reference tiles into a compact
      vector space and retrieve the best matching tile, can be brittle under seasonal, illumination, orientation, and altitude
      variations. Their core contribution is a preprocessing step that feeds edge maps (extracted via Canny or Segment Anything
      Model) into the encoders instead of raw grayscale images, exploiting the fact that geometric contours remain stable
      across appearance changes. They compare BoVW, Auto-Encoder, and Triplet Model backends, finding that an Auto-Encoder
      trained on edge reconstructions yields the strongest localization accuracy and improved robustness to roll errors and
      altitude drops. A Lowe's-ratio-based confidence criterion is added to reject ambiguous matches. Experiments are conducted
      exclusively on a custom synthetic dataset built from IGN BD Ortho imagery across four simulated trajectories (A–D) at
      altitudes ranging from 40 m to 4000 m, with reference tiles from one year and UAV views rendered from a different year
      to simulate seasonality. Reported localization accuracy at a 15 m radius reaches up to 99.67% on trajectory C with the
      edge-based Auto-Encoder, substantially outperforming grayscale baselines, while the confidence filter trades coverage
      for higher precision.
