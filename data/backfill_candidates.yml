- id: 79b1455b2e6d
  title: 'ChronoSurv: A Clinical Pathway-Guided Graph Framework for Multimodal Survival Analysis'
  year: 2026
  venue: arXiv
  authors:
  - Hugo Miccinilli
  - Theo Di Piazza
  abstract: Accurate survival prediction is essential for personalized treatment planning in head and neck cancer, yet remains
    challenging due to the heterogeneous and high-dimensional nature of multimodal clinical data. While deep survival models
    have improved predictive performance over classical statistical approaches, existing methods typically rely on static
    fusion strategies or temporally agnostic modeling, limiting their ability to capture structured clinical workflows. In
    this work, we propose ChronoSurv, a heterogeneous hierarchical directed graph framework for multimodal survival analysis.
    ChronoSurv represents patient care as a progression-aware clinical trajectory using directed graphs aligned with key diagnostic
    steps. A hierarchical topology incorporates fine-grained, coarse, and global representations, further supporting flexible
    adaptation to missing modalities, while heterogeneous message passing models complex and asymmetric relationships across
    modalities and clinical steps. Experimental results on two public datasets demonstrate that ChronoSurv achieves state-of-the-art
    discriminative performance while maintaining statistically reliable calibration. Comprehensive ablation studies further
    confirm the contribution of each architectural component, highlighting the potential of trajectory-aware graph modeling
    for multimodal survival prediction.
