- id: 4125cdc9d2ec
  title: Progressive High-Confidence Pseudo-Labeling for Unsupervised Cross-View Image Geo-Localization
  year: 2026
  venue: ''
  authors:
  - Yu Long
  - Chunfang Yang
  - Ma Zhu
  - Xu Wang
  - Pei Yang
  abstract: Cross-view image geo-localization (CVGL) is typically cast as cross-view retrieval, which matches a query image
    (e.g., a drone view) to its geo-tagged overhead counterpart in a large satellite image database. Supervised CVGL methods
    rely on large-scale paired annotations, resulting in high labeling cost and limited cross-domain generalization. Recent
    unsupervised cross-view geo-localization (UCVGL) approaches mine pseudo supervision via clustering or pseudo-sample generation,
    but viewpoint discrepancy often introduces noisy pseudo-labels in early training and makes it difficult to balance pseudo-label
    precision and coverage. To address these challenges, we propose a Progressive High-Confidence Pseudo-Labeling (PHPL) method.
    PHPL first generates high-confidence initial pseudo-labels through re-ranking-enhanced density clustering and cross-view
    label propagation, providing reliable cold-start supervision. Subsequently, a dynamic-margin mutual-matching mechanism
    adaptively relaxes the selection constraints as training progresses, progressively mining additional positive pairs to
    achieve a dynamic equilibrium between pseudo-label precision and coverage. Experiments demonstrate that, without relying
    on any annotations, our method generates pseudo-labels with 98.70% coverage and 100% precision on the University-1652
    dataset. On both University-1652 and SUES-200 benchmarks, PHPL achieves superior retrieval performance compared to most
    existing unsupervised methods and approaches the performance of supervised counterparts.
