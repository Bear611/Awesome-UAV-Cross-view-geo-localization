  summary:
    summary_en: 'This paper addresses GPS-denied UAV self-positioning through cross-view image retrieval, noting that existing
      part-based and local-feature methods struggle with the fine-grained spatial discrimination and dynamic urban scene variations
      required when drone imagery must be matched to satellite references. The proposed CEUSP framework, built on a ConvNeXt-T
      backbone with weight sharing across branches, introduces two core components: a Rubik''s Cube Attention (RCA) module
      paired with a Context-Aware Channel Integration (CACI) module that exploit cross-dimensional interactions across spatial
      and channel axes for richer feature representation, and a Dynamic Sampling Strategy (DSS) that adaptively blends geographically
      proximate negatives with feature-similarity negatives throughout training. A set of classifier heads together with cross-entropy,
      hard-mining triplet, and bidirectional KL divergence losses optimises category, feature, and distribution alignment.
      Evaluation on the DenseUAV dataset shows state-of-the-art UAV self-positioning performance, while experiments on the
      University-1652 benchmark deliver competitive drone-to-satellite and satellite-to-drone retrieval results, confirming
      the method''s effectiveness across dense urban and general cross-view geo-localization settings.'
