- id: 912da03dc53d
  title: Development of a Xylene-Free Sample Preparation Protocol for Quantitative Proteomics of Clinically Relevant Formaldehyde-Fixed
    Paraffin-Embedded Needle Biopsy Samples
  year: 2026
  venue: Proteomes
  authors:
  - Gontse Mabuse Moagi
  - Lívia Beke
  - Gábor Méhes
  - Gábor Kecskeméti
  - Zoltán Szabó
  - Lilla Turiák
  - Éva Csősz
  abstract: 'Background: Fresh frozen tissues are considered the gold standard for proteomic analyses due to their superior
    preservation of protein integrity; however, their use is limited by the logistical and financial requirements of long-term
    cold storage. Formaldehyde-fixed paraffin-embedded (FFPE) tissues provide a practical alternative, owing to their stability
    and widespread availability in clinical settings. A critical step in FFPE proteomics is deparaffinization, which traditionally
    relies on organic solvents such as xylene, along with the efficient reversal of formaldehyde-induced crosslinks. Methods:
    In this study, we evaluated multiple FFPE protein extraction and digestion workflows including chaotropic, surfactant-based,
    and detergent-free approaches in combination with xylene-free deparaffinization strategies, using label-free data-independent
    acquisition (DIA) LC-MS/MS. Results: Among the tested methods, a chaotropic, reductant, and surfactant-free in-solution
    digestion workflow demonstrated robust protein and peptide recovery. A modified version of this protocol further improved
    peptide coverage while maintaining comparable protein depth. The applicability of the optimized workflow was assessed
    using FFPE needle biopsy samples from control, hepatic steatosis, and liver fibrosis groups. Exploratory proteomic patterns
    were observed across conditions, with hepatic steatosis associated with early activation of stress-response pathways,
    while fibrosis showed evidence suggesting altered lipid metabolism. Conclusions: Overall, this study presents a simple,
    xylene-free, and MS-compatible workflow for FFPE proteomics that is suitable for low-input clinical samples and may support
    broader application of archival tissues in proteomic research.'
