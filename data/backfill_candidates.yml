- id: 24ba95d478a4
  title: 'Comprehensive Review of Doppler Shift Localization Methods: Advances, Limitations, and Research Opportunities'
  year: 2026
  venue: arXiv
  authors:
  - Rafal Szczepanik
  abstract: Reliable geolocation of non-cooperative emitters in environments where Global Navigation Satellite Systems (GNSS)
    are unavailable or degraded is a key enabler for spectrum regulation, emergency response, autonomous mobility, and Integrated
    Sensing and Communication (ISAC) services in 5G/6G systems. Doppler-based techniques - from single-receiver Signal Doppler
    Frequency (SDF) fixes through multi-node Frequency Difference of Arrival (FDOA) and Direct Position Determination (DPD)
    to derivative-enhanced and learning-assisted hybrids - exploit radial-velocity-induced frequency shifts as a passive,
    high-resolution localization cue accessible with commodity software-defined radios, millimeter-wave access points, or
    acoustic sensors. This review consolidates over a decade of research across radio, acoustic, and satellite domains. It
    introduces a unifying taxonomy that divides the field into five technique families, outlining their evolution, measurement
    models, and estimator archetypes. It then compares algebraic, Bayesian, convex, and neural inference frameworks under
    realistic impairments such as oscillator drift, multipath, and asynchronous clocks, highlighting conditions where derivative
    Doppler metrics tighten the Cramer-Rao bound with minimal hardware cost. Environment-specific deployments are examined,
    from urban canyons and GNSS-denied tunnels to underwater, radar, UAV-swarm, and multi-orbit satellite scenarios, with
    prototype accuracies reaching meter scale using low-size, weight, and power payloads. Finally, the survey distils design
    recommendations for mobile and tactical operations and identifies open research challenges in frequency-reference integrity,
    multipath-aware modelling, edge-constrained computation, and trajectory-aware sensing.
