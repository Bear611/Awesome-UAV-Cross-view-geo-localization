    summary_en: This paper addresses UAV-to-satellite cross-view geo-localization (CVGL) under unknown UAV image scales, pointing
      out that most existing methods assume scale consistency between UAV queries and satellite galleries, which causes field-of-view
      misalignment and degraded feature matching in real-world scenarios. The authors propose a semantic geometric framework
      that recovers absolute metric scale from monocular UAV images using small vehicles as semantic anchors, selected for
      their stable size priors, ubiquity, and detectability. A Decoupled Stereoscopic Projection Model decomposes vehicle
      dimensions into radial and tangential components to compensate for perspective distortions in 2D detections of 3D objects,
      and a dual-dimension fusion strategy combined with Interquartile Range-based aggregation mitigates intra-class size
      variation and detection noise. The recovered global scale drives scale-adaptive cropping of satellite imagery to improve
      UAV-to-satellite feature alignment. Experiments are conducted on augmented DenseUAV (DenseUAV+) and UAV-VisLoc (UAV-VisLoc+)
