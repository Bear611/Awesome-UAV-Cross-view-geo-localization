- id: 67d9731de8a7
  title: Scalable Training of Spatially Grounded 2D Vision-Language Models for Radiology
  year: 2026
  venue: arXiv
  authors:
  - Yusuf Salcan
  - Simon Ging
  - Robin Schirrmeister
  - Philipp Arnold
  - Elmar Kotter
  - Behzad Bozorgtabar
  - Thomas Brox
  abstract: We study how to train visually grounded vision-language models (VLMs) for radiology without manual spatial annotations.
    We introduce RefRad2D, a large-scale bilingual (German/English) dataset of 1.2M CT and MR image-text pairs derived from
    clinical practice, with task-specific VQA and spatial grounding subsets generated automatically via LLM-based curation
    and automated segmentation. Trained on this data, our model RadGrounder jointly performs report generation, visual question
    answering, and spatial grounding via bounding-box detection or segmentation. On external VQA benchmarks (Slake, VQA-RAD),
    RadGrounder achieves competitive results with specialized medical VLMs. Adding our clinical data to the training mixture
    improves open-ended VQA over fine-tuning on the downstream datasets alone, showing the transferability of our dataset.
    Crucially, adding grounding supervision does not degrade language quality, enabling spatially verifiable outputs at no
    cost to VQA performance.
