- id: 54676791891a
  title: An Autonomous Positioning Method for Drones in GNSS Denial Scenarios Driven by Real-Scene 3D Models
  year: 2025
  venue: Sensors
  authors:
  - Yongqiang Cui
  - Xue Gao
  - Rui Yu
  - Xi Chen
  - Dingwen Wang
  - Di Bai
  abstract: Drones are extensively utilized in both military and social development processes. Eliminating the reliance of
    drone positioning systems on GNSS and enhancing the accuracy of the positioning systems is of significant research value.
    This paper presents a novel approach that employs a real-scene 3D model and image point cloud reconstruction technology
    for the autonomous positioning of drones and attains high positioning accuracy. Firstly, the real-scene 3D model constructed
    in this paper is segmented in accordance with the predetermined format to obtain the image dataset and the 3D point cloud
    dataset. Subsequently, real-time image capture is performed using the monocular camera mounted on the drone, followed
    by a preliminary position estimation conducted through image matching algorithms and subsequent 3D point cloud reconstruction
    utilizing the acquired images. Next, the corresponding real-scene 3D point cloud data within the point cloud dataset is
    extracted in accordance with the image-matching results. Finally, the point cloud data obtained through image reconstruction
    is matched with the 3D point cloud of the real scene, and the positioning coordinates of the drone are acquired by applying
    the pose estimation algorithm. The experimental results demonstrate that the proposed approach in this paper enables precise
    autonomous positioning of drones in complex urban environments, achieving a remarkable positioning accuracy of up to 0.4
    m.
