- id: e847c98f3f43
  title: 'Morphotectonic and structural signatures of the Savrun Fault: implications for its Neogene evolution (SE Turkey'
  year: 2026
  venue: Acta Geologica Polonica
  authors:
  - Ahmet Can Akıncı
  - Ulvi Can Ünlügenç
  - Hakan Güneyli
  - Erhan Altunel
  - Ali Gökhan ÖÇGÜN
  - İbrahim Adliğ
  abstract: The destructive earthquakes of February 6, 2023 in southern Turkey renewed scientific interest in neighboringfault
    systems whose late-stage tectonic histories remain poorly constrained. One such structure is the SavrunFault, located
    northeast of Adana and southwest of the Sürgü-Çardak Fault. This study investigates the tectoniccharacter and Neogene
    to Quaternary evolution of the Savrun Fault through an integrated approach that combinesfield observations, lithostratigraphic
    relationships, morphotectonic indices and GIS-based remote-sensinganalyses. The fault extends from Kozan toward Göksun
    and exhibits well-developed structural elements, includingfault planes, fracture systems and associated deformation within
    Lower to Middle Miocene sedimentaryunits. In contrast, overlying Quaternary colluvial and alluvial deposits show no evidence
    of displacementor disruption. Morphotectonic indices (Smf, SL, HI, Af, Vf) reveal localized landscape modification, yet
    theundisturbed nature of young fluvial and alluvial units indicates that the fault has not experienced documentedreactivation
    during the Quaternary. Despite its close spatial relationship to the seismically active Sürgü-ÇardakFault, the Savrun
    Fault lacks geomorphic or stratigraphic indicators of late-stage slip. Its southern segment,particularly near the Bağdaş
    Plateau, is interpreted as a transpressional zone that likely ceased motion duringthe Middle to Late Miocene. These combined
    observations suggest that, although structurally prominent, theSavrun Fault plays no measurable role in present-day deformation.
    The refined tectonic interpretation presentedhere contributes to a clearer understanding of fault architecture and Neogene
    landscape evolution in the centralAmanos-Göksun region.
