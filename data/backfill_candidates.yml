- id: 336fd8a30882
  title: Behavior Analysis of Rhinoceroses and their Monitoring using a 3D Geovisualization Prototype
  year: 2026
  venue: AGILE GIScience Series
  authors:
  - Martine Besse
  - Basile Thullen
  - Maryam Lotfian
  - Vanessa Duthé
  - Siphesihle Mbongwa
  - Jürgen Ehrensberger
  - Jens Ingensand
  abstract: Abstract. Black and white rhinoceroses are emblematic large mammals of the African wilderness, yet poaching and
    habitat disturbance are critically endangering their survival. To ensure the conservation of the species, the population
    needs to be closely monitored. This paper presents a prototype of an integrated system designed to support rhino monitoring
    by providing a complete data pipeline, from data collection and visualization, to behavioral analysis. As part of a conservation
    program, more than 200 rhinos across seven nature reserves in South Africa and Mozambique have been fitted with GPS horn
    pods. The transmitted data is then displayed in real-time on Rhinos3D, a web-based 3D visualization which allows the rhinos
    to be visualized in their 3D environment alongside their pre-calculated home ranges. The scientific value of this infrastructure
    is demonstrated by an exploratory analysis of a small data sample which highlights differences in activity patterns and
    home range size across species, sex, season, and time of day. The long-term aim of the Rhinos3D platform is to function
    as a digital twin of a game reserve by integrating additional variables (e.g., vegetation, weather), enriching individual
    rhino profiles with movement and activity metrics, and developing automated anomaly detection to identify deviations from
    normal behavior, thus becoming a key asset for field rangers and researchers in rhino conservation.
