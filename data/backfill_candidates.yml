    berpengaruh terhadap efisiensi produksi air PDAM Kota Yogyakarta, Kabupaten Sleman dan Bantul pada tahun 2020 berturut-turut
    sebesar 1.98%, 6.78% dan 15.96%. Kehilangan air distribusi PDAM setelah adanya pelayanan SPAM Regional Kartamantul cenderung
