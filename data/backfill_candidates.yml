- id: 674ad41fd127
  title: The Impact of Chrysin on The Folliculogenesis and Ovarian Apoptosis in Ischemia-Reperfusion Injury in The Rat Model
  year: 2022
  venue: International Journal of Fertility and Sterility
  authors:
  - Z. Mohammadi
  - Seyedmostafa Hosseinianvari
  - Negin Ghazalian
  - Masoumeh Fani
  - Azam Sadat Mahmudian
  - Balal Brazvan
  - M. Shokoohi
  - Seyd-Hosein Abtahi-Evari
  - M. Moghimian
  abstract: Background The ovarian Ischemia/reperfusion is one of the gynecological emergency concerns that may lead to the
    ovary damage and folliculogenesis. The present research aimed to evaluate the impact of the Chrysin (CH) on the ischemia-reperfusion
    (I/R) injury in the rat model. Materials and Methods In this experimental research, 48 adult female rats, 8 weeks age
    and 180-200 g weight, have been categorized into 6 equal groups (n=8) including one sham and 5 ovarian torsion groups
    (OT+CH groups) that received different treatments. Each group has been treated 30 min before detorsion with gavage of
    CH or normal saline for 1 week and pregnant mare serum gonadotropin (PMSG) has been injected on the day 5 for initiating
    folli- culogenesis. Finally, bio-chemical, molecular, histopathological, apoptotic and hormonal evaluations were performed.
    Results The anti-oxidant enzyme, superoxide dismutase and glutathione peroxidase, ameliorated in the ovarian tis- sues
    of the OT+CH groups in comparison with the OT group (P<0.001). Moreover, the level of serum Luteinizing hormone considerably
    declined and estradiol level (P<0.001), partly enhanced in the rats treated with CH in com- parison with the ones in the
    OT group (P<0.05). In addition, histopathological scores of the OT+CH groups amelio- rated in comparison with the OT group
    scores (P<0.05). Furthermore, the expression Caspase-3 and Bax genes were significantly increased while the expression
    of Bcl-2 was notably decreased in the OT group in comparison with the sham group (P<0.05). Conclusion Here, it seems that
    CH is possibly beneficial for the protection of ovaries against reperfusion injury and ischemia.
