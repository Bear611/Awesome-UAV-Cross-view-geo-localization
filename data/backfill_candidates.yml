- id: f44f33001447
  title: Analysis of Diurnal Air Temperature Trends and Pattern Similarities in Highland and Lowland Stations of Italy and
    UK
  year: 2024
  venue: International Journal of Climatology
  authors:
  - C. Liyew
  - Rosa Meo
  - S. Ferraris
  - Elvira Di Nardo
  abstract: In this study, an analysis of hourly air temperatures in four groups of 32 stations from the UK highland (5 stations),
    UK lowland (4 stations), Italian highland (11 stations), and Italian lowland (12 stations) at different altitudes was
    carried out over the period from 2002 to 2021. The study aimed to examine the trends of each hour of the day during this
    period, over different averaging time windows (10‐day, 30‐day, and 60‐day). The trends were computed using the Mann–Kendall
    trend test and Sen's slope estimator. The similarity of trends within and across the groups of stations was assessed using
    the hierarchical clustering with dynamic time warping technique. An additional analysis was conducted to show the correlation
    of trends among the group of stations using the correlation distance matrix. Hierarchical clustering and distance correlation
    analysis show trend similarities and correlations, also indicating dissimilarities among different groups. Using 30‐day
    averages, significant warming trends in specific months at the Italian stations are evident, especially in February, July,
    August, and December. The UK highland stations did not show statistically significant trends, but clear pattern similarities
    were found within the groups, especially in certain months. The ultimate goal of this article is to provide insights into
    temperature dynamics and climate change characteristics on regional and diurnal scales.
