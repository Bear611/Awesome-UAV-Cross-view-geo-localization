- id: 423bd1bec5f1
  title: Spectral Spreading Control Approach Applied to a LoRaWAN Network Implementation for Mobile Robotic Communication
    R2X
  year: 2024
  venue: Congresso Brasileiro de Automática
  authors:
  - Carlos Daniel de Sousa Bezerra
  - Igor Henrique Leite Cardoso
  - Carlos Alberto Vasconcelos Bezerra
  - Flávio Henrique Teles Vieira
  abstract: LoRa networks have emerged as a robust solution offering greater range than other Internet of Things (IoT) technologies
    for sensing in urban and rural environments. The flexibility of this wireless protocol expands its applicability to mobile
    devices, enhancing its use in dynamic contexts such as industrial robotic systems and autonomous vehicles. This paper
    proposes an algorithm we call Forced Data Rate, which consists of an adaptation of the algorithm known in the literature
    as Adaptive Data Rate (ADR) to control the spectral spreading of LoRa technology. To evaluate the efficiency of the proposed
    algorithm as well as the ADR, a LoRaWAN communication system for autonomous robotic devices is implemented using embedded
    devices, such as the RA08-H in conjunction with RP2040 microcontrollers and an SX1302-based gateway, to create a dynamic
    sensing scenario that fits the concept of Robot to Everything (R2X). The results obtained indicate that the ADR algorithm
    did not provide efficient control, in the considered scenario, of spectral spreading with moving devices. On the other
    hand, using the proposed Forced Data Rate algorithm, it was possible to ensure that the mobile robot navigated through
    the test circuit considered without interruption of the robot’s transmission with temperature and humidity data.
