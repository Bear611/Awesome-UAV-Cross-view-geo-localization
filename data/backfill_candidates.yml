- id: 98f645deec7c
  title: 'ABot-Earth 0.5: Generative 3D Earth Model'
  year: 2026
  venue: arXiv
  authors:
  - Ming Qian
  - Tianjian Ouyang
  - Mingchao Sun
  - Zijian Wang
  - Jincheng Xiong
  - Jiarong Han
  - Yongchang Zhang
  - Jiawei Zhang
  - Xu Wang
