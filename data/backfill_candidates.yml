- id: 196f02d31e03
  title: Topological Codes Based on Space Groups
  year: 2026
  venue: arXiv
  authors:
  - Chong-Yuan Xu
  - Ze-Chuan Liu
  - Yong Xu
  abstract: Topological codes form one of the most important classes of stabilizer codes. Most existing algebraic constructions
    and analyses of topological codes assume translation invariance. Here we show that topological codes can arise in more
    general settings by incorporating point group operations. The central construction is a class of Calderbank-Shor-Steane
    (CSS) codes called space-group codes, whose check operators are built from group-algebra templates over space groups that
    combine translations with point-group operations. We develop methods for analyzing topological properties of space-group
    codes using ring-modules and their invariant theory. At first glance, space-group codes might appear to complicate practical
    implementation; however, we find that they can exhibit greater locality than previous codes based purely on translations.
    Our framework thus extends the landscape of topological codes and opens up a broader design space for the co-design of
    topological codes with quantum computing platforms.
