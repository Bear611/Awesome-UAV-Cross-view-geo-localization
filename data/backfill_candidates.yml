  abstract: Up to the present day, technology has given rise to the most significant legal challenges facing humanitarian
    principles, due to their inadequacy and failure to encompass all dimensions associated with the use of modern weapons.
    It is therefore crucial to highlight an urgent need to establish new international agreements based on scientific techniques,
    aimed at protecting civilians and the environment. Hence, the descriptive analytical method was used to determine the
    impact of scientific techniques on the application of the rules of international humanitarian law. Thus, it is certain
