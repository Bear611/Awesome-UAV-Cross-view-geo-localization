  title: Geometry-Aware Enhancement and Data Augmentation for Street-to-Satellite Geo-localization
  year: 2025
  venue: ''
  authors:
  - Xingbo Wang
  - Yongchao Xu
  - Yuanfei Bao
  - Xueyang Fu
  - Zheng-Jun Zha
  abstract: Cross-view geo-localization aims to determine the location of a ground-level image by matching it with satellite
    imagery. In the street-to-satellite setting, this task is especially challenging due to limited field-of-view, occlusion,
    and strong appearance gaps across views and regions. We propose a lightweight and geometry-aware framework that enhances
    front-view street images via a calibration-free spherical transform. This transformation projects single-view images into
    a bird's-eye view (BEV), effectively aligning their perspective with satellite imagery. Without relying on 3D reconstruction
    or camera parameters, the transformed views retain structural consistency and improve cross-view feature compatibility.
    The enhanced representations are fed into a dual-branch contrastive learning framework, where features from street and
    satellite views are jointly optimized using an InfoNCE loss. Extensive experiments on the ACMMM 2025 Multimedia Street-Satellite
    Matching Challenge demonstrated our method's capabilities, securing a third-place finish while showcasing strong performance
    under adverse conditions, across different regions, and maintaining high efficiency and scalability.
