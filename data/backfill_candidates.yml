  summary:
    summary_en: This paper addresses UAV self-localization by reframing it as a heatmap classification problem and targeting
      a known weakness of the standard Hanning Loss used inside the WAMF-FPI pipeline. The authors observe that Hanning Loss
      tends to produce red clusters and an unbalanced weighting between positive and negative samples, which degrades localization
      accuracy. To address this, they propose Focal Hanning Loss, a drop-in replacement loss that adds a focal-style modulation
      factor to dynamically down-weight easy samples and emphasize harder ones, while preserving the original Hanning formulation.
      The training pipeline is further stabilized through data augmentation, specifically random cropping and scaling of the
      satellite reference images, to simulate multi-scale variation during learning. Experiments are conducted on a custom
      dataset derived from DenseUAV, with the WAMF-FPI backbone retrained under the proposed objective. The authors report
      a 3.4-point improvement in the Relative Distance Score metric over the original Hanning Loss baseline, although detailed
      numerical tables and split-level results are not available in the preview text.
