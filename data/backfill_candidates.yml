- id: f7bc9697b88a
  title: 'Göller Yöresi’nde Hidrolojik Kayıpların Yüzey Sıcaklıkları Üzerindeki Etkileri: Uzaktan Algılama Tabanlı Bir İnceleme'
  year: 2026
  venue: Menba Kastamonu Üniversitesi Su Ürünleri Fakültesi Dergisi
  authors:
