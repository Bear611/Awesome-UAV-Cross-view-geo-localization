- id: 75af3e2f3b7f
  title: Omics-driven plant breeding through phenomics-enviromics crosstalk
  year: 2026
  venue: Nature Communications
  authors:
  - Huihui Li
  - Shang Gao
  - Takele Weldu Gebrewahid
  - Wenxue Li
  - Jiankang Wang
  - Zanping Han
  - Matthew Reynolds
  - J. L. Araus
  - Sarah Hearne
