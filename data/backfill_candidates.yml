  title: Cooperative navigation factor graph optimization method based on robust variance component estimation
  year: 2026
  venue: Measurement Science and Technology
  authors:
  - Hongru Wang
  - T Fang
  - Mykola Kaliuzhnyi
  abstract: Abstract To address the problem of insufficient cooperative positioning accuracy for unmanned aerial vehicle (UAV)
    formations in complex environments, a robust Helmert variance component estimation (HVCE) based factor graph (FG) optimization
    method (RHFG) is proposed. The method employs the FG to model the relationships between UAV navigation states and measurement
    information, and utilizes HVCE to achieve adaptive weighting among different factors, thereby enhancing cooperative navigation
    accuracy in challenging environments. Furthermore, an improved IGG-III robust algorithm is introduced to improve the robustness
    of both HVCE and FG state estimation. The simulation results show that the proposed method can effectively fuse multi-source
    measurement information and relative navigation information, significantly improving the cooperative navigation accuracy
    of UAV formations.
