- id: 9460d9799cb5
  title: 'CV-SCSNet: A Complex-Valued Single-Stage Sea Clutter Suppression Network Based on Feature Residual Attention'
  year: 2025
  venue: IEEE Journal of Selected Topics in Applied Earth Observations and Remote Sensing
  authors:
  - Yongquan You
  - Huafeng He
  - Tao Zhou
  - Zhen Li
  - Liyuan Wang
  - Chuanxiang Li
  abstract: To address the challenge of strong sea clutter masking weak target signals for shore-based radar under complex
    sea states, this paper proposes a complex-valued single-stage sea clutter suppression network (CV-SCSNet) which is characterized
    by a multi-level residual structure. The interpretability of the network is enhanced by establishing a theoretical linkage
    between traditional subspace cancellation methods and residual learning. To mitigate the challenges posed by the non-uniform
    and non-stationary characteristics of sea clutter, a Feature Residual Attention Module (FRAM) is designed by incorporating
    large-kernel depthwise separable convolutions, a nonlinear feature fusion process, and an attention mechanism. This design
    enables the fusion of multi-scale features and contextual information, thereby improving the network's feature extraction
    capabilities. Furthermore, a complex-valued Huber loss function and an evaluation metric that considers target reconstruction
    performance are constructed to ensure training robustness and evaluation accuracy. Experimental results demonstrate that
    under input Signal-to-Clutter Ratio (SCR) conditions of down to -20 dB, the proposed CV-SCSNet can maintain the distortion
    rate of the reconstructed target below 20% on the radar scan evaluation dataset for sea states 3-4. It achieves a net
    SCR gain of over 40 dB, showcasing excellent clutter suppression performance and target reconstruction capability.
