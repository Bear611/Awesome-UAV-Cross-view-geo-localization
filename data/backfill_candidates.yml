      target across different platforms (drone, satellite, and ground) despite drastic viewpoint differences. The authors
      argue that prior work over-emphasizes either global descriptors or local contextual regions, so they propose a three-branch
      joint representation learning network built on information fusion strategies. The Global Information Fusion (GIF) branch
      enlarges the global receptive field of the backbone, the Local Information Fusion (LIF) branch mines contextual information
      with a square-ring partition, and the Local-guided-Global Information Fusion (LGGIF) branch uses CBAM attention to let
