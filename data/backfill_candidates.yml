- id: cba3f199a0d3
  title: 'DOCB: A Dynamic Online Cross-Batch Hard Exemplar Recall for Cross-View Geo-Localization'
  year: 2025
  venue: ISPRS International Journal of Geo-Information
  authors:
  - Wenying FAN
  - Xuetao Tian
  - Long Huang
  - Xiuwei Zhang
  - Fang Wang
  abstract: Image-based geo-localization is a challenging task that aims to determine the geographic location of a ground-level
    query image captured by an Unmanned Ground Vehicle (UGV) by matching it to geo-tagged nadir-view (top-down) images from
    an Unmanned Aerial Vehicle (UAV) stored in a reference database. The challenge comes from the perspective inconsistency
    between matched objects. In this work, we propose a novel metric learning scheme for hard exemplar mining to improve the
    performance of cross-view geo-localization. Specifically, we introduce a Dynamic Online Cross-Batch (DOCB) hard exemplar
    mining scheme that solves the problem of the lack of hard exemplars in mini-batches in the middle and late stages of training,
    which leads to training stagnation. It mines cross-batch hard negative exemplars according to the current network state
    and reloads them into the network to make the gradient of negative exemplars participating in back-propagation. Since
    the feature representation of cross-batch negative examples adapts to the current network state, the triplet loss calculation
    becomes more accurate. Compared with methods only considering the gradient of anchors and positives, adding the gradient
    of negative exemplars helps us to obtain the correct gradient direction. Therefore, our DOCB scheme can better guide the
    network to learn valuable metric information. Moreover, we design a simple Siamese-like network called multi-scale feature
    aggregation (MSFA), which can generate multi-scale feature aggregation by learning and fusing multiple local spatial embeddings.
    The experimental results demonstrate that our DOCB scheme and MSFA network achieve an accuracy of 95.78% on the CVUSA
    dataset and 86.34% on the CVACT_val dataset, which outperforms those of other existing methods in the field.
