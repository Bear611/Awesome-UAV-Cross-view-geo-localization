- id: cfabbb340c1b
  title: 'Climate Change and Emerging Arboviral Threats in Saudi Arabia: Epidemiology, Vector Ecology, and One Health Preparedness'
  year: 2026
  venue: Infectious Disease Reports
  authors:
  - Shuaibu Abdullahi Hudu
  - Emad A. Morad
  - Ghusun M. Alhazimi
  - Abdulgafar Olayiwola Jimoh
  abstract: Arboviral diseases are emerging as important public health threats in Saudi Arabia, driven by rapid urbanization,
    climate variability, the expansion of Aedes aegypti populations, international travel, and large-scale religious mass
    gatherings. Dengue virus remains the most established arboviral infection in the Kingdom, particularly in the southwestern
    regions such as Jazan and the western urban centers of Makkah and Jeddah, where ecological and climatic conditions are
    conducive to sustained vector survival and transmission. This review synthesizes current evidence on the epidemiology,
    vector ecology, climatic determinants, diagnostics, and prevention strategies of arboviral diseases in Saudi Arabia. Particular
    attention is paid to the impacts of rising temperatures, changes in rainfall patterns, urban heat island effects, population
    mobility, and cross-border movement on vector expansion and disease emergence. The review also identifies gaps in surveillance,
    diagnostics, insecticide resistance monitoring, and integrated vector management programs. Emerging preparedness strategies
    include climate-informed early warning systems, Geographic Information System-based risk mapping, multiplex molecular
    diagnostics, genomic surveillance, and community-based vector control. The review emphasizes the importance of implementing
    a One Health approach that combines data on humans, the environment, entomology, and climate. Currently, sustained endemic
    transmission of chikungunya and Zika viruses has not been conclusively demonstrated in Saudi Arabia, but increased environmental
    suitability and connectivity with other areas highlight the need for proactive surveillance and preparedness.
