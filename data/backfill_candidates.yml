- id: 3b17cd245298
  title: Identifying time patterns of highland and lowland air temperature trends in Italy and the UK across monthly and annual
    scales
  year: 2024
  venue: Advances in Statistical Climatology, Meteorology and Oceanography
  authors:
  - C. Liyew
  - Elvira Di Nardo
  - Rosa Meo
  - S. Ferraris
  abstract: 'Abstract. This paper presents a statistical analysis of air temperature data from 32 stations in Italy and the
    UK up to 2000 m above sea level from 2002 to 2021. The data came from both highland and lowland areas in order to evaluate
    the differences due to both location and elevation. The analysis focused on detecting trends at annual and monthly timescales,
    employing ordinary least-squares (OLS), robust S-estimator regression, and Mann–Kendall (MK) and Sen''s slope methods.
    Hierarchical clustering (HCA) using dynamic time warping (DTW) was then applied to the monthly data to analyze the intra-annual
    pattern similarity of trends within and across the groups. Two different regions of Europe were chosen because of the
    different climate and temperature trends – namely, the northern UK (smaller trends) and the northwest Italian Alps (larger
    trends). The main novelty of the work is to show that stations with similar locations and altitudes have similar monthly
    slopes by quantifying them using DTW and clustering. These results reveal the nonrandomness of different trends throughout
    the year and between different parts of Europe, with a modest influence of altitude in wintertime. The findings revealed
    that group average trends were close to the National Oceanic and Atmospheric Administration (NOAA) values for the areas
    in Italy and the UK, confirming the validity of analyzing a small number of stations. More interestingly, intra-annual
    patterns were detected commonly at the stations of each of the groups and are clearly different between them. Confirming
    the different climates, most highland and lowland stations in Italy exhibit statistically significant positive trends,
    while in the UK, both highland and lowland stations show statistically nonsignificant negative trends. Hierarchical clustering
    in combination with DTW showed consistent similarity between monthly patterns of means and trends within the group of
    stations and inconsistent similarity between patterns across groups. The use of the 12 distance correlation matrices (dcor)
    (one for each month) also contributes to what is the main result of the paper, which is to clearly show the different
    temporal patterns in relation to location and (in some months) altitude. The anomalous behaviors detected at 3 of the
    32 stations, namely Valpelline, Fossano, and Aonoch Mòr, can be attributed, respectively, to the facts that Valpelline
    is the lowest-elevation station in its group; Fossano is the southernmost of the Italian stations, with some sublittoral
    influence; and Aonoch Mòr has a large number of missing values. In conclusion, these results improve our understanding
    of temperature spatio-temporal dynamics in two very different regions of Europe and emphasize the importance of consistent
    analysis of data to assess the ongoing effects of climate change. The intra-annual time patterns of temperature trends
    could also be compared with climate model results.

    '
