    summary_en: This paper addresses city-level cross-view geo-localization for aerial platforms, where the goal is to determine
      the geographic location of a query aerial image by matching it against a georeferenced reference map. The authors observe
      that existing aerial-to-map approaches typically tile the reference area into a uniform grid and learn to regress a
      location index, which ignores the fact that real urban maps are fragmented into disconnected road regions, parcels,
      and large open spaces, and also fails to leverage the rich structural cues available in vector-based reference maps.
      To address these issues, they propose a map matching network that aligns the aerial image with an OpenStreetMap-style
      rasterized semantic map and produces a fine-grained, map-relative localization rather than a coarse grid cell. The main
      modules include a dual-branch encoder for the aerial and map inputs, a cross-modal feature interaction and alignment
      module, and a map matching head that predicts the correspondences between the image and the map structure. Experiments
      are reported on standard cross-view localization benchmarks, and the paper shows that the proposed approach yields more
      accurate city-level localization than grid-based aerial geo-localization baselines, particularly in fragmented urban
      areas. The abstract does not specify a particular public dataset name.
