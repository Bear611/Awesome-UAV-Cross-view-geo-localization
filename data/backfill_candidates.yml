- id: 8e81b2f34ac5
  title: Max-Min Rate Fairness Optimization for Multi-User Pinching-Antenna NOMA Systems
  year: 2026
  venue: arXiv
  authors:
  - Mahmoud AlaaEldin
  - Amy Inwood
  - Xidong Mu
  - Michail Matthaiou
  abstract: Pinching-antenna systems (PASs) can overcome signal blockage by repositioning dielectric radiating elements, called
    pinching antennas (PAs), along meter-scale waveguides to create line-of-sight links. Since each waveguide is driven by
    a single radio-frequency (RF) chain, non-orthogonal multiple access (NOMA) is well suited for PAS-based multi-user communications.
    This paper studies a PAS-enabled multi-user downlink NOMA system with multiple waveguides, each equipped with multiple
    PAs. The PA positions and base-station transmit precoding are jointly optimized to maximize the minimum user rate. The
    resulting problem is highly non-smooth and non-convex because of the rapidly oscillating coherent sums caused by inter-PA
    interference. To tackle this challenge, we propose a two-stage structured optimization framework. In the first stage,
    coarse PA-position and power-allocation optimization is performed using an interior-point algorithm while neglecting the
    PA channel phases, which gives solutions near the true optima. In the second stage, PA positions and transmit precoding
    are fine-tuned while accounting for the PA channel phase shifts. This stage first applies phase zeroing, where each PA
    is locally repositioned to align the corresponding channel phase toward zero and promote constructive coherent combining.
    It then uses an alternating procedure that iteratively performs forward-backward PA position refinement and successive-convex-approximation-based
    complex transmit precoding optimization until convergence, thereby reducing residual phase mismatch. Simulation results
    show that the proposed framework significantly outperforms heuristic optimization benchmarks with much lower computational
    time. They also demonstrate large gains over a comparable multiple-input multiple-output downlink NOMA system and reveal
    the impact of the number of PAs, users, and transmit power on system performance.
