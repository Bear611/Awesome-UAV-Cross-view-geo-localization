- id: a5785883743e
  title: Spatially Selective Self-Training for Unsupervised Building Change Detection
  year: 2026
  venue: ArXiv.org
  authors:
  - Wafaa I. M. Hussin
  - Zhi Lu
  - Anas M. I. Mohammed
  - Xiang Zhou
  - Ratiba A. H. Abubaker
  - Zhenming Peng
  abstract: Unsupervised building change detection aims to learn building-change masks from unlabeled bi-temporal remote sensing
    images. Existing label-free methods often follow a discrepancy-to-mask paradigm, directly using temporal differences,
    frozen foundation-model responses, prompt-based outputs, or post-processing results as final change maps. Although these
    strategies provide annotation-free cues, they do not learn a task-specific building-change detector and remain vulnerable
    to the gap between generic temporal discrepancies and building-defined structural changes. In practice, such discrepancies
    are often noisy and task-irrelevant, as appearance shifts, registration errors, and non-building modifications can produce
    strong but misleading responses. To address this problem, we propose SST-CD, a spatially selective self-training framework
    that reformulates fully label-free building change detection as end-to-end detector learning under noisy pseudo supervision.
    SST-CD uses temporal discrepancies as candidate pseudo labels and trains the detector only on spatially reliable pixels,
    whose reliability is estimated by a local consistency criterion that filters inconsistent regions from supervision. To
    further stabilize noisy self-training, a lightweight feature adapter recalibrates bi-temporal features, while a prototype-based
    decoder produces compact change and no-change representations. Experiments on LEVIR-CD, WHU-CD, and DSIFN-CD show that
    SST-CD achieves F1 scores of 83.08%, 91.69%, and 86.60%, respectively, outperforming existing unsupervised and label-free
    baselines.
