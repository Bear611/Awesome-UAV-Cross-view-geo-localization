  summary:
    summary_en: 'Meridian addresses cross-view geo-localization for ground robots in GNSS-denied settings, emphasizing unstructured
      natural environments beyond typical urban driving benchmarks. The problem is formulated as matching high-level metric-semantic
      primitives (point centroids of objects and line segments representing region borders) extracted from aerial orthoimages
      and ground RGB-D maps, without requiring any environment-specific training or fine-tuning. The pipeline comprises three
      modules: an offline/online mapping stage that uses Segment Anything, DINOv2, and alpha shapes to produce point and line
      primitives in aerial patches and ground submaps; a graph-theoretic matching and registration module built on CLIPPER-style
      densest-subgraph inlier selection with a novel scoring metric that handles bounded lines and incorporates rotation priors;
      and a robust pose graph optimization back end that fuses probability-weighted submap-to-aerial patch hypotheses via
      uncertainty-scaled loop-closure consistency checks. Evaluations cover KITTI sequences 00/02/09, a self-collected Park/Campus
      dataset (3.1 km), and Camp A/B (6.3 km, including 1.5-year-old outdated imagery and off-road segments). The authors
      report an average optimized trajectory error of 2.4 m over 19 km of total traversal, with submap registration success
      rates reported on KITTI, Park/Campus, and Camp splits.'
