    summary_en: This paper addresses the problem of vision-based localization for autonomous aerial vehicles (AAVs) as a redundancy
      to GNSS, which is vulnerable to interference. The task requires real-time matching of onboard camera images to satellite
      orthophotomaps for accurate geo-localization. The work conducts a comparative evaluation of 25 image-matching methods
      drawn from the Image Matching WebUI repository, spanning classical sparse-matching descriptors (e.g., SIFT, ORB, BRISK,
      SURF), semi-dense integrated approaches (e.g., LoFTR, TopicFM, AspanFormer, GlueStick), and dense-matching deep learning
      models (e.g., DKMv3, ROMA), combined with matchers such as SuperGlue, LightGlue, and MNN. A novel aerial benchmark dataset
      is introduced, consisting of approximately 2,500 image sets collected from MP-02 Czajka ultralight aircraft flights
      over Rzeszow-Jasionka (Poland), with real-world captures at altitudes of 150–1500 m, multiple camera tilt angles, and
      route lengths, using GoPro Hero 10 imagery paired with orthophotomaps from Esri, Google, and Geoportal. Both camera-frame
      and world-frame image representations are evaluated. The authors report that dense-matching algorithms DKMv3 and ROMA
      achieved the highest number of correct matches, with DKMv3 delivering nearly ten times the average inliers of the second-best
      method for camera-frame images, and ROMA being most robust under large camera tilts for world-frame projections. Processing
      times for the top five methods remained under one second per image pair.
