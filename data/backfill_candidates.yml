- id: c80dcdedd76c
  title: Robust Spatial Georeferencing for UAV-UGV Mobile Mapping Platforms in Urban Canyons via Asymmetric GNSS/UWB Fusion
  year: 2026
  venue: Remote Sensing
  authors:
  - Jiajia Chen
  - Xingao Wang
  - Zhibo Fang
  - Ming Gao
  - Ying Xu
  - Zhiyou Zhang
  abstract: 'Reliable spatial georeferencing of mobile mapping platforms is a fundamental prerequisite for high-fidelity urban
    remote sensing products such as 3D point clouds and digital twins. However, in deep urban canyons, severe signal occlusion
    and multipath effects reduce visible GNSS satellites, causing ambiguity resolution (AR) failure and degraded observation
    geometry for UGV-borne systems. Conventional Vehicle-to-Vehicle (V2V) cooperation offers limited improvement due to symmetric
    ground-level occlusion. To overcome this, we propose an asymmetric GNSS/UWB fusion method that introduces Unmanned Aerial
    Vehicles (UAVs) as high-altitude dynamic spatial anchors to reconstruct the 3D observation geometry. Two contributions
    are presented: (i) an asymmetric heterogeneous stochastic model coupling carrier-to-noise ratio (C/N0) and elevation angle
    to handle the quality disparity between air and ground sensor links, preventing multipath contamination of high-fidelity
    UAV observations; and (ii) a dynamic baseline constrained least-squares algorithm integrating Ultra-Wideband (UWB) ranging
    to stabilize GNSS positioning under high-dynamic relative motion. Validated through high-fidelity simulations and field
    experiments, the method achieves a 98.2% AR success rate and sub-decimeter 3D accuracy under extreme occlusion (≤3 visible
    satellites), while urban-canyon tests demonstrate 100% positioning availability across all evaluated epochs and reduce
    the 95th-percentile 3D error from 7.25 m to 0.19 m under the tested single-UAV/single-UGV configuration. The framework
    supports smart city modeling, 3D reconstruction, and infrastructure monitoring.'
