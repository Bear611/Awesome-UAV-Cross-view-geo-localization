  abstract: Abstract—Natural disasters such as earthquakes, floods, landslides, cyclones, and wildfires continue to cause
    large-scale human, economic, and environmental losses worldwide. Rapid and accurate disaster response is critical to minimizing
    casualties and infrastructure damage; however, conventional disaster management systems often suffer from delayed information
    availability, fragmented data sources, and limited situational awareness. Recent advances in artificial intelligence (AI),
    deep learning, unmanned aerial vehicles (UAVs), and photogrammetry have enabled new paradigms for automated disaster response
    and assessment. AI-driven models can analyze large volumes of heterogeneous data, including social media text, images,
    and sensor streams, while photogrammetric techniques enable accurate three-dimensional (3D) reconstruction of disaster-affected
    areas from aerial imagery. The integration of these technologies provides both semantic understanding and spatial awareness,
    which are essential for effective emergency decision-making. This survey presents an in-depth and structured review of
    AI-driven disaster response and assessment systems enhanced by photogrammetry. The survey systematically analyzes state-of-the-art
    research works focusing on multimodal disaster information extraction, open-world disaster classification, UAV-based photogrammetric
    3D reconstruction, AI-based damage assessment, and optimization-driven decision support. Each research paper is examined
    in terms of objectives, system architecture, methodology, datasets, performance metrics, results, and limitations. Finally,
    the survey identifies critical research gaps and future directions toward developing scalable, real-time, and robust disaster
    response systems.
