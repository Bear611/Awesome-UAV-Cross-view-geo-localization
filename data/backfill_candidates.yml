- id: 667b849873c2
  title: Lightweight Infrared Small Target Detection with Wavelet-Based Frequency Decomposition and Spatial-Aware Attention
  year: 2026
  venue: ''
  authors:
  - Zhan Jin
  - Haonan Chen
  abstract: In military, surveillance applications, infrared small-target detection (IRSTD) is highly challenging due to the
    extremely small size of targets, strong background noise, and sparse features. Based on this, this paper proposes IR-WASNet,
    a lightweight network improved from YOLOv10. IR-WASNet introduces Discrete Wavelet Transform Convolution (DWaveletConv)
    into the backbone network to enhance highfrequency details and low-frequency semantics while suppressing background noise.
    Additionally, a set of POS-SHSA modules is designed, at the same time, we will also study the integration of POSConvEmbedding
    with the SHSA module to enhance the feature fusion capability of IR-WASNet. Experiments validate the effectiveness of
    IR-WASNet on the SIDD and HIT-UAV datasets, achieving mAP scores of 82.6% and 82.8%, respectively, representing improvements
    of 2.4% and 13.8% over the baseline YOLOv10 model, maintained the model's lightweight nature while balancing computational
    costs. These experimental results demonstrate that IR-WASNet effectively enhances infrared smalltarget detection in complex
    scenes by integration of wavelet transform and attention channels.
