- id: b30c44efa1ea
  title: 'Optimizing Agricultural Drone Operations: From Launch and Recovery Siting to Tiered Routing Strategies'
  year: 2026
  venue: arXiv
  authors:
  - Ethan Kolby
  - Josh Noble
  - Max Z. Li
  abstract: Drones are increasingly used in agriculture, where tight margins demand efficient planning. Current optimization
    tools suffer from exponential runtimes as problem sizes grow, necessitating practical heuristics for daily operations.
    This paper presents an operational framework and benchmarking analysis for drone spraying operations. We evaluate the
    trade-offs between facility siting methods and tiered routing parameters. For facility siting, comparing a Mixed-Integer
    Program (MIP) baseline against a $p$-Median heuristic shows that the heuristic reduces runtime by three orders of magnitude,
    from over 97 seconds to under 1.2 seconds, with only a 4\% reduction in serviced field area. For route planning, a tiered
    problem decomposition approach partitioning the target area into 6 to 8 spatial clusters reduces computation time by an
    order of magnitude with minimal degradation in serviced area. This framework achieves minute-scale planning on commodity
    hardware, demonstrating operational relevance. Future research will incorporate weather modeling, integrated optimization
    of facility location and routing, and validation across diverse field geometries.
