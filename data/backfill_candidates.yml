- id: c8fd3520e6da
  title: Scalable Object Geolocation in Traffic Camera Imagery Using 3D World Model
  year: 2025
  venue: ''
  authors:
  - Chinmay Satish Shrivastav
  - Alessio Masola
  - Roberto Cavicchioli
  - Nicola Capodieci
  - Paolo Burgio
  abstract: The rapid expansion of outdoor traffic camera systems requires efficient methods to accurately estimate the geolocation
    of objects within their scenes. We present an innovative and scalable framework that completely automates this process
    by combining easy-to-build 3D world modeling with real-world traffic camera imagery. First, using the Cesium plugin for
    Unreal Engine, we create detailed and scalable 3D representations of urban environments, leveraging publicly available,
    highly accurate 3D data. This results in the creation of globally curated 3D content, including terrain, imagery, and
    photogrammetry. The real-world traffic camera imagery is then matched within our model using state-of-the-art feature
    matching techniques. By estimating the homography between synthetic images from the 3D model and the real images from
    traffic cameras, we accurately determine the geolocation of observed objects within the scene. This approach not only
    enhances geolocation accuracy but also enables seamless scalability across diverse urban settings and camera deployments
    worldwide. Our method significantly reduces the manual effort required for traffic camera calibration, thus streamlining
    the deployment of intelligent transportation systems at scale. We demonstrate the high performance of our approach by
    experimenting in an urban trial site with multiple smart city cameras and publicly available cameras around the world.
    Additionally, we highlight the adaptability of our framework for a wide range of computer vision-based traffic analytics
    applications, including its potential for drone-based localization.
