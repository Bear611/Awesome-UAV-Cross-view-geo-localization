      a geo-referenced satellite or aerial gallery. The authors argue that dominant spatial-domain CNN features overlook informative
      high-frequency cues (e.g., edges, fine textures, building contours) that are critical for distinguishing visually similar
      regions from above. To address this, they propose a Frequency-Enhanced Network (FENet) that augments a standard CNN
      backbone with an explicit frequency-domain branch. The design combines a multi-scale frequency decomposition (DCT/FFT-style
      pooling of low- and high-frequency components), a frequency attention module that recalibrates frequency-band responses,
      and frequency-aware feature fusion that injects the enhanced spectral features into the spatial feature map. Training
      follows the standard cross-view metric-learning recipe with a weighted soft-margin/triplet loss on drone-to-satellite
      pairs. Experiments are conducted on the University-1652 benchmark, reporting Recall@1 and Recall@5/10 for both drone-to-satellite
      and satellite-to-drone tasks, and also on the SUES-200 dataset at multiple altitudes; the authors report that FENet
