      which is challenging due to large appearance variations and target position/scale shifts. Most part-based approaches
      segment feature maps into regions, but in doing so they destroy global structure and remain sensitive to target offset.
      To address this, the authors propose Shifting-Dense Partition Learning (SDPL), which combines a Dense Partition Strategy
      (DPS) with a Shifting-Fusion Strategy (SFS). DPS densely recombines square-ring base parts to mine fine-grained contextual
      features while explicitly preserving a global feature, mitigating structural damage and improving robustness to scale
      changes and offsets. SFS generates multiple parallel partitions with diagonally shifted segmentation centers (centered,
      top-left, bottom-right) and adaptively fuses them through a learned weight estimation module, yielding strong anti-offset
      ability for non-centered targets. The framework supports ResNet, ViT, and Swin backbones. Experiments on University-1652
      and SUES-200 show that SDPL achieves competitive retrieval accuracy and substantially less performance degradation under
      simulated target shifts than LPN and FSRA, demonstrating its robustness to position deviation.
