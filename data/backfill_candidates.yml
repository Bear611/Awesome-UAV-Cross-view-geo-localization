- id: b75d8544f9c8
  title: 'AGEN: Adaptive Error Control-Driven Cross-View Geo-Localization Under Extreme Weather Conditions'
  year: 2025
  venue: Sensors
  authors:
  - Mengmeng Xu
  - Hongxiang Lv
  - Hai Zhu
  - Enlai Dong
  - Fei Wu
  abstract: Cross-view geo-localization is a task of matching the same geographic image from different views, e.g., drone
    and satellite. Due to its GPS-free advantage, cross-view geo-localization is gaining increasing research interest, especially
    in drone-based localization and navigation applications. In order to guarantee system accuracy, existing methods mainly
    focused on image augmentation and denoising while still facing performance degradation when extreme weather conditions
    are considered. In this paper, we propose a robust end-to-end image retrieval framework, AGEN, serving for cross-view
    geo-localization under extreme weather conditions. Inspired by the strengths of the DINOv2 network, particularly its strong
    performance in global feature extraction, while acknowledging its limitations in capturing fine-grained details, we integrate
    the DINOv2 network with the Local Pattern Network (LPN) algorithm module to extract valuable classification features more
    efficiently. Additionally, to further enhance model robustness, we innovatively introduce an Adaptive Error Control (AEC)
    module based on fuzzy control to optimize the loss function dynamically. Specifically, by adjusting loss weights adaptively,
    the AEC module allows the model to better handle complex and challenging scenarios. Experimental results demonstrate that
    AGEN achieves a Recall@1 accuracy of 91.71% on the University160k-WX dataset under extreme weather conditions. Through
    extensive experiments on two well-known public datasets, i.e., University-1652 and SUES-200, AGEN achieves state-of-the-art
    Recall@1 accuracy in both drone-view target localization tasks and drone navigation tasks, outperforming existing models.
    In particular, on the University-1652 dataset, AGEN reaches 95.43% Recall@1 in the drone-view target localization task,
    showcasing its superior capability in handling challenging scenarios.
