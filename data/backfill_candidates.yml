  summary:
    summary_en: This paper addresses the cross-view geo-localization problem of matching UAV images to georeferenced satellite
      imagery under large appearance gaps caused by viewpoint differences, similar surrounding scenes, and varying environmental
      conditions. To tackle this, the authors propose SSPT, a single-stream pyramid transformer network that applies self-attention
      in early stages to enrich internal feature representations and cross-attention in later stages to refine and interact
      complementary features while suppressing irrelevant interference. A dedicated decoder head performs upsampling to generate
      localization heat maps, and a Gaussian-weighted window is introduced for soft label assignment to stabilize training
      convergence. Style transfer is used at the data level to synthesize additional environmental variations. Experiments
      are conducted on the UL14 benchmark, reporting relative distance score (RDS) and meter-level accuracy (MA) at 3 m, 5
      m, and 20 m thresholds, and the method is further evaluated on extended thermal infrared, nighttime, and rainy subsets
      to demonstrate robustness across adverse conditions.
