- id: cbbcd7505c47
  title: Protracted ocean circulation slowdown drove exceptional ice-sheet melting during ice age termination IV
  year: 2026
  venue: Nature Communications
  authors:
  - Hsun‐Ming Hu
  - Gianluca Marino
  - Marı́a Fernanda Sánchez Goñi
  - E ROHLING
  - Teresa Rodrigues
  - Carlos Pérez‐Mejías
  - Qiuping Ren
  - Xiuyang Jiang
  - Véronique Michel
  - Patricia Valensi
  - Elisabetta Starnini
  - Marta Zunino
  - J. Sakari Salonen
  - Chieh-Ju Hsieh
  - Liangcheng Tan
  - Baptiste Chaigneau
  - Maud Chevalier
  - Chuan‐Chou Shen
  abstract: Glacial terminations stand out for their high rates of sea-level rise, particularly during meltwater pulses. Termination
    IV (T-IV; ~340,000 years before present) is a prominent example, with sea level rising at up to ~5 m per century. Due
    to sparse absolute age constraints on marine records, the causes for the high rates of sea-level rise at T-IV remain elusive.
    In this work, we provide a speleothem chronology from northern Italy, which we transpose to North Atlantic marine records.
    We infer that the high T-IV sea-level rise rate likely relates to a feedback whereby protracted meltwater release caused
    enhanced ocean heat storage, followed by heat release upon circulation recovery, driving additional ice-sheet collapse.
    This analysis highlights the critical role of oceanic feedbacks in driving exceptional rates of sea-level rise during
    terminations. Precisely dated cave records show that a prolonged slowdown in Atlantic ocean circulation drove exceptional
    ocean heat buildup and rapid ice-sheet melting during Termination IV (~340,000 years ago), when sea-level rise rates exceeded
    those of today.
