- id: 8264f4540df8
  title: Semantic-Guided Multiview Stereo Reconstruction for Aerial Image
  year: 2025
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Wei Zhang
  - Zhigang Yang
  - Qiang Li
  - Qi Wang
  abstract: The application of learning-based Multi-view Stereo (MVS) depth estimation methods has achieved significant results
    in large-scale 3D reconstruction benchmarks. However, adjacent terrains in aerial image interfere with depth estimation
    along building edges during matching process, leading to inaccurate results. To address these challenges, we propose a
    new end-to-end MVS network, named FuS-MVSNet, which fuses monocular depth probability as a semantic guidance into the
    multi-view geometry-based MVS framework. By combining the strengths of geometric consistency and local semantics, FuS-MVSNet
    achieves notable enhancements in both accuracy and robustness. Specifically, we first construct a monocular branch based
    on the pre-trained Depth Anything model to perform monocular metric depth estimation. The non-shared parameters ensure
    that the depth estimation process is independent of multi-view branch, focusing exclusively on semantic depth inference.
    Subsequently, to incorporate monocular features into the multi-view network, we introduce a volume adaptive fusion module,
    which adaptively integrates monocular feature volumes into the standard cost volume via an attention mechanism and guides
    the cost volume regularization. Finally, confidence-based dynamic selection between the two prediction branches ensures
    the selection of the more robust branch result under challenging conditions. Qualitative and quantitative results indicate
    that we achieve competitive performance on multiple benchmarks, including the WHU and LuoJia-MVS datasets.
