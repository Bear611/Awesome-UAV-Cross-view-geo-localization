  abstract: Autonomous navigation in Global Navigation Satellite System (GNSS)-denied environments remains a critical challenge,
    particularly for unmanned aerial vehicles (UAVs) operating in complex or contested areas. In this work, we propose a vision-aided
    localization framework that integrates a CycleGANbased domain adaptation technique with a Marginalized Particle Filter
    (MPF) for robust state estimation. The proposed approach addresses the domain discrepancy between UAV onboard camera images
