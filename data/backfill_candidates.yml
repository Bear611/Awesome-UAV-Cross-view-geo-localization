- id: 5ed8b876c844
  title: A Hierarchical Absolute Visual Localization System for Low-Altitude Drones in GNSS-Denied Environments
  year: 2025
  venue: Remote Sensing
  authors:
  - Qing Zhou
  - Haochen Tang
  - Zhaoxiang Zhang
  - Yuelei Xu
  - Feng Xiao
  - Yulong Jia
  abstract: Current drone navigation systems primarily rely on Global Navigation Satellite Systems (GNSSs), but their signals
    are susceptible to interference, spoofing, or suppression in complex environments, leading to degraded positioning performance
    or even failure. To enhance the positioning accuracy and robustness of low-altitude drones in satellite-denied environments,
    this paper investigates an absolute visual localization solution. This method achieves precise localization by matching
    real-time images with reference images that have absolute position information. To address the issue of insufficient feature
    generalization capability due to the complex and variable nature of ground scenes, a visual-based image retrieval algorithm
    is proposed, which utilizes a fusion of shallow spatial features and deep semantic features, combined with generalized
    average pooling to enhance feature representation capabilities. To tackle the registration errors caused by differences
    in perspective and scale between images, an image registration algorithm based on cyclic consistency matching is designed,
    incorporating a reprojection error loss function, a multi-scale feature fusion mechanism, and a structural reparameterization
    strategy to improve matching accuracy and inference efficiency. Based on the above methods, a hierarchical absolute visual
    localization system is constructed, achieving coarse localization through image retrieval and fine localization through
    image registration, while also integrating IMU prior correction and a sliding window update strategy to mitigate the effects
    of scale and rotation differences. The system is implemented on the ROS platform and experimentally validated in a real-world
    environment. The results show that the localization success rates for the h, s, v, and w trajectories are 95.02%, 64.50%,
    64.84%, and 91.09%, respectively. Compared to similar algorithms, it demonstrates higher accuracy and better adaptability
    to complex scenarios. These results indicate that the proposed technology can achieve high-precision and robust absolute
    visual localization without the need for initial conditions, highlighting its potential for application in GNSS-denied
    environments.
