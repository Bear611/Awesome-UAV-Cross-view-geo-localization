- id: fb7c0a2fd99f
  title: Hardware- and Vision-in-the-Loop Validation of Deep Monocular Pose Estimation for Autonomous Maritime UAV Flight
  year: 2026
  venue: arXiv
  authors:
  - Maneesha Wickramasuriya
  - Beomyeol Yu
  - Jaden Shin
  - Mason Huslig
  - Taeyoung Lee
  - Murray Snyder
  abstract: Autonomous UAV operations on ships require reliable vision-based relative pose estimation, yet at-sea validation
    is costly, weather-dependent, and risky. This paper presents a hardware-validated vision-in-the-loop framework that enables
    fully autonomous indoor flight while emulating photorealistic maritime environments. Rendered maritime views are processed
    onboard by a deep transformer-based monocular pose estimator. Delayed vision measurements are fused with high-rate IMU
    data using a delayed Kalman filter to provide consistent state estimates for geometric control. The system captures critical
    embedded effects, including perception latency, asynchronous updates, and computational constraints, that are absent in
    pure simulation. Autonomous takeoff, trajectory tracking, and landing experiments demonstrate stable closed-loop flight.
    The results establish a safe and hardware-realistic intermediate stage for developing maritime UAV autonomy prior to shipboard
    deployment.
