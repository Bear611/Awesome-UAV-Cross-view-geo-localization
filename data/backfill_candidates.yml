- id: 2a03d333716e
  title: Multi-Angular Reflectance Anisotropy Observed from UAV Multispectral Imagery
  year: 2026
  venue: arXiv
  authors:
  - Zhenqiang Qin
  - Chenguang Dai
  - Min Wang
  - Xian Li
  abstract: UAV multispectral imagery naturally contains multi-angular observations due to low flight altitude and wide field-of-view
    imaging, which may introduce geometry-driven radiometric variability. This study proposes a geometry-aware multi-angular
    observation extraction workflow to quantify observation-geometry effects from a BRDF perspective. Specifically, camera
    intrinsics and extrinsics are refined via structure-from-motion (SFM), and homogeneous regions annotated on an orthomosaic
    are reprojected onto multiple raw sub-images acquired from different viewpoints. This enables joint extraction of multi-band
    reflectance and observation geometry parameters for the same ground targets under varying viewing directions. The extracted
    observations are further analyzed using band-wise polar visualization in the (VZA, RAA) domain. Results on a grassland
    target show clear reflectance anisotropy across ten bands, with red-edge and nearinfrared bands exhibiting 119-137% variability
    between maximum and minimum reflectance, indicating non-negligible observation-geometry effects on radiometric consistency.
