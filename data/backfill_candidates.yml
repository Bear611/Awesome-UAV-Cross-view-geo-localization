- id: 56698e7ea098
  title: Integrating geospatial technologies for analyzing land surface temperature variabilities in active volcanic fields
    of southern main Ethiopian Rift
  year: 2026
  venue: Discover Applied Sciences
  authors:
  - Talema Moged Reda
  - Wondimu Haimanote Gebremariam
  - Gizachew Kabite Wedajo
  - Gelana Daba
  - Berhan Gessesse
  - Muralitharan Jothimani
  - Alemu Tadese
  - Asmamaw Hangibayna Kussita
  - Tigabu Baye
  - Abrham Asha
  - Guchie Gulie
  - Solomon Gunta
  - Dereje Tsegaye
  - Tsegaye Fekadu
  - Fasika Kelem
  - Zewdneh Tomass
  - Habtamu Fenta
  - Admasu Adamu
  - Selamawit Woldemichael
  abstract: 'The Main Ethiopian Rift is shaped by mantle convection, plume upwelling, thermal erosion, and crustal thinning.
    These geodynamic processes have been historically influenced human evolution across various topographical and temporal
    scales. It significantly affects heat transfer between the Earth’s surface and the atmosphere, influencing energy balance,
    heat flux, and thermal radiation. However, detailed studies assessing spatiotemporal LST and its linkage with geodynamic
    features remain limited in the study area. This study investigates LST variability in relation to active magmatic-tectonic
    processes in the southern Main Ethiopian Rift, and further identifies LST anomalies and agro-thermal thresholds relevant
    to crop growth and productivity. To attain these objectives, MODIS Terra, Landsat series, and ALOS PALSAR digital elevation
    datasets, along with integrated open-source geospatial computing platforms, were utilized. The LST derived from MODIS
    Terra was aggregated to annual, seasonal and decadal timescales, and validated with Landsat derived LST, and finally linked
    to geodynamic processes. Previous LST studies in Ethiopia have largely relied on single-sensor data and emphasized general
    spatiotemporal variability, with limited attention to geological controls. This study integrates multi-sensor satellite
    observations to improve LST characterization and demonstrates, for the first time, the spatial alignment of LST anomalies
    with mapped volcano-tectonic structures, indicating a geodynamic influence. In addition, agro-thermal thresholds are derived
    to link LST variability with agricultural suitability. Results show that mean annual LST (2001–2024) ranged from 19 °C
    to 38.4 °C, with marked seasonal variation: 19.9–40.3 °C (dry season), 16.2–37 °C (short rains), and 14.1–35.2 °C (long
    rains). MODIS Terra and Landsat LST show strong agreement (r = 0.9, RMSE = 3.45 °C, bias = − 2.74 °C), confirming the
    robustness of MODIS LST in this complex terrain. The highest LST anomalies are concentrated in active magmatic–tectonic
    zones, particularly the Abaya geothermal prospect, characterized by hot springs, fumaroles, altered grounds, dense faulting,
    and volcanic domes. LST values above 35 °C significantly affect crop productivity, especially during drought and transitional
    seasons. These results highlight the effectiveness of integrated geospatial approaches for analyzing LST variability in
    relation to active magmatic–tectonic processes. These findings advance a process-based understanding of LST dynamics and
    provide new insights for geoscientific analysis and climate-smart agriculture in Ethiopia and similar areas else.'
