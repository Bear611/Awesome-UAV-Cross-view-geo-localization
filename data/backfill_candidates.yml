- id: f9d50c30779c
  title: Efficient Neural Network Model Selection for Few-Class Application Datasets
  year: 2026
  venue: arXiv
  authors:
  - Bryan Bo Cao
  - Abhinav Sharma
  - Lawrence O'Gorman
  - Michael Coss
  - Shubham Jain
  abstract: While much effort has focused on developing and benchmarking high-performance neural networks, less attention
    has been given to how dataset properties, known to practitioners, can guide efficient model selection. Neural models are
    typically evaluated on datasets with thousands of classes, yet many real-world applications involve fewer than ten. To
    address this understudied but common setting, we develop a measure of classification difficulty based on data-side properties
    and show how it enables more efficient model selection for few-class datasets, where traditional approaches are less effective.
    We term this phenomenon "few-class distinctiveness". Our metric allows comparison of models and datasets 6 to 29$\times$
    faster than repeated training and testing. Leveraging this insight, we extend scaled model families below the smallest
    published models, achieving greater efficiency at similar accuracy, for example models up to 42% smaller than YOLOv5-nano
    for a mobile robot task. Targeting resource-constrained applications, we demonstrate few-class model selection across
    mobile robot, drone, and IoT scenarios, highlighting practical gains in efficiency without sacrificing performance.
