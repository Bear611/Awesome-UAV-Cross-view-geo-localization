- id: db630440fbb5
  title: Метод стабілізації квадрокоптера в заданій позиції з просторовим PID-регулюванням по відеоданим без GPS
  year: 2026
  venue: The Scientific Issues of Ternopil Volodymyr Hnatiuk National Pedagogical University Series pedagogy
  authors:
  - Микола Сусло
  - Володимир Казимир
  abstract: 'The paper considers a method for stabilizing a quadcopter at a fixed position under conditions where global satellite
    navigation (GPS) is unavailable. A two-loop approach to spatial control is proposed: an altitude stabilization loop based
    on barometer measurements in SITL or rangefinder measurements in real-world experiments, using EMA filtering and PID control;
    and a horizontal-plane stabilization loop based on pixel error (dx, dy) obtained from the video stream of a downward-facing
    camera. The estimation of (dx, dy) is performed by extracting local ORB features and estimating the homography between
    reference and current frames with RANSAC-based outlier rejection. To reduce noise, filtering and a deadband are applied,
    after which the (dx, dy) signals are fed to PID controllers which outputs are converted into roll and pitch corrections
    and transmitted to the autopilot via MAVLink. The method was implemented in the Gazebo environment in combination with
    ArduPilot and verified on a real platform. It is shown that in simulation the drift is suppressed to a range of tens of
    pixels; in real-world experiments, the error increases due to vibrations, non-uniform texture, and lighting conditions,
    which requires separate PID tuning and a wider deadband. In addition, the results of altitude stabilization for both SITL
    and real-world experiments are presented, confirming the operability of the Z-loop and its role as a prerequisite for
    stable quadcopter position holding in space. &nbsp;'
