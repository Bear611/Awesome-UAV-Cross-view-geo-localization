  year: 2019
  venue: Remote Sensing
  authors:
  - Katarzyna Kocur-Bera
  - Agnieszka Dawidowicz
  abstract: Technological progress in Earth surface observation provides a vast range of information on the land and methods
    of its use. This enables property owners, users and administrators to monitor the state of the boundaries of the land
    they own/administer. The land cover, monitored directly on the ground, is not always consistent with the land use entered
    in the Land and Property Registry (LPR). Discrepancies between these data are often found in former communist countries.
    One of the reasons for this was the rapid process of land privatisation, which took place in Poland, without updating
    information on the plot geodetic boundaries. The study examined and compared the land use (entered in the LPR) with the
    land cover (on the ground) for national roads (acr. LU-LC). The most frequent discrepancies were selected, using CLC2018,
    digital orthophotomaps (using the Web Map Service (WMS) browsing service compliant with Open Geospatial Consortium (OGC)
    standards), cadastral data, statistical modelling and an updated survey of the right-of-way. Subsequently, six algorithms
    were proposed to synchronise the land use and land cover when the right-of-way was used by unauthorised persons, and two
    algorithms for cases of unauthorised use of land by the road administrator. Currently, it is difficult to synchronise
    the land cover with the land use from the administrative, legal and social points of view. The results of analyses show
    that full synchronisation of land use and land cover is complicated and time-consuming, although desired.
