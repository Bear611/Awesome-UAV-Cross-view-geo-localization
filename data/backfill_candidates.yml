- id: 1eca3c6681d0
  title: Route-Constrained Robust Fusion Estimation for MEMS/GNSS Integrated Navigation of Unmanned Ground Vehicles in GNSS
    Degraded Environments
  year: 2026
  venue: arXiv
  authors:
  - Jingzhi Cui
  - Chao Zhang
  - Yuliang Mao
  - Shaolin Lü
  - Dongmei Li
  - Huan Che
  - Rong Zhang
  abstract: To address cumulative localization drift of unmanned ground vehicles in structured road environments under severe
    Global Navigation Satellite System signal occlusion, this paper proposes a robust route-constrained state estimation method.
    During periods without satellite signals, the proposed method establishes the correspondence between the historical dead
    reckoning trajectory and local segments of the mission route extracted from a high-definition map, and estimates a route-referenced
    position via a two-dimensional rigid transformation. The estimated position is then formulated as a pseudo-position observation
    and incorporated into an Extended Kalman Filter update. In this way, route constraints at the road level can be continuously
    injected into a unified state estimation framework, thereby suppressing position deviation relative to the mission route
    while indirectly improving azimuth estimation. To enhance practical applicability, engineering strategies, such as trigger
    control, matching quality validation, route offset compensation, and single update correction limiting, are further introduced.
    Experiments in three representative scenarios, including a long tunnel, a multi-segment tunnel, and a curved tunnel, show
    that the proposed method effectively suppresses error accumulation during satellite outages, reduces the risk of large
    maximum deviation, and improves localization continuity and road-level usability.
