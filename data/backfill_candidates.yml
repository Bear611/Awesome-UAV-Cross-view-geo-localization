- id: b42052239952
  title: 'SCOF: Supervised Contrastive Orthogonal Fusion for Robust Cross-View Geolocalization'
  year: 2025
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Cheng Fang
  - Jingchun Gao
  - Ping Han
  - Chaoyu Zhao
  - Bing Gao
  abstract: Cross-view geo-localization, crucial for 6G applications like drone navigation and 3D reconstruction, is hampered
    by the inherent challenges of achieving feature consistency across diverse viewpoints and capturing globally discriminative
    information. Existing methods often focus on extracting discriminative global geographic features. Nevertheless, the substantial
    appearance variations across different viewpoints can hinder effective localization. Additionally, the consistency between
    dual-perspective features is frequently overlooked, resulting in mismatches and inaccurate localization. To tackle these
    issues, we propose a novel Supervised Contrastive Orthogonal Fusion framework (SCOF) tailored for cross-view geo-localization.
    SCOF comprises a Supervised Contrastive Learning Module (SCM) and an Orthogonal Fusion Module (OFM). Supervised Contrastive
    Learning Module (SCM) leverages semantic labels to enforce consistent feature representations across different perspectives,
    effectively mitigating the issue of misalignment. The integrated Orthogonal Fusion Module (OFM) extracts orthogonal global
    components from local features, fostering a synergistic fusion of local and global information for enhanced discriminative
    capability. Extensive evaluations on benchmark datasets (University-1652, SUES-200 and DenseUAV) demonstrate that SCOF
    achieves state-of-the-art performance in drone-view target localization and drone navigation tasks, surpassing existing
    approaches in accuracy and robustness. By effectively bridging the gap between local and global feature representations
    while ensuring cross-view consistency, SCOF offers a significant advancement in the field of cross-view geo-localization.
