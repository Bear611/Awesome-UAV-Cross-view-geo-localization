  summary:
    summary_en: 'This paper addresses cross-view geo-localization (CVGL) for GNSS-denied UAV navigation, focusing on the geometric
      misalignment between oblique aerial views and orthographic satellite references. Existing 2D texture-matching methods
      overfit to view-dependent vertical facades that are invisible in satellite orthophotos and struggle with scale variations
      caused by varying flight altitudes. The proposed (MGS)2-Net framework explicitly introduces 3D structural awareness
      through three modules: a Macro-Geometric Structure Filtering (MGSF) module that uses dilated geometric gradients and
      K-Means clustering on surface normals to suppress vertical facade artifacts and emphasize horizontal planes; a Micro-Geometric
      Scale Adaptation (MGSA) module that uses depth priors from Depth Anything 3 to dynamically fuse multi-branch dilated
      features via softmax attention for scale rectification; and a Structure-Guided Contrastive (SGC) loss that penalizes
      higher activations on facades than on co-visible planes. The backbone is a frozen DINOv2-B with SALAD aggregation. Evaluated
      on University-1652, SUES-200, and DenseUAV (zero-shot generalization). The paper reports 97.60% R@1 on University-1652
      drone-to-satellite, 98.45% R@1 on SUES-200 at 150m altitude, and 84.60% zero-shot R@1 on DenseUAV (UAV-to-satellite),
      claiming state-of-the-art results across all benchmarks.'
