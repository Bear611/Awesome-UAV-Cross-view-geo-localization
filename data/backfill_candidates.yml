- id: 16eb88833b38
  title: A new environmental-based tool to support forest breeders in selecting species adapted to current and near-term climate
    conditions
  year: 2026
  venue: Tree Genetics & Genomes
  authors:
  - Ricardo Cavalheiro
  - Aurélio Mendes Aguiar
  - Ranga Raju Vatsavai
  - Mragisha Jain
  - William M. Hammond
  - Gary Hodge
  - Juan Jose Acosta
  - Roberto Fritsche‐Neto
  abstract: Abstract This study presents SST (Species Selection Tool), a climate-based framework designed to support species
    selection across geographic regions and climate scenarios. The tool was developed to enable breeders to examine species
    selection scenarios across countries and climate horizons. Beyond identifying promising species for testing, SST prioritizes
    candidate species, highlights opportunities for germplasm exchange, anticipates climate-driven shifts, and maps environmental
    clusters and adapted genetic resources to guide near- and long-term breeding strategies. Built with the Shiny framework
    in R, SST allows users to upload tabular data in CSV format for flexible analyses. We demonstrate its application for
    a Eucalyptus breeding example in Brazil, using occurrence data from GBIF and environmental covariates from TerraClimate
    and CHIRPS, and complemented by CMIP6 future climate projections. Temperature and precipitation data were used to compute
    19 bioclimatic variables (BIO1–BIO19) for macroenvironmental classification and species suitability assessment. SST integrates
    five analytical indices, scaled from 0 to 1, producing an overall suitability index and ranking species accordingly. The
    tool identified E. urophylla , E. brassiana , E. deglupta , and E. pellita as the most suitable for the study area in
    the Maranhão State, Brazil. Open-source and user-friendly, SST accelerates breeding decisions, supports climate-adaptive
    planning, and provides access to advanced analytical tools. The tool is a useful contribution to forest management and
    forest tree breeding, supporting data-driven strategies for sustainable forestry under changing climates.
