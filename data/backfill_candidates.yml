- id: 3cf16b82cb15
  title: 'ACCURATE BUILDING SEGMENTATION USING MULTI-SOURCE IMAGERY: INTEGRATING SATELLITE DATA AND MULTI VIEWS, MULTI HEIGHTS
    DRONE IMAGES'
  year: 2026
  venue: ARPN Journal of Engineering and Applied Sciences
  authors:
  - Akram H. Jalil
  abstract: Building image segmentation is a critical task in urban planning, disaster management, and environmental monitoring.
    Traditional segmentation methods using either satellite or drone imagery face challenges such as resolution limitations
    and vegetation occlusion. In this study, a novel approach integrating multi-source remote sensing data-combining drone
    imagery captured at multiple heights (150m, 200m, 250m, 300m) with multi-view perspectives combined with satellite imagery
    to enhance building segmentation accuracy. A key challenge in segmentation is the interference of vegetation and shadows,
    which can obscure building boundaries. To address this, advanced vegetation removal techniques have been incorporated
    to refine the extracted structures. By leveraging the complementary advantages of drone and satellite imagery, this approach
    improves segmentation robustness and reliability. Our method achieves a segmentation accuracy of 96%, significantly outperforming
    conventional techniques. This approach has been evaluated against existing segmentation methods, demonstrating its effectiveness
    in extracting high-precision building footprints, even in complex environments. The findings highlight the potential of
    integrating multi-source data and vegetation suppression strategies to enhance automated urban feature mapping.
