- id: 49416ce0a23e
  title: Near-Optimal Learning of Local Lindbladians
  year: 2026
  venue: arXiv
  authors:
  - Itai Arad
  - Zhili Chen
  - Naixu Guo
  - Patrick Rebentrost
  - Zhan Yu
  abstract: We study the problem of learning local Lindbladians from black-box access to the physical evolution, and the goal
    is to estimate all Hamiltonian and dissipative coefficients. We give an algorithm built directly from finite-time channel
    probes, which runs the unknown evolution for short times, estimates the corresponding Pauli transfer matrices from classical
    shadows, and converts these estimates into Lindbladian coefficients by stable local Fourier inversions. For fixed locality
    and bounded dissipative site degree, the uses of the dynamical evolution and total evolution time scale as $\widetilde{O}(Λ^2/\varepsilon^2)$
    and $\widetilde{O}(Λ/\varepsilon^2)$ respectively, in the local dynamical strength bound $Λ$ and target accuracy $\varepsilon$,
    with only logarithmic dependence on the number of qubits. The algorithm is non-adaptive, uses no ancillas, and uses only
    random product states as inputs followed by random Pauli measurements. The method does not require knowing the support
    of the Lindbladian in advance. We complement the algorithm with matching lower bounds, showing that the learning algorithm
    is near-optimal both in physical dynamics accesses and in total evolution time. We construct a single-qubit dephasing
    Lindbladian family that already requires $Ω(Λ^2/\varepsilon^2)$ channel uses and $Ω(Λ/\varepsilon^2)$ total evolution
    time, even for adaptive algorithms with arbitrary ancillas and measurements. In particular, the lower bounds imply that
    the Heisenberg-limited scaling achievable for Hamiltonian learning is information-theoretically impossible once dissipative
    coefficients must be estimated.
