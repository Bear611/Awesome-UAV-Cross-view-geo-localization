- id: 96c425ef5f8e
  title: Efficient Minimal Solvers for Visual-Inertial Relative Pose Estimation in Multi-Camera Systems
  year: 2026
  venue: arXiv
  authors:
  - Tao Li
  - Zhenbao Yu
  - Banglei Guan
  - Jianli Han
  - Weimin Lv
  abstract: Estimating the relative poses of multi-camera systems is a fundamental problem in computer vision, with critical
    applications in autonomous vehicles, mobile devices, and unmanned aerial vehicles (UAVs). However, existing solutions
    often suffer from high computational complexity or rely on an excessive number of point correspondences, limiting their
    real-world applicability. To address these limitations, we propose two efficient minimal solvers for estimating the relative
    poses of multi-camera systems using a novel parameterization. The first solver leverages the vertical direction prior
    provided by Inertial Measurement Units (IMUs), while the second utilizes the rotation axis direction prior from IMUs.
    Our methods require only four point correspondences and reduce the problem of multi-camera relative pose estimation to
    solving a univariate 6th-degree polynomial, a significant improvement over existing approaches, which typically involve
    8th-degree polynomials. This reduction in computational complexity and correspondence requirements makes our solvers particularly
    effective when integrated into RANSAC frameworks, demonstrating strong potential for visual odometry applications. Through
    rigorous evaluations on synthetic data and the KITTI benchmark, our methods achieved superior computational efficiency
    and competitive accuracy compared to state-of-the-art algorithms.
