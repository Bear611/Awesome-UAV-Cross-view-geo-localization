- id: 9c9ef0ce0c13
  title: 'Geriatrics curricular reforms in oral health education: an interprofessional approach'
  year: 2026
  venue: Frontiers in Medicine
  authors:
  - Meenakshi Srinivasa Iyer
  - Raghunath Nagasundara Rao
  - Jaishankar H. P.
  - Guranchal Chadha
  - Madhumita Raju Pillai
  abstract: 'The global shift toward an aging population requires a major change in oral health education. Traditional dental
    programs often fall short in meeting the complex needs of older patients. This can result in scattered care and poor health
    results. This paper advocates for incorporating Interprofessional Education (IPE) into geriatric oral health training.
    By combining evidence from the WHO-World Health Organization Framework for Action, research on the connection between
    oral and systemic health, and educational models from various countries, this paper presents a skills-based plan for changing
    the curriculum. It argues that interprofessional collaborative practice (IPCP) is essential not just for improving education
    but also for ensuring fair access to health services. The paper outlines a curriculum framework based on the “4Ms” of
    Age-Friendly Health Systems. It offers strategies for implementation, including high-fidelity simulation and task-shifting
    in places with limited resources. It also suggests solid evaluation methods based on the Kirkpatrick model which organizes
    impact into four levels: learners’ immediate reactions, gains in knowledge and skills, changes in behavior in real practice,
    and measurable effects on patient or system outcomes. Ultimately, it calls for a move from simply working together across
    disciplines to real collaboration to address the growing challenges of an aging population.'
