- id: a6bf2e8927e2
  title: 'AeroVerse-Review: Comprehensive survey on aerial embodied vision-and-language navigation'
  year: 2025
  venue: The Innovation Informatics
  authors:
  - Fanglong Yao
  - Youzhi Liu
  - Wenyi Zhang
  - Zhengqiu Zhu
  - Chenglong Li
  - Nayu Liu
  - Peng Hu
  - Yuanchang Yue
  - Kaiwen Wei
  - Xin He
  - Xudong Zhao
  - Zihan Wei
  - Haotian Xu
  - Zhiyuan Wang
  - Gujie Shao
  - Liu Yang
  - Dan Zhao
  - Yong Yang
  abstract: '&lt;p&gt;With the rapid advancement of unmanned aerial vehicle (UAV) technology, embedding intelligence into
    aerial platforms has become an increasingly important research direction. UAV-based vision-and-language navigation (UAV-VLN),
    as a representative paradigm of aerospace embodied intelligence, requires UAVs to understand natural language instructions
    and integrate multimodal perception to autonomously plan and execute navigation tasks in three-dimensional environments.
    This survey provides a comprehensive review of UAV-VLN research, covering simulation platforms, task definitions, core
    methodologies, datasets and evaluation metrics, application scenarios, as well as key challenges and future directions.
    We first present the design principles and capabilities of mainstream simulators, followed by a structured summary of
    methodological progress, including rule-based approaches, deep learning-driven models, and multi-agent collaborative strategies.
    We then discuss critical technical challenges in UAV-VLN, such as dynamic feasibility and control in 3D space, perception
    and generalization in complex environments, linguistic ambiguity and cross-modal semantic grounding, long-term spatiotemporal
    reasoning, and deployment under resource constraints. Based on these challenges, we outline promising future directions,
    including standardized benchmark development, Sim-to-Real and cross-domain transfer, pretrained large model integration,
    embodied world model, collaborative and interactive UAV-VLN, and embodied navigation of space-air-ground unmanned systems.
    This survey aims to provide a structured reference for future research and to guide the practical deployment of UAV-VLN
    systems.&lt;/p&gt;'
