- id: deb47214ae3c
  title: 'FluxShard: Motion-Aware Feature Cache Reuse for Collaborative Video Analytics in Mobile Edge Computing'
  year: 2026
  venue: ArXiv.org
  authors:
  - Xiuxian Guan
  - Zongyuan Zhang
  - Zheng Lin
  - Zekai Sun
  - Tianyang Duan
  - Zihan Fang
  - Rui Wang
  - Heming Cui
  - Wei Ni
  - Jun Luo
  - Yuanwei Liu
  abstract: 'Caching and reusing intermediate features across consecutive frames is a common technique to reduce redundant
    computation and transmission for edge-cloud video analytics in mobile edge computation. Existing methods manage the cache
    in a fixed or globally shifted coordinate system, treating it as an indivisible whole. Under the non-uniform motion patterns
    of mobile scenes, this whole-scene granularity invalidates large portions of the cache even when most content has merely
    shifted spatially, wasting computation and bandwidth. The root cause is a granularity mismatch: the cache is managed per
    scene, yet motion varies per region. In this paper, we present FluxShard, a motion-aware edge-cloud video analytics system
    that uses codec-level block motion vectors (MVs) to manage feature cache reuse and recomputation at the granularity of
    individual motion regions. By re-indexing cached features along per-block MVs, FluxShard separates spatial displacement
    from content changes, recovering reusable content that whole-scene methods would otherwise discard. To ensure correct
    reuse under heterogeneous motion, the Receptive Field Alignment Principle (RFAP) identifies, from the input-level MV field
    alone, the positions that must be recomputed due to inconsistent spatial composition within receptive fields. To maintain
    cache coherence across frames, MV-guided cache remapping warps the entire feature cache to the current coordinate system
    each frame, sustaining a high reuse ratio over time. A profiling-driven dispatcher routes the remaining sparse workload
    between edge and cloud for lower latency. Evaluation across multiple vision tasks, dynamic video benchmarks, and network
    conditions shows that FluxShard reduces latency by 32.6-83.8% and energy by 14.9-64.0% over all baselines under the prescribed
    accuracy budget.'
