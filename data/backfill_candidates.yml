- id: 461ef0ab951e
  title: 'SkySense: A Semi-Supervised Generative Framework for UAV Localization in ISAC Networks'
  year: 2026
  venue: arXiv
  authors:
  - Shenghan Luo
  - Yin Xu
  - Jie Yang
  - Yang Wang
  - Cixiao Zhang
  - Shi Jin
  - Wenjun Zhang
  abstract: Extreme data scarcity and inherent multipath spatial ambiguity severely limit existing deep learning-based channel
    state information (CSI) fingerprinting localization schemes for target unmanned aerial vehicles (UAVs). To overcome these
    challenges, we propose an end-to-end semi-supervised generative localization framework. First, by exploiting the temporal
    correlations inherent in continuous flight trajectories, a self-supervised encoder extracts robust spatial features from
    massive unlabeled CSI sequences to establish structured latent representations. Following this, we utilize a consistency
    model, a powerful derivative of diffusion architectures, as the core generative backbone to map the learned latent space
    to physical coordinates, jointly fine-tuning the pre-trained encoder with a strictly limited set of labeled CSI. This
    consistency formulation models the conditional distribution to resolve the mean collapse problem of discriminative models,
    while compressing the inference trajectory to 1-2 steps to avoid the latency bottleneck of traditional diffusion models.
    Furthermore, a lightweight distributed fusion mechanism is designed to aggregate spatial predictions across multiple base
    stations (BS) from a multi-view geometry perspective. Comprehensive evaluations on a real-world measurement dataset demonstrate
    that our framework achieves low latency and suppresses the mean localization error to 9.77 cm under a 3-BS fusion setup
    with only a 1\% label fraction, significantly outperforming existing fully supervised and semi-supervised discriminative
    baselines.
