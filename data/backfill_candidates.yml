- id: 2524c82b443a
  title: Optimizing End-to-End Communication Latency in UAV-Satellite Integrated Networks
  year: 2026
  venue: ''
  authors:
  - A. Charan Kumari
  - Mannat Thakur
  - Akash Singh
  - Chandra Mohan
  - P Singh
  abstract: The integration of unmanned aerial vehicles (UAVs) with satellite communication systems has been identified as
    an effective solution in providing communication services in a reliable manner in environments that are difficult to access.
    However, the high end-to-end latency is a major problem in the integration of satellite communication systems with UAVs
    due to the high satellite propagation delay. In this research, a novel latency-aware communication framework is proposed
    with the main purpose of optimizing the end-to-end delay in the integration of UAVs and satellite communication systems.
    In this paper, the proposed communication framework is presented, and the results obtained in the simulation of the proposed
    communication framework using network simulation tools are presented. In the simulation, the proposed communication framework
    was evaluated using different UAV density and mobility conditions. In the simulation results, the proposed communication
    framework was observed to have reduced the average end-to-end delay from 420 ms to 285 ms, the packet delivery ratio was
    improved from 86.2% to 94.6%, and the throughput was improved from 1.8 Mbps to 2.6 Mbps.
