- id: 4b1ac0ce5d25
  title: 'Characterizing the Formation and Evolution of S0-galaxies (CaFES-0): Their formation pathways around Galaxy Clusters'
  year: 2026
  venue: arXiv
  authors:
  - Diego Pallero
  - Yara L. Jaffé
  - Amelia Fraser-McKelvie
  - Lodovico Coccato
  - Facundo A. Gómez
  - Yannick Bahé
  - Evelyn J. Johnston
  - Ciria Lima-Dias
  - Arianna Cortesi
  - Maria Emilia De Rossi
  abstract: The formation pathways of lenticular galaxies (S0s), which lie morphologically between elliptical and spiral galaxies,
    remain a topic of active research. Environmental effects, merging histories, and pre-processing mechanisms are often proposed
    as key factors influencing their transformation. However, the relative importance of these processes remains unclear,
    particularly when compared with other galaxy types. We use the Hydrangea cosmological zoom-in simulation suite to analyse
    the environmental histories of S0 galaxies, defined here as central and satellite quenched disk galaxies. We find that
    the vast majority (>85\%) of our sample of S0s are satellites in massive haloes (log$_{10}$M$_{200}/$M$_\odot$ > 13),
    while only $\sim10\%$ are centrals in low-mass haloes. Satellite S0s exhibit a highly quiescent merging history, with
    $\sim60\%$ experiencing no significant mergers since $z=2$. Centrals show more varied merging histories, although our
    results may be affected by limited sample size. Contrary to expectations, no clear trends in merger ratios with morphology
    are observed. However, mergers involving lenticular and spiral galaxies tend to occur in low-density environments and
    are likely gas-rich, enabling disk reformation. Pre-processing effects in groups are critical, influencing both quenching
    and morphological transformation.} Our results strongly suggest that S0 galaxies predominantly form from faded/stripped
    spirals in clusters, with a minority forming via mergers in smaller haloes. These results are in agreement with previous
    observations of lenticular galaxies around galaxy clusters.
