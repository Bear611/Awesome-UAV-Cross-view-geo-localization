- id: 127b9656eef3
  title: 'Embodied-BenchClaw: An Autonomous Multi-Agent System for Embodied Spatial Intelligence Benchmark Construction'
  year: 2026
  venue: arXiv
  authors:
  - Baoyang Jiang
  - Fengchun Zhang
  - Leyuan Wang
  - Haotian Li
  - Yida Wang
  - Zhe Ji
  - Jinshan Lai
  - Xi Ren
  - Jianwei Hu
  - Qiang Ma
  abstract: 'Benchmarks are essential for evaluating embodied spatial intelligence, yet their construction is labor-intensive,
    hard to reuse, and difficult to maintain. Existing embodied benchmarks are often static and may quickly become saturated
    as models improve, limiting their ability to distinguish new capabilities. We propose Embodied-BenchClaw, an autonomous
    agentic system for constructing embodied spatial intelligence benchmarks. Given a user-specified evaluation intent, Embodied-BenchClaw
    automatically produces a complete and continually updatable benchmark package through a five-stage pipeline: intent blueprinting,
    data collection, structuring and cleaning, benchmark synthesis, and evaluation reporting. The pipeline is coordinated
    by three agents for planning, construction, and evaluation. To improve reusability and reliability, Embodied-BenchClaw
    introduces an extensible Skill Library and process quality control, enabling benchmark construction to be composable,
    verifiable, and repairable. We instantiate multiple benchmarks covering indoor spatial reasoning, outdoor spatial reasoning,
    robotic manipulation, quadruped robot navigation, UAV/aerial-view understanding, and static benchmark enhancement. These
    benchmarks span diverse embodied carriers, data sources, and spatial capabilities. Experiments with human evaluation,
    judge-based assessment, consistency checks, cost analysis, and ablations show that Embodied-BenchClaw can construct verifiable,
    executable, maintainable, and diagnostically useful embodied spatial benchmarks with reduced manual effort.'
