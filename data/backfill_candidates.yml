- id: d1263bf7632d
  title: Semantic-Aware Multi-Scale Contrastive Learning for UAV Tiny Object Tracking
  year: 2026
  venue: International Journal on Semantic Web and Information Systems
  authors:
  - Xuehua Tao
  - Jiwei Sun
  abstract: 'Unmanned aerial vehicle-based visual systems are essential for tasks such as reconnaissance, disaster monitoring,
    and traffic analysis; however, tracking remains challenging due to tiny targets, background clutter, and interference
    from similar objects. The authors propose multi-scale contrastive discrimination tracking, a transformer-based framework
    for tiny object tracking that integrates three modules: multi-scale detail enhancement, contrastive discrimination attention
    model for suppressing background interference via contrastive discrimination, and instance decoupling enhancement module
    for reducing feature coupling and identity drift among similar instances. Experiments on DTB70 and VisDrone2018 show that
    multi-scale contrastive discrimination tracking achieves 87.9% precision and a 67.4% success rate, surpassing state-of-the-art
    methods by 2.3% and 2.4%, respectively, while running at 185 frames per second on GPU with only 4.2 GMac and 11.2M parameters,
    demonstrating strong potential for resource-constrained unmanned arial vehicle deployment.'
