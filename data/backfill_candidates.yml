      that estimates 4-DoF pose by fusing short-term optical flow tracking with long-term cross-view map matching. The front-end
      uses a lightweight optical-flow tracker for temporal continuity, while the back-end matches UAV frames against georeferenced
      satellite maps using pretrained deep keypoint and descriptor networks (SuperPoint, ALIKED) paired with the LightGlue
      matcher, without any fine-tuning. An extended Kalman filter combines the motion estimate from optical flow with position
