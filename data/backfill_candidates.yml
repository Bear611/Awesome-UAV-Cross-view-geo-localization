- id: 4be99192c5c3
  title: GNSS jammer localization and identification with airborne commercial GNSS receivers
  year: 2025
  venue: arXiv
  authors:
  - Marco Spanghero
  - Filip Geib
  - Ronny Panier
  - Panos Papadimitratos
  abstract: Global Navigation Satellite Systems (GNSS) are fundamental in ubiquitously providing position and time to a wide
    gamut of systems. Jamming remains a realistic threat in many deployment settings, civilian and tactical. Specifically,
    in Unmanned Aerial Vehicles (UAVs) sustained denial raises safety critical concerns. This work presents a strategy that
    allows detection, localization, and classification both in the frequency and time domain of interference signals harmful
    to navigation. A high-performance Vertical Take Off and Landing (VTOL) UAV with a single antenna and a commercial GNSS
    receiver is used to geolocate and characterize RF emitters at long range, to infer the navigation impairment. Raw IQ baseband
    snapshots from the GNSS receiver make the application of spectral correlation methods possible without extra software-defined
    radio payload, paving the way to spectrum identification and monitoring in airborne platforms, aiming at RF situational
    awareness. Live testing at Jammertest, in Norway, with portable, commercially available GNSS multi-band jammers demonstrates
    the ability to detect, localize, and characterize harmful interference. Our system pinpointed the position with an error
    of a few meters of the transmitter and the extent of the affected area at long range, without entering the denied zone.
    Additionally, further spectral content extraction is used to accurately identify the jammer frequency, bandwidth, and
    modulation scheme based on spectral correlation techniques.
