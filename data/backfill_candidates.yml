- id: 21d6ee209613
  title: Visual Localization for Deep-Sea Mining Vehicles During Operation
  year: 2026
  venue: Journal of Marine Science and Engineering
  authors:
  - Yangrui Cheng
  - Bingkun Wang
  - Xiaojun Zhuo
  - Kai Liu
  - Yingjie Guan
  abstract: Deep-sea mining operations demand continuous, drift-free positioning over multi-day missions—a requirement that
    traditional acoustic dead-reckoning systems struggle to meet due to cumulative error accumulation and frequent DVL bottom-lock
    loss in sediment plume environments. Inspired by Google Cartographer’s 2D grid mapping paradigm, we present a prior map-based
    visual localization framework that decouples offline mapping from real-time localization, fundamentally eliminating drift
    through absolute image registration against pre-built seabed mosaics. By integrating adaptive keyframe selection, Multi-Scale
    Retinex (MSR) enhancement, and the AD-LG deep feature matching architecture, our system constructs globally consistent
    seabed maps for absolute positioning. The framework leverages deformable convolutions and LightGlue to effectively mitigate
    challenges such as low texture and non-rigid distortion. Quantitative validation on tank simulation datasets demonstrates
    significant superiority over IMU-only and standard fusion schemes; qualitative deployment on real Pacific CCZ imagery
    confirms near-real-time operational feasibility on an embedded Jetson Orin NX platform. This system establishes visual
    navigation as a viable backup to acoustic systems, addressing a critical gap in deep-sea mining vehicle autonomy.
