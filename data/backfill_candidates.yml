- id: 631f58d43805
  title: A Highly Robust Image Matching and Localization Method Based on Heatmap Guidance and Graph Structure Optimization
  year: 2025
  venue: ''
  authors:
  - Yunpeng Leng
  - W. Mu
  - Yuxiang He
  abstract: With the widespread application of unmanned aerial vehicles (UAVs) in the low-altitude economy, there is an urgent
    demand for high-precision localization in complex environments. Traditional GPS-based localization is susceptible to building
    occlusion and multipath effects, while existing visual localization methods face limitations in handling viewpoint variations,
    dynamic interference, and memory efficiency. To address these challenges, this paper proposes a cross-view UAV localization
    framework based on multi-modal geospatial matching, integrating heatmap guidance and graph structure optimization to significantly
    enhance localization accuracy and robustness. First, adaptive weighted building contour segmentation is performed using
    Grad-CAM heatmaps to suppress illumination variations and local feature errors. Second, global features are extracted
    via Swin-Transformer, and cross-modal fusion is implemented to achieve robust matching and localization under multi-scale
    and cross-view conditions. Finally, a LightGCN-based dynamic semantic graph construction mechanism is introduced to enhance
    feature invariance under large-scale viewpoint changes. Experimental results on the University-1652 dataset demonstrate
    that the proposed method achieves Recall@1 scores of 88.38% and 93.76% for UAV-to-satellite and satellite-to-UAV tasks,
    respectively, with average precision (AP) of 89.37% and 89.35%. The model has only 38.7M parameters and an inference latency
    of 37ms. Real-world flight experiments further validate the practicality of the algorithm, providing an efficient and
    reliable cross-view localization solution for UAV navigation.
