- id: f9dd6a5615e9
  title: 'The SPHEREx View of Galaxy Clusters: A Simulation-based Validation of the Forced Photometry Pipeline for Extended
    Sources'
  year: 2026
  venue: arXiv
  authors:
  - Hyeonguk Bahk
  - Ho Seong Hwang
  - Lindsey Bleem
  - Yujin Yang
  - Yoonsoo P. Bach
  - Yun-Ting Cheng
  - Brendan P. Crill
  - Olivier Doré
  - Andreas L. Faisst
  - Zhaoyu Huai
  - Woong-Seob Jeong
  - Bomee Lee
  - Jeong Hwan Lee
  - Jeonghyun Pyo
  - Michael Zemcov
  abstract: We present a simulation-driven assessment of the performance of the SPHEREx pipeline for galaxy cluster science,
    focusing on photometry, source blending, survey depth, and photometric redshift accuracy. To do that, we compile a sample
    of eight galaxy clusters spanning a wide redshift range ($z \approx 0.02$-$1.1$) and develop an end-to-end pipeline. We
    use the ancillary data from the DESI Legacy Survey and COSMOS survey, and generate realistic mock SPHEREx observations
    with the SPHEREx Sky Simulator. By performing forced photometry on these images with The Tractor, we quantify the characteristic
    biases and uncertainties relevant to cluster science. We find that the photometry is generally unbiased, but source blending
    is the primary driver of catastrophic outliers, particularly when the combined flux of neighbors is comparable to the
    flux of targets. Measuring the effective survey depth, we find that SPHEREx detects members down to $K_{s}\approx 20$
    AB ($5σ$), 7-9 mag fainter than the brightest cluster galaxy (BCG) in nearby clusters but only 1-2 mag for clusters at
    $z \sim 1$, where the BCG itself has faded close to this depth. Despite these challenges, we demonstrate that SPHEREx
    can achieve a photometric redshift precision of $σ_{\mathrm{NMAD}}\approx 0.003$-$0.01$ for cluster galaxies with an appropriate
    sample selection based on brightness or signal-to-noise. Combining the redshifts of quality-selected members, we recover
    cluster redshifts with a bias of $|Δz|/(1+z) < 0.002$ and a scatter of $σ\approx 0.002$ at $z \lesssim 0.5$, meeting the
    precision required for cluster cosmology.
