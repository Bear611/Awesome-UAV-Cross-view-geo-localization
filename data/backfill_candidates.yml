- id: 05cc0c924a23
  title: Adaptive Weighted Factor Graph Optimized Positioning Algorithm Based on Joint GNSS/INS/Vision Residual Detection
  year: 2026
  venue: Sensors
  authors:
  - Jin Wang
  - Jun Zou
  - yan Xing
  - Jin Lu
  - Pengwu Wan
  - Jianbo Du
  abstract: Multi-sensor fusion of GNSS, IMU, and vision sensors has been extensively applied in urban Internet of Things
    systems and automated driving to improve positioning accuracy in complex environments. However, conventional FGO algorithms
    are based on fixed sensor weights, which limit their adaptability to fluctuations in sensor errors caused by environmental
    changes, thereby compromising positioning performance. To overcome this limitation, a novel multi-sensor adaptive weighted
    localization algorithm based on joint residuals detection was proposed in this study. The algorithm computes joint residuals
    by the sliding window accumulation of GNSS, IMU, and vision sensor measurements. By integrating a global weight decay
    factor into the M-estimation framework, the weights of each sensor were dynamically adjusted, thereby suppressing the
    effects of outliers on the state estimation. This approach enables high-precision and robust estimation of position, velocity,
    and attitude. Experimental results demonstrate that, based on validation with the GNSS–Visual–Inertial Navigation System
    (GVINS) public datasets sports field and complex environments, the proposed method exhibits superior performance in challenging
    low-altitude economic scenarios such as weak GNSS signals and significant IMU drift—specifically, it improves positioning
    accuracy by 32.3% and reduces velocity error by 32% compared to traditional FGO algorithms. In scenarios with GNSS signal
    interference, the system effectively mitigates error accumulation and maintains the stability of position and velocity
    estimation. The proposed algorithm demonstrates exceptional positioning accuracy and robustness in complex and dynamic
    environments, making it highly suitable for advanced urban IoT and automated driving applications.
