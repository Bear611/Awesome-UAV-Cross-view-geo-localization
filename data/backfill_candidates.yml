- id: dcec57447074
  title: AI-Driven Defence Surveillance and GPS Threat Alert System based on YOLO Detection for Land, Naval and Airspace Monitoring
  year: 2026
  venue: INTERANTIONAL JOURNAL OF SCIENTIFIC RESEARCH IN ENGINEERING AND MANAGEMENT
  authors:
  - Karthik YN Karthik YN
  abstract: In modern defence operations surveillance must be a u t o n o m o u s , r e a l -t i m e a n d v e r y a c c u
    r a t e i n heterogeneous operational environments such as land perimeters, maritime zones and air corridors.Current surveillance
    infrastructures that rely on human operators, CCTV networks with fixed angles and reactive alert mechanisms suffer from
    critical latency, operator fatigue and an inherent inability to simultaneously process multistream video data at an operational
    tempo.In this paper, an AI-Driven Defence Surveillance and GPS Threat Alert System (AIDS-GTAS) is proposed which combines
    YOLOv11, the most architecturally advanced version of the You Only Look Once real-time object detection family, with Slicing
    Aided Hyper Inference (SAHI) to provide robust multi-domain threat detection across land, naval and airspace surveillance
    channels.The system ingests real-time video streams from RTSP/IP cameras, sensors mounted on drones and naval monitoring
    arrays through a multi-threaded OpenCV pipeline, processes each frame through the YOLOv11 detection engine augmented by
    SAHI's adaptive image tiling mechanism to enhance small-object sensitivity, and subsequently maps detected threats to
    precise geographic coordinates through a GPS localization module employing the Haversine distance formula.Upon classification
    of the threat, the system automatically dispatches georeferenced alert notifications through the Telegram Bot API and
    exhibits live detection overlays on a web dashboard developed with Flask.We experimentally evaluate the proposed YOLOv11+SAHI
    architecture on a composite defense dataset consisting of 18,400 annotated frames, and obtain 94.7% mAP@0.5, 96.2% Precision
    and 93.8% Recall, at a sustained speed of 47.3 FPS on NVIDIA RTX 3070 hardware.SAHI integration results in an 11.3 percentage-point
    increase in mAP for objects less than 32×32 pixels.The average end-to-end alert latency is 1.84 seconds, a 73% reduction
    over human-operator response benchmarks.The proposed architecture is shown to be scalable across distributed sensor networks,
    feasible for deployment in edge AI and ready for immediate application to perimeter security, border monitoring, coastal
    surveillance and airspace integrity verification.
