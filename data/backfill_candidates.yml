- id: 945a96b708e3
  title: A Consistent Comparison of Intracluster Light Assembly in Simulations I. Redshift Evolution and Progenitor Galaxies
  year: 2026
  venue: arXiv
  authors:
  - Harley J. Brown
  - Garreth Martin
  - Frazer R. Pearce
  - Yannick M. Bahé
  - Joseph Butler
  - Weiguang Cui
  - Nina A. Hatch
  - Alexander Knebe
  abstract: The tidal stripping of satellite galaxies and the stellar detritus ejected during galaxy mergers builds up a diffuse
    stellar component in galaxy clusters known as the intracluster light (ICL). We investigate ICL assembly in cluster-mass
    haloes ($M_{178c}\sim10^{14}-10^{15}$ M$_\odot$) using four different hydrodynamical simulations (Horizon-AGN, TNG100,
    The Three Hundred Gizmo-Simba 7K, and Hydrangea) under a homogenized ICL identification framework. For our fiducial ICL
    definition we obtain broadly consistent $z\approx0$ ICL stellar mass fractions ($\sim0.1-0.2$) and, by tracking the progenitors
    of $z\approx0$ clusters back to $z\gtrsim2$, find no significant evolution in average ICL mass fractions. Alternative
    approaches for distinguishing the ICL from the central galaxy show the absolute ICL fraction to be highly sensitive to
    adopted definition, but we never find any significant inter-simulation discrepancies when implementing a consistent methodology
    to identify the ICL. Whether the average ICL mass fraction falls with increasing redshift or does not evolve is determined
    by the ICL definition adopted. By tracing $z\approx0$ ICL stars back to their progenitor galaxies, we find that lower-mass
    satellites typically make slightly larger ICL contributions relative to their mass in every considered simulation, but
    which galaxies make the dominant contribution to the ICL is primarily controlled by the infalling satellite mass function.
    Most ICL stars sourced from satellite galaxies are therefore expected to originate from galaxies with infall stellar masses
    above $\sim10^{10}$ M$_\odot$ and largely within $10^{10.5}-10^{11.5}$ M$_\odot$.
