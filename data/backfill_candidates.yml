- id: e60bb004e9a7
  title: 'Public Value Perception and Conservation Strategies for Urban Industrial Heritage: Evidence from UGC'
  year: 2026
  venue: Buildings
  authors:
  - Ziyang Wang
  - Qixuan Zhou
  - Yi Tai
  - Rong Zhu
  - Kexin Wei
  abstract: Urban industrial heritage is increasingly embedded in urban regeneration, public space provision, and community
    governance, yet existing studies have insufficiently examined how heterogeneous publics perceive its value through everyday
    digital discourse. Taking the Guangzhou Iron and Steel Plant industrial heritage site (hereafter, the Guanggang industrial
    heritage site) as a case study, this study used user-generated content from Rednote posts and local WeChat public-account
    comments to identify platform-mediated expressions of public value perception. A corpus of 745 valid samples comprising
    51,459 Chinese characters was constructed after data collection, screening, and text preprocessing. Word-frequency analysis,
    semantic network analysis, and sentiment analysis were conducted using ROST CM 6.0. The results show that the two retrieved
    platform-contextual corpora foregrounded different concerns. Rednote discourse foregrounded ruin landscapes, industrial
    aesthetics, photography-based check-ins, and exploratory experiences, whereas WeChat comments emphasized park construction,
    public facilities, governance responsiveness, safety, and the residential environment. At the corpus level, lexicon-based
    sentiment classification indicated that Rednote texts were dominated by positive and neutral categories, while WeChat
    comments contained a higher proportion of texts classified as negative. This study conceptualizes dual foregrounding as
    a bounded selection process through which platform affordances, user self-selection, and users’ relationships with the
    site influence which concerns become visible in each corpus; it does not treat the observed differences as a causal platform
    effect. It argues that industrial heritage regeneration must translate historical, technological, and aesthetic values
    into public values that are interpretable, accessible, usable, and trusted by local communities.
