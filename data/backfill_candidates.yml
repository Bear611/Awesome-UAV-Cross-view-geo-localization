  summary:
    summary_en: 'HE-VPR addresses visual place recognition for unmanned aerial vehicles operating across large altitude variations,
      where severe scale shifts in top-down imagery degrade retrieval accuracy. The framework decouples height estimation
      from place recognition while sharing a single frozen DINOv2 ViT-B backbone. Two lightweight bypass adapter branches
      are attached to every Transformer block: a height estimation adapter that retrieves the query''s height partition from
      a compact height database, and a VPR adapter that performs place retrieval within the corresponding height-specific
      sub-database using SALAD aggregation. A center-weighted masking strategy further suppresses peripheral features that
      are unstable under scale change. The authors collect and release two multi-altitude aerial datasets: GEStudio, a simulated
      Google Earth Studio benchmark with 1,200 queries over 100 locations spanning 100–1,200 m, and MHFlight, a real drone-flight
      dataset with 1,970 queries and continuous altitudes from 200–640 m. Experiments report up to 6.1% Recall@1 improvement
      over ViT-based baselines and up to 90% memory reduction by restricting retrieval to selected sub-databases. On GEStudio
      the VPR adapter branch reaches 69.50% R@1 at a 100 m threshold, while full HE-VPR with top-10 candidates attains 70.42%
      R@1 using about 58% of the full-database memory.'
