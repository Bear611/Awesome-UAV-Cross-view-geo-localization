- id: e263cfcc8c8d
  title: 'DTSFNet: A Lightweight Network Based on Dynamic Sampling and Scale Sequence Fusion for Aerial Image Object Detection'
  year: 2025
  venue: Journal of Circuits Systems and Computers
  authors:
  - Yanting Liao
  - Yong Feng
