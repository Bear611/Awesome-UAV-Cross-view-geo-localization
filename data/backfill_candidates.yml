    summary_en: OriLoc addresses cross-view image-based geolocalization in practical scenarios where ground images have a
      limited field of view and an arbitrary, unknown orientation, motivated by UAV delivery and disaster relief. The method
      uses two Swin Transformer encoders to extract attention features from ground and satellite views. A geolocalization
      module with an opti-aggregation layer combines GeM pooling, batch normalization, and a fully connected layer to produce
      compact 384-dimensional descriptors, trained with a dual-weighted soft-margin triplet loss using a hard sample mining
      pool. An orientation estimation module embeds attention-weighted features back into the original satellite image, applies
      polar transformation, and performs convolution-based sliding-window correlation to recover the ground-image heading.
      Experiments are conducted on CVUSA, CVACT, VIGOR (cross-area generalization), and University-1652, reporting Recall@1/5/10
      and Recall@1% for known and unknown orientations, limited FoV settings of 70°, 90°, 180°, and 360°, cross-dataset generalization,
      and average angular orientation error. The paper claims superior performance over prior CNN and Transformer baselines
      in unknown-orientation and limited-FoV conditions while maintaining low parameter count and short encoding length. Code
      is released at the GitHub link.
    main_category: retrieval
    category_confirmed: true
    classification_reason: The paper frames cross-view geolocalization as matching ground-view queries against a satellite-image
      database to retrieve the closest reference, which is a retrieval problem. The model produces embeddings compared via
      cosine similarity and is evaluated with Recall@K metrics, and an auxiliary orientation head is attached. This matches
      the retrieval category.
