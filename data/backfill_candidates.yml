  summary:
    summary_en: 'This paper addresses precise UAV geolocalization without relying on GNSS by combining a lightweight visual-inertial
      odometry (VIO) with a 2D georeferenced satellite/aerial map. The system has three components: a sliding-window monocular
      VIO (built on VINS-Mono) that estimates motion states and reconstructs 3D positions of tracked visual features in a
      local frame; a feature-based georegistration module that aligns VIO-reconstructed 3D points to map points in the geodetic
      horizontal plane using SIFT descriptors and a translation model with inlier filtering, followed by PNP relocalization;
      and a global pose-graph optimizer that fuses VIO relative constraints with absolute georegistered positions under a
      Huber loss to obtain smooth, drift-free trajectories. Two custom real-flight datasets were collected with a DJI M600Pro
      carrying a rigidly mounted downward-looking camera, MIMU, magnetic compass, and a UBLOX-M8T GNSS for ground truth: the
      Rural dataset (~110 m altitude, 1.18 km, ~6 min, 0.51×0.4 km in Changsha) and the Testing Zone dataset (~285 m altitude,
      2.45 km, ~7 min, 1.46×1.45 km at the National Intelligent Connected Vehicle Changsha Testing Zone). Reported pose RMSE
      values are 18.58 m (VIO), 7.41 m (registration only) and 3.76 m (fusion) on Rural, and 69.70 m, 10.70 m and 8.75 m on
      Testing Zone, using 2D maps at 0.3 m/pixel resolution with unknown initial positions.'
