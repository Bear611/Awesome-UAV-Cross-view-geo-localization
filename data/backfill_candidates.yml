- id: 62bbf82a9d2c
  title: Collaborative Air-Ground Sensing, Communication, Computing, Storage, and Intelligence for Low-Altitude Economy
  year: 2026
  venue: ArXiv.org
  authors:
  - Yiqin Deng
  - Junhui Gao
  - Zihan Fang
  - Yanan Ma
  - Xianhao Chen
  - Yuguang Fang
  abstract: 'Low-altitude economy (LAE) is transforming low-altitude airspace into a new cyber-physical infrastructure. Although
    air-ground communications have been widely studied, LAE is fundamentally different in the sense that it is mission-centric
    with diverse requirements, such as stringent safety and compliance constraints not be effectively addressed with a communication-centric
    design alone, which makes air-ground collaboration indispensable: Only through effectively coordinating air-ground infrastructure
    and resources can LAE missions be fulfilled. Consequently, LAE calls for task-driven, closed-loop, multi-resource orchestration
    of Sensing, Communication, Computing, Storage, and Intelligence (SCCSI), where key decisions must be co-designed under
    mobility and uncertainty. In this paper, we first present a novel framework that connects (i) LAE scenarios and a requirement--resource
    coupling matrix, (ii) an air--ground collaborative architecture, and (iii) methodological toolboxes for SCCSI co-optimization
    and online decision-making. We then systematically review enabling technologies for collaborative SCCSI resources and
    capabilities, emphasizing their coupling and end-to-end tradeoffs. Finally, we summarize testbeds, datasets, and evaluation
    metrics, and provide representative use cases to illustrate how the proposed framework translates application requirements
    into practical task-driven optimization designs, together with open challenges and a roadmap toward scalable and trustworthy
    LAE deployment.'
