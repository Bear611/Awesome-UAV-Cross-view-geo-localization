- id: 1e2fd9322454
  title: 'Beyond Spatial Domain: Multi-View Geo-Localization with Frequency-Based Positive-Incentive Information Screening'
  year: 2025
  venue: Remote Sensing
  authors:
  - Bangyong Sun
  - Bangyong Sun
  - Mian Li
  - Bo Sun
  - Bo Sun
  - Ganchao Liu
  - Cheng Bi
  - Weifeng Wang
  - Xiangpeng Feng
  - Geng Zhang
  - Bin Hu
  abstract: The substantial domain discrepancy inherent in multi-source and multi-view imagery presents formidable challenges
    to achieving precise drone-based multi-view geo-localization. Existing methodologies primarily focus on designing sophisticated
    backbone architectures to extract view-invariant representations within abstract feature spaces, yet they often overlook
    the rich and discriminative frequency-domain cues embedded in multi-view data. Inspired by the principles of π-Noise theory,
    this paper proposes a frequency-domain Positive-Incentive Information Screening (PIIS) mechanism that adaptively identifies
    and preserves task-relevant frequency components based on entropy-guided information metrics. This principled approach
    selectively enhances discriminative spectral signatures while suppressing redundant or noisy components, thereby improving
    multi-view feature alignment under substantial appearance and geometric variations. The proposed PIIS strategy demonstrates
    strong architectural generality, as it can be seamlessly integrated into various backbone networks including convolutional-based
    and Transformer-based architectures while maintaining consistent performance improvements across different models. Extensive
    evaluations on the University-1652 and SUES-200 datasets have validated the great potential of the proposed method. Specifically,
    the PIIS-N model achieves a Recall@1 of 94.56% and a mean Average Precision (mAP) of 95.44% on the University-1652 dataset,
    exhibiting competitive accuracy among contemporary approaches. These findings underscore the considerable promise of frequency-domain
    analysis in advancing multi-view geo-localization.
