- id: 3bd445c4a1b7
  title: 'GeoLink: A 3D-Aware Framework Towards Better Generalization in Cross-View Geo-Localization'
  year: 2026
  venue: ArXiv.org
  authors:
  - Hongyang Zhang
  - Yinhao Liu
  - Haitao Zhang
  - Zhongyi Wen
  - Zhenyu Kuang
  - Shuxian Liang
