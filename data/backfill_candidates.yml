- id: 171ae597721c
  title: Visual Orientation Posterior for Post-Retrieval UAV Geo-Localization
  year: 2026
  venue: 2026 China Aerospace Information Technology Conference (CAIT)
  authors:
  - Chaoyue Lv
  - Yuying Du
  - Desheng Chen
  - Yunlong Xie
  - A. Sulistya
  - Mengqi Ji
  abstract: Cross-view UAV geo-localization is often framed as image retrieval, but correct top-1 retrieval does not guarantee
    accurate final localization. We propose a lightweight post-retrieval verification framework based on a visual orientation
    posterior (VOP), which predicts a discrete posterior over candidate orientations and allocates sparse verification to
    a few geometry-promising hypotheses. This lightweight design is practically important for onboard deployment on small
    and medium UAVs, where edge processors impose strict memory and latency budgets and make dense verification difficult
    to accommodate. Trained with supervision derived from final localization quality, our method consistently outperforms
    sparse and rotation-enumeration baselines as well as LoFTR on final localization metrics under our protocol, and narrows
    the gap to dense DKM while remaining much more efficient. Experiments on the GTA-UAV and UAV-VisLoc datasets validate
    the effectiveness of the proposed method.
