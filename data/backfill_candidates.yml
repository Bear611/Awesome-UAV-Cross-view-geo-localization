      satellite patches, without relying on supervised training. The authors argue that existing paired-data methods overfit
      region-specific cues and motivate an unsupervised, training-free pipeline that lifts multi-view drone observations into
      a 3D scene representation. The technical design has three core modules. First, multi-view oblique images are processed
      with Structure-from-Motion (SfM) and 3D Gaussian Splatting (3DGS) to build a neural field, from which an orthogonal
      virtual camera renders a top-down view that approximates satellite imagery. A frozen DINOv2 foundation model with GeM
      pooling provides view-agnostic global features for initial retrieval against the satellite gallery. Second, an iterative
      camera pose update mechanism refines the virtual camera in SE(3) by geometrically verifying Top-K retrieved satellite
      candidates and interpolating toward the best-matching pose. Third, a view-consistency-guided fusion module combines
      self-view and cross-view similarities to merge candidate features into a robust scene representation. Experiments are
      conducted on the University-1652 and SUES-200 benchmarks. The paper states that, without any fine-tuning, the proposed
      unsupervised pipeline outperforms the AnyLoc zero-shot baseline and achieves competitive accuracy against recent supervised
      methods on both datasets.
