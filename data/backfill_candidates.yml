- id: dac7dd98048d
  title: An AI-Based RGBD Framework for Cross-View Geo-Localization
  year: 2026
  venue: ''
  authors:
  - Cemre Sude Akdag
  - Damla Topalli
  - Zafer Kadırhan
  abstract: Cross-view geo-localization aims to determine the geographic location of a query image by matching it against
    reference images captured from significantly different viewpoints, such as satellite and drone perspectives. This task
    is particularly challenging due to pronounced appearance variations arising from viewpoint changes, scale differences,
    and scene geometry distortions. In this paper, we propose an AI-based RGBD framework for cross-view geo-localization that
    enhances geometric awareness by integrating monocular depth estimation into satellite imagery. Depth maps are generated
    using a pretrained MiDaS model and fused with RGB channels to form a four-channel (RGBD) input representation. The proposed
    framework employs a two-stream architecture with modality-specific encoders and adopts a metric learning strategy based
    on cosine similarity and Circle Loss to learn a discriminative shared embedding space. Experimental evaluations conducted
    on the University-1652 benchmark demonstrate that incorporating depth information consistently improves retrieval performance
    compared to an RGB-only baseline, validating the effectiveness of depth-augmented representations for cross-view matching.
