- id: 757be77ae202
  title: 'AerialVL: A Dataset, Baseline and Algorithm Framework for Aerial-Based Visual Localization With Reference Map'
  year: 2024
  venue: IEEE Robotics and Automation Letters
  authors:
  - Mengfan He
  - Chao Chen
  - Jiacheng Liu
  - Chunyu Li
  - Xu Lyu
  - Guoquan Huang
  - Ziyang Meng
  abstract: Visual localization plays an essential role in the autonomous flight of Unmanned Aerial Vehicles (UAVs) especially
    for the Global Navigation Satellite System (GNSS) denied environments. Existing aerial-based visual localization methods
    mainly focus on eliminating image variance between database map and captured frames. However, these is a lack of public
    dataset and baseline for method comparisons, which impedes the development of aerial-based visual localization. To address
    this issue, we construct AerialVL, a large-scale dataset, which is collected using UAV flying at different altitudes,
    along various routes, and during diverse time periods. AerialVL consists of 11 image sequences covering approximately
    70 km of trajectory and includes a reference satellite image database corresponding to the flight area. Leveraging AerialVL,
    we perform thorough evaluations on various mainstream solutions designed for aerial-based visual localization for the
    first time. This evaluation encompasses visual place recognition, visual alignment localization and visual odometry, serving
    as comparison baselines. Furthermore, we present a general aerial-based visual localization framework, which unifies various
    methods and integrates them into a modular architecture. We note that across all flight trajectories, the proposed framework
    achieves higher localization accuracy and robustness against the existing methods.
