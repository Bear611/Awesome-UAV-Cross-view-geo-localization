    summary_en: This work addresses GNSS-denied georeferenced localization of small unmanned aerial vehicles by matching onboard
      camera imagery to a georeferenced orthophoto map, removing the typical requirement of a downward-facing camera. The
      research problem is global pose estimation under uncertain initial pose and potential GNSS jamming or spoofing, where
      the camera may face arbitrary directions. The proposed technical design combines visual-inertial odometry, orthorectification
      of the UAV image using a locally planar terrain assumption estimated from landmark triangulation, classical area-based
      image matching between the orthoprojection and the map, and Monte-Carlo localization fusing odometry with the matching
      score to estimate horizontal position, heading, and scale. The authors also propose a nonparametric weighing function
      derived from Gaussian kernel density estimates over matching scores. Experiments are conducted on three custom UAV datasets
      collected over two areas in Sweden (Klockrike and Kisa) using a hexacopter with RGB imagery and RTK-GPS/IMU ground truth,
      paired with 1 m/pixel orthophotos from a local map provider. After convergence over roughly 2 km of travel, the paper
      reports mean localization error of approximately 50 m RMS in translation, and below 20 m in less ambiguous areas, which
      is lower than visual-inertial odometry alone in most cases.
