- id: 595758ddee1a
  title: 'Remote Sensing Agent: Reshaping the Paradigm of Remote Sensing Information Processing'
  year: 2026
  venue: Remote Sensing
  authors:
  - Peng Liu
  - Rongkai Zhuang
  abstract: In the ongoing data-rich era, intelligent cognition is playing an increasingly important role in advancing remote
    sensing applications. However, traditional intelligent methods for remote sensing processing no longer fully meet the
    growing demands of this era and still suffer from several limitations, such as passive data-dependent processing, predefined-task
    execution, and lack of closed-loop optimization. As a customized GeoAI innovation for remote sensing, Remote Sensing Agent
    has entered an early stage of research explosion. This paper focuses on its paradigm-shifting role in reshaping remote
    sensing information processing, clarifies the “4+1” core characteristics including multimodal spatial perception, goal-driven
    spatial mission planning, geoscientific knowledge reference, geospatial workflow execution, and feedback loop. It elaborates
    the threefold reshaping of remote sensing information processing from initiation mode, execution mode, and evaluation
    criterion, namely shifting from passive data processing to active task-driven, from predefined-task processing to multi-agent
    collaboration, and from result-oriented output to full-process closed-loop optimization. Future prospects of Remote Sensing
    Agent in geoscientific knowledge base optimization, multi-agent collaboration efficiency, and complex-scenario adaptability
    are discussed. This paper provides targeted and forward-looking perspectives for intelligent innovation research in remote
    sensing.
