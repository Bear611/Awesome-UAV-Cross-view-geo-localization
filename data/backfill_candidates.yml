  summary:
    summary_en: Cross-view UAV geolocalization is framed as large-scale image retrieval, where most existing dual-stream methods
      learn separate encoders per view and rely on naive similarity heuristics, failing to model cross-view interactions.
      To address this, the authors propose SkyLink, a plug-and-play LVLM-driven re-ranking framework that jointly models UAV–satellite
      relationships by pairing each query image with each candidate through a cross-view prompt template and feeding the pair
      into a LoRA-fine-tuned Qwen2-VL-7B-Instruct backbone, whose last-token hidden state is mapped to a scalar relevance
      score via a lightweight value head. A relational-aware loss replaces rigid contrastive supervision with soft labels
      derived from cosine similarity between candidate and ground-truth satellite features under a similarity threshold, mitigating
      harsh penalties on near-positive pairs. The authors also curate SkyRank, a derived re-ranking dataset constructed from
      public benchmarks by running existing retrievers over training queries and ensuring the ground truth is present in every
      candidate set. Experiments combine three base retrievers (SDPL, Sample4Geo, MCCG) with two standard benchmarks (University-1652,
      SUES-200), reporting Recall@1, Recall@5, and Average Precision. Results across all retriever–dataset combinations show
      SkyLink consistently improves ranking over the base retrievers, with larger gains on weaker baselines and clearer wins
      at lower altitudes on SUES-200.
