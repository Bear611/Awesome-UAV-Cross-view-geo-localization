  summary:
    summary_en: This paper addresses drone-view geo-localization (DVGL) in GPS-denied scenarios by proposing a satellite-free
      training (SFT) framework that requires no satellite imagery during training. Unlike prior supervised and unsupervised
      DVGL methods that depend on paired or weakly paired drone–satellite data, SFT reconstructs dense 3D scenes from multi-view
      drone sequences using 3D Gaussian Splatting, then projects the reconstructed geometry into PCA-aligned pseudo-orthophotos
      via a soft-roof compositing strategy, refined with geometry-guided and LaMa-based inpainting to obtain texture-complete
      UAV-side location representations. A frozen DINOv3 ViT backbone extracts patch features, and a Fisher vector aggregator
      built from a GMM vocabulary learned exclusively on drone patches encodes both drone pseudo-orthophotos and, at test
      time, satellite gallery tiles into a shared embedding space for cross-view retrieval. The framework is evaluated on
      the University-1652 and SUES-200 benchmarks across multiple flight altitudes. Reported results show that, under the
      satellite-free protocol, SFT substantially outperforms reproduced generalization baselines such as ResNet-50, ViT-Base,
      ConvNeXt-Base, DINOv3, AnyLoc, and MambaVision, while still trailing methods that exploit satellite imagery during training.
