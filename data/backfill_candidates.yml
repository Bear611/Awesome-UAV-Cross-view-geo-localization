  summary:
    summary_en: This paper addresses cross-view image geo-localization, the task of retrieving the geographic location of
      a ground-level street-view panorama by matching it against geo-referenced aerial references such as satellite imagery
      or map tiles. The proposed Panorama-BEV Co-Retrieval Network contains two complementary branches. A BEV branch transforms
      panorama inputs into an enhanced bird's-eye-view (EP-BEV) representation that aligns the ground-level scene with the
      top-down layout of satellite images, while a separate panorama branch encodes the original street-view image to capture
      global layout cues such as buildings and vegetation. The two branches are trained jointly so that local, shared geometric
      information near the capture point and broader contextual layout features are both exploited during retrieval. To support
      evaluation under realistic conditions, the authors introduce CVGlobal, a new dataset of panorama-satellite-map triples
      spanning seven cities worldwide, with unfixed camera orientations and multi-temporal Brisbane captures that introduce
      lighting and structural changes. Experiments on CVGlobal and the CV ACT benchmark analyze BEV range parameters, with
      the configuration r=0.14 m, l=512 yielding R@1 of 89.01 on CV ACT-Val and 68.18 on CV ACT-Test for the BEV-only branch,
      and the paper presents qualitative heatmap visualizations showing complementary attention from the two branches. The
      work focuses on cross-view geo-localization as a retrieval problem rather than UAV-specific pose estimation.
