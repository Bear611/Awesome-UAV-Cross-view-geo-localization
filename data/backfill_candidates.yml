  abstract: Cross-view image matching serves as a pivotal technology for UAV autonomous localization and navigation. Yet,
    given the severe viewpoint disparities between UAV and satellite imagery, current approaches often fail to balance the
    extraction of global semantics with the preservation of fine-grained local details. To overcome this limitation, we present
    an enhanced feature model built upon a lightweight backbone. We design a fusion architecture that leverages the Unit Spatial
    Attention Module (USAM) from Lin et al. to target salient regions, followed by the innovative integration of the Discrete
    Wavelet Transform (DWT) to establish a local feature enhancement module. This module explicitly captures high-frequency
    components—such as edges and textures—thereby effectively mitigating spatial information loss during downsampling. On
    the University-1652 benchmark, our method delivers highly competitive performance, achieving 81.63% R@1 in the localization
    task with a lightweight ConvNeXt-Tiny backbone. This validates the efficacy of our strategy in synergizing frequency-domain
    details with spatial semantics.
