- id: 9e0ff41563c5
  title: Monitoring Chlorophyll Content of Brassica napus L. Based on UAV Multispectral and RGB Feature Fusion
  year: 2025
  venue: Agronomy
  authors:
  - Yongqi Sun
  - Jiali Ma
  - Mengting Lyu
  - Jianxun Shen
  - Jianping Ying
  - Skhawat Ali
  - Basharat Ali
  - Wenqiang Lan
  - Yuchen Hu
  - Fei Liu
  - Weijun Zhou
  - Wenjian Song
  abstract: Accurate prediction of chlorophyll content in Brassica napus L. (rapeseed) is essential for monitoring plant nutritional
    status and precision agricultural management. The current study focuses on single cultivars, limiting general applicability.
    This study used unmanned aerial vehicle (UAV)-based RGB and multispectral imagery to evaluate six rapeseed cultivars chlorophyll
    content across mixed-growth stages, including seedling, bolting, and initial flowering stages. The ExG-ExR threshold segmentation
    was applied to remove background interference. Subsequently, color and spectral indices were extracted from segmented
    images and ranked according to their correlations with measured chlorophyll content. Partial Least Squares Regression
    (PLSR), Multiple Linear Regression (MLR), and Support Vector Regression (SVR) models were independently established using
    subsets of the top-ranked features. Model performance was assessed by comparing prediction accuracy (R2 and RMSE). Results
    demonstrated significant accuracy improvements following background removal, especially for the SVR model. Compared to
    data without background removal, accuracy increased notably with background removal by 8.0% (R2p improved from 0.683 to
    0.763) for color indices and 3.1% (R2p from 0.835 to 0.866) for spectral indices. Additionally, stepwise fusion of spectral
    and color indices further improved prediction accuracy. Optimal results were obtained by fusing the top seven color features
    ranked by correlation with chlorophyll content, achieving an R2p of 0.878 and an RMSE of 52.187 μg/g. These findings highlight
    the effectiveness of background removal and feature fusion in enhancing chlorophyll prediction accuracy.
