- id: 7d750a6e2796
  title: 'Integrating social and spatial dimensions in tsunami evacuation modeling: a case study of Panggarangan coast, Indonesia'
  year: 2026
  venue: npj natural hazards.
  authors:
  - Ni Nyoman Era Jumantini
  - I. Nyoman Putera Indrawan
  - Admiral Musa Julius
  abstract: Abstract The Indian Ocean region, particularly the Indonesian archipelago, represents one of the most high-risk
    tsunami zones globally. Historical records indicate that the southern coast of Java is subject to recurrent seismic and
    tsunami events driven by the Sunda Megathrust activity. This study quantifies tsunami escape potential by integrating
    hazard timing, spatial constraints, and community evacuation behavior in Panggarangan, a coastal village in Banten, Indonesia.
    Tsunami arrival times and inundation characteristics were derived from BMKG megathrust scenarios to define the Available
    Evacuation Time. High-resolution topographic data and GIS-based network analysis were employed to estimate optimal evacuation
    trajectories and Required Travel Times to designated Temporary Evacuation Sites (TES). These quantitative spatial analyses
    were synthesized with longitudinal field-based ethnographic observations conducted between 2022 and 2025. Results indicate
    that compressed arrival windows (approximately 12–15 minutes), when compounded by topographic friction and behavioral
    latency (such as social confirmation and asset protection), substantially diminish evacuation feasibility. This research
    advances tsunami risk assessment by operationalizing evacuation capacity as a socio-spatial outcome, offering a more nuanced
    framework for near-field tsunami mitigation in under-researched coastal contexts.
