- id: c25faab5c384
  title: Making Democracy more Representative of the People
  year: 2026
  venue: Athens Journal of Politics & International Affair
  authors:
  - Andrew Gitlin
  abstract: 'This paper examines the evolving representativeness of democracy through a descriptive analysis of the United
    States and Ghana, two countries shaped by distinct historical trajectories yet similar democratic tensions between the
    period 1990 - 2025. In this context, we conceptualize democracy as constituted through the interaction of cultural practices
    and economic structures. Hence, we move beyond procedural accounts to interrogate how power, wealth, media, and institutional
    design condition meaningful participation. The U.S. case traces a pattern of democratic expansion followed by a seeming
    decline and the growing influence of social media and artificial intelligence on political polarization and participation.
    The Ghanaian case examines democratic consolidation following decades of political instability, highlighting electoral
    reforms, media liberalization, poverty reduction, and expanded civic engagement, while also identifying enduring challenges.
    Overall, we demonstrate how cultural arrangements, economic hierarchies, and media ecosystems interact to either enable
    or constrain democratic representation. Findings from our descriptive case studies suggest that democratic erosion and
    exclusion are not exceptional failures but predictable outcomes when structural inequalities remain embedded within democratic
    institution. We conclude by advancing a praxis-oriented approach to democratic renewal that integrates institutional reform,
    economic redistribution, labor protections, media accountability, and ethical governance of artificial intelligence. Keywords:
    democratic representation, comparative democracy, political economy, wealth and inequality, social media and artificial
    intelligence, United States, Ghana'
