- id: d5f7f8d8fbe8
  title: 'Artificial Intelligence and Remote Sensing for Inland Surface Water Quality Monitoring: A Systematic Literature
    Review of Tools, Methods, Challenges, and Future Directions'
  year: 2026
  venue: Water
  authors:
  - Cristiano Capellani Quaresma
  - Orandi Mina Falsarella
  - Duarcides Ferreira Mariosa
  - Diego de Melo Conti
  - Jorge L. Gallego
  - Júlio Cardoso Pereira
  - Isabella Maria Tressino Bruno
  abstract: Monitoring inland surface water quality is essential for water security, ecosystem conservation, public health,
    and sustainable water resource management. Although in situ measurements remain indispensable, they are often limited
    by high costs, restricted spatial coverage, low temporal frequency, and discontinuous monitoring networks. This study
    presents a systematic literature review, guided by the PRISMA 2020 framework, of empirical studies published between 2021
    and 2025 on the integration of artificial intelligence (AI) and remote sensing (RS) for inland surface water quality monitoring.
    Searches were conducted in the Web of Science database, resulting in a final corpus of 367 peer-reviewed articles. Preliminary
    bibliometric characterization and qualitative content analysis were performed to identify sensors, platforms, AI paradigms,
    algorithms, estimated parameters, validation strategies, limitations, challenges, trends, and research gaps. The results
    show rapid growth in the field, with Sentinel-2 and Landsat-8 as the most recurrent sensors and multispectral data as
    the dominant spectral source. Machine learning approaches, especially Random Forest, Artificial Neural Networks, XGBoost,
    and Support Vector Machine, predominated, while deep learning, multi-source integration, hybrid models, and Explainable
    AI emerged as relevant trends. AI–RS integration shows strong potential to complement conventional monitoring, but persistent
    challenges remain regarding in situ data dependence, limited external and temporal validation, model transferability,
    generalization, uncertainty reporting, validation robustness, and interpretability.
