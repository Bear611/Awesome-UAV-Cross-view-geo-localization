- id: c0c1545f82ef
  title: 'MCFA: Multi-Scale Cascade and Feature Adaptive Alignment Network for Cross-View Geo-Localization'
  year: 2025
  venue: Italian National Conference on Sensors
  authors:
  - Kaiji Hou
  - Qiang Tong
  - Na Yan
  - Xiulei Liu
  - Shoulu Hou
  abstract: Cross-view geo-localization (CVGL) presents significant challenges due to the drastic variations in perspective
    and scene layout between unmanned aerial vehicle (UAV) and satellite images. Existing methods have made certain advancements
    in extracting local features from images. However, they exhibit limitations in modeling the interactions among local features
    and fall short in aligning cross-view representations accurately. To address these issues, we propose a Multi-Scale Cascade
    and Feature Adaptive Alignment (MCFA) network, which consists of a Multi-Scale Cascade Module (MSCM) and a Feature Adaptive
    Alignment Module (FAAM). The MSCM captures the features of the target’s adjacent regions and enhances the model’s robustness
    by learning key region information through association and fusion. The FAAM, with its dynamically weighted feature alignment
    module, adaptively adjusts feature differences across different viewpoints, achieving feature alignment between drone
    and satellite images. Our method achieves state-of-the-art (SOTA) performance on two public datasets, University-1652
    and SUES-200. In generalization experiments, our model outperforms existing SOTA methods, with an average improvement
    of 1.52% in R@1 and 2.09% in AP, demonstrating its effectiveness and strong generalization in cross-view geo-localization
    tasks.
