    summary_en: This paper addresses cross-view geo-localization between drone-view and satellite-view images, where large
      viewpoint differences across platforms pose significant matching challenges. The authors propose a multilevel feedback
      joint representation learning network built on a Swin-B backbone that organizes global features into three levels—image-level,
      part-level, and patch-level—and feeds part/patch information back to higher-level features to enrich contextual and
