- id: b508c0afaa2f
  title: 'UltraVPR: Unsupervised Lightweight Rotation- Invariant Aerial Visual Place Recognition'
  year: 2025
  venue: IEEE Robotics and Automation Letters
  authors:
  - Chao Chen
