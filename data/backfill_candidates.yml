- id: f89f2a5ad23c
  title: On the Effectiveness of Binary-Valued Features for Fast Cross-View Image Geo-Localization
  year: 2025
  venue: ''
  authors:
  - Royston Rodrigues
  - Masahiro Tani
  abstract: Cross-view image geo-localization aims to determine the location of unknown images by matching query images to
    their corresponding aerial views. As search regions expand to larger regions, it becomes increasingly important to not
    only focus on the accuracy of the geo-localization method but also to ensure the efficiency of the search. While the research
    community has primarily focused on improving accuracy by developing larger and more complex models, these models encounter
    significant challenges when scaled to handle larger areas. As the search space grows, the demand for computational resources
    and storage increases substantially, making it difficult to maintain operational feasibility. In this paper, we investigate
    the effectiveness of using binary-valued features instead of traditional floating-point features for cross-view image
    geo-localization. We show that binary features can significantly improve search speed while maintaining accuracy comparable
    to floating-point features. Our findings emphasize the scalability benefits of binary features, enabling faster and more
    efficient search processes even as the database of aerial images grow. Experiments on the CVACT data-set demonstrate a
    10-fold increase in search speed for images with a limited FoV, while maintaining competitive performance.
