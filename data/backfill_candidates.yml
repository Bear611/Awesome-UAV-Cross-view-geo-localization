      the common assumption that drone and satellite-tile scales are pre-aligned. The problem is decomposed into multi-scale
      matching and multi-positive contrastive learning. The proposed MM-Geo pipeline first partitions satellite maps into
      uniformly sized tiles, then retrieves matches online against drone images of smaller field-of-view captured at varying
      altitudes. To handle altitude-induced scale variation, MM-Geo introduces a patch-vote re-ranking strategy guided by
      match attention, which refines coarse retrieval candidates using local patch correspondences. For training, a normalized
      InfoNCE loss is used so that a continuous region of neighboring positives on the map contributes finer-grained supervision
      than a single positive pair, better reflecting the inherently multi-positive nature of the geo-localization task. Experiments
      are conducted on the public UAV-VisLoc benchmark and on a new large-scale urban dataset called MT-UAV, which the authors
