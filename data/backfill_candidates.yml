- id: 2ea8b3ff6fab
  title: Accurate Vision-Enabled UAV Location Using Feature-Enhanced Transformer-Driven Image Matching
  year: 2024
  venue: IEEE Transactions on Instrumentation and Measurement
  authors:
  - Haoyang Wang
  - Fuhui Zhou
  - Qihui Wu
  abstract: Navigation is of crucial importance for the wide application of unmanned aerial vehicles (UAVs). Although methods
    based on the Global Positioning System (GPS) and those depending on satellite images have been proposed, their location
    accuracy and applications are limited by diverse factors, such as signal blocking, electromagnetic interference, regional
    restrictions and the environmental characteristics change, etc. To tackle this issue, we propose a visual positioning
    method enabled by using a feature-enhanced transformer-driven image matching network. The images acquired by the drone’s
    onboard camera are matched with the satellite image to measure the drone position. Simulation results demonstrate that
    our proposed method is more robust and achieves the highest accuracy compared to the benchmark methods in the environments
    where the visual features fluctuate. It is shown that the average positioning error does not exceed 50 meters under the
    seasonal changes at an altitude of 400 meters.
