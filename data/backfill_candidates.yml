      unavailable, such as in GNSS-denied environments. The core challenge is to determine both the geographic position and
      the flight altitude of a UAV from a single onboard image, without relying on additional sensor data such as GPS, barometers,
      or LiDAR. To tackle this, the authors propose a cross-view matching-based pipeline that compares UAV images against
      satellite reference imagery, combined with a geometry-based monocular height estimation module. The height is recovered
      by computing the real-world ground area captured in the image using the known intrinsic parameters of the optical camera,
      avoiding dependence on external altitude sensors. A multi-scale input network is introduced to improve robustness across
      varying flight altitudes and scene scales. The authors constructed a dedicated UAV-to-satellite dataset covering flight
      heights of 80–200 m for evaluation. As reported in the abstract, the positioning index RDS reaches 76.3 points, the
      localization accuracy within 20 m is 81.7%, and the relative height estimation error is 18.1%.
