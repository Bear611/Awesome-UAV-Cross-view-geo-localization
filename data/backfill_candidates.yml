- id: 0e4093d11c45
  title: 'Co-form Meltblown Process: Part II—Effect of Process Parameters on Particle Spatial Distribution and Uniformity'
  year: 2026
  venue: Fibers and Polymers
  authors:
  - Md Nur Uddin
  - Benoît Mazé
  - Behnam Pourdeyhimi
  abstract: Abstract We have been investigating the process parameters of co-form meltblown nonwovens produced by incorporating
    aluminum oxide particulates during web formation. Part I focused on particle loading efficiency and materials characterization.
    However, the effects of processing conditions on particle spatial distribution and web uniformity have not been studied
    in detail. In Part II, we examine the influence of particle size (300 μm, 425 μm, and 600 μm), particle insertion distance
    (15 cm, 38 cm, and 60 cm), and air pressure (6 psi, 8 psi, and 10 psi) on these structural characteristics in a polyether
    block amide (PEBA)-based co-form meltblown system. Particle spacing was analyzed by using nearest neighbor distance (NND)
    from microscope images, while web uniformity was evaluated by a quadrant-based gravimetric method. All samples showed
    regular particle spacing with aggregation index values (R = 1.03–1.27). An insertion distance of 38 cm produced the most
    regular particle distribution. Web uniformity remained high under all conditions, with a minimum of ~ 92%. Variation in
    air pressure showed no significant effect on either particle distribution or overall web uniformity. When considered alongside
    the results from Part I, these observations help establish a process–structure–property relationship for particle-loaded
    nonwovens materials. These studies explain how processing variables and web structure affect co-form meltblown structures.
