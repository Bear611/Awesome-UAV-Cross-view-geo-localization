- id: caf723bbf9aa
  title: 'Terrain Modeling and Cost Map Construction for Autonomous Agricultural Vehicles in Hilly Orchards: A Review'
  year: 2026
  venue: Sensors
  authors:
  - Ruohan Shi
  - Hanquan Lei
  - Yunfei Wang
  - Mingxiong Ou
  - Weidong Jia
  abstract: Navigating hilly orchards is challenging for autonomous agricultural vehicles due to the rugged terrain and dense
    canopy cover. Standard environmental modeling techniques are widely used, yet they often overlook how elevation uncertainty
    propagates during Digital Elevation Model (DEM) reconstruction. This oversight can directly affect terrain risk assessments
    and navigation planning. From an error-propagation perspective, this review examines how uncertainties originating from
    RTK-GNSS, LiDAR, and computer vision propagate through DEM reconstruction, terrain-feature extraction, cost map construction,
    and path planning. We further analyze how DEM elevation errors and vertical inaccuracies affect slope estimation, roughness
    representation, traversability assessment, vehicle stability, and navigation safety. Finally, we highlight practical bottlenecks
    in hilly orchard scenarios and suggest several research priorities, including multimodal fusion, uncertainty-aware modeling,
    lifelong map updating, and learning-based traversability assessment.
