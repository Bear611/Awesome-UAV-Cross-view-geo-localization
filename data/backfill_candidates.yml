- id: 77f68f5493c2
  title: '3D-DLP: Self-Supervised 3D Object-Centric Scene Representation Learning'
  year: 2026
  venue: arXiv
  authors:
  - Ellina Zhang
  - Madhaven Iyengar
  - Amir Zadeh
  - Chuan Li
  - Deepak Pathak
  - David Held
  - Tal Daniel
  abstract: 'We introduce 3D-DLP, a self-supervised object-centric representation learning model that decomposes scene-level
    RGB-D or voxel observations into a set of 3D latent particles. Building on the Deep Latent Particles (DLP) framework,
    each particle encodes disentangled attributes, including 3D keypoint position, bounding box dimensions, and appearance
    features, and represents a distinct entity in the scene. The model learns interpretable per-particle segmentation maps
    through an end-to-end self-supervised reconstruction objective. We demonstrate on both simulated and real-world datasets
    that the learned latent space is interpretable and controllable: by manipulating particle positions and decoding, we can
    generate novel scene configurations. Furthermore, we show that leveraging these compact 3D latent particles for downstream
    robotic manipulation improves performance over baselines that either lack explicit 3D information or rely on memory-intensive
    dense 3D inputs without object-centric structure. Code and videos are available at https://eubooks3003.github.io/3d-dlp.'
