- id: 091d93cc5a33
  title: Physicochemical Aspects of Mixed Micelle Formation Between Amphiphilic Drugs and Surfactants
  year: 2026
  venue: International Journal of Molecular Sciences
  authors:
  - Ádám Juhász
  - Bianka Torma
  - Egon F. Várkonyi
  - László Seres
  - Norbert Varga
  - Árpád Turcsányi
  - Edit Csapó
  abstract: The rational design of mixed micellar systems has emerged as a cornerstone of modern nanomedicine, offering unprecedented
    control over the solubility and bioavailability of challenging therapeutic agents. This review provides a comprehensive
    analysis of the physicochemical principles governing the assembly of amphiphilic drugs and surfactants into synergistic
    nanostructures. By articulating the transition from traditional guest/host solubilization to “drug-as-component” models,
    we highlight the critical role of molecular interactions in achieving therapeutic precision. It further outlines the experimental
    methodologies used to investigate these systems and elucidates how they enhance the solubility, stability, and bioavailability
    of poorly water-soluble drugs. Special emphasis is placed on the practical applications of synergy in reducing systemic
    toxicity and optimizing drug release kinetics, providing a roadmap for the development of next-generation nano-pharmaceuticals.
    The functionality of these systems is significantly influenced by the molecular interactions among their constituents;
    thus, quantitative analysis of these interactions might enhance the formulation of more effective pharmaceuticals. This
    review outlines the key physicochemical principles of mixed micelle formation, including thermodynamics and synergistic
    interactions of amphiphiles, while emphasizing their relevance in current research and practical pharmaceutical applications.
    Various experimental methods, such as surface tension measurement, conductometric and calorimetric tests, and spectroscopic
    techniques, are compared in terms of their conditions of application and performance in understanding micelle formation
    and micelle structure. We clearly point out that the interpretation and evaluation of the properties of colloidal systems
    containing drug molecules solubilized by mixed micelles and an amphiphilic drug incorporated into micelles must be discussed
    and evaluated separately. Understanding the limitations and characteristics of the physical/chemical principles applied
    is essential for the rational design of mixed micelle carriers tailored to specific therapeutic needs.
