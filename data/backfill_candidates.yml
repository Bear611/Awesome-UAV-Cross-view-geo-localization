      images despite large viewpoint, scale, and appearance gaps. The authors propose the Global-Local Quadrant Interaction
      Network (GLQINet), built on a dual-stream ConvNeXt backbone with shared weights. Two core modules are introduced: a
      Quadrant Insight Module (QIM) that decomposes feature maps into horizontal, vertical, diagonal, and anti-diagonal directional
      stripes via directional average pooling to preserve intra-class consistency and multi-scale spatial cues; and an Integrated
      Global-Local Attention Module (IGLAM) that fuses global descriptors with the stripe-level local features through a Merged
      Attention mechanism, achieving bidirectional cross-scale interaction more efficiently than self-, cross-, or co-attention
      variants. Training uses a combined cross-entropy and triplet loss over multiple feature representations. Experiments
      are conducted on the University-1652 and SUES-200 benchmarks under Drone→Satellite and Satellite→Drone protocols. The
