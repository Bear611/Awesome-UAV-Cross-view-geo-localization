- id: e00f95493338
  title: 'Climate change responses in a Himalayan mountain village through the lens of altitude and livelihood practices:
    insights from long-term field research in Domkhar, Ladakh, India'
  year: 2026
  venue: Environmental Research Climate
  authors:
  - Takayoshi YAMAGUCHI
  - Toshihiro Tsukihara
  - S. Takeda
  abstract: Abstract Mountain regions are widely recognized as being highly vulnerable to climate change, yet understanding
    how the impacts of climate change are experienced in everyday life remains challenging, particularly in remote, topographically
    complex settings. This study presents a single-village case study from Domkhar in Ladakh, northern India, examining how
    climate change is embedded in altitude-dependent livelihood practices. The analysis draws on a long-term research design
    combining village-wide surveys, GIS-based land-use mapping, continuous temperature monitoring, and time-lapse observations
    conducted before 2018. These form a baseline of locally grounded data, knowledge and value-based understandings against
    which changes observed in 2025 are interpreted after a COVID-19-related interruption. This design enables the interpretation
    of recent changes in relation to locally grounded historical trajectories. Results show that climate change impacts are
    uneven across altitudinal zones. Rising temperatures have expanded the upper limit of apricot cultivation, creating new
    opportunities in higher settlements, while lower settlements increasingly face heat stress in barley production. These
    changes are not experienced as isolated climatic effects but as part of broader livelihood transformations shaped by market
    integration, labor availability, and local environmental constraints. The findings highlight that responses to climate
    change are mediated through practice-based knowledge embedded in specific altitudinal and socio-economic contexts. By
    focusing on altitude as an organizing lens and drawing on locally grounded insights from long-term observation, this study
    demonstrates how locally situated knowledge can inform a more context-sensitive understanding of adaptation in mountain
    societies.
