    summary_en: 'SkyLink addresses cross-view geo-localization between ground-level street imagery and top-down satellite
      imagery, where extreme viewpoint disparities cause severe appearance gaps and semantic degradation. To bridge this gap,
      the method introduces three main components: (1) a Google Retrieval Enhancement Module (GREM) that augments the limited
      street-view diversity by retrieving visually similar nearby Google images as additional viewpoints; (2) a Patch-Aware
      Feature Aggregation (PAFA) module, built on a weight-sharing DINOv2 Siamese backbone, that emphasizes consistent local
      feature aggregation across viewpoints via patch-mixing MLPs; and (3) a Multi-scale 3D Scene Bridge Module (MSBM) that
      reconstructs multi-scale UAV image sets into 3D point clouds using VGGT, encodes them with PointCLIP, and uses them
      as an intermediate representation linking street and satellite features. Training is optimized with a cross-view contrastive
      loss plus a self-supervised contrastive loss, balanced by a weighting factor λ. Experiments are conducted on the University-1652
      benchmark. The paper reports a ground-to-satellite retrieval result of 27.06% R@1, 52.46% R@5, 64.17% R@10, and 33.09%
      AP with DINOv2-L, and 18.65% R@1 / 23.48% AP with DINOv2-B, stated as the UAVM2025 Challenge performance. The method
