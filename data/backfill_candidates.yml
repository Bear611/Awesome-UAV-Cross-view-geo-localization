- id: 115f6eee4172
  title: On the design of solar thermal energy systems with the f-chart method
  year: 2026
  venue: Discover Analytics
  authors:
  - F. Mavromatakis
  abstract: While the f-chart method is a standard tool for designing solar thermal systems, a significant research gap exists
    regarding the precise impact of the heat exchanger correction factor ( F ′ R / F R ) under different operational conditions.
    Most studies assume a near-unity factor, potentially underestimating the required collector area when a heat exchanger
    is present. This study is motivated by the need for a more rigorous approach to sizing systems that incorporate heat exchangers.
    We propose a methodology that utilizes monthly mean solar irradiance, collector loop flow rates and typical temperatures
    to estimate the correction factor. Our findings reveal that in worst-case scenarios, the required collector area can increase
    by 12–37%, whereas in typical scenarios, the increase ranges from 5 to 14%. We have also explored the effect of the cold-water
    input temperature by adopting temperatures of 10 °C, 15 °C, 20 °C and 25 °C. For any given heat exchanger setup, the higher
    the cold-water temperature, the higher (better) the correction factor and thus, the less additional area of collectors
    to be required. This work shows that the proper set up of the working conditions of the heat exchanger is important for
    the efficient operation of the solar thermal system
