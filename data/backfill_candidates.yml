    summary_en: This paper addresses the problem of significant viewpoint differences and appearance variations in UAV cross-view
      geo-localization, where existing RGB-based methods struggle to capture viewpoint-invariant features. The authors argue
      that geometric structural information from surface normal images, when jointly modeled with RGB semantics, can improve
      robustness. They propose JRN-Geo, a dual-branch ConvNeXt-based network that processes RGB and monocular-estimated normal
      images in parallel. A Difference-Aware Fusion Module (DAFM) progressively fuses semantic and structural features by
      amplifying differential signals between branches, while a Joint-Constrained Interaction Aggregation (JCIA) strategy
      enables interactive aggregation of cross-branch spatial attention to produce discriminative global descriptors. To enrich
      training data, a 3D Geographic Augmentation technique uses COLMAP-based reconstruction and homography cropping to generate
      additional cross-view samples from existing drone imagery. Experiments are conducted on the University-1652 and SUES-200
      benchmarks, where the paper claims state-of-the-art results under complex viewpoint variations, with the full method
      (k=4) outperforming prior work. The authors report that the 3D augmentation further improves recall and average precision
      beyond the baseline JRN-Geo without augmentation.
