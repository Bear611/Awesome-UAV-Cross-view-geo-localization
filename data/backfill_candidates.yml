  abstract: Some medicinal plants have plant-based antioxidants that help to avoid the harmful impact of oxidative stress.
    Alstonia scholaris (Apocynaceae) is a tropical evergreen tree indigenous to South and Southeast Asia. The objective of
    the current work is to investigate the quantitative estimation of phytoconstituents and LCMS characterization of fruits
    extract of A. scholaris with evaluation of antioxidant activity. The total phenolic content is determined by Folin-Ciocalteu
    Reagent (FCR) technique and total flavonoid content is estimated by aluminum chloride assay from the ethanolic extract
    of fruits of A. scholaris. Additionally, the phytoconstituents of the EEAS and antioxidant activity were evaluated liquid
    chromatography mass spectroscopy (LCMS) analysis and 2, 2 diphenyl-1-picrylhydrazyl (DPPH) assay respectively. The total
    phenolic content and total flavonoid content in EEAS was found to be 400mg GAE.gm and 31.1 mg QE/gm respectively. However,
    the LCMS analysis revealed that EEAS showed a total of 58 phytoconstituents. In the antioxidant study, the EEAS exhibits
    the as compared to standard ascorbic acid IC50=8.116±0.013µg/ml. After completing the study, it is concluded that EEAS
    possessed phenolics and flavonoid content. However, LCMS analysis revealed the other important phytoconstituents as well
    as plant extract also possess valuable in-vitro antioxidant potential. So, the evidence of the current study states that
    the A. scholaris and its isolated compounds may be a promising candidate for treating the various diseases in future.
