- id: 659a35249456
  title: 'Exploring the potential of AlphaEarth and TESSERA embeddings for Fine-scale Local Climate Zone Mapping: A case study
    across five cities in Switzerland'
  year: 2026
  venue: arXiv
  authors:
  - Htet Yamin Ko Ko
  - Clement Atzberger
  abstract: Understanding urban spatial morphology is critical for climate modeling, risk assessment, and sustainable urban
    design, and Local Climate Zone (LCZ) mapping provides the basic framework for this. However, many cities still use coarse
    ~100-m resolution LCZ records, which are unsuitable for fine-scale urban research. In this study, precomputed embeddings
    from TESSERA (Feng et al., 2025) and AlphaEarth (Brown et al., 2025) are compared to traditional Sentinel-1/2 (S1S2) composites
    in five Swiss cities to see if they can upscale coarse LCZ maps to 10-m resolution using an attention-based U-Net. Three
    experiments assess multi-city transferability, the impact of higher-resolution reference data, and temporal robustness
    to year-to-year phenology changes. We find that all datasets achieve strong performance with test data Intersection-over-Union
    (IoU) ranging from 0.59-0.69 and 0.77-0.82 in the first two experiments. TESSERA consistently outperforms both S1S2 and
    AlphaEarth across both settings As expected, we find that the transfer of embedding-based models from one year to another
    remains an open challenge. Overall, however, our results demonstrate the promising potential of embeddings derived from
    EO foundation models to reduce time consuming preprocessing, respectively, manual feature engineering tasks and to guide
    a universal deep learning-based LCZ mapping workflow. When combined with a simple location-aware attention U-Net architecture,
    the embeddings enhance regional transferability and scalability, supporting the development of comprehensive and reproducible
    fine-scale LCZ maps for global urban climate applications Improving reference data quality remains the strongest lever
    for further accuracy gains.
