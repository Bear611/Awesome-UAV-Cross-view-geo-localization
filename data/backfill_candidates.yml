  - F. Nati
  - M. Zannoni
  abstract: Modern telescopes observing the Cosmic Microwave Background (CMB) polarization require an exquisite control of
    systematics to target Inflationary Gravitational Waves (IGW), Cosmic Birefringence (CB), and Primordial Magnetic Fields
    (PMF). The absolute polarization angle of the detectors is a critical parameter to disentangle the $E$-modes and $B$-modes
    of the CMB, allowing a correct detection of primordial $B$-modes as well as testing Cosmic Birefringence theories. To
    this end, we discuss the current status of the POLOCALC project, an ERC Advanced Grant that aims to develop air-borne
    calibration sources for CMB small-aperture telescopes. The main scientific objective of POLOCALC is to enable a direct
    calibration of the absolute polarization angle of CMB polarimeters with an accuracy of $0.01 \degree $. We present the
    latest developments regarding the calibration source, the calibration strategies designed to use drone-based calibrators,
    and the application to modern ground-based experiments.
