- id: fa53897145ab
  title: 'ELMA: ELlipse-based bar MAjor axis estimator'
  year: 2026
  venue: arXiv
  authors:
  - Bruna R. Bragança de Lima
  - Andressa Wille
  - Rafael S. de Souza
  - Ana L. Chies-Santos
  abstract: Galactic bars are key non-axisymmetric structures in disk galaxies, driving angular-momentum redistribution and
    contributing to secular evolution, central mass build-up, and the formation of nuclear structures. Robust and homogeneous
    measurements of bar length, however, remain challenging, particularly for large imaging surveys, where manual estimates
    are time-consuming and sensitive to methodological choices. We introduce elma, a standalone, pip-installable Python package
    for automated bar-length estimation in galaxies already identified as candidate barred systems. The method operates directly
    on two-dimensional imaging data, using iterative elliptical-isophote fitting to trace the radial ellipticity profile and
    identify a projected bar-length estimate from the semi-major axis associated with the local maximum in ellipticity. Using
    the image WCS information and a user-supplied redshift, elma converts angular measurement into a projected physical length.
    We demonstrate the package on JWST/NIRCam imaging of barred galaxies in the GOODS-South field. The code is released under
    the MIT license at a repository in Github.
