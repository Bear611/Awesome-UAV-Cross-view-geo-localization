    summary_en: This paper addresses UAV geolocalization in GNSS-denied environments, where satellite signal blockages, jamming,
      or spoofing prevent reliable positioning. The authors develop a visual localization system that operates both during
      the day and at night, targeting safe long-range UAV flight. The proposed pipeline combines an image matching front-end,
      visual odometry (VO) for relative motion estimation, and a terrain-weighted constraint optimization for absolute localization.
      A satellite image map management module handles chunking, real-time scheduling, and merging of satellite tiles for efficient
      online access. A 2D–3D geo-registration step based on Bidirectional Homologous Points Search (BHPS) recovers stable
      virtual control points from UAV imagery and satellite reference data. These control points are fused with VO in a sliding-window
