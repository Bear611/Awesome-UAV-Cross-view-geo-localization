  abstract: Sistem Penyediaan Air Minum (SPAM) Regional Kartamantul DIY merupakan sarana dan prasarana penyediaan air minum
    regional untuk Kota Yogyakarta, Kabupaten Sleman, dan Kabupaten Bantul yang direncanakan memiliki kapasitas sebesar 700
    liter/detik dengan memanfaatkan sumber air baku dari sungai Progo, kabupaten Bantul. Tujuan penelitian ini adalah melihat
    dan menghitung pengaruh suplai SPAM Regional Kartamantul terhadap pelayanan air minum PDAM (Perusahaan Daerah Air Minum)
    Kota Yogyakarta, Kabupaten Sleman dan Bantul setelah dilayani SPAM Regional Kartamantul DIY. Metode yang digunakan dalam
    kajian ini bersifat deskriptif kuantitatif dengan menggunakan data sekunder dari PDAM serta perhitungan pelayanan mengacu
