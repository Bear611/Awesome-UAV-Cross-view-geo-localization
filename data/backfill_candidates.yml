- id: 8a309eea8455
  title: 'Prospects and applications of autonomous vehicles in Nepalese agriculture: a review'
  year: 2026
  venue: Cogent Food & Agriculture
  authors:
  - Samir Regmi
  - Lokendra Khatri
  - Pawan Chapagaee
  - Binita Poudel
  abstract: Agriculture is a key sector in Nepal, employing approximately 60% of the population and contributing 27.1% to
    the national GDP. Despite its importance, Nepalese agriculture relies heavily on traditional practices, resulting in low
    productivity, labor shortages, and inefficient resource use. Autonomous vehicles (AVs), including self-driven tractors,
    harvesters, drones, and robotic farm machinery, are revolutionizing precision agriculture globally by enhancing operational
    efficiency, reducing labor dependence, and enabling data-driven decision-making. Among available technologies, agricultural
    UAVs and GPS-guided ground vehicles for the Terai plains represent the most immediately feasible entry points for Nepal,
    while robotic ground systems for hill terrain require further adaptation and cost reduction before widespread deployment
    is viable. This review explores potential applications and future prospects of AVs in Nepalese agriculture. A narrative
    review of literature from 2000 to 2025 was analyzed, focusing on technologies such as GPS, LiDAR, AI, IoT, and robotic
    actuators used in agricultural automation. AVs offer opportunities for improved crop monitoring, precise application of
    fertilizers and pesticides, mechanized planting and harvesting, and efficient transportation of farm produce. However,
    challenges such as high investment costs, hilly terrain, small landholdings, lack of technical expertise, and inadequate
    infrastructure may limit adoption. Strategic investment, policy support, and capacity building are essential to leverage
    AV technologies for sustainable agricultural development in Nepal. This review provides insights for researchers, policymakers,
    and stakeholders on integrating autonomous technologies to enhance productivity and resource efficiency in Nepalese agriculture.
