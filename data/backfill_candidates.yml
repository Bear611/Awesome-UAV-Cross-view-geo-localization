  summary:
    summary_en: 'This bachelor thesis targets robust UAV localization in GNSS-denied environments, where Visual Place Recognition
      (VPR) alone gives globally consistent but ambiguous and noisy per-image place estimates, while visual SLAM/odometry
      supplies locally accurate frame-to-frame displacement without a global reference. The proposed system combines a VPR
      front-end based on AnyLoc (DINOv2 patch features aggregated with a VLAD vocabulary, producing cosine-similarity probability
      heatmaps over satellite tiles) with a visual SLAM/odometry front-end that yields relative distance and yaw between consecutive
      frames. These cues are fused inside a discrete Bayesian histogram filter operating on a discretized satellite map: the
      prediction step convolves the previous belief heatmap with a banana-shaped kernel that jointly encodes distance and
      orientation uncertainty (line kernel times ring kernel), and the update step multiplies the predicted heatmap element-wise
      with the new VPR heatmap, followed by normalization. Evaluation is performed on the UAV-VisLoc benchmark (9 of 11 maps
      used, excluding one with insufficient valid samples and one with very large map size), reporting Absolute Position Error
      (mean, median, min) and Recall@Cells / Recall@Distance. Across the reported tables, the filter substantially reduces
      VPR-only errors (e.g., Map 1 mean APE from 853.35 m to 67.57 m, median from 450.49 m to 64.90 m; Map 4 mean APE from
      1153.77 m to 85.64 m, median from 340.20 m to 81.20 m), with the weakest performance on coastal Map 8 (mean 1860.49
      m, median 433.01 m).'
