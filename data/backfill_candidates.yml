- id: a5fa83fdd3f8
  title: 'Mediatori Morali nel Metaverso Ubiquitario: non-player characters, influencer ai e alter ego digitali come guide
    etiche tra il mondo reale e quello virtuale'
  year: 2026
  venue: Nova Science Publishers (Nova Science Publishers, Inc.)
  authors:
  - Giuseppe Fulvio Gaglio
  abstract: La diffusione di ambienti digitali immersivi e dell’Intelligenza Artificiale Generativa introduce nuove sfide
    nel supporto ai processi decisionali umani, in particolare in contesti caratterizzati da elevata interazione e riduzione
    dei vincoli sociali. In tali scenari emerge l’esigenza di strumenti capaci di accompagnare l’utente nella riflessione
    etica, preservandone autonomia e responsabilità.La presente ricerca esplora la progettazione di agenti artificiali concepiti
    come mediatori deliberativi non coercitivi, in grado di supportare il ragionamento morale in ambienti immersivi. Il lavoro
    adotta un approccio di Design Science Research e propone un’architettura che integra modelli di IA Generativa, moduli
    di interpretazione delle intenzioni e componenti di contestualizzazione all’interno di una struttura multi-modulo.La validazione
    è stata condotta attraverso scenari simulati, con un’analisi qualitativa focalizzata su coerenza argomentativa, pertinenza
    contestuale e capacità di esplicitazione delle premesse morali. I risultati evidenziano come l’integrazione architetturale
    consenta un supporto deliberativo più strutturato rispetto all’uso isolato di modelli linguistici.La ricerca non mira
    a dimostrare effetti comportamentali sugli utenti, ma a esplorare la fattibilità tecnica e concettuale di sistemi per
    la mediazione morale situata.
