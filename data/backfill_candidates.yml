- id: 879a9ef7da15
  title: 'S-Agent: Spatial Tool-Use Elicits Reasoning for Spatial Intelligence'
  year: 2026
  venue: arXiv
  authors:
  - Yalun Dai
  - Hao Li
  - Shulin Tian
  - Runmao Yao
  - Yuhao Dong
  - Fangzhou Hong
  - Zhaoxi Chen
  - Fangfu Liu
  - Baoliang Tian
  - Dingwen Zhang
  - Tao Wang
  - Kim-Hui Yap
  - Ziwei Liu
  abstract: Real-world spatial intelligence requires reasoning over a continuous and evolving 3D world, yet existing VLMs
    and tool-augmented agents largely remain tied to static, stateless inference from isolated visual observations. We introduce
    \textbf{\textsc{S-Agent}}, a spatial tool-use agentic paradigm for understanding and reasoning over continuous multi-view
    images and videos. By formulating spatial reasoning as spatio-temporal evidence accumulation rather than isolated frame-level
    prediction, \textsc{S-Agent} reshapes spatial perception into scene-centric understanding beyond frame-centric recognition.
    Specifically, \textsc{S-Agent} casts the VLM as a semantic planner that decides what evidence is needed, while a hierarchy
    of spatial tools and experts grounds objects in 2D, lifts them into 3D geometric evidence, and aggregates this evidence
    into high-level spatial knowledge (\textit{e.g.}, counting, measurement, orientation, and relative position). Additionally,
    a temporal memory mechanism, including Scene Memory for maintaining the evolving scene state and Agent Memory for accumulating
    reasoning context, enables evidence integration across frames and reasoning steps. Comprehensive experiments on multi-view
    and video spatial reasoning benchmarks show that \textsc{S-Agent} consistently improves both open-source and closed-source
    VLMs in a training-free manner. Beyond inference-time augmentation, supervised fine-tuning (SFT) on \textsc{S-Agent}-generated
    spatial trajectories \textsc{S-300K} yields \textsc{S-Agent-8B}, a compact spatial agent that significantly surpasses
    similar-scale baselines (e.g., Qwen3-VL-8B) and performs comparably to advanced closed-source models (e.g., GPT-5.4 and
    Gemini 3).
