      ViT)
    - Shared fully connected projection layer (FC1) with cross-entropy classification training
    - Standardized training, testing and evaluation pipeline
    - Multi-query feature averaging for ensemble retrieval
    - Evaluation protocol including height robustness, uncertainty robustness, and inference speed
    reported_results:
    - 'ViT baseline on SUES-200 Drone→Satellite: Recall@1 = 59.32, 62.30, 71.35, 77.17 at 150m, 200m, 250m, 300m respectively'
    - 'ViT baseline on SUES-200 Satellite→Drone: Recall@1 = 82.50, 85.00, 88.75, 96.25 at 150m, 200m, 250m, 300m respectively'
    - 'LPN (block=4) on SUES-200 Drone→Satellite: Recall@1 = 61.58, 70.85, 80.38, 81.47 at 150m, 200m, 250m, 300m'
    - 'LPN (block=4) on SUES-200 Satellite→Drone: Recall@1 = 83.75, 88.75, 92.50, 92.50 at 150m, 200m, 250m, 300m'
    - Multi-query averaging with 50 queries on SUES-200 Drone→Satellite improves Recall@1 over single query by approximately
      15 percentage points
    - Transfer learning from University-1652 outperforms ImageNet pretraining on SUES-200
    - ViT exhibits the best robustness to height and perturbations among tested backbones, but is the slowest at inference
