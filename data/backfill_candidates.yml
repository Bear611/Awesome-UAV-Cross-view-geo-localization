- id: d3c7a439b133
  title: An Improved PST-Based Visual Pose Estimation Algorithm for UAV Navigation
  year: 2026
  venue: Applied Sciences
  authors:
  - Shengxin Yu
  - Jinfa Xu
  - Tianhan Yang
  abstract: Vision-based pose estimation has been widely applied in unmanned aerial vehicle (UAV) navigation. However, existing
    visual pose estimation algorithms are highly sensitive to camera imaging distortion, which degrades estimation accuracy,
    and often suffer from noticeable jitter between frames in dynamic scenarios. To address these issues, this paper proposes
    an improved visual pose estimation algorithm built upon the Perspective Similar Triangle (PST) geometric model. Using
    a planar fiducial marker as the observation target, the single-frame pose estimation problem is reformulated as a hierarchical
    geometric inference framework, including image point distortion correction, depth recovery based on planar similar triangle
    constraint, and rigid transformation estimation between the camera and world coordinate systems. This formulation improves
    pose estimation accuracy under distorted imaging conditions. To accommodate distortion variations in practical scenarios,
    a radial distortion coefficient update method is further designed to adaptively adjust the radial distortion parameters
    under single-frame observations, ensuring that the distortion model remains consistent with the actual imaging distortion
    and providing reliable model inputs for distortion correction in pose estimation. In addition, to enhance pose stability
    in dynamic scenarios, a multi-frame optical center consistency constraint (MOCCC) method is introduced to optimize the
    pose estimation for more stability. By constraining pose estimation across adjacent frames using the mean optical center
    over multiple frames as the optimization objective, the proposed method effectively suppresses pose jitter caused by single-frame
    observation noise. Finally, a three-degree-of-freedom (3-DOF) attitude motion platform is established, and both static
    and dynamic experimental scenarios are designed to validate the accuracy and stability of the proposed algorithm. Experimental
    results demonstrate that the proposed algorithm achieves high accuracy and high stability pose estimation under imaging
    distortion and small perturbations, exhibiting good robustness and suitability for practical UAV visual navigation applications.
