- id: 41f846965028
  title: 'DOA: Advancing Cross-View Geo-Localization via Domain and Objective Alignment'
  year: 2025
  venue: ''
  authors:
  - Yu Meng
  - Lei Sun
  abstract: Cross-view geo-localization (CVGL) aims to match images depicting the same location but captured from different
    platforms, such as drones and satellites. This is a challenging image retrieval task owing to drastic visual appearance
    changes induced by view differences. Existing mainstream methods often formulate this task as an image classification
    problem, while classification-based models are easy to implement and achieve remarkable progress, the training objectives
    do not directly align with the final testing setup of the retrieval task, creating a new objective-level gap. Revisiting
    these keys of CVGL, we propose a novel TransNeXt-based method called DOA (Domain Alignment and Objective Alignment), bridging
    both the cross-view domain gap and objective-level gap. For the former, we propose a Domain Distribution Alignment module
    and a Self-adaptive Partition strategy, balancing coarse-grained and fine-grained feature representations while aligning
    global and local features, effectively mitigating view discrepancies. For the latter, we propose the Cross-view Retrieval
    loss, the first CVGL work to apply ranking-based constraints in training, aligning with the testing goal. Our approach
    demonstrates advanced performance in drone-view target localization and drone navigation task, outperforming state-of-the-art
    methods in comprehensive evaluations on public datasets University-1652 and SUES-200.
