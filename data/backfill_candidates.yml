- id: 085ff4324921
  title: 'FAST-LIVGO: A Degeneracy-Robust LiDAR-Inertial-Visual-GNSS Fusion Odometry'
  year: 2026
  venue: arXiv
  authors:
  - Zhiyu Chen
  - Chunran Zheng
  - Jiayu Wen
  - XiaoLei Zhang
  - Jiaming Xu
  - Feng Pan
  - Yukang Cui
  abstract: Robust state estimation and mapping in long-term, large-scale, and highly dynamic environments remains a key challenge
    in robotics. Existing LiDAR-Inertial-Visual Odometry (LIVO) systems achieve strong local accuracy but suffer from accumulated
    drift over long distances and may fail in geometrically degraded or textureless scenes. Meanwhile, GNSS-aided fusion frameworks
    often rely on LiDAR or visual odometry for state prediction and outlier rejection, making them vulnerable when odometry
    degenerates. To address these limitations, we propose a tightly coupled LiDAR-Inertial-Visual-GNSS fusion framework based
    on an Error-State Iterated Kalman Filter. An online spatiotemporal alignment module using Dynamic Time Warping is introduced
    for highly dynamic conditions. To better exploit GNSS precision, we develop observation models based on Doppler shifts
    and fixed-anchor Time-Differenced Carrier Phase, providing millimeter-level relative constraints without augmenting historical
    anchor states. We further design a degeneracy-aware dual-mode outlier rejection strategy that switches between LIVO-prior-guided
    rejection and GNSS-aided recovery according to the LIVO degeneracy level. Experiments on the public M3DGR dataset and
    a custom 20~m/s fixed-wing UAV dataset demonstrate that our system reduces accumulated drift and map ghosting, outperforming
    state-of-the-art methods in accuracy and robustness.
