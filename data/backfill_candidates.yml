- id: b208ec7913db
  title: Research on UAV geolocation methods based on deep learning
  year: 2026
  venue: ''
  authors:
  - Gaojiang Jin
  - Jinzhao Lin
  - Yu Pang
  abstract: The core challenge of cross-view geolocation lies in matching the same target across images from different perspectives
    (e.g., drone and satellite imagery). However, significant differences in visual appearance, spatial scale, and environmental
    conditions between drone and satellite perspectives make traditional handcrafted feature-based methods inadequate for
    this task. Meanwhile, current deep learning models still exhibit limitations in feature extraction and mining multi-faceted
    image characteristics. To address these challenges, this paper proposes GeoLoc, a drone-satellite cross-view geolocation
    model integrating multi-faceted features. This approach employs neural networks to estimate the "energy value" (i.e.,
    importance) of different regions in feature maps and decomposes features into foreground and background components via
    energy masking, thereby capturing rich discriminative information and achieving comprehensive feature representation.
    Furthermore, by combining multi-scale feature extraction with attention mechanisms, the model dynamically generates channel-wise
    and spatial attention masks to facilitate cross-scale feature interaction, significantly enhancing its robustness to positional
    shifts and scale variations while improving its capability to capture complex patterns. Experimental results on mainstream
    public benchmark datasets such as University1652 demonstrate that the proposed model achieves over 3% performance improvement
    in drone-view target localization and drone navigation applications compared to existing methods, showcasing no Table
    competitive advantages.
