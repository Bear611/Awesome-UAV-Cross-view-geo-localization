  abstract: Cross-view geo-localization (CVGL) remains a challenging task due to the drastic viewpoint variations and occlusions
    between ground and aerial image pairs, especially under limited field-of-view (FoV) conditions in real-world ground images.
    In this work, we propose a novel multi-view contrastive learning framework that significantly enhances ground-to-aerial
    image matching with limited FoV by integrating cross-dataset expansion and multi-view contrastive learning. To obtain
    more training samples, we use a probabilistic embedding mechanism based on a Gaussian distribution to model image semantic
    uncertainty and select image pairs from VIGOR semantically aligned with University-1652, constructing a high-quality auxiliary
    dataset, VIGORaux . Furthermore, we design a unified contrastive learning objective that combines single-view and cross-view
    losses, incorporating drone-view images as intermediaries to bridge the semantic gap between ground and aerial views.
    Experiments on the University-1652 benchmark demonstrate superior performance. Our code will be released at https://github.com/xiaocai0327/ACMMM25-GeoMatch.
