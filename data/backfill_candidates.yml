- id: bd2c55fa8480
  title: Robust GNSS-denied localization for UAV using particle filter and visual odometry
  year: 2019
  venue: Machine Vision and Applications
  authors:
  - Rokas Jurevičius
  - Virginijus Marcinkevičius
  - Justinas Šeibokas
  abstract: Conventional autonomous unmanned air vehicle (UAV) autopilot systems use global navigation satellite system (GNSS)
    signal for navigation. However, autopilot systems fail to navigate due to lost or jammed GNSS signal. To solve this problem,
    information from other sensors such as optical sensors are used. Monocular simultaneous localization and mapping (SLAM)
    algorithms have been developed over the last few years and achieved state-of-the-art accuracy (e.g., visual SLAM algorithms
    achieve centimeter-level precision in an in-doors environment). Also, map matching localization approaches are used for
    UAV localization relatively to imagery from static maps such as Google Maps. Unfortunately, the accuracy and robustness
    of these algorithms are very dependent on up-to-date maps. The purpose of this research is to improve the accuracy and
    robustness of map-relative particle filter-based localization using a downward-facing optical camera mounted on an autonomous
    aircraft. This research shows how image similarity to likelihood conversion function impacts the results of particle filter
    localization algorithm. Two parametric image similarity to likelihood conversion functions (logistic and rectifying) are
    proposed. A dataset of simulated aerial imagery is used for experiments. The experiment results are shown, that the particle
    filter localization algorithm using the logistic function was able to surpass the accuracy of state-of-the-art ORB-SLAM2
    algorithm by 2.6 times. The algorithm is shown to be able to navigate using up-to-date maps more accurately and with an
    average decrease in precision by 30% using out-of-date maps.
