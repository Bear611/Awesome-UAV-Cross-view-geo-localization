    classification_reason: The paper formulates drone-satellite matching as image retrieval (Drone→Satellite and Satellite→Drone),
      reports Recall@K and AP as primary metrics, and provides a dataset and pipeline specifically designed for cross-view
      image retrieval evaluation.
