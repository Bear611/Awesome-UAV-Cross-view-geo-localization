    summary_en: 'This paper addresses vision-based UAV self-positioning in GPS-denied, low-altitude urban environments, where
      the goal is to localize the UAV itself rather than objects captured by it. To overcome the reliance on discrete, synthetic
      samples (e.g., Google Maps) in prior benchmarks, the authors introduce DenseUAV, a densely sampled, real-scene dataset
      containing over 27K UAV-view and satellite-view images across 14 university campuses, captured at multiple altitudes,
      time nodes, and satellite scales. They also propose the SDM@K metric, which jointly evaluates retrieval accuracy and
      spatial localization error for continuous positioning. The baseline pipeline combines a ViT-based Siamese backbone with
      four augmentation strategies (random rotate, random affine, random brightness, random erasing), pooling/chunking prediction
      heads, and three supervision signals: cross-entropy representation learning, soft-weighted triplet metric learning,
      and bidirectional KL-divergence mutual learning. Experiments confirm that Transformer backbones substantially outperform
