- id: 2b7f7f5b16cb
  title: 'A Review of Zero Trust Architecture: Principles, Applications, and Implementation Challenges in Communication, Navigation,
    and Surveillance (CNS) Systems'
  year: 2026
  venue: Sensors
  authors:
  - Nompilo Ngema
  - Bakhe Nleya
  - Rito Clifford Maswanganyi
  abstract: 'The increasing interconnectivity and digital transformation of Communication, Navigation, and Surveillance (CNS)
    systems have expanded their attack surface, rendering traditional perimeter-based security models inadequate for protecting
    these critical infrastructures. Zero Trust Architecture (ZTA), founded on the principle of “never trust, always verify,”
    offers a paradigm shift towards continuous, context-aware security. This paper presents a literature review investigating
    the application of ZTA principles to secure modern CNS ecosystems, following the guidelines of the International Civil
    Aviation Organization (ICAO) through its Cybersecurity Strategy and Plan. We analyze the alignment of ZTA core tenets—such
    as least-privilege access, micro-segmentation, and continuous authentication—with the unique operational requirements
    of CNS systems. This paper also presents a cybersecurity framework, under development within the Future Communications
    Digital Infrastructure (FCDI) project of the SESAR JU program, which aims to assist CNS stakeholders in collaboratively
    identifying cybersecurity threats within their scope of responsibility. The review critically examines implementation
    challenges for specific CNS subsystems: secure aeronautical communications (e.g., LDACS), resilient PNT (Positioning,
    Navigation, and Timing) services, and integrated surveillance networks (e.g., ADS-B, multilateration). Furthermore, we
    identify and evaluate domain-specific challenges, including integration with legacy avionics and ground systems, managing
    stringent latency and reliability constraints, and protecting against sophisticated threats targeting supply chains and
    data fusion processes. By synthesizing current research and practical deployment insights, this review aims to provide
    a foundational reference for aerospace engineers, cybersecurity specialists, and policymakers, offering a roadmap to enhance
    the cyber-resilience of vital CNS infrastructure in an era of evolving digital threats.'
