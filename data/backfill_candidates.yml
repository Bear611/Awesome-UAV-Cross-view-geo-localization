    needs_review: false
    minimax_main_category: fine_pose_localization
  summary:
    summary_en: This paper addresses UAV localization in GNSS-denied environments by combining map-relative particle filter
      localization with visual odometry using a downward-facing optical camera. The core approach employs a particle filter
      with KLD-adaptive sampling, where hypothesized UAV locations are scored by Pearson correlation between the live camera
      image and an orthophoto map tile. A central contribution is the study of image-similarity-to-likelihood conversion functions,
      proposing two parametric variants (logistic and rectifying) and comparing them against linear and softmax baselines.
      Visual odometry via Semi-direct Visual Odometry (SVO) propagates particles between frames using a planar motion model,
      reducing the search space. Experiments are conducted on a newly released simulated aerial imagery dataset of 12 flights
      (straight line, circle, and rectangle trajectories at 200 m and 300 m altitudes) over urban and forested USGS orthophoto
      maps, with Gazebo/PX4 SITL simulation and orthophotos from 2008, 2010, 2012, and 2014 used for robustness analysis.
      The reported results state that the best logistic conversion (v=0.2) yields 43% higher accuracy than the softmax baseline
      while using roughly three times fewer particle evaluations, and that the proposed particle filter outperforms ORB-SLAM2
      by about 2.6 times in average accuracy on the four straight-line flights where ORB-SLAM2 completed tracking, with only
      a 30% precision drop when matching against out-of-date maps.
