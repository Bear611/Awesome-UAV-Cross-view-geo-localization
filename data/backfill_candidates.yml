  summary:
    summary_en: 'MixFP addresses UAV self-localization in GPS-denied environments, where large domain gaps between drone aerial
      imagery and ground/satellite reference imagery, combined with visually similar but semantically distinct scenes, make
      cross-view geo-localization particularly challenging. The authors propose a single-stream pyramid transformer architecture
      that begins with convolutional layers for low-level feature enhancement, then applies a cross-attention mechanism to
      enable effective multi-modal feature interaction while suppressing irrelevant noise. To strengthen discriminative capability,
      FcaNet is integrated to process low-resolution feature maps at multiple backbone stages, a Feature Pyramid Network (FPN)
      fuses multi-scale representations, and DySample is incorporated within the pyramid to improve sampling flexibility.
      Experiments are conducted on the UL14 benchmark dataset, reporting an improvement in the RDS metric from 76.25 to 81.82,
      with notable gains in meter-level accuracy: 3m accuracy increases by 30.43%, 5m accuracy by 18.84%, and 10m accuracy
      by 9.9%, demonstrating the effectiveness of the proposed MixFP design for UAV cross-view geo-localization.'
