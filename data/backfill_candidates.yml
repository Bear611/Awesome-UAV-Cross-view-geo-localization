- id: 8c363f7992f9
  title: 'Something green beneath the surface: The dynamical nature of Fossil Structures in IllustrisTNG-100'
  year: 2026
  venue: arXiv
  authors:
  - Mary Verdugo-Santos
  - Facundo A. Gómez
  - Diego Pallero
  - Franklin Aldás
  - Cristian A. Vega-Martínez
  abstract: 'Fossil structures (FS) have traditionally been considered dynamically relaxed end-products of group evolution,
    characterized by a large magnitude gap ($Δm_{1,2} \geq 2$). However, recent observations and simulations suggest this
    picture is incomplete. We investigate whether FS are dynamically relaxed systems and how their galaxy populations differ
    from non-fossil systems (non-FS), focusing on system dynamics and evolution of the galaxies inside them. Using \textsc{IllustrisTNG-100},
    we select 182 structures ($M_{200} > 10^{13}\,M_{\odot}$) at $z = 0$, classifying them as FS/non-FS based on $Δm_{1,2}$
    in the $r$-band. We track $Δm_{1,2}$ evolution over 9\,Gyr and analyze: (1) the emergence of $Δm_{1,2}$, (2) the fraction
    of quenched galaxies (sSFR $< 10^{-11}$\,yr$^{-1}$), (3) the distribution of galaxies in color--stellar mass space, and
    (4) the gas--BSG centroid shift as a dynamical proxy. The magnitude gap in FS is primarily driven by the absence of massive
    recent accretion: FS exhibit significantly lower BSG-to-satellite stellar mass ratios ($μ^{\rm{FS}}{\star}$=0.17 vs. $μ^{\rm{NFS}}{\star}$=0.39)
    for the most massive satellite accreted within the last 6\,Gyr. FS also host a more prominent red sequence and marginally
    higher quenched fractions than non-FS. Our findings indicate that while the magnitude gap effectively identifies systems
    that have ceased major mergers in the last 3-6 Gyr, it is a poor proxy for their current global dynamical state. Both
    FS and non-FS populations exhibit intermediate gas-BSG offsets ($D_{BSG-CM} \approx 0.15 R/R_{200}$), failing to reach
    full relaxation. This decoupling suggests that the magnitude gap traces the assembly history of massive components rather
    than the overall stability of the intra cluster medium.'
