- id: 31c9536bd75a
  title: 'Role of Free-Ranging Goats in Nitrogen Recycling and Agroecological Intensification of Tropical Agroecosystems:
    A Case Study in the Democratic Republic of the Congo'
  year: 2026
  venue: Open Repository and Bibliography (University of Liège)
  authors:
  - Alain Ndona Nzey
  abstract: Les caprins sont les petits ruminants les plus élevés dans les exploitations familiales en Afrique subsaharienne
    (SSA), car ils sont faciles à entretenir, même par les ménages avec de faibles revenus. Dans une perspective d’intégration
    agriculture-élevage (IAE) pour une intensification agroécologique susceptible de réduire le recours aux intrants extérieurs
    de ces exploitations familiales, cette thèse a analysé le rôle des caprins dans le fonctionnement des agroécosystèmes
    tropicaux, notamment le transfert des nutriments entre les compartiments exploités par les chèvres en pâturage libre.
    Une méthodologie mixte a été utilisée pour vérifier la capacité des chèvres à mobiliser les nutriments par leur consommation
    fourragère et à les transférer via les déjections, vers les compartiments des terres cultivées de l’agroécosystème qu’elles
    exploitent. Cette méthodologie mixte a consisté en la combinaison des enquêtes exploratoires, des observations directes
    accompagnées de pistage GPS au pâturage, des analyses au laboratoire des fourrages consommés et des déjections déposées,
    de la télédétection, du SIG et de la modélisation de flux d’azote. Les résultats montrent que la majorité des élevages
    de chèvres (soit 72%) sont en pâturage libre. Ces dernières exploitent un agroécosystème spatialement fragmenté, avec
    une diversité des compartiments, comprenant les savanes et herbages naturels (36,4-69,7%), les cours des parcelles/zones
    dénudées avec les résidus ou déchets ménagers (9,8-46,7%), les terres cultivées (6,1-14,8%), les jachères (2,7-12,5%)
    et les haies vives (0,1-5,4%). Ces compartiments sont diversifiés en plantes fourragères réellement consommées par les
    chèvres, avec 57 espèces identifiées, de qualité nutritionnelle variable en fonction des saisons. Parmi ces espèces, les
    graminées (17%) sont majoritaires, suivies des légumineuses (9%) et le reste (74%), comprenant un conglomérat de 31 familles
    botaniques différentes. Les savanes et les terres agricoles (jachères et terres cultivées) sont les compartiments les
    plus diversifiés en espèces fourragères et contribuent à l’essentiel de l’alimentation des chèvres (jusqu’à respectivement
    36 ± 13% et 38 ± 9% de matières sèches ingérées). Malgré les avantages socioéconomiques et techniques des élevages en
    pâturage libre des chèvres, les pratiques locales telles qu’observées ne permettent pas une meilleure intensification
    agroécologique dans une IAE, car les bilans d’azote sont négatifs dans les compartiments « terres agricoles et savanes/herbages
    naturels ». Dans ces conditions, le transfert de fertilité vers les terres agricoles est fortement limité. Pour cette
    raison, les simulations des scénarios de gestion de troupeau et des déjections ont été élaborées pour améliorer le bilan
    de l’azote dans les terres agricoles. Ces scénarios sont basés sur l’augmentation du temps de confinement des chèvres,
    l’application de litière dans leur abri de nuit, la restriction de leur accès aux terres cultivées. Il ressort des simulations
    de gestion que la combinaison de ces scénarios contribue à améliorer très significativement le bilan d’azote dans les
    terres agricoles, quelle qu’en soit la saison, avec des valeurs légèrement positives en saison sèche. Cette thèse a démontré
    grâce à ces simulations, qu’une bonne stratégie de gestion de troupeau des chèvres et de leurs déjections, est un levier
    d’intensification agroécologique dans un système d’intégration agriculture-élevage. Cependant, ces scénarios de gestion
    doivent être testés dans les conditions réelles de terrain, sur toutes les catégories animales et dans plusieurs sites,
    pour valider leur efficacité, en tenant aussi compte des apports et pertes d’azote d’autres sources potentielles.
