- id: 0fb6c51ed0df
  title: Nouvelles sources de Philippe Desportes dans la série des Rime di diversi (1545-1560)
  year: 2026
  venue: Thélème/Thélème/Revista de filología francesa
  authors:
  - Eduardo Aceituno Martínez
  abstract: 'Depuis plusieurs décennies, la liste établie des emprunts italiens de Philippe Desportes est jugée à peu près
    complète. Nous avons pourtant repéré, dans la célèbre série des Rime di diversi, quelques sources inconnues de Desportes,
    qui confirment sa connaissance incomparable de la poésie italienne de son temps. Dans cet article, nous aborderons uniquement
    les cas où le rapport entre les poèmes semble indiscutable. Parmi les dix pièces examinées, presque toutes des sonnets,
    la moitié figure dans le Sesto libro delle rime di diversi eccellenti autori (1553), alors que les autres se trouvent
    dans le Libro primo (1546), Libro quarto (1551), Libro quinto (1552) et Libro settimo (1556). Tous leurs auteurs sont
    relativement peu connus et très variés : le seul dont Desportes tire deux poèmes est Giacomo Mauro. Nous commenterons
    brièvement chacune de ces découvertes, pour tenter de comprendre ce que Desportes doit à l’original italien et quels aspects
    du modèle il estime nécessaire de modifier.'
