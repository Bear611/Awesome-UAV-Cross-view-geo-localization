- id: fd3d1f59b342
  title: 'CCR: A Counterfactual Causal Reasoning-Based Method for Cross-View Geo-Localization'
  year: 2024
  venue: IEEE Transactions on Circuits and Systems for Video Technology
  authors:
  - Haolin Du
  - Jingfei He
