- id: a9ddd3a92004
  title: 'Integrated LiDAR, Sentinel-2, and petrographic analysis for mapping paleozoic strata: Insights from the McDaniels
    Quadrangle, Kentucky'
  year: 2026
  venue: Journal of Sedimentary Environments
  authors:
  - Nahid D. Gani
  - Madeline Brosky
  - Mason Wade
  - M. Royhan Gani
  - Niroj Shrestha
  abstract: Abstract Vegetation cover, low-relief topography, and sparse bedrock exposure in western Kentucky hinder accurate
    delineation of stratigraphic boundaries within mixed siliciclastic–carbonate successions, limiting conventional field-based
    geologic mapping. To address this challenge, we present a new 1:10,000-scale geologic map of the McDaniels Quadrangle
    that integrates 1.5 m LiDAR-derived topography, Sentinel-2 multispectral imagery, river-profile analysis (χ and k sn ),
    targeted field validation, thin-section petrography, and scanning electron microscopy (SEM). This integrated workflow
    is innovative in linking remote sensing, geomorphic metrics, and petrographic ground-truthing to refine the mapping of
    Upper Paleozoic sedimentary units along the structurally complex margin of the Rough Creek Graben. LiDAR-derived multi-azimuth
    hillshades and river-profile metrics delineate benches, knickpoints, and lineaments that correspond to lithologic boundaries
    and facies transitions, whereas Sentinel-2 band ratios and principal component analysis enhance discrimination between
    carbonate-rich and siliciclastic units. Mapped lineaments are predominantly &lt; 1 km long and trend NE–SW, consistent
    with regional structures and supported by joint measurements. River-profile analysis reveals concave longitudinal profiles,
    abundant knickpoints, and elevated k sn corridors in the central–northeastern area. Many knickpoints coincide, within
    mapping tolerance, with mapped lineaments, indicating localized structural modulation of bedrock incision. Basin-scale
    χ values (&lt; 50) show weak spatial coherence with mapped faults, suggesting that lithology exerts first-order control
    on regional relief while structure acts locally. Petrographic and SEM analysis further document carbonate-rich matrices
    in Reelsville and Haney Limestones and ferruginous, quartz-rich textures in the Big Clifty Sandstone. The resulting map
    refines stratigraphic boundaries and clarifies the interactions among depositional facies, diagenesis, and surface processes
    in a vegetated, low-exposure setting. More broadly, this study provides a transferable, high-resolution workflow for geologic
    mapping and hazard-relevant terrain assessment in covered sedimentary landscapes.
