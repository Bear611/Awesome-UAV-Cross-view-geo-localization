- id: ddca752302da
  title: 'GeoFormer: Boosting Object Distinguishing and Prompt Understanding for Cross-View Object Geo-Localization'
  year: 2025
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Xiaohan Zhang
  - Si-Yuan Cao
  - Zhu Yu
  - Zhe Wu
  - Xue Zhang
  - Xiaokai Bai
  - Beinan Yu
  - Hui‐Liang Shen
  abstract: Cross-view object geo-localization (CVOGL) determines the geographic location of an object on the satellite view
    reference image. The object is indicated by a point prompt in a ground- or drone-view query image. Despite wide applications,
    the current CVOGL method still suffers from limited performance, and the reason for this limitation remains unknown. In
    this work, we analyze CVOGL and find two primary challenges that hinder its performance, <italic xmlns:mml="http://www.w3.org/1998/Math/MathML"
    xmlns:xlink="http://www.w3.org/1999/xlink">i.e.</i>, 1) point prompt understanding and 2) similar-appearance object distinguishing.
    Therefore, we propose a novel end-to-end framework called object geo-localization transformer (GeoFormer). Specifically,
    we leverage the knowledge of the segment anything model (SAM) through two settings for accurate point prompt understanding,
    <italic xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink">i.e.</i>, using SAM
    during training and inference (GeoFormer) or using SAM only in training via knowledge distillation (GeoFormer-KD). Additionally,
    we devise an information aggregation module (IAM) to leverage local and global perception for similar-appearance object
    distinguishing. Except for the public dataset, we manually annotated a new dataset that contains 1642 image pairs for
    further comparison. Experiments show that our method significantly outperforms the previous work. Notably, the tiny versions
    of our method (GeoFormer-t and GeoFormer-t-KD) maintain state-of-the-art performance while substantially reducing parameter
    costs. Our code and the new dataset will be made available at https://github.com/Temperature-ai/GeoFormer.
