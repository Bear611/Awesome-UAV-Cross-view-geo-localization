- id: cd8ab9b0d4e2
  title: 'Digital Technologies at the Port of HaminaKotka : Smart Energy Systems, Cybersecurity, and Sustainable Logistic'
  year: 2026
  venue: LUTPub (LUT University)
  authors:
  - Hafiz Majid Hussain
  - Juha Haakana
  - Pedro Nardelli
  - Pertti Kauranen
  abstract: 'This report investigates the potential of digitalization and data-driven decision support systems to enhance
    the efficiency and sustainability of port operations considering a case study of the Mussalo harbor at the Port of HaminaKotka.
    The analysis integrates a systematic review of smart port technologies with an empirical optimization study grounded in
    real-world data. The report first outlines the core port areas—terminal, quay, and yard—and their dependence on digital
    systems. It posits that modern ports are increasingly structured on four pillars of information and communication technologies
    (ICTs): Internet-of-things (IoT)‑enabled sensing, data and computation platforms, communication networks, and automation,
    which together provide operational visibility, coordination, and traceability. Furthermore, the report reviews key sensing
    and monitoring functions, describes the role of reliable communications in challenging port environments, and emphasizes
    the importance of centralized data integration for analytics and decision support. The subsequent analysis establishes
    a connection between port digitalization and the energy transition, examining concepts such as smart energy management
    systems (SEMs), microgrids, and virtual power plants (VPPs). In the context of HaminaKotka initiatives, the Mussalo smart
    grid and energy community pilot project exemplifies the growing need for digital coordination to synchronize logistics
    operations with energy consumption and emission reduction goals. Furthermore, the report addresses cybersecurity as a
    fundamental cross-cutting requirement, emphasizing the importance of governance, risk assessment, and preparedness as
    essential components for ensuring reliable digital operations within critical port infrastructure. The final part of the
    report presents a data‑driven fleet decreasing operational activity. Overall, the report demonstrates that smart port
    digitalization delivers its greatest value when paired with systematic analytics and optimization, providing a transferable
    pathway for near‑term decarbonization of port logistics.'
