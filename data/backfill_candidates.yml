- id: d9a29cba99ea
  title: 'CGSTA-Net: A Cross-Domain Generative Prior-Assisted Structure–Texture Adaptive Network for Remote Sensing Image
    Dehazing'
  year: 2026
  venue: Symmetry
  authors:
  - X F Li
  - Yankun Zhao
  - Na Niu
  abstract: Dehazing of images is important for proper interpretation of optical images in remote sensing. However, current
    dehazing networks tend to have limited receptive field and texture information loss caused by conventional downsampling
    and complementary cross-domain information not being utilized in dehazing frameworks. In order to cope with these problems,
    we propose a Cross-domain Generative Prior-assisted Structure–Texture Adaptive Network for remote sensing image dehazing.
    It is a dual-stream encoder–decoder framework, which enhances the domain-specific information of RGB and generated prior,
    and then integrates them adaptively for haze-free reconstruction. In order to minimize information loss in downsampling,
    wavelet pooling is introduced to consider the frequency-aware structural and textural features. Additionally, a Structure–Texture
    Calibration Block is designed to simultaneously improve the local frequency textures and construct sparse long-range dependencies
    of structures, so as to achieve better restoration performance under spatially non-uniform haze. To appropriately fuse
    the various representations from RGB and generated prior images, a Prior-aware Gated Adaptive Fusion module is developed
    to balance the domain-specific features dynamically and keep the fine details at multi-level feature fusion. Finally,
    we utilize pixel-level contrastive learning to guide the latent space away from hazy distributions, thus enhancing the
    discriminability of the features. Extensive experiments on the three datasets, namely RSID, RICE-I and HRSD, demonstrate
    that CGSTA-Net can effectively restore images under varying haze conditions and significantly outperforms the latest dehazing
    methods in terms of visual quality and quantitative performance. Specifically, compared with the most effective competitive
    method, CGSTA-Net increased the PSNR by 22.9% on RSID, by 13.2% on RICE-I, and by 7.2% on HRSD.
