- id: 5ab5e7a879a1
  title: 'AdaptGeo: Parameter-Efficient Cross-View Geo-Localization via Frozen Foundation Model and Transformer Adapter'
  year: 2025
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Changjiang Yin
  - Junqi Luo
  - Q. Ye
  - Xiaohan Zhang
  abstract: Cross-view geo-localization aims to retrieve images of the same location captured from different viewpoints. Recent
    deep learning methods have improved this task. However, most rely on full model fine-tuning, which demands large memory
    and storage due to extensive parameters. To address this limitation, we propose AdaptGeo, a parameter-efficient framework
    that adapts the frozen vision foundation model through a lightweight transformer-based adapter. The adapter employs multihead
    attention to learn viewpoint-invariant representations, effectively bridging the domain gap between drone and satellite
    imagery. The framework is further enhanced by a multiobjective learning strategy that integrates contrastive learning
    with location-specific supervision. A frozen backbone also allows feature pre-extraction, reducing training and inference
    cost. Experiments on University-1652 and SUES-200 datasets demonstrate competitive performance. Compared to traditional
    full model fine-tuning approaches, our method reduces trainable parameters by over 87%. The proposed approach provides
    an efficient solution for adapting visual foundation models to cross-view geo-localization.
