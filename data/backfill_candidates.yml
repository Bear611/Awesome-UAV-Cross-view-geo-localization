- id: 777f1993d9c0
  title: 'Sovereign Execution Brokers: Enforcing Certificate-Bound Authority in Agentic Control Planes'
  year: 2026
  venue: arXiv
  authors:
  - Jun He
  - Deying Yu
  abstract: Autonomous agents are increasingly connected to cloud, deployment, and data-control workflows, but production
    mutation authority should not reside inside non-deterministic reasoning processes. Existing access-control mechanisms
    authorize identities, while assurance layers certify proposed actions; neither alone provides a mandatory enforcement
    point for certified authority at the moment of mutation. This paper introduces the Sovereign Execution Broker (SEB), a
    runtime enforcement boundary for certificate-bound agentic infrastructure. SEB consumes certificates issued by the Sovereign
    Assurance Boundary (SAB), verifies that the requested mutation matches the certified execution contract, checks validity
    windows, policy epochs, revocation epochs, and live-state drift, mints scoped execution identity, invokes infrastructure
    APIs, and records signed decision and outcome records. By separating proposal, admission, and execution, SEB turns certified
    authority into a short-lived, revocable, auditable runtime capability, provided that production mutation APIs reject non-broker
    identities. We present the SEB execution model, certificate and replay-verification predicates, scoped identity semantics,
    bypass-prevention deployment patterns, failure behavior, and a concrete prototype implementation. We evaluate the prototype
    on AWS and Kubernetes clusters, measuring latency overheads, revocation propagation, drift detection, and security under
    fault injection.
