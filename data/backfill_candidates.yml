- id: 83b86acc74cd
  title: GNSS Spoofing Threat for V2X communications
  year: 2026
  venue: arXiv
  authors:
  - Adolfo P. Jimenez
  - Juan Arquero-Gallego
  - Mario P. Luna
  - Jose E. Naranjo
  - Felipe Jimenez Alonso
  abstract: Global Navigation Satellite Systems (GNSS) constitute a core technology for delivering crucial positioning, navigation,
    and timing (PNT) services in the Vehicle-to-Everything (V2X) domain, where they are indispensable for generating Cooperative
    Awareness Messages (CAM) that uphold network reliability and vehicular safety. Yet, GNSS signals are acutely exposed to
    spoofing, an advanced attack in which an adversary transmits crafted signals that replicate legitimate satellite characteristics,
    misleading the receiver into computing a false position. This work presents a methodology for conducting physical spoofing
    with inexpensive Software Defined Radio (SDR), describing a coordinate generation pipeline that employs Haversine-based
    distance calculations, temporal discretization to emulate constant velocity, and linear interpolation to produce high-fidelity
    GPS baseband signals. The proposed attack is experimentally validated on real Commsignia OnBoard Unit (OBU) and RoadSide
    Unit (RSU) devices using a HackRF One across three scenarios that emulate synthetic trajectories at steady speeds of 90
    km/h, 145 km/h, and 200 km/h. The most significant contribution of this paper is the demonstration that V2X communications
    are not secured, as they are susceptible to GNSS spoofing attacks, which cause service degradation without being detected.
