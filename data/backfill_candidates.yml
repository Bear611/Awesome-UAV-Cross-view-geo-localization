- id: b98de8f7ba1c
  title: 'Stable Transformer-Actor-Critic Model Predictive Control: A Contraction Analysis Approach'
  year: 2026
  venue: arXiv
  authors:
  - Antonio Marino
  - Valerio Modugno
  - Marco Cognetti
  abstract: Actor-Critic Model Predictive Control (MPC) effectively addresses complex, non-convex control problems, but guaranteeing
    the closed-loop stability of sequence-based learning models within these pipelines remains challenging. This paper introduces
    a novel Transformer-Actor-Critic MPC architecture with formal robustness guarantees. First, we prove that Transformer
    networks can satisfy global incremental Input-to-State Stability ($δ$ISS). We then leverage Riemannian contraction theory
    to analyze the interconnected dynamics between the physical plant and the predictive neural network. Finally, we integrate
    these theoretical bounds as a training regularizer to yield a certifiably robust policy. The framework is validated on
    a nonlinear 3D drone model executing target-reaching and obstacle-avoidance maneuvers.
