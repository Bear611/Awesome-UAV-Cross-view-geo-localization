    acts as a disruptor in the hormonal activity and in other key pathways leading to enhanced tumor progression and making
    possible pregnancies difficult. In this study, we evaluated LM samples from women resident in urban (high exposure area)
    and no-urban areas (low or negative exposure area) for the expression of genes related to endometrial receptivity. We
    selected a total of 100 patients and among them twenty fill the specific profile of those exposed or not exposed to air
