- id: db1925f2c2dc
  title: 'When Vision Misleads, Let Location Speak: A Worldwide Image Geo-Localization Method via Location Attention Mechanism
    and Large Multimodal Models'
  year: 2026
  venue: arXiv
  authors:
  - Junchao Cui
  - Wenqi Shi
  - Xuanzi Ma
  - Nan Wu
  - Shaoyong Du
  - Xiangyang Luo
  abstract: 'Worldwide image geo-localization aims to determine the capture location of an image on a global scale. Existing
    methods often mislocalize images by matching them to visually similar scenes from different geographic regions, which
    limits reliability in practical applications. To address this issue, we propose TransGeoCLIP, a novel retrieval-based
    framework that integrates a location attention mechanism and large multimodal models (LMMs). Using the Transformer encoder
    with location attention to encode GPS coordinates, TransGeoCLIP can effectively distinguish geographic features among
    visually similar images. The framework consists of two stages: 1) Retrieval database construction, which employs Transformers
    equipped with location attention mechanisms to encode labeled GPS coordinates and enhance location semantics, subsequently
    enables joint image-text-GPS embedding through CLIP; 2) Retrieval-augmented inference, which leverages LMMs to infer the
    final image location prediction from retrieved database results. Extensive experimental results on diverse datasets, including
    IM2GPS, IM2GPS3k, YFCC4k, and YFCC26k, demonstrate that TransGeoCLIP significantly enhances localization performance for
    visually similar images. Particularly, street-level localization accuracy (within 1 km error) is substantially improved,
    surpassing state-of-the-art methods by 1.5%, 1.07%, 7.18%, and 9.75% on these benchmarks, respectively.'
