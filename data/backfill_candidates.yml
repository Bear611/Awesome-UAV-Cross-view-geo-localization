- id: c8709c9e1236
  title: 'Capturing the Past, Shaping the Future: A Scoping Review of Photogrammetry in Cultural Building Heritage'
  year: 2025
  venue: Electronics
  authors:
  - Yongkang Xing
  - Shengxiang Yang
  - Conor Fahy
  - Tracy Harwood
  - Jethro Shell
  abstract: Historic buildings and urban streetscapes face increasing threats from climate change, development, and aging
    infrastructure, creating a pressing need for accurate and scalable documentation methods. This review assesses the combined
    use of photogrammetry and unmanned aerial vehicle (UAV) technologies in preserving built cultural heritage. We systematically
    analyze the end-to-end workflow, from the sophisticated processing of imagery into highly detailed and accurate 3D models
    in photogrammetry software via data acquisition using diverse UAV platforms and sensor payloads. Through case studies,
    including the mapping of ancient Maya sites in the Yucatán Peninsula and the conservation of the Notre Dame Cathedral,
    the review highlights the accuracy, efficiency, and accessibility offered by this technological synergy, underscoring
    its significance for heritage conservation, research, and the development of digital twins. Furthermore, it explores how
    these advancements foster public engagement and virtual accessibility, enabling immersive experiences and enriched educational
    opportunities. The paper also critically assesses the inherent technical, ethical, and legal challenges associated with
    this methodology, offering a balanced perspective on its application. By synthesizing the current knowledge, this review
    proposes future research trajectories and advocates for best practices, aiming to guide heritage professionals in leveraging
    photogrammetry and UAVs for the effective documentation and safeguarding of global cultural heritage.
