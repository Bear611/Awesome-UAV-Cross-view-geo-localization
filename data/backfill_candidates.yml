    summary_en: 'MADA-SSA addresses robust drone-to-satellite cross-view geo-localization under extreme viewpoint disparity
      and asymmetric geometric deformation. The framework couples three components: a Spatial-Semantic Multi-scale Aggregation
      (SSMA) module combining a SemanticAdapter (flattened multi-head self-attention) with a triple-branch MultiHeadSpatialGate
      (1x1, 3x3, and dilated 3x3 convolutions) to capture long-range semantic dependencies and bridge resolution gaps; a Directional
      Strip Attention Block (DSAB) that decomposes features along horizontal, vertical, diagonal, and anti-diagonal axes using
      Selective Kernel Stripe Extraction (parallel 5x5 and dilated 7x7 strip kernels) and reconstructs diagonal context via
      a mapping function to resist yaw rotation; and a Smooth Hard-Mining (SHM) Loss replacing rigid triplet mining with LogSumExp-based
      density-aware soft distances (alpha=0.25, beta=128). A weight-sharing ConvNeXt-Base backbone feeds both drone and satellite
      branches. Evaluation on University-1652 and SUES-200 (multi-altitude 150m/200m/250m/300m) demonstrates the approach,
      with the paper reporting 96.01% Recall@1 and 92.84% AP for Satellite-to-Drone on University-1652. The authors note reduced
