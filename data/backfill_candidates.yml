- id: 27b14397c21c
  title: 'Exploring the best way for UAV visual localization under Low-altitude Multi-view Observation Condition: a Benchmark'
  year: 2025
  venue: arXiv.org
  authors:
  - Yibin Ye
  - Xichao Teng
  - Shuo Chen
  - Zhang Li
  - Leqi Liu
  - Qifeng Yu
