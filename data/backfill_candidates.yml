- id: 8c187c7f35f0
  title: 'P2FCN: Environment-Independent UAV-View Geo-Localization via Pixel-to-Feature Co-Enhancement'
  year: 2025
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Qiang Zhao
  - Jiayu Zhou
  - Tingyu Wang
  - Quan Chen
  - Rongfeng Lu
  - Chenggang Yan
  abstract: This paper investigates the challenges of UAV-view geo-localization under extreme environmental changes, where
    significant cross-domain style differences can lead to degradation of model performance. Existing methods primarily focus
    on mitigating domain shift issues caused by environmental factors but generally overlook the direct interference of environmental
    noise. We argue that mitigating environmental noise is equally critical for extracting discriminative cross-view features
    and introduce a pixel-to-feature co-enhancement network (P2FCN). P2FCN comprises a style-noise dual suppression module
    (SNDS) and a part-based multi-dimensional feature learning strategy (PMDFL). Specifically, the SNDS module mitigates the
    stylistic discrepancies between cross-environment images through pixel-level dynamic adjustment, while reducing the introduction
    of environmental noise to a certain degree. PMDFL improves the representation generalization by purifying discriminative
    information within partitioned channel-and spatial-wise feature subspaces. Extensive experiments on two widely used benchmarks,
    <italic xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink">i.e</i>., University-1652
    and SUES-200, demonstrate that the proposed method achieves state-of-the-art performance in multiple environments compared
    to existing methods.
