- id: ea3d3f5eec86
  title: Cross-View Change Detection via Self-Supervised Contrastive Representation Learning
  year: 2026
  venue: ''
  authors:
  - Ghassen Graja
  - Olfa Besbes
  - Takoua Abdellatif
  abstract: Change detection (CD) is a fundamental task in remote sensing. Existing CD methods often require precise co-registration,
    geometric correction, and large annotated datasets, limiting their scalability in heterogeneous or time-critical scenarios.
    We address cross-view heterogeneous CD between archived satellite imagery and newly acquired UAV data under annotation
    scarcity. We propose a self-supervised contrastive learning framework that learns robust representations from unlabeled
    bi-temporal pairs. Our method integrates CutMix-based data augmentation and a cross-attention module within a Swin Transformer
    backbone to enhance multi-scale, cross-modal feature fusion. Experiments on a challenging cross-view dataset demonstrate
    that our approach outperforms strong baselines with minimal supervision, highlighting its potential for efficient and
    reliable real-world change detection.
