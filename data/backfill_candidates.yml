      matching with high-rate IMU pre-integration through a loosely coupled Error-State Kalman Filter (ESKF), enabling real-time
      dead reckoning with periodic absolute updates. A barometer-assisted adaptive satellite-image loading and ground sampling
      distance (GSD) normalization pipeline dynamically selects satellite tiles and aligns scales to reduce the cross-view
      search space. On the vision side, an accelerated XFeat model provides efficient feature extraction and matching for
      cross-domain correspondence. The ESKF suppresses inertial drift and improves resilience to visual outliers. The complete
      system is deployed on an NVIDIA Orin Nano embedded platform and validated through real flight tests in complex scenarios,
      demonstrating accurate and robust localization, though no quantitative benchmarks or datasets are reported in the abstract.
