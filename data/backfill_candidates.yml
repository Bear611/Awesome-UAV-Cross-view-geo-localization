  summary:
    summary_en: This paper addresses cross-view image matching between drone and satellite imagery, motivated by the lack
      of public benchmarks that capture real-world drone imagery at varying flight altitudes. Existing datasets, such as University-1652,
      rely on simulated drone flights and contain homogeneous campus scenes, limiting generalization. To overcome this, the
      authors introduce SUES-200, a multi-height, multi-scene benchmark comprising 24,120 drone images captured at four flight
      heights (150m, 200m, 250m, 300m) together with corresponding satellite images for 200 target scenes, including parks,
      schools, lakes, and public buildings. The authors design a standardized training-testing-evaluation pipeline and a two-branch
      deep network with a shared fully connected projection layer and cross-entropy loss, benchmarking nine backbones (VGG,
      ResNet, SE-ResNet, ResNeSt, CBAM-ResNet, DenseNet, EfficientNet, Inception, ViT). They also propose three complementary
      evaluation dimensions—robustness across heights, robustness under image perturbations (flip, block, fog, rain, snow),
      and inference speed—alongside Recall@K and AP. Experiments on SUES-200 show that a ViT-based baseline achieves the best
      overall accuracy and that matching performance improves monotonically with drone altitude. Transfer learning from University-1652
      further improves results, and multi-query feature averaging consistently outperforms single-query matching.
    main_category: retrieval
