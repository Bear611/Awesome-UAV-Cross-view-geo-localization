- id: 2bb00c7b9939
  title: 'Advancements and Persistent Challenges in Gas Sweetening: A Review of Alkylamine lonic Liquids for High-Temperature
    CO2 Capture and Mineralization'
  year: 2026
  venue: NIPES Journal of Science and Technology Research
  authors:
  - Tare C. Gillow
  - Ipeghan J.  Otaraku
  abstract: This review provides a comprehensive technical assessment of the utilization of alkylamine ionic liquids (AILs)
    for the combined processes of natural gas sweetening and subsequent carbon dioxide (CO2) mineralization. Driven by the
    need for more energy-efficient and environmentally benign alternatives to conventional amine scrubbing technologies (e.g.,
    using monoethanolamine, MEA), AILs offer potential advantages such as negligible vapor pressure, high thermal stability,
    and structural tunability. This review synthesizes experimental, mechanistic, and techno-economic studies published between
    2010 and 2025, with emphasis on AIL-based absorption, high-temperature operation, and integrated mineralization pathways.
    The analysis focuses on a specific process involving AIL-water mixtures (30 mol% water) operating at 328–366 K with pressure
    swing regeneration, coupled with catalytic CO2 mineralization using KOH or CaO. Performance evaluation indicates that
    certain AILs and AIL-amine blends demonstrate high acid gas loading capacities and potentially faster kinetics, leveraging
    weaker chemisorption for non-thermal regeneration. The integration of CO2 mineralization presents a pathway for permanent
    CO2 fixation, with reported mineralization step, based on CaO- or Ca(OH)₂-driven carbonation, has demonstrated CO₂ conversion
    efficiencies exceeding 60% of the theoretical maximum under slurry-phase conditions (typically 323–353 K and moderate
    agitation), indicating meaningful but still non-quantitative carbonate formation in experimentally reported systems. However,
    significant technical and economic challenges, including high synthesis costs, viscosity, and a lack of long-term stability
    data, impede large-scale deployment. This review critically evaluates the process fundamentals, compares performance against
    conventional technologies, and outlines future research directions required to bridge the gap from laboratory potential
    to industrial viability.
