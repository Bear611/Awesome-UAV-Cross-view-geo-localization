  summary:
    summary_en: This paper addresses robust cross-view geo-localization between drone and satellite imagery, focusing on the
      challenges of geometric distortion, scale inconsistency, and viewpoint variations that cause appearance and structural
      discrepancies. The authors propose an adaptive framework integrating spectral processing with semantic context modeling.
      The Spectral Adaptive Enhancement (SAE) module applies a Discrete Cosine Transform with view-differentiated frequency
      band handling, dynamically enhancing low-frequency structure for satellite views and mid/high-frequency details for
      drone views. The Multi-scale Object Contextual Semantic Interaction (MSI) module combines Object Context Attention with
      a SPADE-style modulator, using multi-scale interpolation and concatenation to inject refined semantic priors into normalized
      visual features. An Adaptive Structured PolyLoss dynamically switches between hard-sample mining and noise suppression
      based on prediction entropy. The method uses a ViT-S backbone pretrained on ImageNet, and is evaluated on the University-1652
      and SUES-200 benchmarks, where it is reported to outperform prior state-of-the-art approaches, including MAF and Safe-Net,
