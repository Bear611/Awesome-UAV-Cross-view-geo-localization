  summary:
    summary_en: This paper addresses Cross-View Geo-Localization (CVGL), where a drone-view query image must be matched against
      GPS-tagged satellite reference images, a task challenged by substantial imaging gaps, large viewpoint variations, and
      the high computational cost of state-of-the-art models. The authors propose MEAN, a lightweight three-branch network
      built on a ConvNeXt-Tiny backbone. The Progressive Extension Embedding (PEE) branch uses parallel dilated convolutions
      with an InfoNCE loss to produce diverse, discriminative embeddings; the Global Extension Embedding (GEE) branch applies
      mean pooling followed by a diversified classifier optimized with cross-entropy to couple global and fine-grained features;
      and the Cross-Domain Enhanced Alignment (CEA) branch performs multi-level fusion with adaptive calibration and is trained
      with a Cross-Domain Invariance Alignment (CDA) loss combining cosine similarity and mean-squared error for global and
      local consistency. Experiments are conducted on University-1652 and SUES-200, plus the Multi-weather University-1652
      extension. The authors report that MEAN reduces parameter count by 62.17% and computational complexity by 70.99% compared
      with state-of-the-art models while maintaining competitive retrieval accuracy and demonstrating strong cross-domain
      generalization when trained on University-1652 and tested on SUES-200.
