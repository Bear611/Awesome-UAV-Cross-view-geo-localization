- id: 0b8353ef62ef
  title: 'DroneShield-AI: A Multi-Modal Sensor Fusion Framework for Real-Time Autonomous Drone Threat Detection, Behavioral
    Intent Classification, and Swarm Intelligence in Contested Airspace'
  year: 2026
  venue: arXiv
  authors:
  - Marius Bayizere
  abstract: 'Unmanned Aerial Vehicle (UAV) threats have emerged as a defining security challenge of the 21st century. This
    paper presents DroneShield-AI, a unified open framework integrating six processing layers: RF signal classification, acoustic
    motor-signature detection, YOLOv8-based visual detection, evidence-weighted sensor fusion, a Behavioral Intent Classification
    Engine (BICE), and a Graph Neural Network Swarm Intelligence Module (GNN-SIM). BICE introduces the first systematic six-class
    threat taxonomy for drone flight patterns, enabling predictive operator alerts with a 30-second advance-warning horizon.
    GNN-SIM is the first open framework for adversarial multi-drone formation analysis using Graph Attention Networks. Evaluated
    on three publicly available real-world datasets, the fused pipeline achieves 96.1% detection accuracy, 3.2% false alarm
    rate, AUC-ROC: 0.981, and 142ms end-to-end latency on commodity CPU-class hardware at approximately $500-$780 USD total
    system cost. All code, model weights, and simulation datasets are publicly released at submission.'
