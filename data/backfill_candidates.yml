- id: 65b3ffc9c29c
  title: Caecal microbiome transplant inhibits transmission and intestinal colonisation of Campylobacter jejuni in broiler
    chickens
  year: 2026
  venue: Poultry science and management.
  authors:
  - Rachel Gilroy
  - Gemma Chaloner
  - Amy Wedley
  - Peter Richards-Rios
  - Sian Pottenger
  - Paul Wigley
  abstract: Abstract Campylobacter jejuni is the most frequent cause of foodborne bacterial gastroenteritis with poultry products
    the most frequent source of infection. C. jejuni can colonise the intestinal tract of the chicken and in particular the
    large blind caeca to a high level accompanied by faecal shedding and rapid transmission in flocks. As such, reducing transmission
    and intestinal colonisation in poultry meat production is considered a key target to reduce human infection. Whilst vaccines
    and feed-based approaches including modulation of the microbiome are considered most likely to reduce numbers in the chicken
    caeca, neither have yet shown the capacity to lead to significant reductions. We have previously shown that administration
    of a caecal microbiome transplant (CMT) at hatch acts to modify the microbiome, increasing diversity and reducing Enterobacteriacae
    levels associated with poor gut health and increased Campylobacter susceptibility. When challenged at 21 days old with
    C. jejuni M1 in a seeder bird infection model, birds in groups receiving CMT showed reduced transmission and significantly
    lower levels of C. jejuni at post-mortem examination at 35 days of age than control birds or birds treated with a commercial
    microflora competitive exclusion product (Aviguard). These data show that a microbiome-based intervention has the potential
    to inhibit C. jejuni transmission and decrease levels in the caeca at slaughter age. This is modelled to lead to a significant
    reduction in human cases. CMT offers a valuable tool to determine protective taxa in the chicken gut, aiding rational
    development of microbial interventions as well as a low-cost platform to help understand immunological development in
    the chicken gut.
