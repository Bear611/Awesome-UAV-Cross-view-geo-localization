  abstract: This book provides the reader with an introduction to the jury system in the United States. It provides a brief
    historical account of the origins of juries and compares juries in the federal versus state court systems, and a grand
    jury versus a trial jury. The text offers answers to the most frequently asked questions that prospective jurors and students
    have about the steps of jury duty, from receiving the juror summons to rendering a final verdict. Through this easy-to-digest
