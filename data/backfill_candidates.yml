      benchmarks (University-1652, SUES-200). It directly addresses UAV cross-view geo-localization via image retrieval.
    needs_review: false
    minimax_main_category: retrieval
  summary:
    summary_en: DiffusionUavLoc addresses cross-view UAV-to-satellite image retrieval for GNSS-denied localization, where
      substantial geometric and appearance gaps exist between oblique drone imagery and nadir satellite orthophotos. The framework
      avoids text prompts and complex annotations by combining geometry-driven image prompting with a text-free conditional
      diffusion model. A training-free pipeline renders pseudo-satellite orthophotos from oblique UAV views using COLMAP-based
      3D reconstruction, orthographic projection, layered rasterization, and in-image inpainting; a perspective-based fallback
      handles sparse-texture failure cases. These rendered orthophotos are injected as visual prompts into a Stable Diffusion
      backbone via a ResNet-18 projector and a ControlNet conditioned on fused Canny, SAM, and DepthAnything-V2 structural
      cues, with LoRA adapters kept trainable. A multi-objective loss combining perceptual, shift-invariant stationary wavelet,
      and structure-mask terms stabilizes training. At inference, the pixel decoder is disabled and a single ControlNet forward
      pass produces a latent descriptor compared against the VAE posterior mean of satellite images via cosine similarity.
      Experiments are conducted on University-1652 and SUES-200. The authors report leading satellite-to-drone Recall@1 and
      AP on University-1652, and strong AP stability across flight altitudes on SUES-200, while noting slightly lower drone-to-satellite
      scores on University-1652 compared with the strongest baseline.
    main_category: retrieval
    category_confirmed: true
    classification_reason: The paper explicitly formulates UAV localization as a cross-view image retrieval problem, matching
      oblique drone queries against satellite reference images using cosine similarity over learned descriptors, which squarely
      fits the retrieval category.
