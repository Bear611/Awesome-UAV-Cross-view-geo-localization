- id: c705c453fa07
  title: 'TranSTD: A Wavelet-Driven Transformer-Based SAR Target Detection Framework With Adaptive Feature Enhancement and
    Fusion'
  year: 2025
  venue: IEEE Journal of Selected Topics in Applied Earth Observations and Remote Sensing
  authors:
  - Bobo Xi
  - Jiaqi Chen
  - Yan Huang
  - Jiaojiao Li
  - Yunsong Li
  - Zan Li
  - Xiang‐Gen Xia
  abstract: Target detection in Synthetic Aperture Radar (SAR) images is of great importance in civilian monitoring and military
    reconnaissance. However, the unique speckle noise inherent in SAR images leads to semantic information loss, while traditional
    CNN downsampling methods exacerbate this issue, impacting detection accuracy and robustness. Moreover, some dense target
    scenarios and weak scattering features of targets make it challenging to achieve sufficient feature discriminability,
    adding complexity to the detection task. Additionally, the multi-scale characteristic of SAR targets presents difficulties
    in balancing detection performance with computational efficiency in complex scenes. To tackle these difficulties, this
    paper introduces a wavelet-driven transformer-based SAR target detection framework called TranSTD. Specifically, it incorporates
    the Haar wavelet dynamic downsampling (HWDD) and semantic preserving dynamic downsampling (SPDD) modules, which effectively
    suppress noise and preserve semantic information using techniques such as Haar wavelet denoise (HW Denoise) and input-driven
    dynamic pooling downsampling (IDPD). Furthermore, the SAR adaptive convolution bottleneck (SAC Bottleneck) is proposed
    for enhancing the discrimination of features. To optimize performance and efficiency across varying scene complexities,
    a multiscale SAR attention fusion encoder (MSAF Encoder) is developed. Extensive experiments are carried out on three
    datasets, showing that our proposed algorithm outperforms the current state-of-the-art benchmarks in SAR target detection,
    offering a robust solution for the detection of targets in complex SAR scenes.
