- id: 358980cb50e9
  title: Geometry-Aware Superpixel Graph Transformer with Metadata for Skin Lesion Classification
  year: 2026
  venue: arXiv
  authors:
  - Muhammad Azeem
  - Tanveer Hussain
  - Amr Ahmed
  - Ardhendu Behera
  abstract: Automated skin cancer classification from dermoscopic images remains challenging due to heterogeneous lesion structure,
    strong intra-class variability, and subtle visual differences between benign and malignant cases. Existing CNN/ViT pipelines
    typically rely on global or patch-level features and often combine patient metadata via late fusion, which limits spatially
    grounded multimodal reasoning. We present a novel region-based graph learning framework that explicitly models lesions
    as graphs of spatially coherent superpixel regions represented as frozen CNN features. To capture fine-grained lesion
    arrangements, we encode inter-regional geometry as edge attributes and introduce a dedicated metadata context node connected
    to all regions, providing structured integration of demographic/clinical variables within the same relational space. Node
    representations are updated using our edge-aware graph transformer followed by attention-driven propagation, and a final
    graph-level embedding for benign-malignant classification. Experiments on four public benchmarks demonstrate that explicit
    region-level relational modeling and graph-native multimodal fusion yield consistent gains over the state-of-the-art.
    Consequently, we establish a new graph-centric perspective in which CNN features are modeled as relational nodes and improved
    through contextual integration, yielding more expressive and robust classifications.
