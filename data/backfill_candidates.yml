- id: 39692f558978
  title: Leveraging Augmented Reality for Improved Situational Awareness During UAV-Driven Search and Rescue Missions
  year: 2024
  venue: arXiv
  authors:
  - Rushikesh Nalamothu
  - Puneet Sontha
  - Janardhan Karravula
  - Ankit Agrawal
  abstract: In the high-stakes domain of search-and-rescue missions, the deployment of Unmanned Aerial Vehicles (UAVs) has
    become increasingly pivotal. These missions require seamless, real-time communication among diverse roles within response
    teams, particularly between Remote Operators (ROs) and On-Site Operators (OSOs). Traditionally, ROs and OSOs have relied
    on radio communication to exchange critical information, such as the geolocation of victims, hazardous areas, and points
    of interest. However, radio communication lacks information visualization, suffers from noise, and requires mental effort
    to interpret information, leading to miscommunications and misunderstandings. To address these challenges, this paper
    presents VizCom-AR, an Augmented Reality system designed to facilitate visual communication between ROs and OSOs and their
    situational awareness during UAV-driven search-and-rescue missions. Our experiments, focus group sessions with police
    officers, and field study showed that VizCom-AR enhances spatial awareness of both ROs and OSOs, facilitate geolocation
    information exchange, and effectively complement existing communication tools in UAV-driven emergency response missions.
    Overall, VizCom-AR offers a fundamental framework for designing Augmented Reality systems for large scale UAV-driven rescue
    missions.
