- id: c8e7ca7c9941
  title: Integrating national forest inventory, airborne lidar, and satellite imagery for wall-to-wall mapping of forest structure
    with computer vision
  year: 2026
  venue: arXiv
  authors:
  - Luke J. Zachmann
  - David D. Diaz
  - Vincent A. Landau
  - Chelsey Walden-Schreiner
  - Tony Chang
  - Nathan E. Rutenbeck
  - Katharyn A. Duffy
  - Kiarie Ndegwa
  - Andreas Gros
  - Scott Conway
  - Guy Bayes
  abstract: Remote sensing is increasingly relied upon to deliver actionable science for forest and wildfire risk management
    across large landscapes. Wall-to-wall, annually updated maps are a persistent need for effective forest management. Many
    planning systems and data collections combine disparate data sources with different purposes, vintages, and prediction
    quality, which leads to confounding behavior in operational planning systems. We introduce the VibrantForests framework,
    developed and applied to map forest attributes and provide a coherent foundation for effective forest and wildfire planning.
    VibrantForests includes a satellite-based forest structure model trained on lidar-derived samples and applied across the
    contiguous United States to concurrently generate estimates of canopy cover, canopy height, aboveground live tree biomass,
    basal area, and quadratic mean diameter at 10-meter resolution. We demonstrate predictive capability spanning the full
    spectrum of forest conditions ranging from sparse-canopy/low-biomass to dense-canopy/high-biomass. Results show that our
    model extends the range at which saturation is commonly encountered in comparable passive-sensor models, and reduces regression-to-mean
    behavior that commonly produces overestimation of forest attributes in small/sparse conditions and underestimation in
    large/dense conditions. The VibrantForests framework addresses a key limitation in large-area forest and wildfire planning
    by delivering coherent wall-to-wall estimates of management-relevant attributes at annual cadence and 10m resolution.
