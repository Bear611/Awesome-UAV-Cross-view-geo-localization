  summary:
    summary_en: Cross-view geo-localization (CVGL) between drone and satellite imagery is hampered by severe viewpoint gaps
      and hard negatives—visually similar but geographically mismatched samples that mislead the learned embedding space.
      Static mining or reweighting schemes tend to overemphasize difficult examples too early, producing noisy gradients and
      unstable convergence. This work proposes a Dual-level Progressive Hardness-aware Reweighting (DPHR) strategy with two
      complementary components. At the sample level, a Ratio-based Difficulty-Aware (RDA) module computes a scale-invariant
      hardness score from the ratio of positive-to-query and negative-to-query distances and maps it linearly into a fine-grained
      weight interval for negatives. At the batch level, a Progressive Adaptive Loss Weighting (PALW) mechanism derives a
      training-progress signal from a moving average of recent unweighted triplet losses and uses an EMA-smoothed scaling
      coefficient to attenuate noisy gradients early and progressively strengthen hard-negative mining as training matures.
      Experiments are conducted on the University-1652 and SUES-200 drone–satellite benchmarks using Recall@1 and AP for Drone→Satellite
      and Satellite→Drone directions. DPHR is integrated into LPN, MCCG, and Sample4Geo, consistently improving both metrics
      across retrieval directions and altitudes, with especially large gains at lower drone altitudes on SUES-200.
