- id: db28ded199ea
  title: 'GeoGNN: Time Series Geo-Localization using Two-Tower Graph Neural Networks'
  year: 2026
  venue: arXiv
  authors:
  - Toan Tran
  - Waqwoya Abebe
  - Abhishek Potnis
  - Supriya Chinthavali
  - Cyrus Shahabi
  - Li Xiong
  - Dalton Lunga
  abstract: This paper investigates a novel concept of time series geolocalization, where the goal is to infer the geographic
    origin of each raw time series. Successful geolocalization can provide spatial context to time series, enabling downstream
    location-aware applications. We formalize the problem, adapt core ideas from image geolocalization to establish strong
    baselines, and propose GeoGNN, a two-tower architecture. During training, GeoGNN's spatial tower learns embeddings of
    geographic cell candidates by leveraging the geographic adjacency graph, while the temporal tower extracts informative
    representations from time series. During inference, each temporal representation is matched against candidate geographic
    embeddings using dot-product similarity, combined with an auxiliary classification head, to predict the time series' associated
    geographic origin. Experiments on large-scale, countrywide electricity-consumption datasets demonstrate that GeoGNN achieves
    the best performance across datasets and enhances both fine- and coarse-grained geolocalization accuracy by ~27% on average.
