  summary:
    summary_en: BGG (Bridging the Geometric Gap) addresses Cross-View Geo-Localization (CVGL), formulated as an image retrieval
      problem that matches drone-view queries against a satellite-view reference database under severe viewpoint and scale
      variations. The method adapts the frozen DINOv3 vision foundation model via a parameter-efficient transfer learning
      strategy, injecting a Multi-granularity Feature Enhancement Adapter (MFEA) in parallel with the transformer blocks.
      MFEA uses multi-level dilated depthwise convolutions to enlarge receptive fields and capture multi-scale spatial relations,
      mitigating geometric and scale gaps with minimal trainable parameters. To compensate for the limited spatial detail
      of the [CLS] token, a Frequency-Aware Structural Aggregation (FASA) module modulates patch tokens in the frequency domain
      and applies gated mixing with adaptive weighted aggregation; the resulting local descriptor is concatenated with the
      [CLS] token. Optimization uses a symmetric InfoNCE loss. Experiments are conducted on University-1652, SUES-200, and
      Multi-weather University-1652 (a weather-perturbed extension). The paper reports that BGG achieves state-of-the-art
      retrieval performance over prior methods on University-1652 and SUES-200 across multiple drone flight altitudes, and
      demonstrates strong cross-domain generalization when trained on University-1652 and tested on SUES-200, all with only
      about 10.67M trainable parameters.
