  abstract: Genomics, including all molecular omics, is driven by molecular data, while phenomics and enviromics rely on phenotypic
    and environmental data. Yet phenotyping is often conducted under poorly characterized environments, limiting the interpretation
    of phenotypic variation and constraining genetic gain. Integrating high-throughput phenotyping with envirotyping is hence
    vital to resolve genomic effects. This perspective introduces phenomics-enviromics (PE) crosstalk as a framework for coordinated
    data collection and integration to advance omics and precision plant breeding. Satellites, unmanned aerial and ground
    vehicles, and controlled indoor facilities, combined with AI-assisted typing technologies and modeling, are establishing
    the basis for synchronous, high-throughput PE crosstalk to enhance interpretability, prediction, and crop resilience.
    Genomics, phenomics, and enviromics constitute the G–P–E triangle in plant breeding, yet enviromics and its interaction
    with phenomics remain underexplored. Here, the authors introduce phenomics–enviromics (PE) crosstalk and discuss its coordinated
    data-collection and -integration into next-generation plant breeding.
