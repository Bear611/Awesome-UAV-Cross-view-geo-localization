    summary_en: Cross-view geo-localization (CVGL) typically requires large amounts of paired drone-satellite annotations
      to learn discriminative cross-view representations. UniABG addresses the scalability bottleneck by proposing a dual-stage
      unsupervised framework that removes the need for ground-truth correspondences. In Stage 1, View-Aware Adversarial Bridging
      (VAAB) introduces an Auxiliary Pseudo View (APV) generated via Lab color-space style transfer from satellite statistics
      to drone imagery, then trains a shared ConvNeXt-Base backbone adversarially against a view discriminator so that drone,
      satellite, and APV features become indistinguishable yet location-discriminative. In Stage 2, Heterogeneous Graph Filtering
      Calibration (HGFC) constructs drone-to-satellite and APV-to-satellite k-NN graphs and applies mutual k-reciprocal neighbour
      filtering with weighted intra-cluster voting to purify cross-view pseudo-pairs before supervised contrastive training.
      Evaluations on the University-1652 and SUES-200 benchmarks under the standard Drone↔Satellite retrieval protocol demonstrate
      state-of-the-art unsupervised performance, with the paper explicitly reporting gains of +10.63% Satellite→Drone AP on
      University-1652 and +16.73% on SUES-200 over prior unsupervised methods.
