- id: a758194111a5
  title: 'High-accuracy polarimetry for CMB: new frontiers with the POLOCALC project'
  year: 2026
  venue: arXiv
  authors:
  - A. Novelli
  - F. Astori
  - L. Bizzarri
  - F. Cacciotti
  - G. Cattaneo
  - G. Coppi
