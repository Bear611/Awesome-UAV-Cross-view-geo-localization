- id: d84f726f3ae5
  title: Expression of GPR34 in microglia remains stable in human Alzheimer’s disease
  year: 2026
  venue: Acta Neuropathologica
  authors:
  - Sophie Seiffer
  - Jonas Rotter
  - Jana Brendler
  - Albert Ricken
  - Zoe Detzer
  - Max Braune
  - Torsten Schöneberg
  - Angela Schulz
  - Karsten Winter
  - Ingo Bechmann
  abstract: Microglia are the resident immune cells of the human central nervous system and play key roles in development,
    homeostasis, and disease. These functions are mediated by a broad repertoire of cell-surface receptors, including G protein-coupled
    receptors such as the ADP receptor P2Y12 and GPR34, a receptor for lysophosphatidylserine. While GPR34 deficiency has
    been linked to impaired microglial phagocytosis, its regulation in relation to amyloid-β (Aβ) and tau pathology in Alzheimer's
    disease (AD) remains unclear. We performed a quantitative analysis of microglial density, morphology, and GPR34 expression
    in the medial temporal lobe cortex (MTLC) of elderly human body and tissue donors across the AD spectrum. Using fluorescence
    in situ hybridization and immunolabeling, we analyzed 187,670 microglial cells and correlated microglial parameters with
    the severity and spatial proximity of Aβ plaques and tau inclusions. In parallel, we analyzed human single-nucleus RNA
    sequencing data from 236,002 cells to assess GPR34 expression across microglial subtypes, brain regions, and neuropathological
    stages. Microglial density and overall morphology in the MTLC were largely preserved, independent of local Aβ or hyperphosphorylated
    tau burdens. Apart from a moderate shortening of microglial processes in the immediate vicinity of Aβ plaques, no consistent
    pathology-associated morphological changes were detected. GPR34 expression showed pronounced cell-to-cell variability
    and differed across microglial subtypes and brain regions, but neither expression intensity nor the proportion of GPR34-positive
    microglia correlated consistently with Braak stage or Thal phase. These findings suggest that GPR34 regulation in human
    microglia is highly context-dependent and shaped by regional and cellular heterogeneity rather than AD-associated pathology
    alone.
