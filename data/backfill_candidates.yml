- id: 742491e5a73f
  title: 'SC3-Eval: Evaluating Robot Foundation Models via Self-Consistent Video Generation'
  year: 2026
  venue: arXiv
  authors:
  - Wei-Cheng Tseng
  - Gashon Hussein
  - Yuzhu Dong
  - Allen Z. Ren
  - Lucy X. Shi
  - XuDong Wang
  - Sergey Levine
  - Zhaoshuo Li
  - Jinwei Gu
  - Florian Shkurti
  - Ming-Yu Liu
  - Quan Vuong
  abstract: Evaluating generalist robot manipulation policies in the real world is expensive, slow, and difficult to scale.
    Action-conditioned video world models offer a scalable alternative by simulating policy rollouts. Autoregressive rollouts
    accumulate compounding errors, observations across multiple camera views must remain mutually consistent, and the evaluator
    must generalize to policies whose behaviors lie outside the training distribution. We address these challenges with SC3-Eval,
    a self-consistent video generation recipe that adapts a pre-trained video foundation model into an accurate policy evaluator
    by enforcing three complementary forms of consistency. First, forward-inverse dynamics consistency jointly trains the
    model to predict frames from actions and to recover actions from frames, anchoring generated rollouts to a physically
    plausible action manifold and counteracting the drift a forward-only model cannot penalize. Second, cross-view consistency
    trains the model to inpaint each camera view from the other, keeping the multi-camera observation coherent over long rollouts
    without any explicit memory mechanism. Third, test-time consistency reuses the inverse dynamics mode at inference as a
    per-action-chunk uncertainty signal that terminates rollouts whose generated frames drift away from the requested actions.
    We also demonstrate SC3-Eval rollouts reproduce the failure modes that policies exhibit in real-world rollouts, supporting
    fine-grained diagnostic comparison rather than aggregate ranking alone. Across seven real-world vision-language-action
    policies, SC3-Eval attains a closed-loop Pearson correlation of $0.929$ and MMRV of $0.119$, outperforming three strong
    prior video-model-based baselines, and generalizes to new tasks.
