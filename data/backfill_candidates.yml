- id: 2e6fb8d58094
  title: 'Render Then Match: A Neural Radiance Field‐Based Indoor Visual Localization Framework for Lighting‐Varying Environments
    Using Infrared Images'
  year: 2025
  venue: The Photogrammetric Record
  authors:
  - Qidi Liu
  - Zilin Liu
  - Qiong Wu
  - Panwang Xia
  - Yongxiang Yao
  abstract: 'ABSTRACT Visual localization determines the position and orientation of a query image within a known scene map,
    which is especially useful in environments with poor GPS signals. Real‐world scenarios often involve differences between
    query images and scene maps due to lighting variations, necessitating robust cross‐modal visual localization technology.
    To address this challenge, we introduce a novel cross‐modal visual localization dataset (named C ross‐ M odal I mage S
    even S cenes dataset) and propose a neural radiance field‐based framework (named R ender T hen M atch) specifically designed
    for cross‐modal issues. The dataset includes images captured in real‐world environments using fixed infrared and RGB cameras:
    infrared images provide a lighting‐robust representation, while multi‐view RGB images construct scene maps. The proposed
    framework leverages the neural radiance field''s rendering capabilities to generate high‐quality rendered images based
    on the initial pose of the query image. It then uses advanced image‐matching techniques to find correspondences between
    the query image and the map, allowing precise pose estimation. Comprehensive experiments on the new dataset demonstrate
    that our framework outperforms state‐of‐the‐art methods, achieving accurate visual localization and enhanced robustness
    across different scenarios. This approach significantly improves the applicability of visual localization in environments
    with challenging lighting conditions.'
