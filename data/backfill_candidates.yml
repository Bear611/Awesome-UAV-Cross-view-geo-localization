  abstract: To address UAV localization in GNSS-denied environments, this paper proposes a multi-scale partitioning retrieval
    method that overcomes scale and viewpoint discrepancies. First, a multi-scale reference library based on altitude intervals
    is constructed to mitigate field-of-view mismatches through scale-compatible matching. Second, a Vision Transformer framework
