  summary:
    summary_en: This paper addresses UAV navigation in GPS-denied environments, where continuous satellite signal loss can
      cause position drift and degrade control performance. The authors propose a UAV scene matching method that combines
      a triplet-relationship matching scheme with sliding mode control to align real-time UAV imagery against a geo-referenced
      reference image database. The pipeline first extracts discriminative descriptors from the query image and uses triplet-relationship
      constraints to robustly match it to the correct reference region, even under viewpoint, illumination, and seasonal variations.
      The resulting position offset is then fed into a sliding mode controller that compensates for GPS outages and corrects
      the UAV trajectory in real time. Experiments are conducted using UAV-collected aerial sequences, and the paper reports
      improved matching accuracy and reduced horizontal position error during GPS-denied flight segments compared with baseline
      matching and control strategies. The work targets resilient autonomous UAV operation when satellite navigation is intermittently
      unavailable, rather than drone-to-satellite cross-view geo-localization benchmarks.
