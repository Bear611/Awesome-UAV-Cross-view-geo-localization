- id: 34e7df4e9039
  title: Stage-Specific Estimation of Maize Flavonoids Using UAV Multispectral Imagery and Spectral, Texture, and Phenological
    Features
  year: 2026
  venue: Remote Sensing
  authors:
  - Botai Shi
  - Yiming Guo
  - Xintong Fu
  - Z Y Li
  - Xiaokai Chen
  - Qingrui Chang
  abstract: Rapid and non-destructive estimation of maize (Zea mays L.) leaf flavonoid (Flav) content is important for crop
    stress monitoring and precision agriculture. This study aimed to improve Flav estimation by integrating unmanned aerial
    vehicle (UAV)-based multispectral data, texture features, and phenological parameters across six key growth stages in
    the Guanzhong Plain, China. Maize Flav content was measured in situ using a Dualex Scientific+ meter, while canopy reflectance
    was acquired with a DJI M300 RTK UAV equipped with an MS600 Pro multispectral camera. A comprehensive feature set, including
    spectral bands, vegetation indices, texture features, texture indices, and logistic curve-derived phenological parameters,
    was constructed. Three feature selection methods, competitive adaptive reweighted sampling (CARS), the genetic algorithm
    (GA), and the successive projections algorithm (SPA), together with three regression models, partial least squares regression
    (PLSR), extreme gradient boosting (XGBoost), and convolutional neural network (CNN), were evaluated for Flav estimation.
    The results showed that integrating spectral, texture, and phenological information significantly improved model performance
    compared with spectral variables alone. CNN and XGBoost generally outperformed PLSR. Across the six growth stages, the
    stage-specific optimal models achieved coefficient of determination (R²) values ranging from 0.7749 to 0.8686 and residual
    prediction deviation (RPD) values ranging from 2.0046 to 2.6019, indicating high to outstanding predictive ability. The
    highest accuracy was obtained at R3 using the CARS-XII-CNN model, with R² = 0.8686, root mean square error of validation
    (RMSEV) = 0.0382, and RPD = 2.6019. Texture features and phenological metrics, especially the start of season derived
    from the normalized difference vegetation index (NDVI_SOS) and the rate of senescence derived from the enhanced vegetation
    index (EVI_ROS), contributed substantially to model accuracy. In addition, maize Flav showed a unimodal response to nitrogen
    supply, with moderate nitrogen levels associated with higher Flav content. This study demonstrates the potential of UAV-based
    multisource feature integration and machine learning for accurate maize Flav estimation, and provides a useful framework
    for digital crop phenotyping and stress diagnosis.
