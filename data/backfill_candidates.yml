- id: 8557bb0b0284
  title: 'Ray Antenna Array Enhanced Low-Altitude ISAC: Performance Analysis and Beamforming Design'
  year: 2026
  venue: arXiv
  authors:
  - Zhiqiang Xiao
  - Tao Zhang
  - Hao Wu
  - Xiaoqiang Qiao
  - Jiang Zhang
  - Zhenjun Dong
  - Yong Zeng
  abstract: The low-altitude economy (LAE) heavily relies on aerial vehicles, yet these platforms remain vulnerable to environmental
    and security risks, necessitating robust airspace monitoring. Integrated sensing and communication (ISAC) as one of the
    key technologies of 6G provides potential solutions for safe LAE. However, conventional antenna arrays face limitations
    in cost, scalability, and coverage, especially directly above the base station, due to hardware complexity and degraded
    angular resolution. By exploiting the recently proposed ray antenna array (RAA), this paper considers a RAA-enhanced low-altitude
    ISAC system. RAA architecture employs multiple ray-arranged arrays directly connected without phase shifters, significantly
    reducing hardware costs while supporting flexible beamforming via dynamic ray selection. Moreover, RAA can provide uniform
    angular resolution and eliminates coverage holes, making it particularly suitable for low-altitude ISAC. In this paper,
    we formulate an optimization problem for joint ray selection and beamforming to enhance sensing coverage under communication
    constraints. An efficient alternating optimization algorithm is proposed to solve this problem. Analytical and simulation
    results demonstrate that RAA achieves higher sensing signal-to-noise ratio compared to traditional arrays, offering a
    cost-effective and high-performance solution for achieving low-altitude ISAC.
