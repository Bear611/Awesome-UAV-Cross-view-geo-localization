- id: 247b16f0622b
  title: Cross-Resolution Consistency of UAV Thermal and Landsat 8 TIRS LST in a Tropical Coastal–Industrial City
  year: 2026
  venue: Engineering Technology & Applied Science Research
  authors:
  - Intan Astritya Anggraini
  - Dini Atikawati
  - Andik Isdianto
  abstract: Coastal industrial cities display complex Land Surface Temperature (LST) patterns driven by heterogeneous land
    cover, anthropogenic activity, and land–sea thermal gradients. This study evaluates cross-resolution consistency between
    Landsat 8 and Unmanned Aerial Vehicle (UAV)-derived LST in a tropical coastal–industrial area in northern Surabaya, Indonesia.
    Land cover was mapped from UAV imagery using object-based image analysis, and UAV-derived LST was resampled to the 30
    m Landsat grid. Cross-resolution agreement was assessed using correlation and error metrics, and land-cover-dependent
    thermal variability was evaluated using ANOVA and Kruskal-Wallis tests. The results showed a significant positive correlation
    (r = 0.692, p &lt; 0.001), indicating consistent large-scale thermal patterns despite differences in the magnitude of
    absolute temperature. Both datasets identified higher temperatures over built-up and open land and lower temperatures
    over water bodies and mangroves. UAV-derived LST showed stronger land-cover discrimination (η² = 0.783), confirming the
    scale-dependent nature of LST representation in heterogeneous coastal environments. Integrating satellite and UAV thermal
    data improves the reliability of urban heat assessments and supports climate-responsive urban cooling planning for rapidly
    growing tropical coastal cities.
