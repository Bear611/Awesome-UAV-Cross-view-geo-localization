    summary_en: This paper addresses cross-view geo-localization (CVGL) for UAV self-positioning and target localization in
      GNSS-denied environments, focusing on the challenge of acquiring robust semantics while preserving fine-grained spatial
      details across UAV and satellite imagery. The proposed DINO-GFSA framework introduces a LoRA-adapted DINOv3 (ViT-Large)
      backbone for parameter-efficient high-capacity representation, keeping trainable parameters to approximately 45.73M
      while leveraging the foundation model. A Semantic Gated Residual Fusion (SGRF) module fuses multi-layer ViT features
      (layers 16, 20, 24), using high-level semantics to generate calibration weights for mid-level features and gating signals
      that filter noise from low-level cues. A Mamba-based Sequential Aggregation (SA) Head captures long-range spatial dependencies
      with linear complexity, followed by GeM pooling to produce the final descriptor, trained end-to-end with InfoNCE loss.
