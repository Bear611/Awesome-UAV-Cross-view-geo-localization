- id: 47ad1fb0120d
  title: '3D Magic Mirror: clothing reconstruction from a single image via a causal perspective'
  year: 2026
  venue: npj Artificial Intelligence
  authors:
  - Zhedong Zheng
  - Jiayin Zhu
  - Wei Ji
  - Yi Yang
  - Tat‐Seng Chua
  abstract: 'Abstract This paper aims to study a self-supervised 3D clothing reconstruction method, which recovers the geometric
    shape and texture of human clothing from a single image. Compared with existing methods, we observe that three primary
    challenges remain: (1) 3D ground-truth meshes of clothing are usually inaccessible due to annotation difficulties and
    time costs; (2) Conventional template-based methods are limited in modeling non-rigid objects, e.g., handbags and dresses,
    which are common in fashion images; (3) The inherent ambiguity compromises the model training, such as the dilemma between
    a large shape with a remote camera or a small shape with a close camera. In an attempt to address the above limitations,
    we propose a causality-aware self-supervised learning method to adaptively reconstruct 3D non-rigid objects from 2D images
    without 3D annotations. In particular, to solve the inherent ambiguity among four implicit variables, i.e., camera position,
    shape, texture, and illumination, we introduce an explainable structural causal map (SCM) to build our model. The proposed
    model structure follows the spirit of the causal map, which explicitly considers the prior template in the camera estimation
    and shape prediction. During optimization, the causality intervention tool, i.e., two expectation-maximization loops,
    is deeply embedded in our algorithm to (1) disentangle four encoders and (2) facilitate the prior template. Extensive
    experiments on two 2D fashion benchmarks (ATR and Market-HQ) show that the proposed method could yield high-fidelity 3D
    reconstruction. Furthermore, we also verify the scalability of the proposed method on a fine-grained bird dataset, i.e.,
    CUB.'
