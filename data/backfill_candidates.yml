- id: 5f27c86a30e9
  title: 'DINO-GFSA: Geo-Localization via Semantic Gated Fusion and Mamba-based Sequential Aggregation'
  year: 2026
  venue: arXiv
  authors:
  - Beier Hu
  - Yuanshen Guo
  - Jialu Cai
  - Chengwei Li
  - Yong Wang
  - Shunan Wu
  - Zhigang Wu
  abstract: Cross-view geo-localization (CVGL) is critical for Unmanned Aerial Vehicle (UAV) self-positioning and target localization
    in GNSS-denied environments. However, acquiring robust semantics while preserving finegrained spatial details remains
    challenging. To address this, we propose DINO-GFSA, a framework leveraging a LoRA (Low-Rank Adaptation) adapted DINOv3
    (ViTL) backbone for parameter-efficient, high-capacity representation. Crucially, we introduce a Semantic Gated Residual
    Fusion module, which utilizes high-level semantics to selectively calibrate and integrate low-level spatial cues, effectively
    bridging the semantic gap. Furthermore, a Mamba-based Sequential Aggregation Head is designed to capture long-range spatial
    dependencies with linear complexity. Experiments demonstrate state-of-the-art performance on University-1652 and DenseUAV
    benchmarks, notably surpassing the previous best on DenseUAV by 3.48% on Recall@1. These results validate DINO-GFSA as
    a generalized, robust solution for UAV CVGL.
