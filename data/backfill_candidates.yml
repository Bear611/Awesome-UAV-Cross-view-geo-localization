- id: 313f35186d2e
  title: 'Next-generation metal–organic frameworks for CO2 capture, CH4 utilization, and H2 integration: toward a circular
    and clean energy future'
  year: 2026
  venue: Carbon Research
  authors:
  - Mohssine Ghazoui
  - Otmane Boudouch
  - Aboubacar Sidigh Sylla
  - Nadia Anter
  - Safa Aharrouy
  - Siham Dabali
  - Abderrafia Hafid
  - Reda Elkacmi
  abstract: Achieving carbon neutrality requires advanced materials capable of managing strategic gases at scale. Carbon dioxide
    (CO2) capture remains essential for mitigating emissions, methane (CH4) must be both valorized and controlled due to its
    global warming potential twenty-eight times higher than that of CO2, and hydrogen is increasingly regarded as a pillar
    of future energy systems. Metal–organic frameworks (MOFs) have emerged as a transformative class of porous materials,
    with surface areas exceeding 6000 m2 g⁻1, tunable pore environments, and modular coordination chemistry. These attributes
    enable CO2 uptakes above 8–12 mmol g⁻¹, methane storage capacities near 200 v/v, and hydrogen (H2) volumetric densities
    up to 25 g L⁻1, values discussed in detail throughout this review. The goal of this work is to provide a unified and critical
    assessment of MOFs for CO2 capture, CH4 storage, and H2 adsorption, integrating mechanistic insights, structure–property
    relationships, and application-specific requirements. The review identifies shared performance drivers, highlights stability,
    scalability, and regeneration bottlenecks, and evaluates the conditions under which MOFs can realistically transition
    toward industrial deployment. By comparing these three gases within a common framework, the review clarifies actionable
    leverage points for carbon mitigation, methane utilization, and hydrogen storage. While promising, the role of MOFs as
    cross-cutting platforms remains contingent on overcoming durability and cost challenges. When aligned with industrial
    and policy frameworks, they may become key enablers of the clean energy transition.
