- id: 9cb462415d03
  title: Endoplasmic reticulum stress in the logic of ulcerative colitis development
  year: 2026
  venue: Experimental and Clinical Gastroenterology
  authors:
  - A. A. Moskovtsev
  - Danila M. Zaichenko
  - Iana R. Astafeva
  - S. G. Morozov
  - О.В. Папышева
  - L. A. Kharitonova
  - M. L. Babayan
  abstract: Ulcerative colitis (UC) is a chronic inflammatory bowel disease (IBD) that develops through the interaction of
    genetic, immunological, environmental factors, and intestinal microbiota. The review outlines the current understanding
    of ulcerative colitis pathogenesis, with an emphasis on the poorly understood adaptive responses of the intestinal epithelium.
    Enterocytes directly interface with the intestinal lumen, which harbors numerous potentially aggressive factors that can
    cause disruption of cellular homeostasis and macromolecular damage, ultimately triggering cellular stress responses. Endoplasmic
    reticulum stress is discussed as one of the key molecular mechanisms involved in the development of UC. The review considers
    the specific features of regulation of the ER stress response in the intestinal mucosa, in particular, the protective
    role of the ER sensor IRE1β as an antagonist of IRE1α, which suppresses proinflammatory signals, maintains the barrier
    function, and prevents dysbiosis. Impaired IRE1β function is associated with increased susceptibility to colitis, making
    it a potential therapeutic target, for example, to enhance mucin production and restore barrier function in IBD. The review
    also covers the PERK and ATF6 branches of the ER stress response.
