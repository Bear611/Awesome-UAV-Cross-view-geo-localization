- id: f7cda11fa15a
  title: Quantum scanning synthetic optical holography
  year: 2026
  venue: arXiv
  authors:
  - Josué R. León-Torres
  - Byron Caiza
  - Nadia Baumann
  - Sebastian Töpfer
  - Anna Mühlig
  - Orlando Guntinas-Lichius
  - Karin Burger
  - Frank Setzpfandt
  - Markus Gräfe
  - Valerio Flavio Gili
  abstract: Synthetic optical holography (SOH) introduced holographic reconstruction into scanning optical microscopy, enabling
    quantitative phase imaging with sequential acquisition and point detection. Here, we extend this concept to the quantum
    regime by implementing SOH within quantum imaging with undetected light (QIUL). By integrating a controlled synthetic
    phase carrier into a scanning QIUL implementation, we retrieve amplitude and phase images of objects probed by mid-infrared
    (MIR) photons while detecting only their visible partners. We demonstrate the method on binary, transparent, and biological
    samples, showing complex-field reconstruction in a scanning quantum imaging system. This approach decouples spatial resolution
    from photon-pair spatial correlations and establishes a route toward diffraction-limited, label-free MIR phase imaging
    with visible-wavelength detection.
