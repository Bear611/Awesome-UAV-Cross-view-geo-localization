- id: 6d5a58a2f2b9
  title: 'War under exposure: battlefield filtering and the narrowing of military choice in Ukraine'
  year: 2026
  venue: Security and Defence Quarterly
  authors:
  - Wojciech Sługocki
  abstract: 'Russia’s full-scale invasion of Ukraine has generated an unprecedented volume of battlefield data. Yet despite
    the rapid diffusion of drones, precision strikes, and persistent surveillance, the war has repeatedly returned to positional
    and attritional fighting. This article examines why similar operational constraints recur across different technological
    domains and successive phases of the conflict, and through what mechanism this pattern arises. It develops the battlefield
    filtering model as a theoretically grounded answer. The study uses critical interpretive synthesis to integrate institutional
    assessments from the Royal United Services Institute (RUSI), RAND Corporation, the European Council on Foreign Relations
    (ECFR), the European Union Agency for Cybersecurity (ENISA), and the Finnish National Defence University (NDU, Helsinki)
    with scholarship on military transformation, organisational adaptation, and the Revolution in Military Affairs. Sources
    were selected according to temporal scope, institutional access, and theoretical relevance. The findings identify four
    interacting filters: the physical environment, sustainment capacity, organisational learning, and adversarial adaptation.
    Together, these pressures progressively reduce the range of operationally viable options under conditions of sustained
    attrition. Unlike the existing frameworks that treat battlefield conditions as static or assume linear technological transformation,
    the filtering model emphasises cumulative erosion over time. Evidence from Ukraine, supported by a limited comparison
    with urban combat in the northern Gaza Strip, suggests that persistent surveillance and precision systems do not eliminate
    operational constraints but intensify their effects. The battlefield filtering model introduces a temporal dimension largely
    absent from the existing accounts of military transformation. Contemporary military effectiveness depends less on technological
    sophistication alone than on the ability to sustain adaptation, absorb attrition, and maintain organisational coherence
    under prolonged operational pressure.'
