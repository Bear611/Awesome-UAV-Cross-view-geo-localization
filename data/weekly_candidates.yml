  - Xiu-Min Li
  abstract: IgE-mediated allergic diseases are common and greatly affect quality of life. Current therapeutic strategies include
    avoidance, which is unreliable, and unspecific symptom management, which causes adverse effects and are expensive. This
    urges the need for safe, effective, and affordable treatment options for infants, children, adolescents, and adults. This
    narrative review discusses naturally occurring compounds that have been researched in animal models, in vitro cell lines,
    and clinical trials to inhibit pathological IgE. These include Food Allergy Herbal Formula (FAHF)-1 and -2 and the derivatives
    B-FAHF-2, EBF-2, and berberine; Rubia cordifolia and its isolate xanthopurpurin; arctigenin; Anti-Asthma Herbal Medicine
    Intervention and its isolate formononetin; apigenin; luteolin; resveratrol; pterostilbene; and ginsenoside Rh1. Natural
    compounds largely work through reduction of IgE production of B cells through modulation of genes involved in B cell activation,
    differentiation and proliferation, and cell cycle. There is a resulting reduction of Th2 responses and mast cell degranulation,
    and hence allergic disease pathology and symptomology. There are rich resources of natural compounds, including those
    with the capacity to restore immunity to that seen in non-allergic individuals. Natural compounds are promising, novel
    treatment strategies for the vast sufferers of food allergy, allergic asthma, allergic rhinitis, and allergic eczema.
