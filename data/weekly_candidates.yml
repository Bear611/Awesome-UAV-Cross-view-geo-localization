- id: e06c75b3561e
  title: 'The economic viability of spot-spraying for pesticides: the case of Northwest Germany'
  year: 2026
  venue: Precision Agriculture
  authors:
  - Jens Schots
  - Till Kuhn
  - Niklas Möhring
  abstract: Abstract Purpose The reliance on pesticides for crop protection poses significant challenges, including biodiversity
    loss and environmental pollution. Despite the potential of precision farming technologies such as spot-sprayers for reducing
    pesticide applications, their adoption remains limited. Previous literature on the economic viability of precision spraying
    is sparse and did not account for relations between technology availability, prices, land use and adoption decisions.
    Methods We here analyze and compare the economic viability of different types of smart spot-sprayers for site-specific
    pesticide applications using a mixed-integer linear programming bio-economic farm model. We apply the model to typical
    cereal and sugar beet farms in North-Western Germany, which is one of the most productive agricultural regions in Europe.
    In our analysis, we account for key economic and performance parameters of precision sprayers and check the sensitivity
    of results regarding assumptions on technology and farm characteristics. Results The findings indicate that real-time
    spot-spraying of herbicides is economically viable for sugar beet farms exceeding 60-172 ha and cereal farms managing
    300-400 ha. The large range of results reflects an important challenge for the adoption of spot sprayers. It highlights
    the sensitivity of economic viability to changes in technology type and performance and pesticide prices, which are often
    uncertain for farmers in advance. Broadening the use of the spot sprayer to multiple pesticide types and combining smaller
    and more precise spot-sprayers with broadcast sprayers improves the economic viability. Conclusions Overall, our results
    underscore the potential of smart spot-sprayers to contribute to sustainable agricultural practices by reducing pesticide
    use while maintaining profitability for farmers. Based on our results, we discuss how the adoption of these technologies
    could be facilitated to achieve environmental goals and improve farm economics.
