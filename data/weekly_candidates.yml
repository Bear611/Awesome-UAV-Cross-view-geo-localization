- id: ffc7e84a4099
  title: How Do VLMs Fail? Vision-Operation Misalignment in Compositional VQA
  year: 2026
  venue: arXiv
  authors:
  - Navya Gupta
  - Bingjie Xu
  - Avinash Anand
  - Timothy Liu
  - Zhengchen Zhang
  abstract: 'Compositional visual question answering requires Vision-Language Models (VLMs) to execute multiple reasoning
    operations like object selection, spatial relation resolution, and attribute verification. Despite strong aggregate performance,
    the mechanistic basis of VLM failures on this task remains underexplored. To address this gap, we analyze vision-operation
    misalignment in VLMs by examining how failures relate to specific reasoning operations and the internal computational
    pathways through which they arise and propagate. We introduce an Operation-centric mechanistic framework that decomposes
    VLM failures by both the reasoning operation where they originate and the internal computational pathway through which
    they propagate. Our analysis reveals four mechanistically distinct failure modes: grounding failure, reasoning failure,
    attribute extraction failure, and language prior dominance failure. Each characterized by a unique relationship between
    visual grounding strength and answer correctness. Through three complementary causal interventions applied across all
    transformer layers, we further demonstrate a pathway dissociation: grounding failures route exclusively through the feedforward
    network, reasoning failures route through late-layer attention, and attribute extraction failures localize to the answer-position
    feedforward computation. This dissociation demonstrates that different failure types require fundamentally different corrective
    strategies, providing a principled foundation for targeted improvements to VLM reliability in multimedia reasoning.'
