- id: 67c1b5280eea
  title: 'DroneFINE: Domain-Aware Parameter-Efficient Fine-Tuning of Vision-Language Detectors for Drone Images'
  year: 2026
  venue: arXiv
  authors:
  - Ke Wu
  - Yanan Zhang
  - Yingjie Gao
  - Wenhao Li
  - Chenyu Zhou
  - XinZhu Ma
  - Jiaxin Chen
  - Di Huang
  abstract: Object detection for Unmanned Aerial Vehicles (UAVs) working in open and dynamic environments is a highly challenging
    task. While Vision-Language Models (VLMs) have offered a powerful solution for universal object detection, adapting them
    to UAV scenarios remains non-trivial due to a substantial domain gap between VLM pre-training data and aerial imagery.
    The prevailing Parameter-Efficient Fine-Tuning (PEFT) methods prove ineffective in bridging this gap, as VLMs' "natural-scene,
    foreground-dominant" visual priors misalign with the "bird's-eye-view, background-dominant, small-object" characteristics
    of UAV data. To address this issue, we propose DroneFINE, a novel PEFT paradigm comprising two domain-aware complementary
    modules tailored for VLM-based drone image detectors. Specifically, a data-dependent, foreground-aware, and multi-path
    adaptation mechanism named HyperAdapter is designed, which overcomes the static structural constraints of PEFT. In addition,
    a background suppression algorithm named SemanticGate is developed. It is a text-conditioned guidance strategy that employs
    background vocabulary to actively guide the model in suppressing responses from irrelevant regions. Extensive experiments
    on VisDrone and UAVDT demonstrate that DroneFINE significantly outperforms existing PEFT methods and achieves performance
    comparable to full fine-tuning while substantially reducing the number of trainable parameters.
