  abstract: In this manuscript we release two datasets for visual sensing of tomato plants grown in commercial-like settings
    and acquired using a robot. The first is BUTom21 which consists of still images and manual annotations. The second is
    BUTom-ST21 which consists of video-based data and semi-automated annotations through AI-based methods, referred to as
    pseudo-labels. In both cases, we provide pixel-level labels for the ripeness of the fruit. The aim is to provide the research
