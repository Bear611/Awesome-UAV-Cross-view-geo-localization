- id: 0d5e0a0d061e
  title: Optimization of aerial image stitching for garbage identification
  year: 2026
  venue: An International Journal of Optimization and Control Theories & Applications (IJOCTA)
  authors:
  - Cheng-Chien Su
  - Jih‐Gau Juang
  abstract: To improve the environmental quality and protect local ecosystems, riverine waste monitoring systems are needed
    to identify waste along riverbanks. Since most riverbank areas are wide, a single unmanned aerial vehicle (UAV) camera
    cannot capture the entire area. Hence, the use of multiple UAVs and image stitching for river scene reconstruction is
    required. This study applies image processing with multiple UAVs to identify garbage. First, image stitching employed
    the scale-invariant feature transform, Oriented Features from Accelerated Segment Test and Rotated Binary Robust Independent
    Elementary Features, and accelerated KAZE for feature detection and description. Real-time scene stitching was performed
    using feature point matching and filtering, and seam removal was achieved with an averaging-weighted mask. Two image-stitching
    datasets were tested, and the proposed method preserves 100% of the content of the original images. The computation time
    was reduced by 60% compared to the conventional method. Secondly, the optimized stitching results were used to further
    identify marine pollution using the You Only Look Once (YOLO) model. &amp;nbsp;Different types of YOLO networks were used
    to identify waste pollution. An optimal YOLO model that identified waste items with 100% recognition and accuracy was
    obtained. The current coordinates, waste types, area size, and real-time images of the waste pollution were sent to the
    monitoring terminal. This enabled the analysis of waste distribution and facilitated attempts to trace the source of the
    waste by comparing training results and the identification effectiveness of different models.
