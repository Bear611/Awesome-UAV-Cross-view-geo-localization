- id: cd1c11af9594
  title: Tidal evolution of packed moon systems around an Earth-mass planet
  year: 2026
  venue: arXiv
  authors:
  - Alan Briseño
  - Billy Quarles
  - Marialis Rosario-Franco
  abstract: While missions have long targeted terrestrial exoplanets within the habitable zone of their host stars, the number
    of exomoon candidates is expected to grow as next generation space-based observatories achieve the photometric sensitivity
    required to detect their transit signals. Constraining the stability limits of tightly packed moon systems is therefore
    essential for transit searches and predicting the number of moons around terrestrial planets. In our Solar System, only
    three moons orbit the terrestrial planets, motivating the question of whether Earth-mass exoplanet systems can sustain
    long-lived, tightly packed satellites. We investigate the stability limits of an Earth-mass planet orbiting a Sun-mass
    star, where the planet hosts multiple moons. We use the REBOUND N-body integrator along with the tides_spin module in
    REBOUNDx to assess the stability of tightly packed systems of Luna-, Pluto-, and Ceres-mass moons across a range of tidal
    dissipation parameters, up to $10^{7}$ dynamical orbits of the innermost moon. We find that an Earth-mass planet can stably
    host up to two Luna-mass moons, three Pluto-mass moons, or five Ceres-mass moons. Under Earth-like dissipation, the Luna,
    Pluto, and Ceres packed systems survive within narrow regions of orbital spacing. These results imply that long-lived
    multi-moon systems around Earth-mass planets are possible but strongly depend on tidal dissipation; for these architectures
    to exist on billion-year timescales, tides must be weaker than those of the present-day Earth-Moon system.
