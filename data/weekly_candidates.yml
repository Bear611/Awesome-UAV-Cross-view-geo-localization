  summary:
    summary_en: 'AeroMap3D addresses monocular 6-DoF UAV localization in GNSS-denied environments by anchoring onboard imagery
      to publicly available map priors: satellite imagery (NAIP), bare-earth DEMs (USGS 3DEP), and OpenStreetMap semantic
      layers. The system tackles two coupled problems: the large cross-view geometric mismatch between oblique/nadir UAV frames
      and north-up satellite tiles, and the structural inconsistency between bare-earth terrain heights and urban buildings.
      Its first module is a lightweight Siamese scale-yaw adapter built on MobileNetV3-Small, trained entirely on synthetic
      UAV-like renderings from UAV-VisLoc satellite tiles, which predicts log-scale and yaw offsets to rectify the UAV-map
      pair before feeding it to a frozen RoMa v2 dense matcher. The second module conditions correspondences through OSM building
      masking before DEM lifting and RANSAC-PnP, rejecting matches on elevated structures that would otherwise bias 2D-3D
      geometry. A delayed-state EKF then fuses map-derived PnP measurements with a reference-derived stochastic motion prior
      for continuous trajectory estimation. The authors release UAV-Terra3D, a benchmark of 20 trajectories, 55 km of flight,
      and 22.4 km² across eight Austin sites with co-registered satellite, DEM, and OSM layers. On UAV-Terra3D, the adapter
      raises RoMa v2 registration success from 62.4% to 99.2% with only 35 ms overhead; adding OSM semantic filtering raises
      single-frame PnP success from 88.24% to 95.69% and reduces mean 3D error from 16.17 m to 14.11 m; and the full PnP+EKF
      pipeline achieves 100% success within 50 m, 5.88 m mean 3D error, and 11.25 m 95th-percentile error over the 55 km benchmark.'
