- id: 7784207cd7d0
  title: 'Raising the bar: a systems approach to promoting good wellbeing and self-efficacy in zoo and aquarium professionals'
  year: 2026
  venue: Frontiers in Veterinary Science
  authors:
  - Sabrina Brando
  - Hannah M. Buchanan‐Smith
  - Sonia Rey Planellas
  - Line Caes
  abstract: This research examines life satisfaction, individual and organisational job satisfaction, and self-efficacy in
    zoo and aquarium (ZOAQ) professionals, investigating how organisational structures, processes, provisions, and team engagement
    contribute to these outcomes. We applied a novel integration of Bronfenbrenner’s Ecological Systems Theory, the Rhinelands
    Way, and the One Welfare framework to guide a mixed-methods study comprising a cross-sectional mixed-methods survey (
    n = 442) and follow-up interviews ( n = 39) across 23 accredited organisations. Descriptive statistics, correlations,
    mediation and moderation analyses addressed five pre-specified hypotheses, with thematic analysis of interview data contextualising
    the quantitative findings. Most participants reported satisfactory individual job satisfaction (71%), and work perceptions
    and organisational appreciation were more strongly associated with job satisfaction than access to tangible provisions.
    However, findings revealed significant role-based disparities in provision access, a weak relationship between formal
    wellbeing processes and job satisfaction, and patterns of manager-observed behaviour and self-efficacy suppression consistent
    with learned helplessness. These results provide an empirical basis for developing people-centred organisational cultures
    characterised by equitable provisions, supportive leadership, meaningful communication, and structures that promote help-seeking
    and collective goals including animal wellbeing and conservation. Limitations include the cross-sectional design, English-language
    sampling, and the inferential rather than direct measurement of learned helplessness.
