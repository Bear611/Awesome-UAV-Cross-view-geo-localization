- id: 1ffec9ff12b4
  title: Measuring satellite galaxy subhalo masses in redMaPPer clusters with UNIONS weak lensing data
  year: 2026
  venue: arXiv
  authors:
  - Roman Akhmetshyn
  - Jack Elvin-Poole
  - Michael J. Hudson
  - Isaac Cheng
  - Thomas de Boer
  - Sébastien Fabbro
  - Sam Farrens
  - Sacha Guerrini
  - Axel Guinot
  - Stephen Gwyn
  - Hendrik Hildebrandt
  - Martin Kilbinger
  - Charlie T. Mpetha
  - Calum Murray
  - Ludovic Van Waerbeke
  - Anna Wittje
  abstract: In this work, we present the observed galaxy-galaxy lensing signal of satellite galaxies in rich clusters obtained
    from the Ultraviolet Near-Infrared Optical Northern Survey (UNIONS). Such observations are crucial for understanding dark
    matter halo physics and interaction dynamics in the cluster environment. Our goal is to investigate the tidal stripping
    of cluster subhalos. Theoretical predictions, supported by recent studies, suggest that as satellite galaxies fall into
    clusters, their dark matter halos are stripped and dispersed into the cluster's main halo, while their stellar mass remains
    relatively intact. A robust method to probe this phenomenon is through statistical measurements of the excess surface
    mass density of satellite galaxies at different cluster-centric distances. Our results reveal a significant lensing signal,
    with strong statistical power from the large number of lens-source pairs. A simple model used in the fitting process to
    constrain subhalo masses effectively reproduces the observed lensing signal at relevant satellite-centric distances. However,
    it lacks the complexity to accurately fit the excess surface density at larger distances, where the host cluster halo
    dominates. We measure the subhalo-to-stellar mass ratio as a function of cluster-centric radius and find a strong positive
    trend. These results confirm tidal stripping or other environmental processes that impact the relative masses of a satellite
    galaxy's stellar component and its dark matter halo.
