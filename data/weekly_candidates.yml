  summary:
    summary_en: 'Cross-view object geo-localization (CVOGL) aims to localize a user-specified object on a satellite image
      given a click point query from either a ground or drone image. Existing methods suffer from a prompt-disobeying overfitting
      problem: when the click point changes, the predicted bounding box fails to track the prompt, indicating reliance on
      spurious correlations rather than prompt semantics. To address this, the paper introduces two plug-and-play, architecture-agnostic
      contributions. First, the CVOGL-MO dataset extends the original CVOGL training and test sets with diverse multi-object
      annotations per image, mitigating annotation bias and shortcut learning. Second, the Cross-View Co-Scene Multi-Object
      Contrastive Loss (CVMCL) enforces distinct feature representations for different click points within the same scene,
      compelling the model to follow prompt instructions. Both components integrate seamlessly into existing CVOGL pipelines
      without architectural changes. Experiments on CVOGL benchmarks reportedly demonstrate consistent gains for existing
      methods and substantial improvements on the new test set, advancing prompt-consistent cross-view object geo-localization.'
