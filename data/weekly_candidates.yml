    summary_en: 'This paper tackles cross-view geo-localisation (CVGL), where a query image must be matched against a large
      reference gallery of geo-tagged images despite severe viewpoint differences between drone and satellite perspectives.
      The authors propose a unified pipeline built around three contributions: (1) a DINOv2 backbone equipped with a convolution-based
      adapter for efficient domain adaptation to cross-view imagery; (2) a multi-scale channel reallocation module that diversifies
      and stabilises spatial feature representations; and (3) an improved aggregation module that injects a Mixture-of-Experts
      (MoE) routing mechanism into a cross-attention framework, dynamically selecting expert subspaces for keys and values
      to handle heterogeneous input domains adaptively. The system is evaluated on the University-1652 and SUES-200 benchmarks,
      and the authors report that the proposed method achieves competitive performance relative to existing approaches while
      using fewer trainable parameters. The paper targets the image-retrieval formulation of CVGL, presenting a query-aggregation
      architecture rather than pose refinement or unified global-to-local search.'
