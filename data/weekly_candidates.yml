  - Léo Vacher
  - Christophe Vescovi
  - Mario Zannoni
  abstract: Cosmic Microwave Background (CMB) polarization measurements are pushing instrumental sensitivities to levels where
    calibration systematics become a dominant limitation. The large dynamic range between cosmological and Galactic emission
    prevents future experiments from relying only on diffuse sky measurements or standard celestial calibrators. To address
    this challenge, the COSmological Microwave Observations Calibrator (COSMOCal) project proposes an artificial calibration
    source deployed as a guest payload on a geostationary satellite, scheduled for launch by the Eutelsat group by 2030. This
    source will provide stable, well-characterized polarized microwave signals accessible to multiple ground-based observatories.
    In this work, we present the status of the project, the updated development timeline, and the refined scientific and technical
    requirements, defined with the observatories that plan to use this calibration source. Furthermore, we investigate the
    interplay between instrumental systematics and component separation in the presence of complex models of interstellar
    dust emission. We discuss in this paper how this can impact the recovery of the primordial signal, and whether residual
    calibration errors can degrade the performance of foreground cleaning algorithms.
