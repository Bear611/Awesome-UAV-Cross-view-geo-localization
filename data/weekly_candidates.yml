- id: 971d1b70ff12
  title: 'Reproductive health considerations in cervical cancer management: A nationwide analysis of epidemiological trends
    and histological shifts (1993-2017)'
  year: 2026
  venue: Placenta and Reproductive Medicine
  authors:
  - Hao Lin
  - Yuhan Chen
  - Yang Shen
  abstract: 'Background: Comprehensive evidence regarding the longitudinal trends of cervical cancer (CC) incidence and its
    histological subtypes in China is limited, particularly concerning the growing clinical demand for reproductive health
    preservation. This study analyzed incidence patterns (2013-2017) and long-term trends (1993-2017) of CC and its subtypes
    across China. Methods: Data were extracted from the Cancer Incidence in Five Continents (CI5 XII) and CI5plus databases.
    Trends in age-standardized incidence rates (ASIRs) were analyzed using Joinpoint regression. A novel estimation model
    was developed to quantify the national and regional prevalence of patients potentially eligible for fertility-sparing
    surgery. Results: Between 2013 and 2017, approximately 67,053 new CC cases were diagnosed in China. From 1993 to 2017,
    the incidence of CC showed a pronounced upward trend (annual percent change [APC]: 7.06). While the incidence peaked in
    the 50-54 age group, the rising burden in younger cohorts highlights an urgent need for reproductive health considerations.
    Utilizing our novel fertility-sparing potential estimation model, we identified approximately 7544 patients theoretically
    eligible for fertility-sparing surgery during 2013-2017. Significant regional clustering of these candidates was observed
    in high-burden provinces such as Jiangsu and Zhejiang, emphasizing the substantial challenge of infertility risk among
    young patients. Conclusion: China faces a significant and increasing burden of CC with notable regional variations. There
    is an urgent need to implement a national, integrated prevention strategy that combines standardized Human Papillomavirus
    (HPV) vaccination and screening with tailored fertility preservation services. Addressing these reproductive health needs
    is critical to mitigating the long-term impact of CC, particularly for young women in high-prevalence regions.'
