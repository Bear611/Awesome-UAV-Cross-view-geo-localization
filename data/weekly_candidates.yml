- id: 302dc6f11f98
  title: 'Frontier Language Models Struggle to Copy: Text Can Be Better Viewed in 2D'
  year: 2026
  venue: arXiv
  authors:
  - Haodong Wen
  - Yiran Zhang
  - Yingfa Chen
  - Kaifeng Lyu
  abstract: 'While large language models (LLMs) can solve advanced reasoning problems in seconds, we show that even frontier
    models fail to perform a much simpler operation: exactly copying an input string that lies well within their context windows.
    We attribute this failure to positional encodings in Transformer architectures, whose inductive bias favors copying through
    a shortcut based on matching local contexts rather than carefully locating the corresponding input positions. To address
    this issue, we introduce 2D-RoPE, which organizes text into a 2D grid rather than a 1D sequence and assigns each token
    a row ID and a column ID. Under this view, copying becomes simply retrieving input tokens at a fixed column offset, which
    makes the task easy to learn. In synthetic copy experiments, shallow Transformers with 2D-RoPE achieve perfect copying
    at input lengths hundreds of times longer than those seen during training, whereas standard positional encodings fall
    far behind. We further show that the advantage of 2D-RoPE language models on copy tasks consistently holds in large-scale
    pretraining on DCLM with model sizes up to 1.4B parameters. Overall, our results suggest that viewing text in 2D can benefit
    language modeling, and we hope this encourages future work to further explore the potential of 2D positional encodings.'
