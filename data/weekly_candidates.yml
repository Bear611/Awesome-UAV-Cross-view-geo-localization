- id: 23310bb77f5b
  title: 'MIRA: A Modular Open-Source Micro-UAV for Indoor Research'
  year: 2026
  venue: arXiv
  authors:
  - Lucas K. de Oliveira
  - Felipe A. G. Tommaselli
  - João Aires Marsicano
  - Marco S. Tayar
  - Pedro A. R. Saraiva
  - Ricardo V. Godoy
  - Marcelo Becker
  abstract: Indoor robotics research increasingly relies on micro-UAVs whose airframe, electronics, and control software are
    fully open to modification. Off-the-shelf platforms rarely expose the low-level access required for such modifications,
    while building a custom alternative typically requires substantial engineering effort before flight testing can begin,
    leaving many laboratories to work within constraints that limit the scope of their research. We present MIRA (Modular
    Indoor Research Architecture), a low-cost, open-source micro-UAV for indoor research built around a replicable 3D-printed
    PLA airframe and a containerized low-level software package managing the companion-to-autopilot communication bridge via
    Micro XRCE-DDS. Designed as a white-box architecture, core subsystems are individually replaceable without firmware refactoring,
    supporting local fabrication and component substitution from existing lab inventory. We characterize MIRA through manual
    flight in position-control mode within an optical motion-capture volume, where the communication pipeline sustains a median
    companion-to-autopilot latency of 0.02 ms and power spectral density analysis confirms the structural vibration energy
    stays concentrated in a narrow 90 to 110 Hz band, isolated from the sub-20 Hz control bandwidth and within the autopilot
    safety thresholds.
