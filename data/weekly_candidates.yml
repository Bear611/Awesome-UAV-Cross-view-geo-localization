- id: c582cf47b025
  title: 'Enhancing the well-being of individuals with vision impairments: a comprehensive examination of the MoSIoT framework'
  year: 2026
  venue: Universal Access in the Information Society
  authors:
  - Seyed Shahabadin Nasabeh
  - Santiago Meliá
  - Barbara Leporini
  - Diana Gadzhimusieva
  abstract: Abstract The global prevalence of visual disabilities is increasing, significantly impacting the quality of life
    and social inclusion of those affected. Existing technologies, while helpful, continue to face challenges in terms of
    cost, accessibility, and real-time effectiveness. Individuals with visual impairments face significant barriers in their
    daily interactions with the environment, limiting their independence and social participation. The lack of adaptable and
    personalized solutions that address these specific needs remains a significant barrier. This study presents an extension
    of the Modeling Scenarios of the Internet of Things (MoSIoT) framework, a platform designed to improve the quality of
    life of people with disabilities by enhancing their interactions with IoT devices. The enhanced MoSIoT framework uses
    artificial intelligence and augmented reality technologies to significantly improve navigation and environmental interaction,
    enhancing the well-being of individuals with visual impairments. The proposed enhancements include advanced object detection,
    scene recognition, and augmented reality geolocation, all tailored to provide a richer and more autonomous user experience.
    A case study conducted as part of this research illustrates the practical application of these technologies in a real-world
    scenario, demonstrating how they can be used to support individuals with visual impairments in various everyday contexts.
    Practical tests conducted using tools such as YOLO for object recognition and Azure IoT for device integration have significantly
    improved user autonomy and quality of life. The results show that the enhanced framework can facilitate more effective
    environmental interaction and better social inclusion, highlighting its potential for implementation across different
    contexts and devices.
