- id: 8a1859d3cfff
  title: 'First damaging experiments on the openLAB research bridge: Extensive open data sets and preliminary insights'
  year: 2026
  venue: e-Journal of Nondestructive Testing
  authors:
  - Bertram Richter
  - Steffen Marx
  abstract: The openLAB is a 45 m long, three-span semi-integral research bridge near Bautzen, Germany, constructed from prestressed
    concrete girders. It serves as a benchmark platform for evaluating and comparing structural health monitoring (SHM) systems
    through controlled experiments. This paper presents the experimental setup, procedure, and selected results from load
    tests conducted in May 2025, focusing on static deformation up to the ultimate limit state (ULS) under a concentrated
    load of 400 kN, inducing a maximum deflection of 60 mm. The structural response was monitored using interdisciplinary
    methods – e.g., laser triangulation sensors (LTS), tilt sensors, robotic total station (RTS), unmanned aerial vehicle
    (UAV) photogrammetry, and fiber optic sensing – with strong agreement among the methods. Finite element (FE) models, developed
    to support test preparation, showed significant variability, highlighting sensitivity to modeling assumptions. All data
    – comprising FE models, environmental conditions, geodetic measurements, UAV photogrammetry, crack documentation, and
    fiber optic sensor readings – are openly accessible, providing a rich, multi-source dataset for future SHM research.
