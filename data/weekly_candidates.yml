- id: c3eb28e4cc97
  title: Adaptive Contrast Enhancement and Optimised Feature Matching for RootSIFT-Based Palm-Vein Recognition
  year: 2026
  venue: arXiv
  authors:
  - Kaveen Perera
  - Fouad Khelifi
  - Ammar Belatreche
  abstract: Palm-vein recognition is a highly secure biometric modality due to the uniqueness and subcutaneous nature of vein
    patterns. However, low contrast in palm-vein images, caused by NIR light scattering and sensor limitations, remains a
    significant challenge. To address this, we propose the Intensity-Limited Adaptive Contrast Stretching with Bidirectional
    Gaussian-weighted Overlapping Tiles (ILACS-BGOT) method, an enhancement of the previously developed ILACS with Layered
    Gaussian-weighted Overlapping Tiles (ILACS-LGOT) technique. ILACS enhances local contrast, while BGOT mitigates blocky
    artefacts. This study further integrates RootSIFT features with KNN+RT and incorporates the previously introduced Mean
    and Median Distance (MMD) filter to investigate the parameter variations of both MMD and RT, and their impact on recognition
    performance. A comprehensive analysis was conducted across three benchmark datasets (CASIA, PolyU, and PUT), using 42
    combinations of MMD filter thresholds and RT values. Results were evaluated using EER and Accuracy. Findings reveal that
    higher template sizes improve performance, while varying MMD thresholds reflect dataset-specific rotational variations.
    The proposed system demonstrates superior generalisability, achieving significant improvements in both EER and Accuracy
    over existing methods. Furthermore, the underlying ILACS-BGOT mechanism suggests potential applicability beyond palm vein
    recognition to other biometric modalities such as finger vein and palmprint recognition, and more generally to low-contrast
    image enhancement across computer vision applications.
