- id: 65b298b874b5
  title: 'Mapping and dynamics of woody cover in the xerophytic thickets of southwestern Madagascar: methodological contributions
    from the Toliara II District'
  year: 2026
  venue: ORBi (University of Liège)
  authors:
  - Felana Nantenaina Ramalason
  abstract: 'Les écosystèmes arides du district de Toliara II, dans le sud-ouest de Madagascar, dominés par les fourrés xérophiles,
    présentent un taux d''endémisme végétal exceptionnel (95 %), mais sont soumis à des pressions humaines croissantes et
    restent difficiles à cartographier par satellite en raison de leurs propriétés optiques atypiques. Cette thèse propose
    un cadre méthodologique intégré pour cartographier et suivre leur couvert ligneux sur 36 ans, combinant photo-interprétation
    à très haute résolution, données satellitaires multi-sources (Sentinel-1, Sentinel-2, AlphaEarth Foundations) et séries
    temporelles Landsat traitées sous Google Earth Engine. Les études locales reposent majoritairement sur des classifications
    binaires forêt/non-forêt incapables de restituer la dégradation graduelle de ces formations. L''évaluation de quatre produits
    cartographiques globaux — GFCC, GFW, CGLS-LC100 et Dynamic World — confrontés à 41 relevés terrain révèle des écarts considérables
    entre produits (coefficient de variation : 78,94 %). Dynamic World offre les meilleures performances (R² = 0,70), mais
    reste inférieur aux modèles calibrés localement développés dans cette thèse (R² = 0,75–0,88). La comparaison de quatre
    configurations satellitaires et de deux stratégies d''échantillonnage montre que c''est la répartition spatiale des placettes
    — et non la sophistication des capteurs — qui détermine la précision des modèles. Ainsi, 505 placettes photo-interprétées
    produisent des résultats nettement meilleurs que 41 relevés terrain (R² = 0,88 contre 0,46–0,66). Le seuil minimal est
    de 15,5 placettes dispersées par 1 000 km², le seuil optimal entre 20,7 et 41,4. Un échantillonnage dispersé atteint des
    performances équivalentes à un échantillonnage groupé avec deux fois moins de placettes. Sur 36 ans, la perte nette de
    couvert est modérée (−3,2 %, soit −15 185 ha). Elle masque cependant une transformation profonde : les fourrés intacts
    (couvert > 80 %) ont reculé de 62,8 % à 29,0 % du paysage, au profit des fourrés dégradés (60–80 %), passés de 18,5 %
    à 39,5 %. Quatre phases se succèdent : expansion légère (1989–2001), dégradation accélérée (2001–2013), déclin atténué
    (2013–2019) et récupération partielle (2019–2025) ; ces taux, bien qu''indicatifs des grandes tendances, ne sont pas individuellement
    significatifs au seuil de 95 % (test de Theil-Sen), la transformation structurelle (fourrés intacts vers dégradés) constituant
    le résultat le plus robuste de cette analyse. La perte s''accélère au-delà de 8,9 feux cumulés sur 25 ans — soit environ
    un feu tous les trois ans —, seuil au-delà duquel la capacité de résilience de la végétation s''épuise progressivement
    ; la gestion proposée vise à ramener cette fréquence à un feu tous les cinq ans ou moins pour maintenir les parcelles
    dans la zone de résilience partielle. La perte décroît par ailleurs régulièrement avec la distance aux habitations. Dans
    les zones pastorales où la fréquence des feux reste sous le seuil critique, le couvert se maintient, suggérant que le
    pâturage extensif n''induit pas en lui-même de perte directionnelle. Cette thèse établit le premier cadre empirique quantifié
    pour l''optimisation de l''échantillonnage en zone aride tropicale, démontre la primauté de la représentativité spatiale
    sur la précision instrumentale, et confirme qu''une variable continue de couvert est indispensable pour révéler la dégradation
    structurelle que les approches binaires occultent. Les perspectives portent sur la validation du protocole dans d''autres
    écosystèmes arides, l''intégration de modèles Transformer pour la détection des couronnes individuelles, et le couplage
    des cartes de couvert avec des équations allométriques pour estimer les stocks de carbone sur 36 ans, ouvrant la voie
    aux mécanismes REDD+.'
