  summary:
    summary_en: PiLoT v2 addresses real-time, drift-free UAV geo-localization in GNSS-denied environments by replacing heavy
      3D-mesh references and GPU-based rendering with lightweight TDOM/DSM map crops. The pipeline crops a pixel-aligned 2.5D
      reference (TDOM appearance plus DSM height) from the pose prior, lifts reference pixels into 3D geo-anchors, and registers
      the oblique query image against this crop via a cross-view feature registration network (MobileOne-UNet backbone) trained
      on a large-scale, geometrically annotated oblique-to-orthographic synthetic dataset. Pose refinement is performed with
      a multi-hypothesis coarse-to-fine Levenberg-Marquardt optimizer that fuses learned feature-metric residuals with onboard
      sensor priors, namely IMU gravity direction and single-point laser range, to regularize attitude and depth. Evaluations
      are conducted on a newly constructed TDOM/DSM benchmark aligned with SynthCity-6, UAVScenes, and UAVD4L-2yr. Experiments
      report that PiLoT v2 matches or surpasses PiLoT's 3D-mesh-based localization while drastically lowering map storage
      (e.g., 472 MB vs 19.5 GB on UAVD4L-2yr) and running at 17 FPS. The paper does not report results on the repository's
      tracked cross-view retrieval benchmarks (University-1652, SUES-200, DenseUAV, etc.).
