- id: 0e91f8c05c52
  title: 'VTLoc: Learning-based Tactile Contact Localization in Visual Point Clouds'
  year: 2026
  venue: arXiv
  authors:
  - Zhiyuan Wu
  - Zhuo Chen
  - Shan Luo
  abstract: 'Vision and touch are complementary modalities essential for robotic perception and manipulation. While vision
    provides global object context, touch offers precise local information at contact points. Integrating these modalities
    for contact localization, i.e., predicting the location of touch on an object''s surface, poses significant challenges
    due to the need for accurate spatial alignment between tactile data and visual geometry. To address this challenge, we
    propose VTLoc, a novel visual-tactile framework that localizes contact points from tactile readings using a 3D point cloud
    as visual input. VTLoc introduces two key components: a geometric multi-modal alignment module, which reconstructs a pseudo-point
    cloud from fused visual-tactile features and aligns it with the visual point cloud to enforce spatial consistencies across
    modalities; and an iterative localizing updater, which iteratively refines the predicted contact location using fused
    visual-tactile features. Evaluated on a new benchmark of 100 real-world objects, VTLoc improves single-touch contact localization
    by reducing local-to-global correspondence ambiguity.'
