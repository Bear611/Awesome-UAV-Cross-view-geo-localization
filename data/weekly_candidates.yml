- id: 408f7b3d5499
  title: 'Artificial Intelligence in Open Innovation and Project Management: A Systematic Literature Review of Technologies,
    Applications, and Future Research Directions'
  year: 2026
  venue: Applied Research Advances
  authors:
  - Sushil Kumar Sahoo
  - Bibhuti Bhusan Choudhury
  - Prasant Ranjan Dhal
  - Supriya Sahu
  - Sudhakar Majhi
  - Ipsita Dhar
  abstract: Artificial Intelligence (AI) is reshaping open innovation and project management by enhancing knowledge discovery,
    collaborative innovation, intelligent decision-making, and project execution. Despite the rapid growth of research in
    these domains, existing studies remain fragmented and lack a comprehensive synthesis of AI technologies, applications,
    and emerging research directions. This study systematically reviews the evolution of AI-driven open innovation and project
    management research through a systematic literature review and bibliometric analysis of publications from 2000 to 2026.
    Relevant studies were identified following the PRISMA guidelines and analyzed using bibliometric and thematic analysis
    techniques. The findings reveal a significant increase in research activity, particularly since 2018, driven by advances
    in machine learning, natural language processing, predictive analytics, and generative AI. AI applications are primarily
    concentrated in idea generation, knowledge management, crowdsourcing, project planning, risk assessment, resource optimization,
    and decision support. Furthermore, the review identifies major research themes, emerging trends, and critical gaps related
    to explainable AI, human–AI collaboration, governance, and sustainability. Finally, a conceptual framework and a future
    research agenda are proposed to facilitate the development of intelligent, resilient, and sustainable innovation and project
    management ecosystems.
