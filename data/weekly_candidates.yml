- id: 39a253ad2ed1
  title: 'Beyond Object Validation: Relational Conformance in Multi-Artifact Agent Releases'
  year: 2026
  venue: arXiv
  authors:
  - Tengjiao Liu
  abstract: 'Agent systems validate inputs, tool calls, and generated objects. The final package often escapes the same scrutiny.
    In one DRSS release, the ledger supported 60 points and a failed certificate; the report announced a 100-point Gold Path.
    Every local gate was green. The package contradicted itself. We study that failure alongside Schema Docs, where similar
    faults became product contracts, and Brand Shuttle GEO, where evidence is turned into repair work. The result is a candidate
    Schema-SIP Relational Conformance profile (SIP-RC). It models a release as a graph: claims point to evidence, decisions
    carry bounded authority, derived artifacts retain their execution conditions and lineage, and published bytes must match
    the package that was checked. Hard failures cannot be averaged away, and a validator recomputes critical decisions on
    a separate path. The paper establishes the failure class and shows that several mechanisms are practical. Whether the
    full profile performs better than existing checks remains an open experiment.'
