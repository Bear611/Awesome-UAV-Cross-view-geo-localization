- id: ceabb804f1ed
  title: Localized Vector Modes on Local Cosmic Strings
  year: 2026
  venue: arXiv
  authors:
  - Sergio Alameda-Calvo
  - Jose J. Blanco-Pillado
  - Jose Queiruga
  abstract: We investigate the dynamics of vector excitations localized on cosmic strings in the Abelian-Higgs model. These
    confined gauge field fluctuations behave as massive vector degrees of freedom propagating along the string. We show that
    they remain bounded for all values of the scalar self coupling $λ$, including parameter regimes in which the previously
    studied conventional shape mode is no longer present. After determining their spectra and spatial profiles, we analyze
    their decay through nonlinear coupling to bulk radiation. Their amplitudes exhibit the characteristic power law relaxation
    associated with non-linear radiation. For sufficiently large $λ$ the scalar radiation channel becomes kinematically inaccessible
    and the decay is instead mediated by quasinormal modes which can be interpreted as Feshbach resonances of the string.
    We then study the full $3+1$ dimensional dynamics of the vector-excited string. Field theory simulations reveal a parametric
    instability between the vector mode and the Goldstone sector. In contrast to the shape mode, the vector mode resonantly
    excites both transverse directions simultaneously. In addition, we build an effective model that captures the instability
    and identifies the nonlinear couplings responsible for it. Our results show that vector excitations constitute a long-lived
    massive degree of freedom with a non-trivial role in the dynamics of local strings.
