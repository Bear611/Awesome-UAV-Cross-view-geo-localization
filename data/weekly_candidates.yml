- id: 2772ad5cd422
  title: 'RASR: Range-Aware Scale Recovery for Metric UAV Navigation'
  year: 2026
  venue: arXiv (Cornell University)
  authors:
  - Hongtao Liang
  - Xinyu Shao
  - Chenxu Wang
  - Yiyao Wan
  - Jiahuan Ji
  - Fangwei Ye
  - Fuhui Zhou
  - Qihui Wu
  abstract: A central challenge in image-goal UAV navigation under Global Navigation Satellite System (GNSS) denial is estimating
    metric distance and heading between current and goal views. Dense pairwise geometry models capture relative scene structure,
    but without a calibrated metric scale, they cannot directly provide reliable distance estimates for navigation. Although
    global scale calibration corrects the dominant scale bias, the remaining errors vary systematically with distance. In
    this paper, Range-Aware Scale Recovery (RASR) is proposed, which complements global scale calibration with range-aware
    residual correction. RASR encodes pairwise geometry extracted by a frozen Matching And Stereo 3D Reconstruction (MASt3R)
    backbone as a compact descriptor and separates the scale-recovery core from task-specific command calibration. On the
    official online evaluation of the UAVs in Multimedia 2026 PairUAV challenge, RASR achieved a total error of 0.003189,
    achieving a lower total error than global scale calibration alone. The results demonstrate that range-aware residual correction
    improves metric distance estimation beyond global scale calibration. Code and materials are available at https://github.com/lht-research/rasr-pairuav.
