- id: e28b75c4d37e
  title: 'Post-disaster recovery systems: A systematic review of the Wenchuan earthquake'
  year: 2026
  venue: ''
  authors:
  - Zulkaif Ahmed Saqib
  - Ao Yibin
  - Zhao Jianjun
  - Panyu Peng
  abstract: Abstract. Wenchuan earthquake is one of the most extensively studied large-scale disaster-recovery scenarios,
    providing a unique empirical basis for understanding the design, implementation, and sustainability of complex recovery
    systems. However, governance, infrastructural, social, economic, and environmental research is fragmented, limiting system-level
    knowledge of post-disaster recovery processes. Addressing this gap, a systematic analysis of 735 peer-reviewed articles
    from 2008 to 2025 aims to synthesize interdisciplinary evidence on post-disaster recovery. The PRISMA-guided assessment
    incorporates interdisciplinary insights into governance, infrastructure reconstruction, social recovery, livelihood regeneration,
    environmental restoration, and technology innovation. Institutional capabilities, resource mobilization, and risk circumstances
    alter recovery as a dynamic system-level transformation. Governance coordinates sectoral policymaking. Centrally coordinated
    systems, particularly the paired-assistance model and large-scale financing, enabled rapid and complete reconstruction
    in Wenchuan. The research also indicates coordination inefficiencies, uneven recovery outcomes, and policy goals that
    don't fit local realities. The review reveals that social and environmental variables affect long-term rehabilitation
    beyond physical recovery. Psychosocial rehabilitation, community cohesion, and livelihood stability take longer than infrastructure
    restoration and are seldom planned. Landslides and debris flows influenced recovery over time in dynamic hazard settings.
    To remedy such shortcomings, a governance-mediated post-disaster recovery paradigm, defined by enabling conditions and
    structural constraints, is proposed. The approach links policy tools to cross-domain recovery processes and emphasizes
    adaptive learning and long-term resilience to increase understanding. Future catastrophe recovery methods must combine
    rapid rebuilding with high-quality coordination, social inclusion, environmental risk management, and system resilience,
    as shown by the Wenchuan experience.
