- id: d8009d80fe0c
  title: Il Corsaro Nero sull’altra sponda dell’Adriatico. La presenza di Emilio Salgari nel contesto editoriale croato
  year: 2026
  venue: SPONDE
  authors:
  - Enrico Davanzo
  abstract: L’articolo analizza la presenza dei romanzi d’avventura dello scrittore Emilio Salgari (1862-1911) nel contesto
    editoriale croato ed ex jugoslavo fra il XX e il XXI secolo. Tenendo conto degli studi più recenti dedicati alla produzione
    letteraria salgariana, il testo cerca di ricostruire in quale modo l’opera dello scrittore si sia inserita nel graduale
    sviluppo di determinati settori editoriali dedicati all’infanzia e alla letteratura d’evasione in Croazia e nella più
    estesa area regionale, grazie all’impegno di figure localmente rilevanti come l’editore Nikola Andrić (1867-1942) e il
    traduttore Ivo Hergešić (1904-1977). Le conclusioni raggiunte, ponendo la diffusione dell’opera salgariana in relazione
    alle diverse fasi della storia croata recente, suggeriscono lo sviluppo di un percorso editoriale parzialmente simile
    a quello definitosi in Italia, culminato nella definizione dell’autore come un “classico” e nella riscoperta di alcuni
    suoi lavori meno noti.
