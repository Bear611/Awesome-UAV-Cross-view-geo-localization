- id: b68250957918
  title: 'Locke: Hume'
  year: 2026
  venue: ''
  authors:
  - Monsignor Walshe
  abstract: 'John Locke was born in Somersetshire in the year 1632. He came of a Puritan stock. For the first fourteen years
    of his life his studies were made at home, after which he spent six years (1646–1652) at Westminster school under Dr Busby.
    Though John Dryden was a contemporary at Westminster, there is no allusion to him in the writings which have survived.
    In the year 1652 Locke entered at Christ Church, Oxford, and began an association with the University which lasted for
    well-nigh thirty years. The philosophy then in vogue at Oxford was still peripatetic in character. The influence of Cartesian
    views had not as yet any noticeable effect. Regarding his political doctrine, Locke, though a Puritan, had little sympathy
    with religious intolerance. Two exceptions, however, he made—he was opposed to Atheists, believing that their tenets had
    a pernicious effect on morals, and he disapproved of Catholics who in his opinion were subjected to the teaching of a
    foreign potentate. In the year 1659 he was elected to a senior studentship, and lectured on Greek and Rhetoric. At this
    period his intention was to take a medical degree, and with a view to qualification he began in the year 1663 to study
    Chemistry. But though his studies in Medicine were continued for some time, he finally abandoned the idea of a medical
    career, and accepted for some months (1665–1666) the position of secretary to Sir Walter Vane who was ambassador at Cleve.
    This position brought him under the notice of Lord Ashley, with whom he was associated in warm friendship for many years.
    In the Epistle to the Reader prefixed to the Essay Locke records an interesting fact—a discussion held with five or six
    friends in the winter of 1670–1671. The subject of discussion is not mentioned, but the difficulties that arose suggested
    to Locke the advisability of finding out first of all “the powers of the understanding, the extent to which they reach,
    and the points in which they fail.” 1 For seventeen years he meditated on this subject, and the result was the Essay concerning
    the Human Understanding . Already he had given indications of his preference for the inductive method. A fragment 1 has
    the following: “When man could not discover (by experience) the principles, causes and methods of Nature’s workmanship,
    he would needs fashion all those out of his own thought, and make a world to himself, framed and governed by his own (narrow)
    intelligence.” On the subject of Morals, his sympathies were utilitarian. Health, reputation, knowledge, benevolence,
    eternal happiness in another life—these were “the five great and constant pleasures.” No doubt the teaching of Lord Bacon,
    Descartes, and the Port Royal Logic had their due influence in determining the philosophical bent of Locke’s mind.'
