- id: 41f51b13b1a9
  title: 'Assessing the Capabilities of UAV-Based Observation for Marginalized Communities: A Case Study of Roma Settlements
    in Slovakia'
  year: 2026
  venue: Remote Sensing
  authors:
  - Farzaneh Dadrass Javan
  - Lukáš Ihnacik
  - Peter Blišťan
  - MohammadReza Homaei
  - Ingrid Papajova
  - Carmen Anthonj
  abstract: This study assesses the capabilities of UAV-based Earth observation for analyzing marginalized communities, using
    Roma settlements in southeastern Slovakia as a case study. Marginalized populations are often underrepresented in official
    spatial datasets, resulting in a limited understanding of their living conditions, infrastructure needs, and environmental
    risks. To address this gap, we propose a multi-scalar, UAV-based observational approach that bridges the limitations of
    coarse satellite imagery and logistically constrained ground surveys. High-resolution RGB and thermal imagery were acquired
    across three settlements with varying spatial characteristics and processed using photogrammetric workflows to generate
    detailed orthophotos and spatial products. The results demonstrate that UAV data with centimeter-level spatial resolution
    enable precise mapping of settlement morphology, infrastructure, waste distribution, and thermal inequalities. Furthermore,
    UAV observations enable change detection and environmental risk assessment at scales that are not achievable with conventional
    remote sensing. However, the study also highlights critical operational and ethical challenges, including regulatory constraints,
    privacy concerns, and the need for community engagement. By integrating technical evaluation with socially sensitive research
    practices, this work proposes a methodological framework for responsible UAV deployment in marginalized contexts. The
    findings underscore the potential of UAV-based observation to improve spatial visibility and support evidence-based planning
    while emphasizing the importance of ethical implementation.
