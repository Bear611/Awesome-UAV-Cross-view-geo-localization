- id: ade70cb20b09
  title: 'StarCodex: Dynamic Coding Harness for Starlink Measurement Analysis and Experiment Automation'
  year: 2026
  venue: arXiv
  authors:
  - Pengcheng Luo
  - Zhiming Shao
  - Bowen Zhang
  - Genke Yang
  - Jian Chu
  abstract: Starlink and other low Earth orbit (LEO) satellite broadband systems are producing increasingly diverse measurement
    data across regions, time periods, and access conditions. These measurements are valuable for throughput prediction, adaptive
    bitrate (ABR) evaluation, and network experimentation, but converting continuously arriving data into reusable experimental
    evidence still relies heavily on manually developed analysis code and expert-guided data inspection and failure-case organization.
    This paper proposes StarCodex, a dynamic coding harness for Starlink measurement analysis and experiment automation. StarCodex
    detects analysis gaps from the current measurement state, converts them into structured coding tasks, uses Codex to generate
    or repair executable analysis artifacts, and accepts artifacts through code, data-interface, measurement-semantics, and
    output validation. Experiments on real Starlink measurements show that StarCodex discovers 49 of 56 uncovered system-risk
    cases, attains higher average precision than the strongest predefined analysis baseline, and constructs a benchmark with
    denser and broader system-risk evidence. The generated prediction and replay artifacts further reveal prediction risks
    and quality-of-experience (QoE)--risk differences among ABR controllers. These results demonstrate the feasibility of
    using a dynamic coding harness to convert evolving Starlink measurements into validated analysis artifacts for automated
    experiment workflows.
