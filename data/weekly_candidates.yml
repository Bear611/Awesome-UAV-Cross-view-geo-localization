- id: 4c8a93c727ac
  title: Assessment of AI Impact on Energy Utilization in Robotics
  year: 2026
  venue: Energies
  authors:
  - Valery Vodovozov
  - Zoja Raud
  abstract: This review presents an up-to-date summary of AI impacts on energy utilization in a broad spectrum of modern robotic
    platforms, solutions in the scope of AI employment in different robotics areas, and the crucial role AI plays in energy
    requirements of robotic stations. Notably, among the multitude of references devoted to robotics, energy, and AI technologies,
    most of the “early AI” approaches are either excluded from examination or serve as auxiliary components of the full-fledged
    AI robotic systems. Instead, this research reveals solutions for stationary and mobile robotics, the competent application
    of which can make the greatest impact on energy savings. The work reveals two interconnected directions contributing to
    reducing losses and improving energy recovery. The first one concerns platforms for AI-assistive process-level design
    and programming of robotic cells. The second way covers so-called AI robots, whose behavior is not only fully controlled
    by AI but also results in an obvious energy-saving effect. Thus, the study demonstrates how AI can provide robot management,
    thereby unlocking their potential to decline energy consumption in industry, agriculture, transport, household and other
    areas of vital activity.
