- id: 1ddb7fbcbc0a
  title: Millimetre-scale spectrographs for next-generation photonic instrumentation
  year: 2026
  venue: arXiv
  authors:
  - Emily Ronson
  - Robert J. Harris
  - Ariadna Calcines Rosario
  - Viktoria Kutnohorsky
  abstract: We present a set of ultra-compact spectrographs fabricated using two-photon polymerisation, each under 1 mm in
    length and printed directly onto an optical fiber. This fully integrated, alignment-free architecture enables extremely
    low-mass instrumentation with broad potential across astrophotonics, space systems, drone-based sensing, and quantum optics.
    Two transmissive configurations are presented; they combine beam-expansion optics, dispersive elements, and stray-light
    suppression within monolithic printed structures optimised for J- and H-band operation. Coarse gratings provide resolving
    powers of approximately R = 30. Experimental characterisation confirms the feasibility of fiber-coupled, fully printed
    spectrographs and demonstrates their promise as deployable components for next-generation integrated photonic instrumentation.
