- id: df8c7e9f844e
  title: 'SwarmFly: A simulation platform for UAV swarm experiment design and validation'
  year: 2026
  venue: arXiv
  authors:
  - Abhishek Phadke
  - Karthik Kumar Vasudeva
  - Abhishek Joshi
  abstract: The initial development phase of UAV swarms largely depends on simulation for experimental design and validation,
    yet existing open-source tools are often unmaintained, have steep learning curves, or are built around a single fixed
    scenario. The need for a comprehensive, modular simulation platform is a recognized research gap. This paper presents
    SwarmFly, a MATLAB-based simulation and test platform for multi- UAV swarms that addresses these gaps. SwarmFly combines
    a real-time operational map, four swarm coordination modes (leader-follower, decentralized, heterogeneous relay, and heterogeneous
    speed), simulated IMU telemetry, and IP-based geolocation with a plugin architecture that lets researchers add behaviors,
    fault models, and analysis tools without touching the core code. Eight bundled plugins extend the base simulator into
    a full test harness. The SwarmFly platform exposes multi-agent aerial swarms to a wide range of internal and external
    disruptions, enabling observation and quantification of underlying swarm control and behavioral mechanisms. This study
    verifies and characterizes each subsystem through eight experiments that measure formation accuracy, wind tolerance, fault
    recovery, energy endurance, and airspace compliance. The platform runs entirely in MATLAB. Its modular design supports
    straightforward extension toward hardware-in-the-loop testing, larger swarms, and higher-fidelity dynamics. An open-source
    release is available at [https://github.com/abhishekphadke/SwarmFly.git]
