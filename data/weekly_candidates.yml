- id: 6ffcec057ba1
  title: Classification of Ecosystem-based Disaster Risk Reduction (Eco-DRR) in Bangladesh
  year: 2026
  venue: Progress in Disaster Science
  authors:
  - Shakila Kayum
  - Yukihiro SHIMATANI
  - Tomoko MINAGAWA
  abstract: 'Ecosystem-based Disaster Risk Reduction (Eco-DRR) is a new concept and yet to have a well-established classification
    system. While widely applied in developed countries, there is a pressing need to introduce and implement Eco-DRR in disaster-prone
    developing nations like Bangladesh. This approach could enhance the resilience while preserving environmental health of
    the country. The primary objective of this study is to classify existing Eco-DRR elements in Bangladesh based on their
    natural characteristics, geographical context, and disaster mitigation functions. The study results showed that the Eco-DRR
    of Bangladesh can be classified into four major groups: Coastal or Marine Eco-DRR, Inland Freshwater Eco-DRR, Terrestrial
    Forest Eco-DRR, and Manmade or Agri-based Eco-DRR for miscellaneous functions. This study proposes a reproducible methodological
    framework for the spatial classification of Eco-DRR elements, tailored to the deltaic context of Bangladesh. The emphasis
    of this research is to move beyond conceptual reviews by providing a spatially-explicit, functional classification that
    can be operationalized for disaster management. This study will help future research works on the Eco-DRR sector in Bangladesh
    and its neighboring countries.'
