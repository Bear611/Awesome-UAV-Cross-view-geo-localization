- id: d74a3c282a61
  title: 14. New Attributions to Wedgwood
  year: 2026
  venue: Open Book Publishers
  authors:
  - Alison Stone
  abstract: 'Many Wedgwood essays discussed here are attributed to her for the first time. This chapter provides my grounds
    for these attributions, which are archival, textual, and digital, forming a cumulative case. Evidence from archival records
    and correspondence is decisive when it is available. When it is not, my grounds for attribution come from the following
    sources: her use of initials; duplication of sentences and substantial philosophical claims across already-known and newly-attributed
    essays, informed by contextual knowledge about her publication activity; characteristic words and phrases identified using
    digital concordance software; and digital stylometry, which presents a clear clustering of essays we can attribute to
    Wedgwood. I then note some further uses of digital stylometry, list all my new attributions, and provide textual analyses
    and stylometric dendrograms regarding further attributions not already discussed.'
