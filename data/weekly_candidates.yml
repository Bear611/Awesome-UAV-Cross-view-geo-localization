- id: 0df4fb635917
  title: '"CVOGL-MO"'
  year: 2026
  venue: IEEE DataPort
  authors:
  - Lingyun Xing
  abstract: '"Cross-view object geo-localization (CVOGL) aims to locate a certain object on the satellite image. This object
    is specified by a click point. There are two types of query images: ground images and drone images. Although the existing
    methods have solved some problems, they still suffer from a prompt-disobeying overfitting problem. Specifically, when
    the click point moves, the predicted box fails to respond accordingly, indicating that the model relies on spurious feature
    correlations rather than genuinely understanding the prompt semantics. In this paper, we propose two plug-and-play components
    to address this issue. First, we construct the CVOGL-MO dataset by expanding the existing CVOGL training and test sets
    with diverse multi-object annotations, mitigating the annotation bias that causes shortcut learning. Second, we propose
    the Cross-View Co-Scene Multi-Object Contrastive Loss (CVMCL), which enforces distinct feature representations for different
    click points within the same scene, effectively compelling the model to follow prompt instructions. Both components are
    architecture-agnostic and can be seamlessly integrated into the existing CVOGL methods without any architectural modification.
    Extensive experiments on the CVOGL benchmarks demonstrate that both components consistently improve the performance of
    existing CVOGL methods and achieve substantial gains on the new test set, advancing prompt-consistent cross-view object
    geo-localization.Our dataset is mainly expanded on the basis of the original CVOGL dataset. Each image is annotated with
    additional objects on top of the original ones. The image remains the original one. We only upload our own annotations."'
