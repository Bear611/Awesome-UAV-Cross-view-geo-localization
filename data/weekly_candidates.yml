- id: 643d6d266f41
  title: An Open Source Framework for Routing and Event Management in University Campuses
  year: 2026
  venue: ISPRS annals of the photogrammetry, remote sensing and spatial information sciences
  authors:
  - Gökdemir Çardak
  - İbrahim Topcu
  - Berk Anbaroğlu
  abstract: 'Abstract. The ever-evolving nature of university campuses presents unique challenges for web-based routing and
    event coordination, as physical layouts frequently change due to ongoing construction and development. To address these
    dynamic spatial and logistical needs, this paper designs and develops an open-source, web-based framework for routing
    and event management. The framework implements routing functionalities based on OpenStreetMap using Open Source Routing
    Machine (OSRM). The framework supports three distinct user groups: (i) guests, (ii) registered students and staff, and
    (iii) supervisors. To assess OSRM''s reliability in a campus setting, we compared its route distances with those obtained
    from the legacy geospatial database. For pedestrian and bicycle modes, strong correlations of 90% and 89% were found across
    thousands of routes connecting 78 campus units, confirming OSRM as a reliable routing solution. A key strength of the
    framework lies in its modular, open-source architecture, which makes it easily adaptable and replicable across other campus
    settings with minimal customization. The replicability workshop demonstrated that six out of seven participants coming
    from different backgrounds have successfully launched the application on their own computers. The framework is referred
    to as ROAMer, intended to stand for Replicable OSRM Application for Campus Routing and Event Reporting.Project’s GitHub
    Repo: https://github.com/ROAMer-Geo/Web'
