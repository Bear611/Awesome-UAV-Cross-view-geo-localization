- id: 4b4185fc3e5d
  title: 'Infrared spectroscopy of gas-phase hydrogenated and methylated pyrenes: from laboratory spectra to the simulated
    3.4 $μ$m emission band'
  year: 2026
  venue: arXiv
  authors:
  - Karine Demyk
  - Christine Joblin
  - Louan de Bentzmann
  - Dominique Toublanc
  - Giacomo Mulas
  abstract: Observations of the aromatic infrared emission band at 3.3 $μ$m often reveal satellite emission features in the
    3.4 - 3.6 $μ$m range. While the 3.3 $μ$m band is attributed to the CH stretching vibration of polycylic aromatic hydrocarbons
    (PAHs), the satellite bands - particularly its prominent 3.4 $μ$m component - is assigned to aliphatic CH stretching vibrations
    in hydrogenated and methylated PAH-like species. Our aim is to derive state-of-the-art infrared emission spectra for aliphatic-containing
    pyrene derivatives and compare them with astronomical observations. This will help refine our understanding of the contribution
    of these species to the 3.4 $μ$m emission band. Mid-infrared spectra (1.4-25 $μ$m) of gas-phase dihydropyrene, tehtrahydropyrene,
    hexahydropyrene methylated pyrene, and pyrene were recorded at temperatures ranging from 373 to 673 K, depending on the
    species. The band profiles were analyzed using a multi-component fitting tool, and empirical anharmonicity laws were derived
    to quantify the evolution of the band positions and widths with temperature. The obtained spectral data was combined with
    the results of a Monte Carlo emission model to simulate the emission spectra following UV-photon absorption, up to the
    dissociation limit ($\lesssim$6 eV). The resulting synthetic spectra were compared with James Webb Space Telescope observations
    of the Orion Bar region (PDRs4All program). Based on these state-of-the-art simulated spectra, we propose 1,2,3,6,7,8-hexahydropyrene
    as the carrier of the red component of the 3.4 $μ$m band observed at 3.403 $μ$m. While 1-methylpyrene may also contribute
    to the underlying emission plateau, its lack of a strong infrared band complicates detection in observed spectra, unlike
    hexahydropyrene. All experimental spectra and their temperature-dependent analyses are available in the new cosmicPAH-IRDB
    database.
