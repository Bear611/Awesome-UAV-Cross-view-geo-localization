- id: f6e7621eed5e
  title: 'From Plausible to Actionable: A Position on LLM Self-Explanations'
  year: 2026
  venue: arXiv
  authors:
  - Elize Herrewijnen
  - Benedetta Muscato
  - Gizem Gezici
  - Fosca Giannotti
  abstract: Large Language Models (LLMs) can generate natural language explanations that rationalize their own decisions,
    a phenomenon commonly referred to as self-explanations.Such explanations have emerged as a promising direction for explainable
    artificial intelligence (XAI), particularly for interpreting LLM behavior.However, while self-explanations often appear
    plausible, whether they faithfully reflect a model's underlying reasoning process remains an open question. In this opinion
    paper, we argue that self-explanations can be highly plausible, questionably faithful, and yet highly actionable. From
    a traditional XAI perspective, we identify the limitations of standard evaluation protocols for LLM-generated self-explanations
    and propose practical guidelines for assessing their plausibility and faithfulness. Moreover, we argue that evaluation
    should extend beyond these criteria to actionability, highlighting applications of LLM rationalization capabilities that
    support informed decision-making and appropriate action across diverse stakeholders.
