- id: c6c0e806e5df
  title: 'AERONAUTICAL DRONES, PART 1: CURRENT STATUS AND TRENDS'
  year: 2026
  venue: SCIENTIFIC RESEARCH AND EDUCATION IN THE AIR FORCE
  authors:
  - Andrei BENCZE
  abstract: Unmanned aerial vehicles (UAVs), commonly referred to as drones, have become an essential component of modern
    aerospace systems due to their fast expansion across civil, commercial and military applications. Advances in lightweight
    materials, miniaturized electronics, navigation systems and manufacturing technologies have enabled the development of
    increasingly capable platforms ranging from small multirotor drones to high-altitude long- endurance aircrafts. This paper
    reviews the current status of the global drone sector by examining market evolution, industrial development and the principal
    regulatory frameworks governing UAV operations. A technical classification of drone configurations is presented, including
    fixed-wing, rotary-wing, hybrid VTOL and mission-oriented categories, highlighting their operational characteristics and
    engineering trade-offs. Representative civil and military platforms are comparatively analyzed in terms of range, payload,
    endurance, cost and mission capability in order to illustrate current technological trends. Attention is also given to
    structural materials and manufacturing technologies employed in modern UAV design (composite materials, lightweight alloys,
    additive manufacturing and modular construction concepts). The analysis shows that progress in materials engineering and
    airframe design, together with the diversification of operational requirements, is driving the development of increasingly
    efficient, specialized and adaptable unmanned aircraft. These trends confirm the importance of UAV technologies within
    the evolving aerospace industry.
