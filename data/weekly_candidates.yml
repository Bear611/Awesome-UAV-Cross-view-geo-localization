- id: 60bd39791ed8
  title: Modulation of Donepezil Release Through Hydrophobic Ion- Pairing with Oleic Acid in Liquid Crystalline Nanodispersions
    for Transdermal Delivery
  year: 2026
  venue: ACS Omega
  authors:
  - Priscila Pires da Silva
  - Vinicius Candian Marques
  - Lorena Kelly Santiago Ramos
  - José Dias de Souza Filho
  - Renato Ferreira de Freitas
  - Marina Guimarães Carvalho Machado
  - Marcus V. C. Cardoso
  - Flávia de Souza Marques
  - Paula Melo de Abreu Vieira
  - Leonardo da Silva Araujo
  - Jaqueline S. Soares
  - Jacqueline de Souza
  - André Luís Morais Ruela
  abstract: High Resolution Image Download MS PowerPoint Slide Precursor liquid crystals based on unsaturated monoglycerides,
    with or without oleic acid (OA), exhibited anisotropy characteristic of an inverse hexagonal phase. Donepezil-loaded liquid
    crystalline nanodispersions (LCNs) were produced by sonication and exhibited encapsulation efficiencies of 91.3–97.9%,
    with the OA-containing formulation (LCN-2) displaying a smaller particle size (183.0 ± 1.5 nm), lower polydispersity (0.183
    ± 0.006), and improved colloidal stability over 90 days. NMR ( 1 H NMR, 1D NOESY/ROESY and DOSY), molecular docking, and
    molecular dynamics simulations consistently demonstrated hydrophobic ion-pair formation between donepezil and oleic acid.
    These molecular interactions reduced drug mobility within the lipid domains, resulting in anomalous release behavior (
    n = 0.79), more sustained in vitro release, and an approximately 45% higher steady-state skin flux than the control donepezil
    solution. Overall, hydrophobic ion-pair formation with oleic acid represents an effective strategy to modulate drug release
    and enhance the transdermal performance of liquid crystalline nanodispersions for donepezil delivery.
