- id: 02f04d9f0fde
  title: 'Beyond Unfolding: 60x Faster One-Stage Unmixing for Closely-Spaced Infrared Small Targets'
  year: 2026
  venue: arXiv
  authors:
  - Ximeng Zhai
  - Zheng Wang
  - Yaohong Chen
  - Hao Wang
  - Ming-Ming Cheng
  - Yimian Dai
  abstract: Due to the optical diffraction limit and long imaging distances, Closely-Spaced Infrared Small Targets (CSIST)
    typically exhibit energy overlap, manifesting as indistinguishable blobs in infrared images. This ambiguity invalidates
    the one-to-one mapping assumption of traditional detection, thereby necessitating a paradigm shift towards CSIST Unmixing,
    which decomposes these blobs into discrete sub-targets. However, the dominant paradigm deep unfolding networks are shackled
    by the high latency and structural inflexibility intrinsic to their repetitively iterative architecture. To this end,
    we propose the Fast One-stage CSIST Unmixing Scheme (FOCUS), a one-stage lightweight paradigm which demonstrates that
    deep unfolding is not necessary. Motivated by the key observation that image super-resolution (SR) and CSIST Unmixing
    share an isomorphic degradation model, our insight is that it is possible to achieve a paradigm shift from image SR to
    CSIST Unmixing via completely transforming the label space, loss functions, and evaluation criteria. Specifically, to
    avoid entangling geometric recovery with artifact suppression, FOCUS adopts a single pass mapping with an internal coarse-to-fine
    flow that progressively refines target localization from coarse spatial distributions to finer sub-pixel precision. While
    sparsity regularization suppresses background clutter, it also attenuates target intensities. To compensate for this attenuation
    of valid signals, flux conservation is introduced as a competing constraint that restores signal energy back to target
    centers. To the best of our knowledge, this work is the first attempt to address this task via a lightweight one-stage
    framework without the DUN paradigm. Experiments demonstrate that our method matches or surpasses the state-of-the-art
    unfolding approaches in both localization and unmixing accuracy, while boosting the inference speed by 60x.
