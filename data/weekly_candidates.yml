- id: cd11a8cc546d
  title: 'Biohydrogen production from agricultural waste by dark fermentation: Current status and perspectives'
  year: 2026
  venue: Energy Nexus
  authors:
  - V. Benítez
  - Alexander García‐Mariaca
  - Uriel Fernando Carreño Sayago
  abstract: ABSTRACT The high energy demand of green H₂ production technologies continues to constrain their economic competitiveness,
    highlighting the need to diversify production pathways and develop low-energy alternatives. In this context, dark fermentation
    (DF) has emerged as a promising biological route, owing to its low energy intensity and its ability to utilise a wide
    variety of organic residues as substrates. To advance understanding and support the development of DF, this review critically
    analyses recent research progress reported over the past five years. The review shows that strict anaerobic microorganisms
    achieve higher H₂ yields. Furthermore, co-digestion strategies and substrate pretreatment methods are identified as effective
    approaches to enhance substrate biodegradability and ensure stable fermentation performance. The literature reports that
    optimal H₂ production occurs at pH values near 5.5 and at low H₂ partial pressure. Overall, DF demonstrates strong potential
    as a low-energy alternative for H₂ production, with energy requirements ranging from 1.8 to 2.5 kWh/kgH₂, approximately
    one order of magnitude lower than those of conventional electrolysis. Nevertheless, large-scale implementation remains
    limited by unresolved technical and economic challenges. This review provides a comprehensive synthesis of current knowledge
    and offers guidance for future developments to improve the technical and environmental competitiveness of DF-based H₂
    production.
