- id: 0228d0c0f367
  title: 3D Reconstruction of deciduous Trees using low-cost UAV- and Crane-based Photogrammetry for Monitoring Shoot Elongation
    across entire Canopies
  year: 2026
  venue: arXiv (Cornell University)
  authors:
  - Stephan Nebiker
  - Micha Tschanz
  - Nando Amport
  - Frederik Baumgarten
  abstract: Tree growth determines how much CO2 is sequestered from the atmosphere and temporarily stored in woody biomass.
    At the same time tree growth is affected by increasing temperatures, more frequent drought periods, late frosts and other
    extreme events associated with climate change. While continuous measurements of radial (secondary) tree growth using dendrometers
    are well established, monitoring of shoot elongation (primary growth) has largely been neglected because suitable measurement
    techniques are lacking. As a result, the effects of climate change on primary tree growth remain insufficiently understood.
    This work aims at reconstructing native deciduous trees in 3D as a basis for measuring and monitoring shoot elongation
    over entire tree canopies. Here we explored the use of low-cost UAV photogrammetry and of a multi-camera CraneCam system
    under real-world conditions. Data were collected in two study areas over an entire growing season. We present sensor evaluations,
    photogrammetric data acquisition and processing strategies. A special focus is placed on the analysis of the resulting
    photogrammetric 3D point clouds in terms of accuracy, resolution and completeness. Results demonstrate 3D point accuracies
    of 5-6 mm for entire trees using consumer-grade UAVs weighing less than 250 g and a 3D reconstruction completeness between
    92% and 98% depending on the UAV type. The paper introduces a novel 3Dprinted ground-truth branch to evaluate the capability
    to reconstructing fine-detail structures such as thin tree shoots. Finally, we discuss operational challenges and initial
    experiments towards a skeletonization of entire trees based on photogrammetric point clouds.
