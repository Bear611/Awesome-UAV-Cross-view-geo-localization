  summary:
    summary_en: 'STEAM addresses the problem of unsupervised cross-view geo-localization (UCVGL), where drone-view images
      must be matched to satellite-view images without manually annotated cross-view pairs. Existing UCVGL approaches based
      on generative fake-image warm-up or clustering-based stage-wise optimization suffer from distribution bias and the accumulation
      of noisy pseudo-labels. STEAM proposes an end-to-end self-training framework that operates directly on real drone and
      satellite imagery. Its core design comprises three complementary components: (1) a Stable Spatial-Aware Module (SSA)
      that uses nonlinear multi-head spatial attention built on a ConvNeXt-Base backbone with shared drone/satellite weights
      to stabilize feature representations under noisy supervision; (2) Elastic Matching (ElMa), which combines Bidirectional
      Top-K Soft Matching with cosine-decay Dynamic Threshold Filtering to discover high-coverage pseudo-labels while controlling
      correctness; and (3) Adaptive Purification (AdPu), which maintains a reliable pseudo-label repository through Confidence-aware
      Update, Age-aware Update, and Expired Label Removal, iteratively optimized with symmetric InfoNCE loss. Experiments
      on the University-1652 and SUES-200 benchmarks show that STEAM achieves state-of-the-art performance among unsupervised
      methods and reaches accuracy comparable to supervised approaches. Ablation studies further confirm that SSA, ElMa, and
      AdPu are individually necessary, with each step progressively raising pseudo-label accuracy and retrieval recall.'
    main_category: retrieval
    category_confirmed: true
    classification_reason: The paper formulates UCVGL as an image retrieval problem (matching drone queries against a satellite
      gallery, and vice versa), evaluates it with Recall@1 and Average Precision, and frames technical contributions around
      learning discriminative cross-view embeddings — all of which align with the repository's retrieval category.
