- id: d4ea6f26ab5b
  title: Foraging mode and social behavior of Arctic charr, Salvelinus alpinus, in lava cave ponds in the Lake Mývatn area,
    NE-Iceland
  year: 2026
  venue: Aquatic Ecology
  authors:
  - Stefán Ó. Steingrímsson
  - Mark R. Roper
  - Camille A. Leblanc
  - Gabrielle Ladurée
  - Bjarni K. Kristjánsson
  abstract: Abstract Individual variation in foraging and social behavior provides insights into how animals exploit and share
    local resources and habitats. In this study, we examined the foraging mode and social behavior for 55 Arctic charr (fork
    length = 5–17 cm) during summer in four freshwater lava cave ponds in the subarctic Lake Mývatn area in NE-Iceland. As
    expected for lentic waters, cave-living Arctic charr were highly mobile when searching for prey (mean proportion of mobile
    search = 0.748; SD = 0.251). Foraging attempts were mostly directed towards the water surface (mean proportion = 0.730;
    SD = 0.358), and rarely toward prey on the bottom (mean = 0.164; SD = 0.291) and in the water column (mean = 0.106; SD
    = 0.225). Although most fish foraged primarily on surface prey, with small subsidies from the other two locations, some
    individual fish fed almost exclusively on either benthos or prey in the water column. Aggression among fish suggests that
    size-related dominance hierarchies occur within the lava caves. Specifically, larger fish typically chased other fish
    more often than smaller fish did, whereas smaller fish were more likely to be chased. These findings add to our understanding
    of behaviors that may contribute to the survival and local adaptation of these unique populations of cave-living Arctic
    charr in North Iceland. The study also gives insights into the variable natural history of aquatic cave animals and expands
    the limited knowledge that exists on foraging mode and social behavior in salmonids in lentic waters.
