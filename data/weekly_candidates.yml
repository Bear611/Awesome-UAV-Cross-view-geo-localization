  summary:
    summary_en: This work addresses cross-view geo-localization from sequential observations, extending prior video-query
      formulations to also support natural-language route descriptions. The core problem is matching ground-level sequential
      queries (video clips or route narratives) to geo-tagged satellite imagery, where the same trajectory can be described
      either visually or linguistically. To support this, the authors introduce SeqGeo-VL, a new benchmark of 38,863 video–text–satellite
      triplets built on the SeqGeo dataset via a VLM/LLM annotation pipeline with quality control. The proposed TrajLoc framework
      unifies the two query modalities through three CLIP-initialized encoders for video, text, and satellite images, trained
      with a two-stage curriculum learning strategy that first aligns video and satellite features, then aligns text while
      regularizing the shared satellite encoder. A lightweight Trajectory-conditioned Modulation (TrajMod) module injects
      trajectory geometry (waypoint headings and origin–destination bearing) as FiLM-style scale/shift parameters into the
      query embeddings, producing spatially grounded representations. On SeqGeo-VL, TrajLoc achieves R@1 of 12.09% for video-to-satellite
      retrieval and 2.52% for text-to-satellite retrieval, surpassing prior video methods and the CrossText2Loc text baseline.
