- id: cb516059dbee
  title: 'Geometric Distillation from Rectified Stereo: Leveraging Epipolar Cues for Monocular Depth'
  year: 2026
  venue: arXiv
  authors:
  - Jung-Hee Kim
  - Xiaoming Liu
  abstract: Monocular depth foundation models have demonstrated remarkable generalization capabilities across diverse environments.
    However, they continue to struggle with metric depth estimation in diverse environments. This limitation stems from the
    inherent scale ambiguity of single-view inference, leading to misaligned scale predictions even when the relative geometry
    is accurate. Conversely, recent multi-view foundation models leverage cross-view cues to learn robust scene-level geometry
    and consistent scale. Yet, these benefits typically vanish during single-image inference, as the absence of explicit geometric
    constraints causes performance to degrade. To bridge this gap, we propose a novel framework that transfers the scale-aware
    geometric priors of multi-view models into monocular depth foundation models. Specifically, we introduce an Epipolar Distillation
    (EpiDistill), an approach utilizing Rectified Stereo Tokens, which enables the single-view prediction model to retain
    epipolar attention patterns and maintain geometric consistency without requiring multi-view inputs at inference. Experimental
    results demonstrate that our method significantly improves zero-shot metric depth estimation, particularly on challenging
    datasets like ETH3D and DIODE where scale alignment is critical. Furthermore, our approach is model-agnostic, consistently
    boosting the performance of state-of-the-art ViT-based models, including UniDepthV2 and DepthPro.
