- id: 18a160e29067
  title: Cooperative Navigation for Cross-Platform Dual-SINS Based on Relative Range and Angle Measurements
  year: 2026
  venue: Sensors
  authors:
  - Jiang Lai
  - Shiqiao Qin
  - Xiangyuan Li
  - Jiaxing Zheng
  - Wenfeng Tan
  - Yingwei Zhao
  abstract: In order to address the issue of rapidly divergent positioning errors of a single-platform inertial navigation
    system (INS) in GNSS-denied environments, this paper proposes a cross-platform cooperative navigation method based on
    relative range and angle measurements. The observability of the cooperative navigation system under different motion strategies
    is investigated using Fisher information matrix (FIM) right null-space analysis combined with singular value decomposition
    (SVD). The results show that with relative range and angle measurement constraints, all inertial sensor biases can be
    effectively estimated by two strapdown inertial navigation systems (SINSs) moving along a simple trajectory, thereby improving
    the navigation accuracy. Experimental results demonstrate that compared to the autonomous navigation mode, the average
    positioning accuracy of the two SINSs improves by 77.4% and 68.4% respectively after 3 h of cooperative navigation along
    the prescribed trajectory. Using relative range and angle measurements, the proposed method requires only two SINSs and
    relatively simple planar motion, without the need for high-precision reference benchmarks, complex three-dimensional excitation
    trajectories, or turntable modulation. It reduces system complexity and motion requirements, providing an effective and
    easy-to-implement solution for ground vehicular positioning and orientation and other cross-platform cooperative navigation
    tasks in GNSS-denied environments.
