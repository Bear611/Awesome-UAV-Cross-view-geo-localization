- id: d42baab76476
  title: 'Tighter Dark Matter Constraints from the Projected Mass Method: A Neural Network Enhanced Method for Galaxy Groups
    and Clusters'
  year: 2026
  venue: arXiv
  authors:
  - Yinbo Huang
  - David Benisty
  abstract: Measuring the total mass of the Milky Way and nearby galaxy groups is difficult because classical dynamical estimators
    rely on assumptions about satellite orbital geometry that are rarely satisfied in practice, and because only a handful
    of satellite galaxies are typically available as kinematic tracers. We present a new framework that corrects the well-known
    Projected Mass Estimator (PME) using a residual neural network trained on thousands of simulated galaxy groups from the
    IllustrisTNG cosmological simulation. Separate networks are trained for each satellite sample size, from as few as 5 satellites
    up to 50, so that the correction automatically accounts for the statistical noise that dominates when only a small number
    of tracers is available. In tests on simulated halos, the classical PME systematically overestimates halo masses by factors
    of $M_{\rm proj}/M_{\rm true} = 1.30^{+0.72}_{-0.62}$ (using the 2D distance) and $1.46^{+0.97}_{-0.72}$ (using the 3D
    distance), with RMSE of 0.29 and 0.32 dex respectively. The neural-network correction reduces this to $M_{\rm proj}/M_{\rm
    true} = 1.02^{+0.30}_{-0.26}$ with an RMSE of 0.13 dex. Applied to the Milky Way, the method yields a total mass of $M_{\rm
    MW} = 1.144^{+0.399}_{-0.296}\times10^{12}\,M_\odot$, with estimates based on the brightest 5-10 satellites favoring a
    somewhat lower range of $(0.8$-$0.95)\times10^{12}\,M_\odot$. The modified PME gives a tighter constraint on the virial
    masses and the dark matter rate prediction in galaxy groups and clusters.
