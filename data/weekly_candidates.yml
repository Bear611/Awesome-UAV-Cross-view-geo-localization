- id: 56a3a389850f
  title: El principio de interés superior del niño, niña o adolescente en el Derecho cubano.  Particularidades de su aplicación
    en el ámbito civil y familiar
  year: 2026
  venue: rechtstexte
  authors:
  - Leonardo B. Pérez Gallardo
  - Raúl J. Vega Cardona
  abstract: 'El principio de interés superior del niño, niña o adolescente, consagrado en el artículo 3.1 de la Convención
    sobre los Derechos del Niño, ha experimentado en Cuba una recepción normativa acelerada y de notable densidad técnica.
    Este trabajo examina el marco jurídico vigente —Constitución de la República de 2019 (artículo 86), Código de procesos
    de 2021, Código de las familias de 2022, Ley del Notariado de 2024 y Código de la niñez, adolescencias y juventudes de
    2025— y analiza las particularidades de la aplicación del principio en los ámbitos civil y familiar, tanto en sede notarial
    como judicial. El estudio parte de la triple dimensión del principio —derecho sustantivo, principio interpretativo y norma
    de procedimiento—, conforme con las Observaciones Generales números 12 y 14 del Comité de los Derechos del Niño, y muestra
    cómo el legislador cubano la ha incorporado plenamente al Derecho interno. En el plano notarial se aborda una singularidad
    del Derecho iberoamericano: el desplazamiento del principio hacia la función pública notarial mediante los controles de
    legalidad y de equidad o no lesividad, el mandato de razonabilidad de las decisiones notariales (artículo 11 del Código
    de las familias), la ponderación para evaluar la pertinencia de la guarda y el cuidado compartidos, la autonomía progresiva
    de las personas menores de edad para comparecer ante notario, la escucha en sede notarial —prevista por vez primera en
    la región— y la intervención preceptiva del fiscal mediante dictamen. En el plano judicial se examina la labor configuradora
    del Consejo de Gobierno del Tribunal Supremo (Instrucciones 187/2007, 216/2012 y 285/2023), con un juicio crítico sobre
    los retrocesos de esta última, y se comentan cinco sentencias de la Sala de lo Civil, de lo Familiar y de lo Administrativo
    dictadas entre 2024 y 2025 sobre privación y suspensión del ejercicio de la responsabilidad parental, conflictos en su
    ejercicio, atribución temporal de la guarda y el cuidado, y determinación de la paternidad. Los autores concluyen que
    Cuba dispone hoy de una sólida arquitectura normativa, pero que el desafío se sitúa en la práctica jurídica: no basta
    con invocar el principio, sino que resulta imprescindible evaluar y determinar su contenido en cada caso concreto y explicitar
    en la motivación el iter que condujo a la convicción, único modo de hacer visible su triple funcionalidad.'
