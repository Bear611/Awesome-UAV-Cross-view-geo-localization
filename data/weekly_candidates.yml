- id: 602912f2b0b3
  title: 'Banshee: Target Switch Attacks on Gimbal-Stabilized Visual Tracking Systems via Acoustic Injection'
  year: 2026
  venue: arXiv
  authors:
  - Jiarui Li
  - Joseph Brewington
  - Qingzhao Zhang
  - Z. Morley Mao
  abstract: 'Gimbal-stabilized visual tracking is critical for modern autonomous systems such as Unmanned Aerial Vehicles
    (UAVs). While prior work shows acoustic signals can disturb gimbal internals, the impact of such attacks on real-world
    applications like UAV tracking and following remains underexplored. Existing demonstrations largely overlook practical
    challenges for real-world attacks, such as object-motion uncertainty and runtime latency. To bridge this gap, we present
    Banshee, the first physically realizable attack that induces target switching in UAV visual tracking systems by exploiting
    acoustic vulnerabilities in gimbal-camera systems. Banshee generates carefully crafted acoustic waveforms that induce
    optimized adversarial gimbal oscillations, causing directionally biased camera-view drifts that break inter-frame target
    associations. Consequently, the onboard tracker is driven to switch from the original target to an attacker-selected object
    with high probability, with occasional target loss. Banshee achieves a 93.6% success rate in simulation across two commercial
    gimbal systems and five trackers. Real-world benchtop and in-flight black-box attacks against a commercial drone across
    varied scenarios show an overall 95.5% attack success rate. Our results reveal a practical cross-domain vulnerability
    between acoustics and vision, highlighting the need for robust designs of gimbal systems and applications. Our code is
    available at: https://github.com/U1ltra/Banshee.'
  publication_date: '2026-07-10'
