- id: 6b0f8eb208b8
  title: 'PiLoT v2: Pixel-to-Orthogonal Map Alignment for Free-view UAV Geo-localization'
  year: 2026
  venue: arXiv
  authors:
  - Xinyi Liu
  - Xiaoya Cheng
  - Rouwan Wu
  - Zhaochen Wang
  - Shen Yan
  - Maojun Zhang
  - Yu Liu
  abstract: Real-time, drift-free UAV geo-localization is essential for autonomous missions in GNSS-denied environments. The
    pioneering system, PiLoT, achieves high precision via Neural Pixel-to-3D Registration, aligning UAV video streams with
    a single rendered reference view from 3D meshes. However, its reliance on heavy 3D meshes incurs massive storage overheads,
    complex map acquisition, and significant computational rendering costs, severely hindering deployment on embedded platforms.
    To address these bottlenecks, we propose PiLoT v2, a lightweight yet robust evolution that shifts the paradigm to direct
    pixel-to-orthogonal map registration for free-view UAV geo-localization. By leveraging True Digital Orthophoto Maps (TDOMs)
    and Digital Surface Models (DSMs) as the reference substrate, PiLoT v2 replaces GPU-intensive 3D rendering with a highly
    efficient, CPU-friendly map cropping operation. To bridge the severe geometric discrepancy between these 2.5D orthogonal
    crops and free-view oblique UAV imagery, we train a cross-view feature registration network using a novel, large-scale
    geometrically annotated dataset. Furthermore, we integrate onboard sensor prior--specifically gravity direction and single-point
    laser rang--directly into the pose optimization manifold to enhance robustness against cross-view visual degradation.
    Experimental results demonstrate that PiLoT v2 achieves performance comparable to, or even exceeding, its Pixel-to-3D
    predecessor, while offering drastically lower storage and computational costs.
