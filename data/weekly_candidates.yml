- id: 86f9db4d1ef8
  title: Slab stagnation sustained by wet harzburgite and dry basaltic slab assemblages
  year: 2026
  venue: Nature Communications
  authors:
  - Danian Shi
  - Yang Shen
  - Rongtao Zhao
  - Jianyu Shi
  - Changxin Chen
  - Xiaoming Xu
  - Yongqian Zhang
  - Yao Xu
  - Hua Xiang
  - Yan Liu
  - Yan Yang
  abstract: '<title>Abstract</title> Slab stagnation in the mantle transition zone is critical for the mantle dynamics and
    evolution of Earth’s interior but remains poorly understood1-4. Here we present seismic images that show two key features
    near Eurasia''s northeastern margin: 1) a 700-km-deep, 400-km-wide discontinuity within the slab stagnation zone, matching
    the akimotoite-bridgmanite transition in an anhydrous basaltic assemblage at adiabatic temperature of ~1000K, and 2) the
    660-km discontinuity depressed below the Clapeyron slope of the post-spinel phase transition by ~15 and ~10 km , likely
    induced by water, respectively in front of the Pacific plate and at the center of the slab stagnation zone. Our mineral
    physics modeling indicates that the slab stagnation is initiated and sustained predominantly by buoyancy from the excess
    depressions in the pyrolite and harzburgite mantle and aided by buoyancy of the dry basaltic assemblage in the uppermost
    lower mantle.'
