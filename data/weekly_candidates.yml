- id: 1cf82f2bcb9a
  title: 'UAV remote sensing for yield prediction in staple crops: a review'
  year: 2026
  venue: Frontiers in Plant Science
  authors:
  - Peihan Zhao
  - Wenteng Li
  - Chao Wang
  - Bin Wang
  - Tao Yang
  - Xinxin Wang
  - Zhen Liu
  - Hongquan Liu
  - Fushun Wang
  abstract: Accurate yield prediction for major grain and oilseed crops, including soybean, corn, wheat, and rice, is essential
    for food-security assessment and precision field management. This study presents a structured integrative review of UAV-based
    crop yield prediction and follows PRISMA-guided procedures for literature search, screening, and evidence synthesis. Seventy
    peer-reviewed studies published between 2018 and 2025 were synthesized within a “Data–Ground Truth–Model–Decision” framework.
    Beyond summarizing UAV platforms, sensor configurations, feature-engineering strategies, and model architectures, the
    review explicitly distinguishes among microplot, field, and regional prediction scales, and evaluates the characteristics
    and limitations of yield-label acquisition methods, including manual harvest, plot-combine harvest, and combine yield-monitor
    data. Existing evidence indicates that the reliability of UAV-based yield prediction depends not only on optimal image
    acquisition windows, multi-source feature fusion, and model architecture, but also on scale-consistent yield labels, spatially
    aware validation strategies, and clearly defined model outputs, such as plot-level scalar yield, field-scale yield maps,
    and regional yield estimates. Major bottlenecks include scale mismatch between UAV imagery and yield labels, error propagation
    during yield-map generation, limited cross-year and cross-region transferability, weak causal interpretability, and difficulties
    in deploying models under complex operational field conditions. Future research should emphasize scale-explicit benchmark
    datasets, quality-controlled ground-truth yield acquisition, UAV–satellite–ground data fusion, spatiotemporal deep learning,
    and edge–cloud collaborative systems that can translate prediction outputs into agronomic decisions. This review provides
    a practical pathway for developing robust, interpretable, and deployable UAV-based yield prediction systems for major
    grain and oilseed crops.
