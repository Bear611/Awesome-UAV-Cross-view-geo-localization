- id: b5d60cf46440
  title: 'LTM: Large-scale Terrain Model for Wildfire-prone Landscapes'
  year: 2026
  venue: arXiv (Cornell University)
  authors:
  - Xiao Fu
  - Yue Hu
  - Meida Chen
  - Peter A. Beerel
  - Barath Raghavan
  abstract: Accurate 3D terrain maps are essential for emergency response when assessing wildfire hazards. However, wildfire-prone
    regions often span vast areas where conventional reconstruction methods underperform. Airborne LiDAR systems provide high-resolution
    terrain data, but they are expensive and infrequently updated. Image-based methods offer a lower-cost alternative, but
    struggle due to sparse visual features and limited image overlap. We propose a multi-modal reconstruction framework leveraging
    outdated Digital Elevation Models (DEMs) as geometric priors for image-based 3D reconstruction. Our key innovation is
    physics-based pixel-pixel alignment between images and DEM data, dramatically reducing computational complexity by eliminating
    expensive feature matching procedures. To validate our approach, we developed a large-terrain simulator based on a real
    wildfire-prone area, generating realistic images enabling a comprehensive evaluation. Given posed images and legacy DEMs,
    our method produces high-fidelity depth maps while maintaining real-time performance. We find significant improvements
    in reconstruction accuracy and computational efficiency over existing techniques, offering a scalable solution for wildfire
    response.
