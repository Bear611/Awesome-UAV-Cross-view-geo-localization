- id: 8a0618cfc7ce
  title: UAV image-derived canopy traits for predicting alfalfa fall dormancy and forage yield in Mediterranean environments
  year: 2026
  venue: Frontiers in Plant Science
  authors:
  - Francisco González
  - Hamza Armghan Noushahi
  - Danae Hernández
  - Miguel Garriga
  - Alejandro del Pozo
  - Macarena Gerding
  - Claudia Muñoz‐Espinoza
  - Salvador A. Gezan
  - Luis Inostroza
  abstract: 'Fall dormancy (FD) and forage yield (FY) are two key traits in alfalfa ( Medicago sativa L.) breeding programs.
    However, genetic progress has remained limited over the past decades, largely due to the complexity of alfalfa breeding
    and the reliance on labor-intensive phenotyping methods. High-throughput phenotyping (HTP) using unmanned aerial vehicles
    (UAVs) represents a promising alternative for rapid and non-destructive crop evaluation. The objectives of this study
    were to i) estimate FD using UAV-derived canopy height and RGB vegetation indices and ii) evaluate the predictive performance
    of machine learning (ML) models for FY estimation. A total of 210 alfalfa populations with diverse genetic backgrounds
    were evaluated over two growing seasons (2023 to 2025) across seven harvests under Mediterranean conditions in central
    Chile. FY was measured manually, while FD was estimated using both manual and UAV-based approaches. A total of 19 RGB-derived
    indices (VIs) including plant height (PH) were extracted and used as predictor variables. Five complex predictive ML models
    were evaluated: PLS, PCR, SVM, ANN, and MLR. The results showed that UAV-derived FD was significantly correlated with
    FD obtained through conventional methods ( R 2 = 0.88). The automated UAV-based FD phenotyping framework demonstrated
    slightly higher precision ( R 2 = 0.92) and broad-sense heritability ( H 2 = 0.69) compared to manual measurements ( R
    2 = 0.87–0.89; H 2 = 0.64), providing a more reliable selection tool for breeders. Among the tested ML models, SVM and
    ANN achieved the highest accuracy ( R 2 ≈ 0.73) for FY prediction. These findings demonstrate that integrating low-cost
    RGB imagery with complex modeling offers a promising avenue that could assist in refining future selection strategies
    for this genetically complex species.'
