- id: 41ae698b0fb2
  title: 'AdvancedMathBench: A Benchmark Suite for Advanced Mathematical Proof Generation and Verification'
  year: 2026
  venue: arXiv
  authors:
  - Lingkai Kong
  - Zijian Wu
  - Yuzhe Gu
  - Haiteng Zhao
  - Wenyong Huang
  - Shuang Sun
  - Zhicheng Xiong
  - Xiaotian Zhang
  - Shuya Zhao
  - Yan Wang
  - Disheng Xu
  - Wenwei Zhang
  - Kai Chen
  abstract: 'Large language models (LLMs) have achieved remarkable performance on high-school and olympiad-style mathematics,
    yet their capabilities on advanced mathematics remain poorly understood. Existing benchmarks, however, fall short in both
    scope and evaluation granularity: they provide limited disciplinary coverage and often rely on final-answer correctness
    or coarse judgments, leaving the validity of the reasoning process inadequately assessed. To bridge this gap, we introduce
    AdvancedMathBench, a benchmark suite designed to evaluate advanced mathematical reasoning capabilities. Its core proof-generation
    benchmark, ProverBench, contains 296 problems spanning undergraduate and doctoral qualifying-exam levels. To provide reliable
    evaluation of the proofs, we develop a dedicated automatic verification pipeline trained on large-scale expert annotations
    to produce both correctness verdicts and fine-grained assessments of proof errors, which exhibits strong agreement with
    human experts on held-out proof trajectories. We further introduce VerifierBench, consisting of 888 model-generated proof
    trajectories paired with expert ground truth, to evaluate whether models can correctly judge proof validity and provide
    sound verification rationales. Experiments show that AdvancedMathBench remains challenging for frontier models. On proof
    generation, the best-performing model, GPT-5.5-xhigh, achieves only 75.8 and 66.1 on the UGD and QE splits, respectively,
    indicating substantial room for improvement on advanced mathematical proof construction. On proof verification, the best
    model attains a Balanced F1 of only 65.1, and models generally exhibit low true negative rates, suggesting that critical
    error detection remains a major bottleneck.'
