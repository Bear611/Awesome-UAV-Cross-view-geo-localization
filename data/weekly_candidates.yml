- id: 287d267dcf81
  title: 'Exo2EgoPose: Leveraging Exocentric Demonstrations for Vision-Language guided Egocentric 3D Hand Pose Forecasting'
  year: 2026
  venue: arXiv
  authors:
  - Zhaofeng Shi
  - Heqian Qiu
  - Lanxiao Wang
  - Xiang Li
  - Hongliang Li
  abstract: Perceiving multimodal cues and forecasting fine-grained actions from an egocentric (Ego) perspective is vital
    for applications like robot manipulation. However, previous studies either rely mainly on under-informed visual inputs
    to predict coarse human motions or follow the VRM/VLA paradigm, which suffers from insufficient robot data and the gap
    between human and robot embodiments. We observe that 3D hand pose naturally serves as a unified representation to bridge
    human-robot actions. Hence, we investigate an under-explored Vision-Language guided Egocentric 3D Hand Pose Forecasting
    (VL-EHPF) task, which aims to predict future Ego 3D hand poses from visual observations, a language instruction, and pose
    states. To overcome the limited field-of-view and highly dynamic motions in the Ego view, we propose a framework dubbed
    Exo2EgoPose, which innovatively leverages holistic and stable exocentric (Exo) demonstrations as guidance to compensate
    for partial and dynamic Ego-view cues. Specifically, we introduce a Dual-level Exocentric Reconstruction Module (DERM),
    which incorporates the paired Exo videos as supervision to reconstruct their video-level and chunked frame-level representations,
    thereby modeling spatial contexts and temporal dynamics. Then, the Global-to-Local Modulation Module (GLMM) utilizes the
    reconstructed hierarchical Exo representations for progressive feature refinement via attention mechanisms and adaptive
    modulation, enabling comprehensive Exo guidance for accurate Ego hand pose forecasting. Extensive experiments on \textit{AssemblyHands},
    \textit{Ego-Exo4D}, and our newly constructed \textit{EgoMe-pose} benchmarks show the superiority of our method, which
    outperforms state-of-the-art methods by a large margin. Moreover, it demonstrates an effective human-to-robot transfer
    capability and yields improvements on the \textit{CALVIN} dataset. Code will be released.
