- id: d84bb89ecf2e
  title: 'Economic Effects of Artificial Intelligence (AI)-Driven Mechanization on Farm Labour in Nigeria’s Agricultural Sector:
    A Conceptual Review'
  year: 2026
  venue: Journal For Family & Society Research
  authors:
  - O. B Nwokah
  - N. C. Morgan
  - M. M Obiene
  abstract: The review brings to light the economic effects of AI-driven mechanization on farm labour in Nigeria’s agricultural
    sector. The review is organized as an overview of AI- driven mechanization in the Nigerian agricultural sector, key AI
    mechanization technologies in Nigeria and their applications, economic effects of AI on farm labour and challenges to
    the use of AI-driven mechanization in the Nigerian agricultural sector. Artificial Intelligence (AI) is poised to transform
    farming by reducing labour needs while increasing food production. As AI automation progresses, it is expected to gradually
    replace human labour, particularly on farms, where robots and autonomous machines will manage operations and utilize predictive
    analytics for decision-making. The adoption of new technology and mechanization in agriculture can significantly enhance
    food production. However, it warns that the implementation of AI might lead to challenges such as unemployment among unskilled
    labourers. Additionally, inadequate connectivity in rural areas could hinder AI effectiveness. Recommendations include
    improving connectivity and infrastructure, training extension personnel on AI, and making agriculture more appealing to
    youth, especially graduates.
