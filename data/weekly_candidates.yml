- id: c0baadf5b8ea
  title: Attention-Guided Saliency Maps for Interpreting Visualization Literacy in VLMs
  year: 2026
  venue: arXiv
  authors:
  - Maeve Hutchinson
  - Abderrahmane Wassim Mehdaoui
  - Pranava Madhyastha
  abstract: Understanding how vision-language models (VLMs) interpret data visualizations remains an open problem, and is
    increasingly important as these models are used for analytical tasks where reliable reasoning is essential. We introduce
    a lightweight, diagnostic saliency map method tailored for text generation over images using transformer models, the current
    state-of-the-art models in visualization interpretation. Our approach aggregates the language model's attention over the
    visual tokens across all heads and layers, then maps this attention back onto the vision encoder's patch grid to localise
    it over the image, producing a direct correspondence between each generated answer token and the image regions it attended
    to. This yields fast, gradient-free saliency maps that expose how VLMs allocate focus across visual elements during answer
    generation, enabling inspection of whether model attention aligns with semantically relevant components. We evaluate our
    approach using a deletion metric which validates the causal faithfulness of our saliency maps to the model's behavior.
