- id: 3f821a728a92
  title: Semantic-grouped Mamba and pyramidal multi-granularity feature enhancement in an end-to-end DEIM real-time insulator
    defect detection model
  year: 2026
  venue: Measurement Science and Technology
  authors:
  - Hui Chen
  - Changsheng Zhu
  - Hongwei Bai
  - Lulu Zhu
  - Zhiyuan Xia
  - Kexiang Liu
  abstract: Abstract Insulator defect detection is essential for reliable power transmission. In unconstrained UAV inspection,
    extreme aspect ratios, complex backgrounds, and tiny low-contrast defects make precise detection challenging. To reduce
    missed detections and false alarms, we propose SGMP-DEIM, a real-time detector integrating Semantic-Grouped Mamba and
    Multi-Granularity Diffusion. In the backbone, we build a Semantic Grouped Mamba Stage (SGM-Stage) where semantic grouping
    guides an approximate state space model (ASSM) to capture long-range dependencies along insulator strings with linear
    complexity. In the neck, we develop a Multi-Granularity Diffusion Pyramid Network (MGDP-Net) with a High-Frequency Dual-View
    Feature Aggregation (HDFA) module. By introducing a high-resolution P3 level and performing bidirectional diffusion across
    scales, MGDP-Net strengthens high-frequency details and improves localization of tiny defects. We further propose a Clustering-Enhanced
    Meta Encoder (CEM-Encoder) that uses clustering-driven attention to learn robust semantic prototypes and suppress background
    interference. Experiments show SGMP-DEIM improves the baseline by 7.2% in 〖AP〗_50 and 6.9% in 〖AP〗_(50:95), outperforming
    strong real-time detectors such as RT-DETR and YOLO variants. To evaluate robustness in extreme conditions, we also build
    a challenging test benchmark with diverse weather disturbances using an AIGC-based augmentation framework for testing
    only. Overall, SGMP-DEIM provides an effective solution for real-time, high-precision insulator defect detection.
