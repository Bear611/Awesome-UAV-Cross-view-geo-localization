- id: 1635a196f406
  title: IMPLEMENTASI KEBIJAKAN AGROWISATA DALAMMENDUKUNG PEMBANGUNAN BERKELANJUTAN DIDESA CIBODAS KECAMATAN LEMBANG, KABUPATENBANDUNG
    BARAT
  year: 2026
  venue: Universitas Pasundan institutional repositories & scientific journals (Universitas Pasundan)
  authors:
  - Akbar Yulindo Rasyad
  abstract: 'Penelitian ini dilatar belakangi oleh potensi agrowisata Desa Cibodas sebagai bagian dari Kawasan Bandung Utara
    yang memiliki fungsi strategis sebagai daerah resapan air, namun menghadapi tekanan alih fungsi lahan dan inkonsistensi
    kebijakan antara sektor pariwisata dan tata ruang. Pemerintah Kabupaten Bandung Barat telah menetapkan Perda Nomor 07
    Tahun 2013 dan Perda Nomor 04 Tahun 2012 tentang RIPPARKAB, namun implementasinya di tingkat desa masih menghadapi berbagai
    tantangan. Penelitian ini bertujuan menganalisis proses implementasi kebijakan agrowisata, faktor penghambat, serta kontribusinya
    terhadap pembangunan berkelanjutan di Desa Cibodas. Penelitian menggunakan metode kualitatif dengan pendekatan study kasus
    dengan teknik pengumpulan data melalui wawancara mendalam terhadap tujuh informan, observasi, dan dokumentasi. Analisis
    data menggunakan model interaktif Miles dan Huberman, dengan triangulasi sumber dan metode untuk uji keabsahan data. Kerangka
    teori menggunakan model implementasi Edwards III (komunikasi, sumber daya, disposisi, struktur birokrasi) dan konsep pembangunan
    berkelanjutan (ekonomi, sosial, lingkungan). Hasil penelitian menunjukkan implementasi kebijakan agrowisata belum optimal.
    Komunikasi kebijakan dari kabupaten ke desa tidak konsisten dan terbatas. Sumber daya manusia, anggaran, dan infrastruktur
