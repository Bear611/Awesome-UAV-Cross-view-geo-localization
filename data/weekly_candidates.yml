- id: 73b1c373fc5c
  title: 'Searching Videos as Trees: Self-Correcting Agents for Grounded Long Video QA'
  year: 2026
  venue: arXiv
  authors:
  - Ce Zhang
  - Ziyang Wang
  - Yulu Pan
  - Oluwatumininu Oguntola
  - Pranav Wagh
  - Qiyu Wu
  - Hiromi Wakaki
  - Mohit Bansal
  - Gedas Bertasius
  abstract: 'Grounded long-video question answering (Grounded LVQA) requires answering a question about a long video while
    localizing the short evidence interval that supports the answer. Recent agentic methods frame this task as multi-turn
    exploration with a single crop_video(start, end) action, which supports coarse-to-fine narrowing but provides no primitive
    for fine-to-coarse backtracking. As a result, these agents typically converge prematurely and cannot recover from an early
    mistake. We propose VideoTreeSearch (VTS), a framework that casts grounded LVQA as iterative self-correcting search over
    an adaptive temporal tree. VTS constructs a non-uniform tree from visual scene boundaries so that each node corresponds
    to a semantically coherent segment, and trains an agent to navigate the tree through four discrete operations: zoom_in,
    zoom_out, shift, and answer. These operations expose backtracking and recovery as explicit, learnable primitives rather
    than implicit behaviors. To train this navigation, we introduce a trajectory synthesis pipeline that produces multi-step
    paths through the tree, including deliberate detours into incorrect branches followed by recovery. We use these trajectories
    for supervised fine-tuning, followed by reinforcement learning with grounding and answer-accuracy rewards. On three Grounded
    LVQA benchmarks (CG-Bench, Haystack-LVBench, Haystack-Ego4D), VTS outperforms the strongest prior agentic methods by +12.5
    mIoU on CG-Bench and +7.4 T-F1 on Haystack-Ego4D. The learned policy also transfers to general long-video QA, surpassing
    all prior agentic baselines on Video-MME, MLVU, and LVBench by up to +7.1 accuracy points. Ablations confirm that self-correcting
    hierarchical search is the central mechanism behind these gains: removing either adaptive descent or explicit backtracking
    substantially degrades performance. Code is available at https://github.com/CeeZh/VTS.'
