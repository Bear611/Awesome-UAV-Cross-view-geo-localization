  abstract: 'Surface brightness fluctuations (SBF), the pixel-to-pixel variations in flux that arise from the statistical
    distribution of stars in galaxy images, provide a powerful tool to measure redshift-independent distances from photometric
    data alone. This method is particularly important in the era of large imaging surveys, such as those carried out during
    the Euclid mission. Here we present the first application of SBF to Euclid data, using the FAST-SBF code to measure stellar
    fluctuation amplitudes in the $I_\mathrm{E}$ band for a sample of galaxies in the Early Release Observations (ERO) of
    the Fornax galaxy cluster. Although the Euclid data reduction pipeline is not optimized for SBF measurements, extensive
    testing suggests that we are able to extract robust results. We calibrate the absolute fluctuation magnitude $\overline{M}_\mathrm{IE}$
    as a function of the $(I_\mathrm{E}{-}H_\mathrm{E})$ colour for 15 galaxies in Fornax, then test this relation on galaxies
    in two other ERO fields: the Perseus cluster and dwarf satellite candidates around NGC 6744. Overall, we find reasonable
    agreement with distances in the literature and good agreement in cases where FAST-SBF indicates the measurements are robust.
    Finally, we compare our results against Stellar Population Tools (SPoT) simple stellar population models, and discuss
    the possibility of using SBF with Euclid to probe the underlying stellar populations of the galaxies.'
