- id: a931197f3136
  title: An Introduction to Sparse Identification of Nonlinear Dynamics for Engineering Applications
  year: 2026
  venue: arXiv
  authors:
  - Yao Cheng Li
  - Ana Larrañaga
  - Steven L. Brunton
  - Urban Fasel
  abstract: 'Many engineering problems involve phenomena whose governing equations are poorly characterized or only partially
    known. Surrogate modeling techniques such as neural networks can capture the behavior of these systems, but they typically
    demand large training datasets that are difficult to obtain in engineering contexts and yield models with limited physical
    interpretability. The Sparse Identification of Nonlinear Dynamics (SINDy) method addresses both limitations by performing
    sparse regression over libraries of candidate nonlinear terms, recovering interpretable governing equations from comparatively
    small datasets. Although SINDy has been demonstrated extensively on canonical benchmark systems, its application to practical
    engineering problems is less widely documented. This tutorial introduces the SINDy method and progressively builds toward
    its main extensions, from noise-robust weak-form and ensembling-based variants to constrained and parametrizable formulations.
    The paper and the accompanying tutorial (available at https://github.com/paullililili/SINDy4Engineers) is organized in
    three parts: the first introduces the standard SINDy algorithm and progressively extends it, inviting readers without
    prior knowledge to follow each step and adapt the methods to their own problems; the remaining two parts present detailed
    case studies on (1) the system identification of an unmanned aerial vehicle and (2) a chaotic thermosyphon heat exchanger.
    Through these examples, we aim to demonstrate that SINDy is simple to implement yet flexible enough to serve as a valuable
    identification tool for advanced engineering applications.'
