- id: f5c423af7112
  title: Framework and Multi-modal Dataset for Roadwork Zone Detection and Geo-localization
  year: 2026
  venue: arXiv
  authors:
  - Zhiran Yan
  - Yutong Xin
  - S Shyam Shenoi
  - Rui Song
  - Gordon Elger
  abstract: 'Autonomous vehicles often rely on high-definition (HD) maps for navigation; however, these maps are not frequently
    updated and often lack semi-static information, such as temporary roadwork zones, which can significantly alter the road
    network. This limitation underscores the urgent need for an accurate global position of roadwork zones. However, the absence
    of publicly available datasets for evaluating roadwork zone detection and geo-localization models has hindered the development
    of reliable autonomous driving systems. To address this challenge, we propose the Roadwork Zone Detection and Geo-localization
    (RZDG) dataset, which includes both simulated and real-world data, providing multimodal sensor inputs along with comprehensive
    annotations. The dataset supports multiple perception tasks, including image semantic segmentation, 3D object detection,
    and object geo-localization. In addition, we introduce a tracker-based roadwork zone detection and geo-localization (RZDG)
    pipeline, an extension of AB3DMOT, for accurate object geo-localization in roadwork zones. We benchmark our approach on
    the RZDG dataset, demonstrating its effectiveness in detecting roadwork zones and transforming object positions from the
    local coordinate system to the global coordinate system. A prediction is considered a true positive (TP) if its estimated
    position falls within one meter of the ground truth. Our experimental results show that our approach achieves high accuracy
    on both real and simulated data. Specifically, we report: Precision: 0.565 (real) / 0.615 (simulated) Recall: 0.898 (real)
    / 0.809 (simulated) F1-score: 0.597 (real) / 0.665 (simulated).'
