  summary:
    summary_en: URF-Loc addresses cross-view geo-localization for UAVs operating under GNSS-denied conditions, where severe
      appearance variations, large search spaces, and ambiguous structural correspondence make robust localization difficult.
      The paper observes that prior approaches either rely on global retrieval with limited spatial precision or on deterministic
      dense prediction without modeling prediction reliability, leading to unstable localization. To address this, the authors
      propose a coarse-to-fine framework. The coarse stage employs a spatial-frequency joint (FSJ) representation that injects
      high-frequency residuals into multi-scale features to enhance view-invariant structural cues for robust global matching.
