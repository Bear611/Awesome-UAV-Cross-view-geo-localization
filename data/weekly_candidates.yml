- id: 43250bb219e1
  title: 'Building portfolio retrofit pathways: A generic process development and case study application'
  year: 2026
  venue: Energy and Buildings
  authors:
  - Nico Ehlers
  - Farzan Banihashemi
  - Herbert Palm
  - Werner Lang
  abstract: Building portfolio managers face increasing pressure to develop robust decarbonization pathways. Because planning
    such pathways across heterogeneous portfolios is too complex to handle on a case-by-case basis, managers rely on structured
    frameworks. Yet existing frameworks remain fragmented, insufficiently transferable, and limited in stakeholder integration.
    This study introduces a building portfolio retrofit pathway process organized into three parallel layers. A Stakeholder
    integration layer runs continuously throughout. A technical workflow covers problem scoping, method selection, baseline
    creation, potential analysis, and pathway design. An evaluation layer handles validation, uncertainty analysis, and goal
    checking. Together, these elements produce reproducible, transferable retrofit pathways resolved into a building-by-building
    schedule. The process is applied to a heterogeneous portfolio of 199 state-owned buildings in Bavaria, Germany. It couples
    machine-learning heating-demand, photovoltaic potential, and life-cycle models to quantify retrofit impacts. Nine decision
    criteria are weighted by stakeholder priority and combined into a single score to select one retrofit option per building.
    The measures are then scheduled from 2026 to 2040 to meet the required annual renovation quota. The resulting roadmap
    prioritizes and schedules retrofits transparently at the portfolio level, achieving 65% of the total annual CO 2 reduction
    within the first six years. Cumulative emission and cost outcomes stay stable under alternative stakeholder weightings,
    even though most individual building rankings change. A goal check shows that nearly zero-energy and 2040 climate-neutrality
    targets are missed with grid electricity but largely met with renewable electricity, underlining the need for iterative
    goal refinement.
