- id: 50586fdaa434
  title: 'Ancient and modern quarries of building stones in North-East France: main limestone deposits and rock types'
  year: 2026
  venue: BOLETÍN GEOLÓGICO Y MINERO
  authors:
  - Gilles Fronteau
  - Patricia Vázquez
  - Théo Krauffel
  abstract: The north-east of France is mainly occupied by the Paris Basin, which has provided a significant quantity of building
    stone, particularly limestones used as dimension stone. A series of famous quarries have left their mark on the local
    area, from the Jurassic (Dom, Euville, Savonnières) to the Cenozoic layers (Hermonville, Courville), while others have
    been forgotten. These building stones are sometimes used on their own or mixed with more local materials that are less
    valued or with other properties. Some of these quarry areas have stones which were exported, competing with stone from
    Belgium, Burgundy and the Paris region. By comparing old maps and archives with quarries and stones that are still accessible,
    it is possible to draw up a number of assessments of the geological signatures of each limestone (facies, microfacies,
    petrophysical features). This allows us to gain a deeper insight into the utilisation of these building stones and to
