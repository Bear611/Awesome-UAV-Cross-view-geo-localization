- id: 1d5d741c51bf
  title: Cluster-Aware Matching via Laplacian Optimal Transport
  year: 2026
  venue: arXiv
  authors:
  - Gabriel Samberg
  - YoonHaeng Hur
  - Yuehaw Khoo
  - Nir Sharon
  abstract: In many applications of matching, the point clouds to be matched are not merely unstructured sets of points but
    rather samples from distributions with an intrinsic cluster structure. In such cases, as individual points are often interchangeable
    within a coherent region, finding a robust region-to-region alignment is more desirable than establishing a precise point-to-point
    correspondence. To this end, we propose a novel approach for cluster-aware matching based on Laplacian Optimal Transport
    (LapOT). The key idea is to regularize the optimal transport problem with quadratic Laplacian terms constructed from similarity
    graphs of the point clouds, which encourages the optimal coupling to respect the cluster structure of both point sets.
    We also introduce Refined Simultaneous Clustering (RSC), a method that leverages the cluster-aware coupling obtained from
    LapOT to produce consistent partitions across the point sets, which can overcome the limitations of independent clustering
    and yield more stable and interpretable results. We demonstrate the effectiveness of our approach through theoretical
    analysis and empirical experiments, showing that LapOT indeed produces cluster-aware matching that leads to more consistent
    and meaningful alignments between point clouds.
