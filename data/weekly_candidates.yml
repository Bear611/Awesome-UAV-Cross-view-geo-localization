      where existing methods suffer performance degradation due to distortions, occlusions, and reduced visibility introduced
      by fog, rain, low light, and snow. To tackle this, the authors propose a weather-aware multi-granularity representation
      learning framework that explicitly accounts for weather conditions while capturing features at multiple granularities.
