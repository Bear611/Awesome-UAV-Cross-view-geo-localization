- id: 3af7807561ec
  title: The Bill of Rights, transformative ecclesial leadership, and the kairotic task
  year: 2026
  venue: Pharos Journal of Theology
  authors:
  - McGlory Speckman
  abstract: This article argues that South Africa's democratic transition remains incomplete because democratic values have
    not been sufficiently institutionalised at the community level. Drawing on the Kairos tradition, I propose a model of
    transformative ecclesial leadership that advances the constitutional vision embodied in the Bill of Rights. I argue that
    transformative ecclesial leadership, equipped to function in a democratic context, rather than resistance or protest leadership,
    is required to carry democracy beyond the liminal phase it is currently in. The church, propelled by the spirit of Kairos
    theology and in pursuit of the common good, does not need government approval, as this is enshrined in the Bill of Rights.
    I conclude the discussion with practical proposals for bringing democracy closer to the community level.
