- id: dc82cea04dd2
  title: 'Recursive ArUco Markers: A Scalable Fiducial Marker Design for Unmanned Aerial Vehicle Landing Pads'
  year: 2026
  venue: arXiv
  authors:
  - Rafael Munoz-Salinas
  - Francisco Jose Romero-Ramirez
  - Sergio Garrido-Jurado
  abstract: Unmanned Aerial Vehicles (UAVs) increasingly rely on visual fiducial markers for autonomous navigation and precision
    landing. However, standard markers suffer from limited operational ranges, becoming undetectable when the camera is either
    too far or too close. While recursive and fractal markers have been proposed to address this issue, existing approaches
    either require the marker's center to remain visible, making them vulnerable to occlusion, or are limited in their recursion
    depth and placement. We propose a novel Recursive ArUco marker design. Our method allows any standard fiducial marker
    to be transformed into a recursive marker with an arbitrary depth. By employing a modified bit-sampling strategy during
    detection, we embed complete markers within both the black and white bits of the parent marker. This approach guarantees
    unlimited recursion depth and robust detection even with partial occlusion, as it does not rely on the marker's center
    being visible. Furthermore, by maintaining a single, unique identifier across all recursive scales, our proposal provides
    an extensive dictionary of multiple unique landing pads. This capability allows fleets of UAVs to operate simultaneously,
    with each drone landing at its designated location -- a feature not supported by existing Fractal and Harco markers due
    to their structural and dictionary constraints.
