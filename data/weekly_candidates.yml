  summary:
    summary_en: HoloGeo investigates and mitigates landmark bias in image geo-localization with Vision-Language Models, where
      models over-rely on salient landmarks and ignore broader geographic context. To characterize the problem, the authors
      formalize landmark bias and introduce two metrics, Bias Intensity (BI) and Bias Harmfulness (BH), together with a dedicated
      diagnostic benchmark LandmarkBias-3K built from MP-16 and GLDv2 using GroundingDINO-based landmark extraction and probability-based
      filtering. To mitigate bias, they construct BF-30K, a multi-evidence reasoning dataset annotated with structured <Analyze>/<Think>/<Answer>
      chains via multi-VLM annotation and cross-model validation, then train HoloGeo on Qwen2.5-VL-7B with SFT followed by
      GRPO reinforcement learning using a multi-dimensional reward combining geo-localization accuracy, visual evidence grounding,
      and comprehensive logical reasoning. Experiments evaluate on IM2GPS, IM2GPS3K, YFCC4K, and LandmarkBias-3K. Reported
      results include HoloGeo achieving 47.3% city and 60.3% region accuracy on IM2GPS, and 27.27% city accuracy on LandmarkBias-3K,
      exceeding prior open-source VLMs and demonstrating more balanced attention via saliency analysis. The paper does not
      address UAV or aerial cross-view localization.
