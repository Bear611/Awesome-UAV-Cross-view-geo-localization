- id: 26637717d21e
  title: Quantifying the complexity of trajectory ensembles with clustering-weighted multivariate multiscale sample entropy
  year: 2026
  venue: arXiv
  authors:
  - Chenxiao Tian
  - J/"urgen Hackl
  abstract: 'Across the physical and life sciences, data increasingly appear as ensembles of trajectories, from chaotic flows
    and satellite constellations to clinical cohorts. Established sample-entropy measures characterize individual time series,
    while averaging across an ensemble discards population structure and cannot distinguish redundancy from diversity. We
    introduce clustering-weighted multivariate multiscale sample entropy (CWMMSE), which groups trajectories into behavioral
    patterns and weights each by its dynamical complexity. CWMMSE is a weighted entropy of the population''s pattern distribution.
    Its empirical plug-in estimator is strongly consistent for a fixed finite partition, and it separates two components that
    can diverge in real data: individual complexity and population diversity. Both are essential. Averaging ignores diversity,
    whereas spread alone can mistake a varied but predictable population for a complex one. Across eleven physical, environmental,
    engineering, and biomedical systems, CWMMSE ranks a calm ocean region above an energetic but individually more complex
    one, identifies a major earthquake as a collapse in system complexity, and reverses the conclusion from averaging in cardiac
    cohorts, where disease reduces population diversity. Supported by an open, reproducible implementation, these results
    show that population complexity should be measured rather than averaged.'
