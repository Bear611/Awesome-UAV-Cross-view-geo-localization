- id: 18ded4193f0e
  title: 'Dec-MARVEL: Decentralized Multi-Agent Exploration without Communication under Budget Constraints'
  year: 2026
  venue: arXiv
  authors:
  - Janghyun Cho
  - Jimmy Chiun
  - Guillaume Sartoretti
  - Changjoo Nam
  abstract: 'Multi-UAV exploration is often constrained by unreliable communication, limited field-of-view sensing (e.g.,
    lightweight onboard camera), and finite travel budgets that require each robot to reserve enough budget to return to its
    base. We present Dec-MARVEL, a decentralized budget-aware exploration framework for communication-free teams with directional
    sensing. Rather than exchanging maps, goals, or messages, each robot coordinates through its incidental observations:
    any teammate trajectory within its field of view serves as a coordination signal. A graph-attention actor fuses local
    frontier geometry, teammate motion, and budget features to select return-feasible waypoint-heading actions. The actor
    is trained with phase-conditioned critics, a training-only task-oriented privileged critic, and a mixture-based budget
    curriculum. Across 900 held-out trials spanning three team sizes (2, 4, 8 robots) and three travel budgets (720, 800,
    1024 meters) against four baselines, Dec-MARVEL achieves the highest or tied-highest exploration rate and lowest sensing
    overlap across all nine team-size budget configurations. Under our tightest 720m budget, it reaches 53%, 94%, and 100%
    success for 2, 4, and 8 robots, versus 37%, 83%, and 99% for the strongest baseline. Physical-robot experiments demonstrate
    successful sim-to-real transfer and real-world deployment of Dec-MARVEL.'
