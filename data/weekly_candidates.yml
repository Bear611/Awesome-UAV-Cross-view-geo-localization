- id: 9248de1638ef
  title: 'From Digital Agricultural Governance to Intelligent Precision Farming: Repositioning E-Peek Pahani as an AI-Driven
    Ecosystem'
  year: 2026
  venue: International Journal of Science and Research (IJSR)
  authors:
  - Chitra Ganesh Desai
  abstract: Digital agriculture is transforming conventional farming through the integration of Artificial Intelligence (AI),
    geospatial technologies, Internet of Things (IoT), computer vision, and data-driven agricultural governance systems. In
    India, government-led initiatives such as the Digital Agriculture Mission, AgriStack, Bharat-VISTAAR, and the Maharashtra
    Government?s E-Peek Pahani platform have significantly strengthened agricultural digitization and crop survey modernization.
    However, most existing systems continue to function primarily as administrative record management infrastructures and
    underutilize the intelligence potential of large-scale agricultural datasets. This paper critically examines the evolutionary
    trajectory of digital agriculture through the conceptual framework proposed by Wang et al., encompassing the phases of
    technological germination, mechanization, information integration, and intelligent leap. The study strategically positions
    E-Peek Pahani as a participatory geo-spatial agricultural governance infrastructure integrating geo-tagged crop imagery,
    land-linked agricultural metadata, and farmer-generated field intelligence within a large-scale digital ecosystem. Furthermore,
    the paper proposes a comprehensive AI-driven transformation framework incorporating computer vision, object detection
    architectures, geospatial intelligence, predictive analytics, explainable Artificial Intelligence, multilingual farmer
    advisory systems, and governance analytics to reposition E-Peek Pahani from an administrative crop survey platform toward
    an intelligent precision agriculture and AI-enabled governance ecosystem. The proposed framework demonstrates how public
    digital agriculture infrastructures can support automated crop monitoring, intelligent crop verification, precision farming,
    and AI-enabled agricultural governance. The study contributes toward understanding the future role of scalable AI-driven
    public agricultural ecosystems in sustainable digital agriculture and precision farming in India.
