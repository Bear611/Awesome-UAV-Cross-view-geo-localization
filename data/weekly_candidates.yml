- id: c9937f8a816f
  title: 'El problema de la irreligión en la España del siglo XVII: el caso del deísmo'
  year: 2026
  venue: Hispania Sacra
  authors:
  - Markus Schreiber
  abstract: En la primera mitad del seiscientos, en la España barroca se formó un pequeño círculo de librepensadores. Aquellos
    hombres, en unas circunstancias sociorreligiosas específicas y sobre la base del discurso dominante, desarrollaron un
    ideario que puede identificarse como una variante radical del deísmo europeo. En este artículo, presentamos la red de
    los librepensadores y analizamos el vivero de la irreligión, identificamos las fuentes del deísmo hispano y desenterramos
    la estructura de la religión filosófica, y finalizamos enfocando una importante consecuencia del ideario. Con nuestra
    reconstrucción, sobre todo podemos mostrar que el deísmo en la España barroca fue un fenómeno autónomo con profundas raíces
    en su entorno cultural.
