  summary:
    summary_en: 'AFGL-Net addresses robust cross-view geo-localization between drone and satellite imagery, where severe geometric
      distortion and noise degrade retrieval accuracy. The framework integrates spectral analysis with adversarial learning
      through three co-designed components: a Real-Symmetric Frequency Module (RSFM) that performs efficient feature refinement
      in the frequency domain using parallelizable spectral transforms, an Adversarial Distractor Mining Module (ADMM) that
      actively suppresses background interference, and a Dual-path Robust Cross-Entropy (DRCE) loss that combines standard
      and reverse cross-entropy terms with learnable Gaussian noise for robust optimization. Together these components learn
      discriminative, view-invariant embeddings. Experiments evaluate the approach on the University-1652 and SUES-200 benchmarks,
      with the abstract reporting a satellite-to-drone Recall@1 of 95.86% on University-1652 as the headline result. The design
      emphasizes parallelizable transforms and adversarial mechanisms, positioning the method for HPC and distributed acceleration
      aimed at high-throughput surveillance and emergency-response scenarios.'
