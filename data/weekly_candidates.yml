- id: 4d3ddda992ab
  title: THE ARCHITECTURE OF AMBIGUITY. ELEMENTS AND EVOLUTION OF RUSSIAN HYBRID WARFARE IN UKRAINE
  year: 2026
  venue: SCIENTIFIC RESEARCH AND EDUCATION IN THE AIR FORCE
  authors:
  - Catalin Bucurel BAIU
  - Daniel ȘTEFĂNESCU
  abstract: 'This study examines Russian hybrid warfare as operationalized in Ukraine between 2013 and 2024, arguing that
    it represents the most comprehensive and empirically documented case of integrated grey-zone conflict in the contemporary
    era. Drawing on open-source intelligence reports, security studies scholarship, and legal analysis, the paper analyzes
    six core dimensions of Russia''s hybrid approach: theoretical doctrine, information and cognitive operations, cyber warfare,
    electronic warfare, unconventional proxy forces, economic coercion, and lawfare. The analysis reveals a deliberate strategy
    of ambiguity — combining plausible deniability with escalation dominance — designed to undermine target-state cohesion,
    fracture Western alliances, and achieve strategic objectives below the threshold of conventional warfare. Crucially, however,
    the Ukrainian case also illuminates the conditions under which hybrid strategies can fail: when the target state exhibits
    ''whole-of-society'' resilience and when adversary coercion inadvertently accelerates the opposing coalition''s cohesion
    and capability development. The paper concludes with implications for NATO posture, democratic resilience, and the evolving
    character of 21st-century conflict.'
