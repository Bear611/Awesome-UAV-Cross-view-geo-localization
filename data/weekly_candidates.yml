- id: bde8335fe736
  title: 'Acceptance begins with understanding: Technology acceptance of autonomous and uncrewed vehicle systems in urban
    mobility and logistics'
  year: 2026
  venue: Technovation
  authors:
  - Clare McTigue
  - Emine Zehra Akgün
  - Luca Mora
  abstract: Urban mobility and logistics are being transformed by the adoption of autonomous and uncrewed vehicle systems
    (UxVs), yet research on user acceptance remains theoretically fragmented and empirically inconsistent. This study systematically
    reviews empirical research on UxV acceptance, across ground-based autonomous mobility technologies and autonomous logistics
    and last-mile delivery systems, excluding speculative aerial passenger technologies for which no empirical evidence exists.
    Drawing on the Technology Acceptance Model (TAM), its subsequent extensions (TAM2, TAM3, and TAM for Smart Technologies),
    as well as the Unified Theory of Acceptance and Use of Technology (UTAUT and UTAUT2), the review synthesises psychological,
    social, technological, and contextual determinants of UxV acceptance. Our analysis shows that acceptance arises from the
    multidimensional interaction of these factors and that no single model fully captures the domain-specific differences
    between mobility and logistics applications. Contextual influences, such as exogenous shock, organisational dynamics,
    and institutional and policy frameworks, appear as important moderators that shape, rather than replace, established TAM
    and UTAUT constructs. The review also identifies significant knowledge gaps, including the influence of socio-demographic
    variables, the need for technology-specific studies, and the importance of empirical research grounded in real-world trials.
    Addressing these gaps is essential to advancing theory and informing the effective integration of UxV technologies in
    complex urban environments.
