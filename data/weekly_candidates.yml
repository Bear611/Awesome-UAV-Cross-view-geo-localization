  abstract: The vibrant field of robotic autonomous systems (RAS) has not only been a subject of intense theoretical exploration
    but has also found myriad applications, offering the potential to replace humans in diverse tasks across various environments.
    Despite this, the specific application of RAS in addressing emerging challenges within the mining sector has gained significant
    research attention, yet a comprehensive survey remains unavailable. This paper endeavors to fill this void by reviewing
