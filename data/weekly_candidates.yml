- id: 9ea109a97a59
  title: 'GAC-MAC 2026 St. John''s Meeting: Abstracts, Volume 49'
  year: 2026
  venue: Geoscience Canada
  authors:
  - James Conliffe
  - Philippe Belley
  abstract: The ~400 km long, 8-10 km thick Saint-Fulgence Shear Zone in the Saguenay-Lac-Saint-Jean region of Quebec, Canada,
    records multiple deformation phases related to the Grenvillian orogeny.It dips moderately to the SE or E and records dextral
    (± reverse) displacement.Mylonitic fabrics developed in paragneiss are defined by hightemperature mineral assemblages
    including garnet, sillimanite and K-feldspar.Sillimanite commonly occurs as fibrous to acicular crystals forming C-S-C′
    fabrics or sigmoidal aggregates.Chessboard extinction and grain boundary migration in quartz and diffusion creep in monomineralic
    K-feldspar fish indicate deformation temperatures exceeding 630°C, consistent with quartz crystallographic <c>-axis preferred
    orientation opening angle thermometry from asymmetric (dextral) distributions (650-800°C).Lower temperature microstructures,
    including quartz subgrain rotation (400-500°C), are associated with sinistral shearing along rare narrow planes that overprint
    and are parallel to dextral mylonites.U-Pb zircon dating from an asymmetric (dextral), foliation-parallel leucosome pod
    within a metapelite yields a crystallization age of 1061 ± 7 Ma.Ti-in-zircon thermometry from zircon autocrysts indicates
    that crystallization took place at ~690°C.This value is consistent with hightemperature deformation microstructures (grain
    boundary migration, chessboard extinction) developed at the leucosome margins, indicating that shearing occurred during
    or shortly after leucosome crystallization, providing a pre-to syn-shearing time constraint.In the host metapelite, monazite
    grains are restricted to the margins of sigmoidal sillimanite aggregates and biotite-rich asymmetric pressure shadows
    around them.All three minerals are interpreted to have formed during shearing, and ongoing in situ U-Pb dating of monazite
    grains is expected to provide a direct chronological constraint on the timing of shearing.
