- id: 120e933e12d6
  title: Semantic Concept Perception Network With Interactive Prompting for Cross-View Image Geo-Localization
  year: 2025
  venue: IEEE Transactions on Circuits and Systems for Video Technology
  authors:
  - Yuan Gao
  - Haibo Liu
  - Xiaohui Wei
  abstract: Cross-view image geo-localization aims to estimate the geographic position of a query image from the ground platform
    (such as mobile phone, vehicle camera) by matching it with geo-tagged reference images from the aerial platform (such
    as drone, satellite). Although existing studies have achieved promising results, they usually rely only on depth features
    and fail to effectively handle the serious changes in geometric shape and appearance caused by view differences. In this
    paper, a novel Semantic Concept Perception Network (SCPNet) with interactive prompting is proposed, whose core is to extract
    and integrate semantic concept information reflecting spatial position relationship between objects. Specifically, for
    a given of pair input images, a CNN stem with positional embedding is first adopted to extract depth features. Meanwhile,
    a semantic concept mining module is designed to distinguish different objects and capture the associations between them,
    thereby achieving the purpose of extracting semantic concept information. Furthermore, to obtain global descriptions of
    different views, a feature bidirectional injection fusion module based on attention mechanism is proposed to exploit the
    long-range dependencies of semantic concept and depth features. Finally, a triplet loss with a flexible hard sample mining
    strategy is used to guide the optimization of the network. Experimental results have shown that our proposed method can
    achieve better performance compared with state-of-the-art methods on mainstream cross-view datasets.
