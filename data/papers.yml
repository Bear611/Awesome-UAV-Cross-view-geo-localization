    summary_en: This paper addresses the cross-view image retrieval problem for UAV geo-localization, where aerial images
      captured by a drone must be matched against a geo-referenced ground-level reference database to determine the drone's
      position. The authors observe that standard attention-based retrieval pipelines are easily distracted by cluttered ground-level
      features such as trees, cars, and pedestrians, and therefore propose a spatially aware attention mechanism that injects
      geometric priors into the cross-view matching process. The framework couples a spatial-aware attention module with a
      cross-view embedding backbone, explicitly encoding vertical-vertical correspondences between aerial and ground viewpoints
      so that the network focuses on stable, geographically meaningful regions rather than transient objects. The method is
      trained and evaluated on standard cross-view UAV geo-localization benchmarks (University-1652 and DenseUAV are mentioned
