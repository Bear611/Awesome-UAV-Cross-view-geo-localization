- id: 2baab5dbc766
  title: 'NavBEV: Empowering Self-Supervised UAV-Based Visual Navigation Through 3D BEV Representation'
  year: 2025
  venue: Ubiquitous Positioning, Indoor Navigation, and Location Based Service
  authors:
  - Hongyang Zhang
  - Hongrui Yin
  - Ziyao Wang
  - M. Pun
  abstract: 'Unmanned Aerial Vehicle (UAV)-based visual navigation aims to identify the geographic location of aerial imagery
    by matching it with geo-referenced maps or satellite views. Recent advances in cross-view geo-localization have leveraged
    3D-aware representations to improve generalization across unseen regions and varying environments. However, most existing
    approaches rely on complex multi-stage optimization or explicit 3D rendering, which limits their scalability. In this
    paper, we propose NavBEV, a self-supervised UAV-based visual navigation framework that integrates 3D scene point clouds
    and bird''s-eye view (BEV) representations in an end-to-end manner. In addition, the reconstructed 3D point clouds provide
    geometry-aware guidance for cross-view alignment through 3D-guided relational distillation, enabling efficient learning
    without additional training stages. We conduct experiments on two benchmarks: University-1652 and SUES-200. NavBEV achieves
    a significant advancement in Selfsupervised UAV-based visual navigation, outperforming previous 3D-Aware methods in both
    in-domain and cross-domain settings.'
