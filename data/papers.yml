  summary:
    summary_en: This paper addresses UAV absolute visual localization in GNSS-denied environments by cross-source matching
      of UAV-captured images against georeferenced satellite reference maps. To overcome the limitations of low-level appearance
      features under cross-source and temporal variations, the authors propose a hierarchical coarse-to-fine matching pipeline.
      The framework begins with a DINOv2-based image retrieval module that selects the most similar candidate satellite patch
      using optimal transport aggregation. A Semantic-Aware and Structure-Constrained Matching Module (SASCM) then extracts
      dense DINOv2 features from both images, constructs a 4D similarity tensor, and applies Soft Mutual Nearest Neighbor
      filtering and 4D convolutions to identify region-level correspondences under semantic and structural consistency. A
      lightweight fine-grained convolutional module subsequently performs keypoint detection, description, and RANSAC-based
      homography estimation within the matched regions to compute the precise pixel-level position, yielding a complete pipeline
      that does not rely on relative localization techniques. Experiments are conducted on the public AerialVL and UAV-VisLoc
      datasets and on a newly introduced CS-UAV dataset collected in Changsha, China. The paper reports that the proposed
      method achieves superior localization accuracy and robustness compared with SIFT, SuperPoint, and Deep-LK baselines
      under various challenging conditions.
