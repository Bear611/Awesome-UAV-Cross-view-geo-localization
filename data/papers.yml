- id: 50abb7ac99ee
  title: 'MTA-Dataset: Multiple-Tilt-Angle Dataset for UAV–Satellite Image Matching'
  year: 2026
  venue: Applied Sciences
  authors:
  - Qifei Liu
  - Liang Jiang
  - Guoqiang Wu
  - Kun Huang
  - Haohui Sun
  - Gengchen Liu
  abstract: Accurate target localization via matching real-time UAV images with reference satellite imagery is essential for
    autonomous environmental perception. Nonetheless, operational constraints and weather conditions often necessitate oblique
    photography. This large-tilt mode causes significant perspective and radiometric distortions, resulting in a substantial
    domain gap between UAV and vertical satellite imagery. The scarcity of datasets featuring extreme viewpoint shifts and
    fine-grained ground-truth labels hinders the validation of image matching algorithms in multi-tilt-angle environments.
    To address this issue, we introduce the multiple-tilt-angle dataset (MTA-Dataset), containing 1892 UAV images with tilt
    angles spanning 0°,90° and flight altitudes up to 300 m, supported by high-precision five-point manual annotations. Based
    on this benchmark, we evaluate state-of-the-art matching algorithms and propose a spatial-resolution-based cropping strategy.
    Experimental results demonstrate that, as the UAV tilt angle increases within the range of 0°,90°, although the expanding
    field of view provides richer contextual information, the localization errors of all methods increase significantly and
    matching precision drops sharply due to severe geometric distortions in far-field regions and interference from redundant
    background information, with performance deteriorating most drastically in the 50°,90° range. With the integration of
    our strategy, the average matching localization errors of SuperPoint + SuperGlue baseline for UAV images within the tilt-angle
    ranges of 50°,60°, 60°,70°, 70°,80°, and 80°,90° are reduced by 33.49 m, 37.86 m, 98.3 m, and 109.95 m, respectively.
    Our study provides a more comprehensive evaluation framework for robust UAV–satellite image matching algorithms in multi-tilt-angle
    scenarios.
