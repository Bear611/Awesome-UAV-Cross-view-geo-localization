- id: e93df3813f7c
  title: 'VLGeo: Bridging Viewpoints in UAV-View Geo-Localization Using a Large Vision–Language Model'
  year: 2026
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Zhengxin Cao
  - Lei Tang
  - Xin Zhou
  - Yunji Liang
  - Longbin Chen
  - Ruixiao Xu
  - Kaiping Wang
  - Tao Gao
  abstract: Unmanned Aerial Vehicle (UAV) geo-localization has garnered significant attention due to its potential to enhance
    UAV autonomy in scenarios where traditional GPS signals are unavailable or unreliable. Several innovative visual-based
    approaches have been developed, including deep image-matching and stereo-matching localization techniques. Nevertheless,
    extracting common features remains difficult, primarily because of significant appearance discrepancies caused by changes
    in viewpoint, altitude, and orientation. In this paper, we introduce VLGeo, the first text-assistant visual geo-localization
    benchmark, to enhance UAV-view localization by facilitating cross-view and cross-modal interaction. We crafted detailed
    textual descriptions to enhance retrieval capabilities by enabling text-image guided extraction of common features. Our
    approach entails generating attribute-based prompts through triplet images, thus effectively highlighting the intrinsic
    differences between images. Furthermore, a bidirectional guided semantic alignment mechanism and a contrastive learning
    network are introduced to extract discriminative common features across views and modalities. Finally, a cross-modality
    dataset, UAV-VLL, is also introduced for evaluating and advancing the integration of visual and textual data for UAV geo-localization.
    Experimental results indicate that our method significantly enhances localization accuracy, achieving improvements of
    4.88% in top 1 recall and 1.99% in average precision compared to state-of-the-art methods. The code is available at https://github.com/ballball9/VLGeo.
