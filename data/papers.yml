    summary_en: 'This paper addresses the relative pose problem (RPp) between two calibrated cameras: estimating the rotation
      R and translation t (up-to-scale) from noisy, outlier-contaminated feature correspondences. The authors propose a family
      of optimality certifiers derived from different relaxations of the essential matrix set, increasing the detection rate
      of global optima. A fast essential matrix estimation pipeline iteratively refines any initial guess on the product space
      of 3D rotations and the 2-sphere, with a preconditioner that accelerates convergence. This certifiable pipeline is embedded
      into a robust framework combining Graduated Non-Convexity (GNC) and Black-Rangarajan (BR) duality to jointly estimate
      inliers and the solution. Extensive experiments on synthetic and real datasets demonstrate the framework''s speed and
