    summary_zh: 针对多旋翼无人机在GPS拒止环境下的全局位姿估计难题，本文提出一种基于稠密互信息（MI）的跨视角图像配准方法。该方法利用飞行前从Google Earth三维重建渲染的地理参考图像，通过sRt变换（缩放-旋转-平移）对机载云台相机拍摄的实时图像进行配准，并以归一化信息距离（NID）为代价函数、由L-BFGS优化求解最佳对齐参数；随后将配准得到的位姿测量与云台视觉里程计输出在SE(3)滤波框架中融合以抑制漂移。在多伦多大学航空航天研究所（UTIAS）采集的数据集上验证：303米航线上RMSE小于1米和1度；六次1132米航线（高度低至36米）在日出至日落不同时刻采集，RMSE均小于3米和3度，显著优于成功率不足7%的SURF特征方法，表现出对光照与外观变化的高度鲁棒性。
