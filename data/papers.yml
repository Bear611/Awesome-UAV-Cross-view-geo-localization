  summary:
    summary_en: Visual Teach and Repeat (VT&R) enables long-range autonomous route following, yet its reliance on visual features
      makes it vulnerable to appearance changes caused by lighting, weather, and seasons. This paper proposes Multi-Experience
      Localization (MEL), a novel algorithm requiring only a single manually taught privileged path while exploiting intermediate
      bridging experiences gathered during autonomous operation. MEL uses a Spatio-Temporal Pose Graph (STPG) to simultaneously
      match the live view against multiple experiences, yielding continuous 6DoF metric localization with uncertainty relative
      to the privileged path. The system combines stereo visual odometry with SURF features, the STEAM nonlinear least-squares
      engine, and MLESAC outlier rejection. Experiments include offline analysis on a 9 km subset of a 27 km Canadian Space
      Agency Mars Emulation Terrain dataset and an online 250 m loop field trial across a sunny day. Results show that bridging
      the appearance gap substantially improves localization robustness and enables safe long-term autonomy.
