  summary:
    summary_en: Current cross-view geo-localization (CVGL) methods for UAV navigation in GNSS-denied environments follow a
      matching-to-tile (M2T) paradigm that incurs inherent accuracy-storage trade-offs and neglects heading prediction. We
      propose Bearing-UAV, a purely vision-driven navigation method that jointly regresses absolute position and heading from
      four adjacent satellite tiles and one UAV-view patch. Its architecture integrates a Global-Local Unity Feature (GLUF)
      submodule, a Relative Coordinate Encoder (RCE), cross-attention fusion with a Patch Similarity-Guided module, and dual
      regression heads. We also construct Bearing-UAV-90K, a multi-city benchmark with 90k cross-view image pairs and heading
      annotations. Experiments show Bearing-UAV achieves Recall@1 of 90.76%/83.17% (satellite/UAV views), mean localization
      error of 5.66/8.61 m, and navigation success rate of 62.50%/50.00%, substantially outperforming matching/retrieval baselines
      (0% navigation success) and remaining robust to weather variations.
    summary_cn: University-1652
