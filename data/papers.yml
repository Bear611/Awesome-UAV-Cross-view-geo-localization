- id: b8cd2823e728
  title: UAV-Satellite Cross-View Image Matching Based on Adaptive Threshold-Guided Ring Partitioning Framework
  year: 2025
  venue: Remote Sensing
  authors:
  - Yushi Liao
  - Juan Su
  - Decao Ma
  - Chao Niu
  abstract: 'Cross-view image matching between UAV and satellite platforms is critical for geographic localization but remains
    challenging due to domain gaps caused by disparities in imaging sensors, viewpoints, and illumination conditions. To address
    these challenges, this paper proposes an Adaptive Threshold-guided Ring Partitioning Framework (ATRPF) for UAV–satellite
    cross-view image matching. Unlike conventional ring-based methods with fixed partitioning rules, ATRPF innovatively incorporates
    heatmap-guided adaptive thresholds and learnable hyperparameters to dynamically adjust ring-wise feature extraction regions,
    significantly enhancing cross-domain representation learning through context-aware adaptability. The framework synergizes
    three core components: brightness-aligned preprocessing to reduce illumination-induced domain shifts, hybrid loss functions
    to improve feature discriminability across domains, and keypoint-aware re-ranking to refine retrieval results by compensating
    for neural networks’ localization uncertainty. Comprehensive evaluations on the University-1652 benchmark demonstrate
    the framework’s superiority; it achieves 82.50% Recall@1 and 84.28% AP for UAV→Satellite geo-localization, along with
    90.87% Recall@1 and 80.25% AP for Satellite→UAV navigation. These results validate the framework’s capability to bridge
    UAV–satellite domain gaps while maintaining robust matching precision under heterogeneous imaging conditions, providing
    a viable solution for practical applications such as UAV navigation in GNSS-denied environments.'
