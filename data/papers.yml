  abstract: 'Current cross-view geo-localization methods rely heavily on real drone-captured images to bridge the perspective
    gap between ground and satellite views. This dependency creates critical deployment barriers in scenarios where drone
    imagery is unavailable due to cost, privacy regulations, or operational constraints. We propose Proxy-UAV, the first framework
    that eliminates this requirement by synthesizing geometrically consistent drone-view features directly from ground inputs.
    Our approach features: (1) A Transformer-based Proxy Generator that translates ground-view features into drone-representative
    embeddings, and (2) An Uncertainty-Aware Adapter that aligns synthetic features with satellite space while quantifying
    reliability. Evaluated on University-1652 under drone-absent conditions, Proxy-UAV achieves 2.17% Recall@1 and 4.73% mAP—demonstrating
    viable performance in scenarios where existing drone-dependent systems completely fail.'
