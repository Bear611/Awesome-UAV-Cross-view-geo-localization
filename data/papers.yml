- id: ca16920bb2da
  title: 'CFIRE: Cross-View Feature Interaction for Fine-Grained Regression-Based UAV Localization'
  year: 2026
  venue: ''
  authors:
  - Yuqi Sun
  - Wenrui Ding
  - Z K Zhang
  - Yuxing Wang
  - Yuhui Chen
  - Zeqi Shao
  abstract: Cross-view geo-localization based on image retrieval(IR) has become an important solution for UAV self-localization
    under GNSS-denied conditions. However, IR-based methods are highly sensitive to the tiling strategy while construct the
    reference database, and inevitably preserves only local semantics while discarding global context, resulting in degraded
    accuracy in low-texture scenarios. To overcome these limitations, we propose a novel cross-view localization network named
    CFIRE, which avoids reference image tiling by directly processes entire query and reference images to regress the center
    position of query image within the reference image. Specifically, we design a Query-Guided Cross-Scale Fusion Module(QCSF)
    that integrates multi-scale representations from both the query and reference views, enabling effective semantic interaction
    and alignment. We further design a coarse-to-fine localization strategy with a classification–regression head, enabling
    precise localization. Experiments on the AerialVL dataset demonstrate that CFIRE achieves meter-level localization accuracy,
    while maintaining real-time performance at 33 FPS on a single GPU.
