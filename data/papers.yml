      for matching drone and satellite images. It evaluates on standard UAV cross-view benchmarks University-1652 and SUES-200,
      and also tests on ground-level datasets CVUSA and CVACT.
    needs_review: false
    minimax_main_category: retrieval
  summary:
    summary_en: Drone-view geo-localization (DVGL) matches drone images against a georeferenced satellite database to estimate
      absolute position without GPS, but remains difficult because large viewpoint differences entangle view-agnostic content
      with view-specific appearance in the learned embeddings, weakening contrastive alignment. This paper revisits DVGL from
      a manifold-learning perspective and models cross-view features as a composite manifold jointly governed by content and
      viewpoint factors. It proposes CVD, a plug-and-play Content-Viewpoint Disentanglement framework that embeds images into
      a shared representation and then projects them onto separate content and viewpoint submanifolds, supervised by an intra-view
      independence constraint using a Sliced Wasserstein proxy for mutual information and an inter-view reconstruction constraint
      that cross-combines content from one view with viewpoint from the other. InfoNCE is applied only on the content branch
      for matching, and the reduced channel width lowers inference latency. Experiments are conducted on University-1652,
      SUES-200, CVUSA, and CVACT, showing consistent improvements when CVD is integrated into ResNet, ConvNeXt, and ViT-based
      baselines, with more pronounced gains under lower altitudes and stronger cross-dataset generalization.
    main_category: retrieval
    category_confirmed: true
    classification_reason: The paper formulates DVGL explicitly as an image retrieval task, training a Siamese network with
      InfoNCE contrastive loss to retrieve the best-matching satellite image from a georeferenced database, which aligns with
      the cross-view geo-localization retrieval category.
    benchmarks:
    - University-1652
    - SUES-200
    - CVUSA
    - CVACT
    main_modules:
    - Manifold Embedding (shared Siamese encoder)
    - Information Disentanglement (parallel content and viewpoint projection heads)
    - Intra-view Independence Constraint via Sliced Wasserstein Distance
    - Inter-view Cross-Reconstruction Constraint with view-specific decoders
    - InfoNCE localization loss on content embeddings
    reported_results:
    - On University-1652 (drone→satellite), CVD plugged into LPN raises AP from 77.26 to 78.99 and R@1 from 73.87 to 75.78;
      into FSRA, AP from 84.24 to 85.53 and R@1 from 81.62 to 83.32; into SDPL, AP from 86.45 to 87.24 and R@1 from 84.13
      to 84.98; into MCCG, AP from 90.63 to 92.19 and R@1 from 88.92 to 90.67; into Sample4Geo, AP from 93.56 to 94.78 and
      R@1 from 92.36 to 93.73; into Game4Loc, AP from 92.56 to 93.95 and R@1 from 91.32 to 92.94.
    - On SUES-200, CVD consistently improves all five baselines across the 150m, 200m, 250m, and 300m altitude settings for
      both drone→satellite and satellite→drone directions.
    - In cross-dataset transfer (trained on University-1652, tested on SUES-200), CVD yields large R@1 gains over LPN and
      Game4Loc across all altitudes.
    - On CVUSA and CVACT (ground→satellite), CVD improves LPN, TransGeo, GeoDTR, Game4Loc, and Sample4Geo across R@1, R@5,
      R@10, and R@1%.
    - Ablations show that removing both disentanglement constraints degrades performance, and the best results are obtained
      when the intra-view independence and inter-view reconstruction constraints are jointly applied with a balanced content/viewpoint
      split ratio.
