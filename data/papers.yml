    summary_en: 'Cross-view geo-localization matches oblique drone images to satellite tiles when GNSS fails, yet existing
      methods conflate layout with texture, retain altitude scale variation in embeddings, and rely on hand-tuned multi-objective
      losses. We propose SKYPART, a lightweight swappable head for patch-based ViTs comprising four components: learnable
      prototypes with single-pass cosine assignment for semantic part discovery, altitude-conditioned FiLM modulation applied
      only during training to marginalize altitude as a nuisance, a graph-attention readout over active prototypes, and Kendall
      uncertainty-weighted GeoPartLoss over four objectives. Built on DINOv2 ViT-S/14, SKYPART has 26.95M parameters and 22.14
      GFLOPs, the smallest among top-performing methods. It establishes new state-of-the-art on SUES-200, University-1652,
      and DenseUA V under single-pass, no-re-ranking, no-TTA inference, and achieves the strongest mean robustness on the
      ten-condition WeatherPrompt benchmark, with particularly large gains under fog+snow and darkness.'
