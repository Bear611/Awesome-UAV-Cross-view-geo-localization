    summary_en: Drone-view geo-localization aims to match a drone-captured image, often degraded by adverse weather such as
      fog, rain, or snow, against a gallery of geo-tagged satellite images. To address the widened cross-view domain gap under
      such conditions, the paper introduces GeoFuse, a cross-modal fusion framework that augments satellite imagery with geo-aligned,
      text-free road map tiles treated as a freely available, weather-invariant geometric prior. The framework couples a shared
      image encoder with a text encoder and proposes a flexible fusion module performing token-level and channel-level cross-attention
      between satellite and road map features, balanced by lightweight learnable gating scalars. A class-level cross-view
      contrastive loss aligns weather-degraded drone features against precomputed per-class satellite and fused satellite-roadmap
      anchors, complementing the standard image-text matching and classification objectives. The authors extend University-1652
      and DenseUAV with paired road maps retrieved via the Google Maps API and refined with Qwen-Image-Edit. On Drone→Satellite
      retrieval, GeoFuse reports mean Recall@1 of 80.60% on University-1652 (+3.46% over the WeatherPrompt baseline) and 52.43%
      on DenseUAV (+23.18%); on Satellite→Drone, it reports 90.39% and 49.03% mean Recall@1 respectively.
