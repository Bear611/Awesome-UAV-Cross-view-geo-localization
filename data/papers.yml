    summary_en: Vision-based localization provides critical redundancy for autonomous aerial vehicles (AAVs) when GNSS signals
      are denied or degraded. This paper presents a comparative study of descriptor-based image matching techniques for cross-view
      AAV geo-localization. The proposed three-stage pipeline involves image preprocessing and labeling, automatic matching
      via the Image Matching WebUI with RANSAC-based outlier rejection, and graphical result analysis. Twenty-five classical
      and deep learning methods were benchmarked, including state-of-the-art approaches such as DKMv3 and ROMA. A novel public
      aerial dataset was introduced, collected using an MP-02 Czajka aircraft equipped with a GoPro Hero 10 camera and AHRS,
      comprising 2500 image-orthophotomap pairs at altitudes ranging from 150 to 1500 m, with three-axis camera rotations
      and two field-of-view settings (95° and 123°). Results demonstrate that deep learning descriptors, particularly DKMv3
