  summary:
    summary_en: This paper presents a systematic review and unified derivation of five Kalman filter variants—KF, EKF, ESKF,
      IEKF, and IESKF—for state estimation in dynamic systems with applications to UAV navigation. Starting from Bayesian
      estimation theory, the authors derive the recursive Bayes filter and the linear Kalman filter as the Gaussian belief
      case. For nonlinear systems, EKF applies first-order Taylor approximation, while ESKF estimates error states in tangent
      space for improved numerical stability. IEKF iterates the correction step based on MAP estimation, and IESKF combines
      both approaches. The paper provides detailed mathematical derivations linking MAP estimation, Gauss-Newton optimization,
      and EKF, and presents comparative analyses of the five variants. Key results show that IESKF achieves the best convergence
      and accuracy for highly nonlinear systems by combining error-state parameterization with iterative MAP-based updates,
      while remaining computationally tractable for real-time UAV applications.
