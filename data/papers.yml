- id: 6f2a302b59e6
  title: Geolocalization of Unmanned Aerial Vehicle Images and Mapping onto Satellite Images Utilizing 3D Gaussian Splatting
  year: 2026
  venue: Sensors
  authors:
  - Satoshi Arakawa
  - Kaiyu Suzuki
  - Tomofumi Matsuzawa
  abstract: Geolocalization of images captured by unmanned aerial vehicles (UAVs) remains a significant challenge in Global
    Navigation Satellite System-denied environments. Although geolocalization is typically achieved by matching UAV images
    with satellite images, the viewpoint discrepancy between oblique UAV and nadir satellite images complicates this task.
    In this study, we employ 3D Gaussian Splatting (3DGS) to generate images from viewpoints close to the satellite viewpoint
    based on multiview UAV images. Assuming that the approximate flight area of the UAV is known, we propose a geolocalization
    method that directly establishes correspondences between 3DGS-rendered and satellite images using pixel-level image matching.
    These satellite images, which we refer to as wide-area satellite images, cover a larger area than the UAV observation
    range. Experimental results demonstrate that the proposed method achieves higher geolocalization accuracy than existing
    approaches that divide wide-area satellite images and perform image retrieval. Moreover, we demonstrate the potential
    for geographically consistent integration of independently captured and trained 3DGS models by leveraging the correspondences
    between 3DGS-rendered and wide-area satellite images.
