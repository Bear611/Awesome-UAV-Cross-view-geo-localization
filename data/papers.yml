- id: 9880ae23b323
  title: Adaptive Multi-Backbone Fusion for UAV-Centric Cross-View Geo-Localization with Partial Street–Satellite Matching
  year: 2025
  venue: UAVM
  authors:
  - Rong Fu
  - Simon Fong
  abstract: 'Cross-view geo-localization remains a challenging task due to severe viewpoint shifts, scale mismatches, and
    appearance variations across drone, street-level, and satellite imagery. To address these issues, we propose a unified
    ensemble framework that integrates convolutional and transformer-based backbones into a shared embedding space. Our method
    introduces three core modules: lightweight regional aggregation for fine-grained descriptors, cross-branch attention for
    dynamic feature refinement, and instance-adaptive fusion for multi-scale representation alignment. The model is optimized
    end-to-end via a composite strategy combining angular-margin classification, hard-sample mining, and circular boundary
    regularization. Extensive experiments on benchmark datasets validate the effectiveness of heterogeneous backbone integration
    and attention-guided fusion. The framework demonstrates strong robustness under occlusion and extreme perspective variation,
    offering a reliable solution for UAV-based localization and scalable geospatial mapping.'
