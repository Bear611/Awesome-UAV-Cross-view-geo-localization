  summary:
    summary_en: 'Cross-view geo-localization (CVGL) suffers from drastic viewpoint changes and varying capture times, making
      discriminative image-level feature extraction difficult, while existing methods underutilize fine-grained keypoint information.
      Inspired by the human visual system and keypoint detection, we propose UDPA-Net with a plug-and-play Unit Dot Product
      Attention Module (UDPAM). UDPAM uses a parameter-free Unit Dot Product Convolution (UDPC) to automatically identify
      salient keypoints from deep descriptor maps and fuses them via residual attention fusion. Embedded behind early ResNet-50
      stages, it integrates seamlessly into existing networks. Experiments on University-1652 and CVUSA demonstrate consistent
      gains: on University-1652, LPN+UDPAM improves D→S mAP from 79.20% to 81.31%; on CVUSA, LPN+UDPAM raises R@1 from 85.79%
      to 91.18% and GeoDTR+UDPAM reaches 95.97% R@1, with negligible parameter overhead.'
