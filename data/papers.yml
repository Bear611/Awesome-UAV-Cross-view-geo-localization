- id: 7de7b7bb2240
  title: Efficient cross-view matching of images captured by UAV cameras
  year: 2025
  venue: Scientific Bulletin of UNFU
  authors:
  - Р. І. Ілечко
  - Ю. В. Цимбал
  abstract: 'We address the problem of visual geo-localization for unmanned aerial vehicles operating under GNSS,0 degradation
    and study how Sample4Geo-type cross-view methods can be deployed on onboard hardware with limited resources. We analyze
    the behavior of lightweight feature extractors within the Sample4Geo framework and investigate how systematic backbone
    downscaling, together with training configuration and input image resolution, affects the accuracy of cross-view geo-localization.
    We introduce a unified evaluation protocol on a standard cross-view dataset and train a set of convolutional and transformer
    architectures (ConvNeXt-Base/Nano, ViT-Small/Tiny, MobileNetV3/V4, LeViT) under shared baseline settings at 224×224 resolution,
    followed by a targeted hyperparameter search for each backbone. We further examine resolution scaling by re-training the
    tuned models at 384×384. We construct an efficiency frontier using Recall@1 and the number of trainable parameters as
    axes. Our results show that compact backbones already provide competitive accuracy with a simple single-epoch training
    scheme, while hyperparameter tuning yields a substantial additional gain for MobileNetV4 and ViT-Small and confirms that
    an almost uniform training schedule is sufficient for ConvNeXt-Nano, ViT-Tiny, and MobileNetV3. We establish that increasing
    input resolution consistently improves all models: ConvNeXt-Nano approaches the accuracy of ConvNeXt-Base while remaining
    significantly smaller, and ViT-Small surpasses ViT-Tiny when richer spatial detail is available. We construct the Pareto
    frontier and identify MobileNetV3 and ViT-Tiny as attractive options at very low capacity, while highlighting ConvNeXt-Nano
    as a knee point that offers a favorable compromise between accuracy and model size for onboard deployment. In comparative
    experiments against recent cross-view baselines, including LPN, LCM, SAIG-D, DWDR, MBF, and MSBA, the proposed lightweight
    ConvNeXt-based configurations consistently outperform or match prior state-of-the-art methods under comparable or lower
    model complexity. Finally, we provide practical recommendations for selecting feature extractors and training settings
    in resource-constrained cross-view geo-localization.'
