      Transformer编码器与跨视角目标感知模块（CVOPM），联合预测目标边界框与低分辨率掩码；第二阶段SAM提示阶段（SPS）利用SAM的零样本分割能力生成高精度掩码。同时构建包含6079个1024×1024像素高分辨率分割标注的CVOGL-Seg数据集。在CVOGL与CVOGL-Seg上的大量实验表明，所提方法达到最优性能，有效突破矩形限制，为城市规划和农业监测提供精准的目标几何信息。
