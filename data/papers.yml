  summary:
    summary_en: This paper addresses cross-view geo-localisation (CVGL), where a query image is matched against a large database
      of geo-referenced imagery, with the core difficulty being large viewpoint discrepancies that hinder stable feature aggregation
      and alignment. The proposed framework is built on three components. First, a DINOv2 backbone is adapted via convolutional
      adapters that keep the foundation model frozen and train only lightweight bottleneck-style adapters (1×1–3×3–1×1 convolutions
      with GELU), providing vision-aligned inductive bias for parameter-efficient fine-tuning. Second, a Multi-scale Channel
      Reallocation (MSCR) module combines 1×1, 3×3 and 5×5 depthwise convolutions with max-pooling, a residual signal modulation
      branch and a learnable element-wise scaling factor to enhance multi-scale spatial structure perception. Third, an MoE-enhanced
      Bag-of-Queries aggregator introduces Mixture-of-Experts routing over keys and values, using top-1 sparse gating so that
      a small set of expert feed-forward sub-modules specialise in heterogeneous cross-view cues. Training uses a symmetric
      InfoNCE loss. Experiments are conducted on the University-1652 and SUES-200 benchmarks across drone→satellite and satellite→drone
      protocols. The authors report that the method attains competitive accuracy on both datasets while using only about 10M
      trainable parameters, substantially fewer than competing methods.
