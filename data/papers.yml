  summary:
    summary_en: This paper addresses accumulated drift in visual-inertial odometry (VIO) by presenting GVINS, a tightly coupled
      GNSS-Visual-Inertial fusion system for real-time, drift-free six-DoF state estimation. The architecture employs a nonlinear
      factor graph jointly optimizing visual, inertial, and GNSS raw measurements—specifically code pseudorange and Doppler
      shift—across multiconstellation receivers (GPS, GLONASS, Galileo, BeiDou). A coarse-to-fine initialization procedure
      recovers the four-DoF local-to-global frame transformation online without offline calibration, while degenerate cases
      (insufficient satellites, GNSS-unfriendly regions) are explicitly handled. The system is evaluated through simulation
      and large-scale real-world experiments, including a challenging 22.9 km urban driving sequence with indoor–outdoor transitions.
      Results demonstrate substantial drift suppression, achieving 4.51 m RMSE on the longest sequence—outperforming comparable
      tightly coupled methods. The system additionally operates with only one visible satellite, whereas conventional GNSS
      requires four. Code and datasets are open-sourced.
