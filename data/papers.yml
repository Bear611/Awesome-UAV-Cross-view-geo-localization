      Pattern Network (LPN) that performs part-based representation learning by dividing high-level feature maps into several
      parts without requiring any extra part or landmark estimator. On University-1652-like imagery, LPN uses a square-ring
      partition based on distance to the image center, while on CVUSA/CVACT panoramic data it adopts sequential and column
      partition strategies as special cases of the same idea. The method is optimized with per-part cross-entropy (instance)
      losses, and during inference the part-level features are concatenated into the final descriptor. Experiments are conducted
      on University-1652, CVUSA, and CVACT_val, and the partition strategy is shown to be embeddable into existing frameworks
      such as CVFT and SAFA. The paper also reports transfer learning results on Oxford5k and Paris6k, which are auxiliary
      landmark retrieval benchmarks.
