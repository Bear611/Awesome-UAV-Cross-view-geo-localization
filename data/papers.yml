    summary_en: This paper introduces CRISP (ContRastive Image-remote Sensing Pre-training), a CLIP-style contrastive pre-training
      framework that aligns ground-level natural-world photographs with co-registered aerial NAIP imagery to learn transferable
      visual representations. The authors curate and release the Nature Multi-View (NMV) dataset, which pairs iNaturalist
      plant observations in California with 256x256 RGB-Infrared NAIP tiles, and additionally evaluate on the Auto Arborist
      street-tree dataset. The core design uses two ResNet50 encoders (ImageNet-initialized for ground, randomly-initialized
      for aerial) trained with the OpenCLIP objective, and explores several variants to handle the many-to-one mapping between
      ground images and aerial patches, including CRISP-Aug with remote sensing data augmentation, CRISP-M2o using a many-to-one
      Haversine-based pairing strategy within 250 m, and CRISP-Par with a learned dynamic scaling factor. Downstream evaluation
      spans species recognition, species distribution mapping, mixture-of-experts fine-grained classification, crop type mapping
      (using the Tile2Vec Central Valley setup), and cross-city tree genus identification on Auto Arborist. Comparisons are
      made against supervised ImageNet and randomly-initialized baselines as well as MAE, SatMAE, MoCo-v2, and SauMoCo self-supervised
      baselines, with reported Top-1 Eco-Accuracy, Top-1/Top-5 accuracy, macro-accuracy, and frequency-stratified metrics
