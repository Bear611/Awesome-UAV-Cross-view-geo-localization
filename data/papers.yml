      cloud-based AI paradigm struggles to meet strict low-latency and low-energy requirements. Edge AI, which executes AI
      algorithms on-device or at nearby edge servers, can effectively address key UAV technical challenges including autonomous
      navigation, formation control, power management, security and privacy, computer vision, and communication. It also enables
