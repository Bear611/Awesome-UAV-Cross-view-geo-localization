  summary:
    summary_en: Cross-view localization for outdoor robotics is challenged by large viewpoint disparities and noise such as
      moving objects and seasonal variations. This paper proposes PureACL, the first sparse visual-only fine-grained cross-view
      localization method that estimates 3-DoF pose (lateral, longitudinal, yaw). The framework comprises a Spatially Aware
      Feature and Confidence Extractor (SAFCE) leveraging camera intrinsics/extrinsics for spatial embedding, a View-consistent
      On-ground Keypoint Detector (VOKD) that filters off-ground and dynamic objects through homography validation, and a
      multi-camera fusion module. A differentiable Levenberg-Marquardt algorithm iteratively refines poses. Evaluated on KITTI
      and Ford Multi-AV Seasonal datasets with Google Maps satellite imagery using only geo-poses as supervision, PureACL
      achieves mean errors below 0.14m/3.57° on KITTI with one camera and below 0.88m/0.74° on FMAVS with four cameras, with
      median lateral/longitudinal errors under 0.5m and yaw error under 2°, outperforming state-of-the-art methods.
