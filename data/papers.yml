  summary:
    summary_en: This paper tackles global pose estimation for multirotor UAVs in GPS-denied environments by visually localizing
      onboard images against pre-rendered Google Earth images. The proposed method employs dense mutual information with Normalized
      Information Distance as the cost function to perform sRt (scale-rotation-translation) warping between query and map
      images, recovering the relative 4-DoF pose. These registration measurements are fused with gimballed visual odometry
      in an SE(3) filtering framework. Experiments were conducted at UTIAS on a 303 m overcast flight (45-48 m AGL) and six
      1132 m flights (36-42 m AGL) captured from sunrise to sunset on a sunny summer day. The method achieved sub-meter and
      sub-degree RMSE on the 303 m path and less than 3 m and 3° RMSE on the 1132 m flights, significantly outperforming a
      SURF-based localizer (under 7% success), demonstrating robust localization despite large lighting and appearance changes.
