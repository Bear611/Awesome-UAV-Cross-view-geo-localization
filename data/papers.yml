    summary_zh: 针对可见光到红外图像翻译在下游模板匹配任务中生成数据可靠性存疑的问题，本文提出TMGAN方法，将图像翻译与多模态模板匹配任务联合训练。该方法基于条件生成对抗网络，生成器采用ConvNeXt编码器与类ConvNeXt解码器构成的U-Net结构，判别器使用PatchGAN。总损失函数包含L1损失、LSGAN损失以及两种匹配损失：基于归一化互相关算法的NCC损失和将模板匹配建模为对比学习问题的匹配块（MP）损失。在KAIST、VEDAI和AVIID三个公开数据集上的实验表明，该方法在图像生成质量和模板匹配精度方面均优于现有最优方法，验证了GAN生成图像在关键下游任务中的可用性。
