    summary_en: This paper introduces a benchmark for UAV Absolute Visual Localization (AVL) under low-altitude (<300m) multi-view
      (pitch angles 20°–90°) conditions, where extreme viewpoint changes challenge conventional nadir-view methods. The authors
      construct AnyVisLoc, a large-scale dataset of 18,000 UAV images captured by seven DJI drone types across 15 cities,
      25 regions, and multiple altitudes, with both aerial photogrammetry and historical satellite reference maps plus DSM
      data. A unified coarse-to-fine framework integrates image-level retrieval (template matching, NetVLAD, drone-to-satellite
      deep networks), pixel-level matching (handcrafted, sparse/dense learning-based), and PnP+RANSAC pose solving, evaluated
      under four localization strategies. A new retrieval metric PDM@K is proposed to better correlate retrieval performance
      with downstream localization accuracy. The best combined pipeline (CAMP retrieval + RoMa matching + Top-N Re-rank) achieves
      74.1% accuracy within 5m on the aerial map and 94.2% within 20m, with satellite maps yielding only 18.5% at 5m. The
      authors further analyze how reference map type, pitch angle, and prior information noise (yaw/pitch/altitude) affect
      localization accuracy, highlighting significant room for improvement.
