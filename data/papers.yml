    code_url: null
    needs_review: true
    summary_zh: 无人机热成像地理定位（TG）通过将空中热图像与卫星地图对齐实现无GPS情况下的精确定位，但现有方法缺乏不确定性估计，难以应对纹理缺失、图像损坏、几何噪声、地图自相似、超出区域及地图过时等挑战。本文提出UASTHN框架，引入基于裁剪的测试时增强（CropTTA）策略，通过裁剪视图的单应性一致性衡量数据不确定性，并结合深度集成（DE）评估模型不确定性，可与任意深度单应性估计模型无缝集成。在Boson夜间热成像数据集（涵盖33平方公里热图像与216平方公里卫星图像，含10K训练、13K验证、27K测试对）上对DHN、IHN、STHN等基线进行全面测试，结果表明该方法在512米搜索半径内实现7米定位误差和97%的不确定性估计成功率，ROC曲线AUC高达0.96，并支持早停机制提升推理效率。
