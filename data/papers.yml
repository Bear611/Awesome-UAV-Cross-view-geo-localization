  summary:
    summary_en: 'This survey investigates deep learning-based visual localization techniques for Unmanned Aerial Vehicles
      (UAVs) operating in GPS-denied environments, where GNSS signals may be blocked, reflected, or spoofed. It begins by
      reviewing traditional aerial visual localization methods, including template matching approaches such as normalized
      cross-correlation and mutual information-based registration, and feature matching methods using SIFT, SURF, ORB, and
      HOG combined with particle filters or optical flow. It then systematically categorizes recent deep learning approaches
      by architecture: CNN-based methods (VGG, ResNet, DenseNet, U-Net, Vision Transformer) for urban signature matching,
      semantic segmentation, neighborhood consensus, satellite-to-aerial cross-view matching, and pose regression; RNN/LSTM-based
      models for temporal sequence localization and target tracking; Siamese networks with contrastive learning for aerial-satellite
      image matching; conditional GANs for translating aerial imagery into map-like representations aligned with OpenStreetMap;
      and reinforcement learning (Deep Deterministic Policy Gradient) combined with LiDAR for UAV formation control. The paper
      compares methods across model type, reference imagery (Google Earth, satellite maps, OpenStreetMap), operational context,
      and accuracy. It also identifies challenges such as the absence of standardized benchmarks, limited cross-study comparability,
      ethical and privacy concerns, and the need for robust real-world evaluation, and proposes future directions including
      online and transfer learning, hybrid neural architectures, model interpretability, and multi-modal data fusion. Reported
      accuracy varies from sub-meter to tens of meters depending on method and environment, and the survey highlights that
      no public benchmark dataset is yet standard for this domain.'
