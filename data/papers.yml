    summary_zh: 无人机跨视角地理定位是实现精确目标地理坐标确定与地理空间增强现实的关键难题。本文提出AirLock+系统，一种面向可扩展无人机-卫星图像配准的端到端视觉框架，支持精确的目标地理定位与地理空间增强现实两项任务。该系统由三个核心模块组成：预测跟踪器用于在无人机图像帧中定位目标；跨视角图像匹配器生成鲁棒的无人机-卫星单应性矩阵，能够应对严重的域差异、过时的卫星图像，并在无需微调的情况下泛化至未见过的环境；像素-世界对应关系将目标像素坐标映射至地理空间，生成连续轨迹估计并支持无人机视频流的地理空间增强。系统在7.8公里的真实世界轨迹上实现了20.23米的平均目标定位误差，在现有方法通常失效的高海拔、倾斜视角条件下表现出强鲁棒性。
