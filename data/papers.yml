  summary:
    summary_en: This paper addresses metric relative camera pose estimation from image pairs. Conventional 2D-2D feature matching
      yields only scale-ambiguous poses and typically depends on external depth estimators to lift correspondences into 3D.
      The authors propose MicKey, a neural network that directly regresses 3D metric keypoint coordinates in camera space
      along with descriptors from a single image. Metric 3D-3D correspondences are established via descriptor matching, and
      the metric relative pose is recovered through a differentiable Kabsch solver. MicKey is trained end-to-end with differentiable
      pose optimization, requiring only image pairs and their relative poses as supervision—without depth measurements, scene
      reconstructions, or overlap information. Evaluated on the Map-free Relocalisation benchmark (outdoor) and ScanNet (indoor),
      MicKey achieves state-of-the-art performance on Map-free with an AUC of 0.74 and precision of 49.2%, surpassing competing
      methods while requiring less supervision.
