- id: 8ad80ad4e6be
  title: 'UAV-VisLoc: A Large-scale UAV Dataset with Continuous Trajectories for Visual Geo-localization'
  year: 2026
  venue: Zenodo (CERN European Organization for Nuclear Research)
  authors:
  - Wenjia Xu
  - Xuekai Chen
  - Jiaqi Cao
