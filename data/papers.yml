  abstract: In the past few years, the use of Unmanned Aerial Vehicles (UAVs) has expanded and now reached mainstream levels
    for applications such as infrastructure inspection, agriculture, transport, security, entertainment, real estate, environmental
    conservation, search and rescue, and even insurance. This surge in adoption can be attributed to the UAV ecosystem’s maturation,
    which has not only made these devices more accessible and cost effective but has also significantly enhanced their operational
    capabilities in terms of flight duration and embedded computing power. In conjunction with these developments, the research
    on Absolute Visual Localization (AVL) has seen a resurgence driven by the introduction of deep learning to the field.
    These new approaches have significantly improved localization solutions in comparison to the previous generation of approaches
    based on traditional computer vision feature extractors. This paper conducts an extensive review of the literature on
    deep learning-based methods for UAV AVL, covering significant advancements since 2019. It retraces key developments that
    have led to the rise in learning-based approaches and provides an in-depth analysis of related localization sources such
    as Inertial Measurement Units (IMUs) and Global Navigation Satellite Systems (GNSSs), highlighting their limitations and
    advantages for more effective integration with AVL. The paper concludes with an analysis of current challenges and proposes
    future research directions to guide further work in the field.
