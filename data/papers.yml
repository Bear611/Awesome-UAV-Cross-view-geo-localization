  summary:
    summary_en: This paper addresses UAV cross-view geo-localization, where appearance variations between drone and satellite
      views make discriminative feature extraction difficult. The proposed MFAF method uses the EVA02 visual foundation model
      as a backbone to better capture global spatial context, and adds a Multi-scale Frequency Attention Fusion module composed
      of two components. The Multi-Frequency Branch-wise Block (MFB) combines a multi-scale low-frequency branch that captures
      stable structural layouts through pooling at multiple kernels with a Hybrid High-frequency branch that uses four-directional
      Sobel operators to extract edge and texture details, while the Frequency-aware Spatial Attention (FSA) module adaptively
      reweights salient frequency regions to suppress background noise. A Multi-Classifier Block with cross-entropy and cross-domain
      triplet losses supervises training. Experiments are conducted on University-1652, SUES-200, and Dense-UAV for both drone
      localization and drone navigation tasks. The paper reports that MFAF achieves competitive performance against recent
      state-of-the-art methods on all three benchmarks, and ablation studies confirm the contribution of the MFB and FSA components.
