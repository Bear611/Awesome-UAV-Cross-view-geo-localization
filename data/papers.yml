    summary_zh: 本文针对从两张图像估计度量级相对相机位姿的问题，提出MicKey网络。传统2D-2D特征匹配只能得到无尺度的位姿，且依赖外部深度估计器将二维点提升至三维空间。MicKey直接从单张图像预测相机坐标系下关键点的三维度量坐标及其描述子，通过描述子匹配建立三维-三维对应关系，再利用可微分Kabsch算法恢复度量相对位姿。训练采用端到端可微分位姿优化策略，仅需图像对及其相对位姿作为监督信号，无需深度测量、场景重建或图像重叠信息。在Map-free
      Relocalisation基准（户外）和ScanNet（室内）数据集上的实验表明，MicKey在Map-free上取得最先进性能，AUC达0.74，精度49.2%，优于现有方法且所需监督更少。
