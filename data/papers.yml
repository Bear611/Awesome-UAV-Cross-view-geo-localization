- id: 4db932860019
  title: One-to-Many Fine-Grained Matching Between UAV Images and Satellite Images for UAV Self-Localization
  year: 2025
  venue: ''
  authors:
  - Jiaqi Li
  - Yuli Sun
  - Yaobing Xiang
  - Lin Lei
  abstract: Fine-grained matching between Unmanned Aerial Vehicle (UAV) imagery and satellite imagery is a critical step for
    achieving UAV self-localization. Current fine-grained matching methods typically compare each UAV-captured image in turn
    against cropped patches from a large-scale satellite reference map to find the most similar region, then estimate the
    UAV's position via point correspondences. However, when the UAV lacks precise initial location information and the satellite
    map covers a large area, this approach consumes significant computational resources and time due to the need for large-scale
    matching to retrieve similar patches. Moreover, existing methods usually select only a single best-matching patch for
    subsequent finegrained matching, which limits both accuracy and robustness. To address these challenges, we have adapted
    the UAV-VisLoc dataset to suit our task requirements. Using the dense matching algorithm LoFTR as our baseline, we have
    developed a one-tomany fine-grained matching pipeline specifically for UAV selflocalization. Experimental results demonstrate
    the effectiveness of our proposed one-to-many fine-grained matching framework.
