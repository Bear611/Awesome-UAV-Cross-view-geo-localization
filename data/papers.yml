      for aerial imagery, addressing the growing need for robust UAV localization in GPS-denied or degraded environments.
      The survey systematically reviews the research problem of matching drone-captured images to georeferenced databases,
      covering both same-view and cross-view scenarios, and analyzes the unique challenges introduced by altitude variation,
      viewpoint shifts, scale differences, temporal changes, and varying illumination conditions in aerial imagery. The main
      technical modules discussed include (1) deep feature extraction backbones tailored for aerial perspectives, (2) cross-view
      image matching architectures such as transformers and polar/geometry-aware transformations, (3) similarity learning
      approaches including contrastive, metric, and ranking losses, and (4) dataset and benchmark construction methodologies
      for UAV-based VPR. The survey systematically catalogs and compares a wide range of UAV place recognition datasets, including
