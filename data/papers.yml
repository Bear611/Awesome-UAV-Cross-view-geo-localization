      and coarse-to-fine matching, which is closely related to cross-view geo-localization retrieval. However, the task is
      explicitly described as 'image registration' and 'image matching' with homography estimation, not geo-localization retrieval.
      The category 'retrieval' was inherited from DeepSeek's suggestion and may not accurately reflect the paper's true focus
