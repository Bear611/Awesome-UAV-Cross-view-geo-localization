  summary:
    summary_en: This paper targets precise UAV self-positioning in GPS-denied environments, a task it distinguishes from conventional
      coarse cross-view geo-localization by requiring the model to perceive fine-grained spatial relationships between densely
      sampled UAV images and corresponding satellite tiles. The authors propose a Geographic Information Guided Contrastive
      Learning (G2CL) framework built on a Siamese dual-branch ConvNeXt-Tiny encoder that takes paired UAV-view and satellite-view
      images from the same GPS location, combining a standard pair-level InfoNCE objective with a novel geographic information
      adaptive loss. The adaptive loss partitions into satellite, UAV, and cross-view triplet-style components that use hard
      example mining and GPS-derived neighbourhood weighting, encouraging feature-space distances to mirror real-world haversine
      distances so that geographically close samples remain close in feature space. Evaluation is conducted exclusively on
      the DenseUAV benchmark using both Recall@1 and the SDM@K metric; the paper reports that G2CL substantially exceeds the
      DenseUAV baseline across five satellite-scale/time configurations and additional ablations, while remaining robust to
      the loss-weight hyperparameter. The study focuses on positioning accuracy, leaving computational efficiency for future
      work.
