      that localizes a UAV by matching onboard nadir-facing aerial imagery against a tiled satellite image database. The localization
      module builds on a GeoCLIP-inspired CLIP-style architecture, pairing a frozen ViT-L/14 image encoder with a multi-scale
      Gaussian Random Fourier Feature location encoder, and aligns cross-view embeddings through contrastive learning to retrieve
      the best-matching satellite tile. The orientation module then applies MapGlue for detector-free keypoint correspondence
      between the retrieved tile and the query aerial image, and estimates a homography via RANSAC to recover both the UAV
      position and yaw angle. For training and evaluation the authors construct a new paired UAV-Satellite Dataset collected
      with a DJI Mavic Air 2 over the NTU campus, together with a Google Earth benchmark covering NTU campus, Taichung Station,
      and a cross-season UCLA zero-shot test set. On the controlled Google Earth benchmark, NavCLIP achieves around 1.5-pixel
      localization errors (≈1.21 pixels / 1.17 m on the cross-season UCLA split) and a mean heading error of 0.2°, substantially
      outperforming the GeoCLIP baseline. Real-world UAV flight experiments yield larger errors, with the best route reaching
      37.76 m MAE / 55.64 m RMSE for position and 12.14° MAE / 32.37° RMSE for yaw, highlighting a gap between controlled
      and practical deployment.
