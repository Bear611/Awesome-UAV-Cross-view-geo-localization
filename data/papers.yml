  summary:
    summary_en: 'AirLock+ addresses the challenging problem of registering UAV imagery to satellite reference imagery in order
      to determine the geodetic position of ground targets observed from a UAV, even under severe appearance gaps between
      aerial and overhead views, outdated satellite basemaps, oblique camera angles, and high-altitude flights. The system
      is composed of three end-to-end modules: a predictive target tracker that localizes the object of interest in each UAV
      frame, a cross-view image matcher that estimates a robust homography between the UAV frame and the satellite tile without
      environment-specific finetuning, and a geo-mapping module that converts the resulting pixel-to-world correspondences
      into geodetic coordinates, producing a continuous target trajectory and enabling geospatial augmented-reality overlays
      on the UAV video stream. The authors evaluate the full pipeline on real-world UAV trajectories spanning 7.8 km of flight
      and report an average target localization error of 20.23 m, claiming robustness in oblique, high-altitude conditions
      where prior cross-view registration approaches typically fail. No standard cross-view geo-localization benchmark (e.g.,
      University-1652, DenseUAV, SUES-200, VDrone-style splits) is explicitly used, and no dataset name, public release, or
      download link is mentioned in the abstract.'
    main_category: fine_pose_localization
    category_confirmed: true
    classification_reason: The paper targets UAV-to-satellite image registration to recover precise target geolocation in
      geodetic coordinates and to enable geospatial AR. This falls under fine-grained UAV geolocalization / cross-view pose
      estimation rather than retrieval-style place recognition, navigation-only guidance, or a unified global-to-local pipeline,
      so the fine_pose_localization category is appropriate.
    benchmarks: []
    main_modules:
    - Predictive target tracker for UAV frame localization
    - Cross-view UAV-to-satellite image matcher producing homographies
    - Geo-mapping module converting pixel-to-world correspondences to geodetic coordinates and enabling geospatial AR overlays
