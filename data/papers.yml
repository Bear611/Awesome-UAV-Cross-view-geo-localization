- id: a7fcf3489f1b
  title: 'VLF-SPS: a visual localization framework based on salient position selection and cross-source image matching'
  year: 2025
  venue: Measurement Science and Technology
  authors:
  - Chengyou Yong
  - Cheng Yuan
  - Jizhou Lai
  - Churong Ding
  - Zhongqing Xia
  - Pin Lyu
  abstract: Abstract In urban scenarios such as logistics delivery and emergency rescue, unmanned aerial vehicles (UAVs) can
    obtain reliable positioning information through visual scene matching-based navigation to ensure successful task execution.
    However, traditional feature-based methods are susceptible to dynamic motion blur and significant scale variations in
    images, which often result in decreased positioning accuracy. In these critical applications, such failures can lead to
    catastrophic consequences ranging from mission failure and dangerous collisions to life-threatening delays in emergency
    rescue. To address these challenges, this paper proposes a visual positioning framework for UAVs based on salient position
    selection. In the front-end, an improved bilateral filtering algorithm, equipped with an adaptive parameter adjustment
    mechanism, is used to enhance image quality under challenging conditions, such as uneven illumination and motion blur.
    A salient position selection mechanism is introduced in the feature extraction network. It leverages channel attention,
    to dynamically enhance discriminative features, and applies spatial sparsity constraints, to focus on geometrically stable
    regions. As a result, the network extracts keypoints with distinctive structural features. After keypoint matching, the
    back-end constructs a unified confidence evaluation model that integrates feature matching quality and geometric consistency.
    Combined with a weighted sliding window optimization strategy, this enhances the positioning accuracy of UAV localization
    based on image matching. In real-world flight tests, the proposed method reduced localization error by 28.9%, compared
    to mainstream matching-based positioning algorithms. By leveraging only publicly available satellite imagery, it offers
    an effective solution for low-altitude UAV localization and navigation.
