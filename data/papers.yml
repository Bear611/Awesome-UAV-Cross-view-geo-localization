    summary_en: This paper addresses aerial-view geo-localization, where a drone-view image is matched against a geo-tagged
      satellite database to determine the location of interest. The core challenge is learning discriminative, view-invariant
      features that bridge the large appearance gap between drone and satellite imagery. The authors argue that prior methods
      over-rely on the final feature map and overlook informative middle-layer representations, and that aligning features
      across layers can yield richer local patterns. To address this, they propose the Multi-layer Local Pattern Cross Attention
      Network (MLPCAN), a Transformer-based architecture built around two key modules. The Cross-Attention Block (CAB) establishes
      correlations between feature maps from different layers when both images are fed into the network. A square-ring partition
      strategy then divides multi-layer feature maps into local pattern blocks, and the Multi-layer Aggregation Block (MAB)
      aggregates high-association blocks to mitigate information misalignment across layers. The model is evaluated on two
      public benchmarks, University-1652 and SUES-200, and the authors report that MLPCAN significantly improves geo-localization
      accuracy and achieves competitive results relative to existing approaches. No specific numerical scores are reported
      in the available text.
