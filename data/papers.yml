  summary:
    summary_en: 'This paper targets the heterogeneous image matching problem inherent to UAV visual localization, where satellite
      or aerial reference images must be matched against real-time UAV imagery acquired under substantially different viewpoints,
      scales, and illumination. To improve robustness against the high outlier ratios typical of such pairs, the authors propose
      a spatial consistency-guided sampling algorithm that operates as a post-processing module on top of standard feature
      extractors (e.g., SIFT or SuperPoint). Its pipeline comprises three components: (1) construction of K-nearest-neighbor
      triplet relationships among feature correspondences to encode local geometric structure, followed by a local geometric
      structure consistency filter that retains only high-confidence triplets; (2) a minimal subset sampling strategy that
      combines triplet compatibility scores with a Gaussian-kernel diversity penalty to select globally representative minimal
      subsets; and (3) a data subset refinement strategy that iteratively re-samples around low-residual points using a triplet-weighted
      stopping criterion. The approach is evaluated on three public UAV-satellite benchmarks—University-1652, DenseUAV, and
      SUES-200—against RANSAC, LPM, LGSC, and TRESAC. Across all three datasets, the reported precision, F-score, and mean
      projection error improve over the compared robust estimators, while runtime (≈0.15 s per pair) remains substantially
      lower than RANSAC and TRESAC, supporting real-time UAV deployment.'
