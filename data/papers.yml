  - Yuxin Sun
  - Meng Xu
  - Sen Jia
  abstract: Cross-View Geo-Localization (CVGL) matches images from different platforms, such as Unmanned Aerial Vehicles (UAVs)
    and satellites, to estimate target locations using geographic data. This task poses significant challenges due to viewpoint
    differences and scale inconsistencies. We propose a novel CVGL method named saliency-aware integrated global-local network
    (SIGN) to effectively tackle the challenges of viewpoint differences and scale inconsistencies between drone and satellite
    images. SIGN employs a transformer-based network for fine-grained feature extraction and utilizes the Saliency-Aware Partition
    (SAP) module to divide images into key regions for local alignment. The model integrates global feature contrast learning
    with saliency-aware local block contrast learning to enhance alignment accuracy at both global and local levels. Experiments
    on the University-1652 dataset show that SIGN achieves state-of-the-art performance, demonstrating superior accuracy and
    robustness in handling viewpoint variations.
