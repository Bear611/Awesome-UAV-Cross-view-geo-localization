    summary_en: 'This paper addresses UAV geo-localization under GNSS-denied conditions by proposing SAVL, a scene-adaptive
      visual localization framework that performs pixel-level cross-view matching between UAV images and georeferenced satellite
      imagery. The architecture comprises two core modules: a Feature Reconstruction module that fuses coarse semantic features
      from a pre-trained ViT/S with fine-grained texture features to enhance keypoint detection in low-texture scenes, and
