      thermal geo-localization methods require dense satellite map sampling and exhibit limited tolerance to geometric noise.
      This paper introduces STHN, a novel coarse-to-fine deep homography estimation framework comprising a Thermal Generative
      Module (TGM) for data augmentation, a coarse alignment stage that matches small thermal images to large satellite maps
      within a 512m search radius at a challenging 11% size ratio, and a refinement stage that crops the selected region for
