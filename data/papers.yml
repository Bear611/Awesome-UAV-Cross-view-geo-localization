      Multi-view Selection Refinement Module (MSRM) filters redundant views to reduce computational load. Experiments on University-1652
      and SUES-200 benchmarks demonstrate that MobileGeo achieves a 4.19% AP improvement while being over 5× more efficient
      in FLOPs and 3× faster than prior state-of-the-art, running at 251.5 FPS on an NVIDIA AGX Orin edge device.
