- id: 39ff99cf43f4
  title: Lightweight Cross-View Localization via Quantized Knowledge Distillation and Adaptive Local Feature Matching
  year: 2026
  venue: IEEE Signal Processing Letters
  authors:
  - Jialiang Shi
  - Zixu Wang
  - Chunxi Zhang
  - Jingchun Cheng
