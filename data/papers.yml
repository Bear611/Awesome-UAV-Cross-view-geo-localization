  summary:
    summary_en: 'This work tackles cross-view UAV-to-satellite geo-localization under GNSS-denied conditions, where large
      viewpoint, time, and platform differences cause geometric distortion and occlusion that standard CNN-based extractors
      handle poorly by ignoring semantic and structural cues. The proposed SeGCN pipeline first uses shared-weight SwinV2-T
      backbones to produce 8×8×768 feature maps for drone and satellite branches, then infers semantic distributions via cross-attention
      between learnable semantic embeddings and the feature map, and finally builds a semantic-aware graph by connecting features
      that share the same inferred semantic category and applies lightweight graph convolution to extract structural information
      that is invariant to viewpoint change. The structural semantic features are concatenated with global features and optimized
      with instance loss plus triplet loss. The authors evaluate on University-1652 and SUES-200 under both Drone→Satellite
      (UAV localization) and Satellite→Drone (UAV navigation) protocols, reporting that SeGCN surpasses prior SOTA including
      LCM, LPN, PCL, FSRA, PAAN, and MBF across all altitudes. They additionally perform realistic localization simulations
      on two self-collected UAV datasets (Outlets and Zhonghu Park) using a University-1652-trained model, demonstrating applicability
      to real UAV trajectories.

      '
