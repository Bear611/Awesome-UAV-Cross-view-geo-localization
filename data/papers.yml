  summary:
    summary_en: Cross-view geo-localization is critical for UAVs in GNSS-denied environments, yet unimodal visual methods
      suffer robustness issues, while existing multimodal approaches require comprehensive multimodal databases. This paper
      proposes MMG EO, a multimodal compositional geo-localization framework that localizes drone-view multimodal queries
      (image + point cloud/depth/text) against satellite-view image references, eliminating the need for extensive multimodal
      databases. The framework leverages pretrained encoders with adapter-based fine-tuning, a cross-attention compositor,
      and learnable [SUB] modality-substitution tokens enabling bi-directional symmetric learning, with the weighted-InfoNCE
      loss extended to the multimodal setting. The authors construct GTA-UAV-MM and UAV-VisLoc-MM, the first UAV geo-localization
      benchmarks combining image, point cloud, depth, and text modalities. Experiments under both same-area and cross-area
      settings demonstrate that MMG EO consistently outperforms vision-based state-of-the-art methods, while exhibiting superior
      robustness under data degradation and strong generalization to real-world scenarios.
