    summary_en: UAV visual geo-localization is challenged by significant cross-modal discrepancies between satellite maps
      and aerial images, including scale variations, viewpoint deviations, and spatiotemporal inconsistencies, where existing
      retrieval-based or keypoint-matching methods struggle to balance efficiency and accuracy. This paper proposes R2PLoc,
      a unified region-to-point framework that integrates coarse region retrieval with fine-grained keypoint matching. A shared
      backbone extracts semantic features for efficiency, while a Hierarchical Semantic Aggregation Module (HSAM) fuses multi-scale
      global and local semantics to mitigate cross-modal feature distribution shifts. A Semantic-enhanced Hierarchical Refinement
      Matcher (SHRM) incorporates high-level semantic guidance into geometric matching to improve consistency under viewpoint
      variations. The authors also construct the UVL-R2P dataset with semantic annotations dedicated to region-to-point localization.
      Extensive experiments on multiple benchmarks demonstrate that R2PLoc outperforms most state-of-the-art methods with
      comparable model sizes.
