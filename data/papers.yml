      geographic locations, which is valuable in GPS-denied environments. However, significant perspective disparities, varying
      sensor parameters, and extreme weather challenge feature discriminability. This paper proposes APA-BI, employing EfficientNetV2-S
      as a shared-weight backbone. The Adaptive Partition Aggregation (APA) module maintains semantic integrity by concatenating
      square-ring partition features with learnable scale factors, while the Bidirectional Integration Module (BIM) leverages
