    summary_en: This paper addresses UAV localization failures in challenging environments where GPS signals are lost near
      tall buildings and visual features are insufficient in texture-less areas such as water surfaces and roads. We propose
      a reliable localization system integrating a keyframe decision module, a lightweight real-time semantic segmentation
      network with attention mechanisms, and a hierarchical path planner that combines a cost map with the Dynamic Window
      Approach (DWA). The system is evaluated on a self-collected UAV image dataset (3,600 images, 23 semantic labels) and
