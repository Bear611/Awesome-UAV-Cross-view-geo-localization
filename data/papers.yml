- id: 987a2921bafc
  title: 'Learning Better UAV-Based Cross-View Object Geo-Localization from Multi-Modal Prompts: MoP-UAV Benchmark and MoPT
    Framework'
  year: 2026
  venue: Proceedings of the AAAI Conference on Artificial Intelligence
  authors:
