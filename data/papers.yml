  abstract: Absolute Visual Localization (AVL) enables an Unmanned Aerial Vehicle (UAV) to determine its position in GNSS-denied
    environments by establishing geometric relationships between UAV images and geo-tagged reference maps. While many previous
    works have achieved AVL with image retrieval and matching techniques, research in low-altitude multi-view scenarios still
    remains limited. Low-altitude multi-view conditions present greater challenges due to extreme viewpoint changes. To investigate
    effective UAV AVL approaches under such conditions, we present this benchmark. Firstly, a large-scale low-altitude multi-view
    dataset called AnyVisLoc was constructed. This dataset includes 18,000 images captured at multiple scenes and altitudes,
    along with 2.5D reference maps containing aerial photogrammetry maps and historical satellite maps. Secondly, a unified
    framework was proposed to integrate the state-of-the-art AVL approaches and comprehensively test their performance. The
    best combined method was chosen as the baseline, and the key factors influencing localization accuracy are thoroughly
    analyzed based on it. This baseline achieved a 74.1% localization accuracy within 5 m under low-altitude, multi-view conditions.
    In addition, a novel retrieval metric called PDM@K was introduced to better align with the characteristics of the UAV
    AVL task. Overall, this benchmark revealed the challenges of low-altitude, multi-view UAV AVL and provided valuable guidance
    for future research. The dataset and code are available at https://github.com/UAV-AVL/Benchmark
