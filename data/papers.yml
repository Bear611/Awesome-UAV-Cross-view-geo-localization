    summary_zh: 针对GNSS拒止环境下无人机鲁棒定位的需求，本文提出一种融合视觉位置识别（VPR）与相对运动信息的贝叶斯直方图滤波方法。该方法以AnyLoc作为全局VPR前端获取全局一致但易含噪声与歧义的位置概率分布，同时利用视觉SLAM或里程计提供的相对位姿变化，在贝叶斯直方图滤波框架下将二者进行融合，从而得到平滑且稳定的位置估计。整体架构包括VPR全局似然计算、运动预测以及基于直方图的贝叶斯递推更新三部分。作者在涵盖多类复杂场景的UAV-VisLoc数据集上对所提方法进行了系统评估，并与原始VPR基线进行对比。实验结果表明，所提融合方法在几乎所有测试场景下均能稳定运行，并显著提升定位精度，验证了将运动信息引入VPR定位框架的有效性。
- id: e0ec8018f9b7
  title: Weather-Robust Cross-View Geo-Localization via Prototype-Based Semantic Part Discovery
  year: 2026
  venue: arXiv
  authors:
  - Chi-Nguyen Tran
  - Dao Sy Duy Minh
  - Huynh Trung Kiet
  - Nguyen Lam Phu Quy
  - Phu-Hoa Pham
  - Long Tran-Thanh
  abstract: 'Cross-view geo-localization (CVGL), which matches an oblique drone view to a geo-referenced satellite tile, has
    emerged as a key alternative for autonomous drone navigation when GNSS signals are jammed, spoofed, or unavailable. Despite
    strong recent progress, three limitations persist: (1) global-descriptor designs compress the patch grid into a single
    vector without separating layout from texture across the view gap; (2) altitude-related scale variation is retained in
    the learned embedding rather than marginalized; and (3) multi-objective training relies on hand-tuned scalars over losses
    on incompatible gradient scales. We propose SkyPart, a lightweight swappable head for patch-based vision transformers
    (ViTs) that institutes explicit part grouping over the patch grid. SkyPart has four theory-grounded components: (i) learnable
    prototypes competing for patch tokens via single-pass cosine assignment; (ii) altitude-conditioned linear modulation applied
    only during training, making the retrieval embedding altitude-free at inference; (iii) a graph-attention readout over
    active prototypes; and (iv) a Kendall uncertainty-weighted multi-objective loss whose stationary points are Pareto-stationary.
    At 26.95M parameters and 22.14 GFLOPs, SkyPart is the smallest among top-performing methods and sets a new state of the
    art on SUES-200, University-1652, and DenseUAV under a single-pass, no-re-ranking, no-TTA protocol. Its advantage over
    the strongest baseline widens under the ten-condition WeatherPrompt corruption benchmark.'
