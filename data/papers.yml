  summary:
    summary_en: 'This work addresses scale mismatch in UAV visual place recognition caused by large altitude variations in
      GPS-denied settings, aiming at coarse geo-initialization. It proposes a monocular, vision-only altitude-adaptive framework
      with two stages. The relative altitude estimation (RAE) module applies a 2D-FFT spatial-to-frequency transform and formulates
      altitude prediction as regression-as-classification (RAC) over fixed 50 m bins using a cropped ResNet-50 with MixVPR
      aggregation. The predicted altitude guides altitude-aware center cropping to a canonical scale, after which a classify-then-retrieve
      VPR module (EfficientNet-B5 + MixVPR, group-wise angular classifiers with a quality-adaptive margin derived from AdaFace,
      and FAISS retrieval) refines location via weighted coordinate estimation with one-class SVM outlier filtering. Evaluation
      uses two synthetic datasets (CT01 from Beijing, CT02 from Shanghai) and two real-flight rural datasets collected in
      Qingdao (QD01: 814 images; QD02: 470), with search areas of 7.8×5.9 km, 8.8×4.9 km, and 4.8×3.5 km, and altitude ranges
