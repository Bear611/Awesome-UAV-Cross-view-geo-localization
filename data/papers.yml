    summary_en: This paper addresses drone-based cross-view geo-localization, which aims to match drone-view images against
      satellite-view images despite large variations in viewpoint angle and distance. The authors observe that humans recognize
      aerial scenes by first segmenting them into semantically meaningful regions and then comparing corresponding parts,
      and they mimic this process with a transformer-based architecture. Their Attention-guided Segment Transformer (AST)
      introduces an adaptive, non-uniform segmentation strategy that partitions the feature map into regions that maintain
      correspondence even under significant viewpoint shifts, including overlapping regions. A dedicated segment token module
      then generates per-region tokens that are concatenated with the class token, allowing the model to preserve local part-level
      information that vanilla vision transformers lose. Compared with CNN baselines, the self-attention backbone captures
      global context while the segment tokens recover local cues, improving robustness to perspective change. Experiments
      are conducted on the University-1652 benchmark for both drone-view target localization and drone navigation tasks, where
      the authors report competitive performance and improved viewpoint tolerance, although no specific numerical scores are
      stated in the available text.
