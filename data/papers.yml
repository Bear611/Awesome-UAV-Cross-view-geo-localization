    summary_en: 'This paper addresses unaligned cross-view matching between drone and satellite imagery for geo-localization,
      where viewpoint gaps, spatial-resolution differences, and positional offsets make matching difficult. The authors propose
      a ConvNeXt-based multi-level representation learning network. A ConvNeXt-Tiny backbone first extracts global feature
      maps, which are then passed through a feature aggregation module that duplicates the features into two branches: one
      processed by spatial group-wise attention (SGE) and the other by a standard convolution. The two branch outputs are
      combined with learnable scalar weights, producing part-aware and context-aware features for cross-view matching. A multi-branch
      classifier and a hybrid loss combining cross-entropy and triplet losses are used to constrain the learned embeddings.
