  summary:
    summary_en: Cross-view geo-localization between UAV and satellite images is challenged by positional shifts and uncertainty
      in distance and scale. Existing CNN-based methods are limited by local receptive fields and downsampling operations
      that lose fine-grained information. This paper proposes a Transformer-based Feature Segmentation and Region Alignment
      (FSRA) method comprising a Heatmap Segmentation Module (HSM) and a Heatmap Alignment Branch (HAB). HSM automatically
      partitions feature regions according to the heat distribution of Transformer feature maps, while HAB performs one-to-one
      region alignment across views without extra supervision. A multiple sampling strategy is further introduced to alleviate
      the scarcity of satellite images. Experiments on the University-1652 benchmark demonstrate that the proposed method
      achieves state-of-the-art performance on both drone-view target localization and drone navigation tasks.
    summary_cn: University-1652
    benchmarks: []
    main_modules: []
    reported_results: []
    code_url: null
    needs_review: true
    summary_zh: 无人机-卫星跨视角地理定位任务面临位置偏移、距离与尺度不确定等核心挑战。现有基于CNN的方法受限于局部感受野与下采样操作，难以充分捕获全局上下文与细粒度信息。本文提出基于Transformer的特征分割与区域对齐方法(FSRA)，包含热力图分割模块(HSM)与热力图对齐分支(HAB)：HSM根据Transformer特征图热力分布自动划分实例区域，HAB对不同视角的对应区域进行一对一对齐，无需额外监督信息。此外提出多重采样策略以缓解University-1652数据集中卫星图像稀缺问题。实验表明，所提方法在无人机目标定位与无人机导航两个任务上均达到当时最优性能。
