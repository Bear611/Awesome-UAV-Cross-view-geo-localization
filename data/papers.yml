    summary_en: Path planning for unmanned aerial vehicles (UAVs) in ultra-low altitude environments remains challenging due
      to dense static and dynamic obstacles and limited inter-UAV communication. This paper proposes ST-D3QN, a novel framework
      integrating an enhanced Dueling Double Deep Q-Network (D3QN) with the A* algorithm. The method generates sub-target
      sequences via A* and applies fixed-value sampling within constraint regions to mitigate sparse-reward issues, while
