  summary:
    summary_en: This paper addresses UAV localization in GNSS-denied environments by combining map-relative particle filter
      localization with visual odometry using a downward-facing optical camera. The core approach employs a particle filter
      with KLD-adaptive sampling, where hypothesized UAV locations are scored by Pearson correlation between the live camera
      image and an orthophoto map tile. A central contribution is the study of image-similarity-to-likelihood conversion functions,
      proposing two parametric variants (logistic and rectifying) and comparing them against linear and softmax baselines.
      Visual odometry via Semi-direct Visual Odometry (SVO) propagates particles between frames using a planar motion model,
      reducing the search space. Experiments are conducted on a newly released simulated aerial imagery dataset of 12 flights
      (straight line, circle, and rectangle trajectories at 200 m and 300 m altitudes) over urban and forested USGS orthophoto
      maps, with Gazebo/PX4 SITL simulation and orthophotos from 2008, 2010, 2012, and 2014 used for robustness analysis.
      The reported results state that the best logistic conversion (v=0.2) yields 43% higher accuracy than the softmax baseline
      while using roughly three times fewer particle evaluations, and that the proposed particle filter outperforms ORB-SLAM2
      by about 2.6 times in average accuracy on the four straight-line flights where ORB-SLAM2 completed tracking, with only
      a 30% precision drop when matching against out-of-date maps.
    main_category: fine_pose_localization
    category_confirmed: true
    classification_reason: The paper estimates planar 2D position (x, y) and heading (theta_yaw) of a UAV relative to a geo-referenced
      orthophoto map, which constitutes fine pose localization rather than retrieval or navigation. No cross-view image retrieval
      benchmark is used.
    benchmarks:
    - Simulated aerial imagery dataset (12 flights, urban and forest USGS orthophotos, Zenodo DOI 10.5281/zenodo.1211729)
    main_modules:
    - Particle filter localization with KLD-adaptive sampling
    - Pearson correlation image similarity
    - Logistic image-similarity-to-likelihood conversion function
    - Rectifying image-similarity-to-likelihood conversion function
    - Semi-direct Visual Odometry (SVO) for particle propagation
    - Planar motion model integration
    - Weighted-sum pose estimation from particle set
    reported_results:
    - Logistic conversion with v=0.2 ranked best across 12 simulated flights
    - Logistic (v=0.2) achieved 43.42% higher accuracy than Softmax baseline on average
    - Logistic (v=0.2) used 2.96x fewer particle evaluations than Softmax on average
    - Particle filter with logistic v=0.2 outperformed ORB-SLAM2 by approximately 2.6x on the 4 straight-line flights where
      ORB-SLAM2 completed
    - 'Robustness: 30% average precision decrease when matching against out-of-date maps'
    leaderboard_metrics: []
    table_evidence_notes: The paper uses its own custom simulated aerial dataset, not any of the tracked cross-view geo-localization
      benchmarks (University-1652, SUES-200, DenseUAV, UAV-VisLoc, UAV-GeoLoc, GTA-UAV, Game4Loc, World-UAV, Nardo-Air, ALTO,
      UAV-R2P, UVL-R2P, Boson-nighttime, Thermal-UAV). Therefore no leaderboard rows are extracted. The reported ORB-SLAM2
      comparison in Table 5 covers only the straight-line trajectories and is not a standard benchmark, so it is excluded
      from leaderboard_metrics and mentioned only in the summary.
    code_url: https://github.com/jureviciusr/particle-match
    needs_review: false
    summary_zh: 无人机自主飞行通常依赖全球导航卫星系统（GNSS）进行定位，但当信号被遮挡或干扰时定位系统将失效。本文针对GNSS拒止环境，提出一种基于粒子滤波与下视光学相机的鲁棒定位方法。该方法在粒子滤波框架内融合视觉里程计信息，并创新性地设计两种参数化图像相似度-似然转换函数（logistic函数与rectifying函数），以增强定位精度与抗干扰能力。实验采用模拟航空影像数据集进行系统验证。结果表明，采用logistic函数的粒子滤波算法定位精度优于ORB-SLAM2达2.6倍；在地图更新条件下定位更加精准，即便使用过时地图，精度也仅平均下降30%，显著优于传统地图匹配方法，展现出对地图时效性的良好适应性。
