  summary:
    summary_en: 'Cross-view geo-localization (CVGL) matches an oblique drone image to a geo-referenced satellite tile to enable
      autonomous drone navigation when GNSS is unavailable. The paper identifies three persistent limitations in current CVGL
      methods: global descriptors that conflate view-invariant layout with view-specific texture, altitude-related scale variation
      that leaks into the learned embedding, and multi-objective training driven by hand-tuned scalar weights over incompatible
      loss scales. To address these, it proposes SkyPart, a lightweight swappable head for patch-based ViTs that introduces
      explicit part grouping over the patch grid. SkyPart comprises four theory-grounded components: (i) learnable prototypes
      competing for patch tokens via single-pass cosine assignment; (ii) altitude-conditioned Feature-wise Linear Modulation
      (FiLM) applied only during training so the inference embedding is altitude-free; (iii) a graph-attention readout over
      active prototypes capturing pairwise layout compatibility; and (iv) GeoPartLoss, a Kendall uncertainty-weighted multi-objective
      loss whose stationary points are Pareto-stationary. Evaluation is conducted on SUES-200, University-1652, and DenseUAV
      under a single-pass, no-re-ranking, no-TTA protocol, with robustness assessed under the ten-condition WeatherPrompt
      corruption benchmark. At 26.95M parameters and 22.14 GFLOPs, SkyPart is reported as the smallest among top-performing
      methods, setting a new state of the art on all three datasets, and widening its margin under weather corruption, with
      especially large gains under fog+snow and darkness.'
    main_category: retrieval
    category_confirmed: true
    classification_reason: 'The paper formulates CVGL as a retrieval problem: matching a drone query image to a geo-referenced
      satellite gallery via cosine similarity between learned embeddings, with no re-ranking, no test-time augmentation, and
      no pose refinement. The evaluation protocol explicitly reports Recall@K and AP retrieval metrics across gallery sizes
      defined by each benchmark, confirming the retrieval framing.'
    benchmarks:
