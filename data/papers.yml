- id: ccd22757308c
  title: SAVL Scene-Adaptive UAV Visual Localization Using Sparse Feature Extraction and Incremental Descriptor Mapping
  year: 2025
  venue: Remote Sensing
  authors: []
  abstract: In recent years, the use of UAVs has become widespread. Long distance flight of UAVs requires obtaining precise
    geographic coordinates. Global Navigation Satellite Systems (GNSS) are the most common positioning models, but their signals
    are susceptible to interference from obstacles and complex electromagnetic environments. In this case, vision-based technology
    can serve as an alternative solution to ensure the self-positioning capability of UAVs. Therefore, a scene adaptive UAV
    visual localization framework (SAVL) is proposed. In the proposed framework, UAV images are mapped to satellite images
    with geographic coordinates through pixel-level matching to locate UAVs. Firstly, to tackle the challenge of inaccurate
    localization resulting from sparse terrain features, this work proposes a novel feature extraction network grounded in
    a general visual model, leveraging the robust zero-shot generalization capability of the pre-trained model and extracting
    sparse features from UAV and satellite imagery. Secondly, in order to overcome the problem of weak generalization ability
    in unknown scenarios, a descriptor incremental mapping module was designed, which reduces multi-source image differences
    at the semantic level through UAV satellite image descriptor mapping and constructs a confidence-based incremental strategy
    to dynamically adapt to the scene. Finally, due to the lack of annotated public datasets, a scene-rich UAV dataset (RealUAV)
    was constructed to study UAV visual localization in real-world environments. In order to evaluate the localization performance
    of the proposed framework, several related methods were compared and analyzed in detail. The results on the dataset indicate
    that the proposed method achieves excellent positioning accuracy, with an average error of only 8.71 m.
  urls:
