    summary_en: MCGF tackles cross-view geo-localization in GNSS-denied environments when drone-view queries are captured
      under diverse or unseen weather conditions such as fog, rain, snow, wind, and combined weather. The paper observes that
      weather-specific information corrupts geographic features and degrades matching, and proposes a unified Multi-weather
      Cross-view Geo-localization Framework that jointly optimizes image restoration and geo-localization using denoising
      diffusion models. For restoration, MCGF uses a shared Swin Transformer encoder with a lightweight CNN-based restoration
      module that learns to gradually denoise degraded drone images, supervised by an MSE loss. For matching, a diffusive
