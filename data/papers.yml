- id: e55a3076ffe2
  title: 'ACCL: A Plug-and-play Adaptive Confusion-aware Contrastive Loss for UAV-to-Satellite Geolocalization'
  year: 2025
  venue: ''
  authors:
  - Yining Zhu
  - Zihao Deng
  - Jun-Bo Wang
  - Bin Li
  - Long Xiao
  - Jikun Shen
  - Yuan Yao
  abstract: UAV-to-Satellite geolocalization aims to estimate the location of an aerial-view query image taken by an Unmanned
    Aerial Vehicle (UAV) by matching it to satellite images annotated with known locations. However, it is difficult for existing
    methods to distinguish neighboring satellite images that exhibit a high degree of visual similarity. To address this issue,
    we introduce a plug-and-play adaptive confusion-aware contrastive loss (ACCL) to explicitly enhance the model’s discriminative
    ability, which gives more tolerance to high confusion query samples by means of elaborating a confusion metric function.
    As a plug-and-play loss module, ACCL can be easily incorporated into various UAV-to-Satellite geolocalization methods
    without additional modifications. To demonstrate the effectiveness of our proposed method, we conduct extensive experiments
    on one publicly available geolocalization dataset (i.e. NewYorkFly) and to further prove the effectiveness of our method
    in different scenarios, we collect two new geolocalization datasets (LasVegasFly and HollywoodFly), which contain drone-captured
    aerial images and dense sampled satellite images in various geomorphic regions. Experimental results indicate that our
    method can achieve an obvious performance improvement over the state-of-the-art methods on all three datasets. Our code
    and collected datasets are available at https://github.com/NWPU-CPS/ACCL.
