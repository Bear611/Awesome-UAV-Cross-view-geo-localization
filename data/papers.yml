  summary:
    summary_en: Existing cross-view object geo-localization schemes rely on rectangular proposals that cannot precisely localize
      irregularly shaped objects in satellite imagery. We propose Cross-View Object Segmentation (CVOS), a segmentation-based
      scheme that predicts pixel-level masks for fine-grained geo-localization, enabling extraction of object shapes, sizes,
      and areas. We introduce TROGeo, a two-stage framework comprising a Heterogeneous Task Training Stage (HTTS) with a shared-weight
      Swin Transformer encoder and a Cross-View Object Perception Module (CVOPM) jointly predicting bounding boxes and low-resolution
      masks, and a SAM Prompt Stage (SPS) leveraging SAM's zero-shot capability for refined masks. We also construct the CVOGL-Seg
      dataset with 6,079 high-resolution (1024×1024) segmentation annotations. Extensive experiments on CVOGL and CVOGL-Seg
      demonstrate state-of-the-art performance, effectively breaking rectangular shackles for urban planning and agricultural
      monitoring.
