- id: 0cd8ae8fffca
  title: Multilevel Feedback Joint Representation Learning Network Based on Adaptive Area Elimination for Cross-View Geo-Localization
  year: 2024
  venue: IEEE Transactions on Geoscience and Remote Sensing
  authors:
  - Fawei Ge
  - Yunzhou Zhang
  - Li Wang
  - Wei Liu
  - Yixiu Liu
  - Sonya A. Coleman
  - D. Kerr
  abstract: Cross-view geo-localization refers to the task of matching the same geographic target using images obtained from
    different platforms, such as drone-view and satellite-view. However, the view angle of images obtained through different
    platforms will vary greatly, which can bring great challenges to the cross-view geo-localization task. Therefore, we propose
    a multilevel feedback joint representation learning network based on adaptive area elimination to solve the cross-view
    geo-localization problem. In our network model, we first process the extracted global features to obtain part-level and
    patch-level features. We then utilize these features as feedback to the global features to extract the contextual information
    in the global features and improve the robustness of the extracted features. In addition, as images obtained from different
    platforms differ, there will always be some interference when matching images. Therefore, we introduce an adaptive area
    elimination strategy to erase the interference information in the global features and assist the model in obtaining crucial
    information. On this basis, the feature correlation loss function is designed to constrain learning when using global
    feature information, thereby eliminating possible interference, which can improve the network model performance. Finally,
    a series of experiments is carried out using two well-known benchmarks, namely, University-1652 and SUES-200, and the
    experimental results show that the proposed network model achieves competitive results, thereby demonstrating the effectiveness
    of the proposed model.
