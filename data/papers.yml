    main_modules:
    - Learnable prototype bank with single-pass cosine assignment over ViT patch tokens
    - Per-image Gumbel-sigmoid salience gate for active prototype selection
    - Altitude-conditioned FiLM modulation (training-only, mean-FiLM at inference)
    - Graph Attention Network readout over active prototype nodes
    - Three-way fusion of global CLS, part-pooled, and graph readouts
    - 'GeoPartLoss: Kendall uncertainty-weighted multi-objective loss (alignment, part quality, distillation, altitude)'
    - Uncertainty-Aware Proxy Alignment (UAPA) temperature modulation
    - Masked Part Reconstruction (MAR) auxiliary
