  summary:
    summary_en: 'Visible-to-infrared image translation aims to enrich infrared data, yet the reliability of generated images
      for downstream matching tasks remains controversial. This paper proposes TMGAN, which jointly trains image translation
      with multimodal template matching to ensure generated images are usable in downstream tasks. The method is built on
      a conditional GAN with a U-Net generator (ConvNeXt encoder, ConvNeXt-like decoder) and a PatchGAN discriminator. The
      total loss combines L1 loss, LSGAN loss, and two matching losses: an NCC loss based on the normalized cross-correlation
      algorithm, and a Match Patch (MP) loss that models template matching as a contrastive learning problem. Experiments
      on the KAIST, VEDAI, and AVIID datasets demonstrate that TMGAN outperforms state-of-the-art methods in both image generation
      quality and template matching accuracy, confirming the reliability of GAN-based generated images for critical downstream
      tasks.'
    summary_cn: '-'
