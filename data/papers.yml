- id: 0fde36fb877f
  title: Robust UAV Localization in GNSS-Denied Environments via Efficient Visual Scene Matching–Inertial Fusion
  year: 2025
  venue: 2025 6th International Conference on Computers and Artificial Intelligence Technology (CAIT)
  authors:
  - Zhipeng Zhang
  - Buhong Zhang
  - Meibo Lv
  - Sunhao Liu
  - Jingyuan Xue
  - Hairui Wei
  abstract: In environments where Global Navigation Satellite Systems (GNSS) are degraded or unavailable, unmanned aerial
    vehicle (UAV) visual-inertial localization faces challenges including cross-domain scale inconsistency, accumulated inertial
    drift, and limited onboard computing resources. To address these issues, we propose a lightweight visual–inertial localization
    framework for onboard platforms that combines low-rate absolute corrections from satellite–to–aerial visual scene matching
    with high-rate relative motion constraints from inertial measurement unit (IMU) pre-integration. The two are fused via
    a loosely coupled Error-State Kalman Filter (ESKF), achieving real-time, robust localization through low-rate absolute
    correction + high-rate dead reckoning. To reduce the cross-domain search space and mitigate scale mismatch, we introduce
    a barometer-assisted adaptive satellite-image loading and ground sampling distance (GSD) normalization pipeline that dynamically
    selects satellite tiles and aligns scale between satellite and onboard imagery. On the vision side, an accelerated XFeat
    model delivers high-quality feature extraction and matching; On the fusion side, the ESKF effectively suppresses inertial
    drift and improves resilience to visual outliers and anomalous conditions. The full system is deployed on a NVIDIA Orin
    Nano embedded platform and validated in real flight tests, demonstrating accurate and robust localization in complex real-world
    scenarios.
