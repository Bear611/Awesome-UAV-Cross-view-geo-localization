    summary_en: This paper addresses cross-view camera pose estimation, which determines the 3-DoF ground camera pose (planar
      location and orientation) by matching a ground-level image to a geo-referenced aerial image. We propose SliceMatch,
      comprising ground and aerial feature extractors, feature aggregators, and a pose predictor. The novel aerial feature
      aggregator employs a cross-view attention module for ground-view guided aerial feature selection and leverages the geometric
