- id: 039cb769dc1b
  title: Learning Robust Feature Representation for Cross-View Image Geo-Localization
  year: 2025
  venue: IEEE Geoscience and Remote Sensing Letters
  authors:
  - Wenjian Gan
  - Yang Zhou
  - Hu Xiaofei
  - Luying Zhao
  - Gaoshuang Huang
  - Mingbo Hou
  abstract: 'The cross-view image geo-localization (CVGL) refers to determining the geographic location of a given query image
    using an image database with the known location information. Existing methods mainly focus on learning discriminative
    image representations to optimize the distance of image feature representations in feature space without fully considering
    the positional relation information of the features and the information redundancy in the features themselves. Therefore,
    we proposed a cross-view image localization method that combines the global spatial relation attention (GSRA) with feature
    aggregation. First, we utilize the lightweight GSRA to learn the spatial location structure information of features, which
    fully enhances the perceptual and discriminative capabilities of the model. The proposed attention has a little effect
    on the complexity and memory occupancy of the model and can be generalized to other image-processing tasks. In addition,
    we introduce the sinkhorn algorithm for locally aggregated descriptors (SALADs), which represents the aggregation of local
    features as an optimal transport problem and selectively discards useless information during the clustering and assignment
    of features, thus enhancing the generalization and robustness of the descriptors. Experimental results on the public University-1652,
    CVACT, and CVUSA datasets validate the effectiveness and superiority of the proposed method. Our code is available at:
    <uri xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink">https://github.com/WenjianGan/LRFR</uri>.'
