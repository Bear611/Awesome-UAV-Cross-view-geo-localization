- id: aeb153b400f8
  title: 'BiCrossNet: resource-efficient cross-view geolocalization with binary neural networks'
  year: 2025
  venue: 'Machine Learning: Science and Technology'
  authors:
  - Federico Fontana
  - Thomas Jantos
  - J. Steinbrener
  - Luigi Cinque
  - Gian Luca Foresti
  - Bernhard Rinner
  abstract: Abstract This paper presents BiCrossNet, a novel approach to cross-view geolocalization utilizing binary neural
    networks to significantly reduce computational complexity while maintaining competitive performance. Key contributions
    include the development of a Bi-Gradual Unfreezing method to enhance transfer learning, a Bi-Partitioned Optimization
    strategy to improve training stability, and the use of logit-based knowledge distillation to supplement standard losses.
    Experimental results on the University-1652 and SUES-200 datasets demonstrate that BiCrossNet establishes a new benchmark
    in the efficiency-performance trade-off. It achieves up to a 90.87-fold reduction in operations and uses 4.64 times less
