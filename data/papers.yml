    summary_zh: 针对GNSS拒止环境下无人机视觉导航中现有跨视角地理定位(CVGL)方法依赖"匹配到瓦片"(M2T)范式导致的精度-存储权衡及忽略航向估计的问题,本文提出Bearing-UAV:一种纯视觉驱动的跨视角导航方法,通过双回归头联合预测无人机的绝对位置与航向角。其架构包含全局-局部统一特征(GLUF)子模块、相对坐标编码器(RCE)、跨注意力融合与相似性引导的坐标估计模块。同时构建多城市基准Bearing-UAV-90K(90k跨视角图像对,含航向标注)。实验表明,Bearing-UAV在Recall@1上达90.76%/83.17%(卫星/UAV视图),平均定位误差5.66/8.61米,导航成功率62.50%/50.00%,显著优于现有匹配/检索范式(后者导航成功率均为0%),且对天气变化具有鲁棒性。
