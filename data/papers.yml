  summary:
    summary_en: Cross-view geo-localization (CVGL) enables drone localization by matching aerial images against satellite
      databases in GNSS-denied environments, yet existing methods rely on resource-intensive architectures unsuitable for
      edge deployment. This paper proposes MobileGeo, a mobile-friendly framework. During training, a Hierarchical Distillation
      (HD-CVGL) paradigm—combining Fine-Grained Inverse Self-Distillation, Uncertainty-Aware Prediction Alignment (UAPA),
