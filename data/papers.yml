  summary:
    summary_en: This work tackles the problem of UAV geo-positioning when GNSS is unavailable or unreliable, a critical capability
      for maintaining autonomous flight during satellite-denied operations. The authors propose two cross-view geo-localization
      pipelines that constrain matching to a refined search area. The first method, FVL-SAR, combines a fully convolutional
      network with a deep neural network to perform coarse-to-fine matching between UAV imagery and overhead reference data.
      The second method, TVL-SAR, employs an attention-only Vision Transformer for the same cross-view matching task. To produce
      continuous state estimates between visual fixes, an Extended Kalman Filter propagates the UAV pose and dynamically narrows
      the search area, although the authors observe accuracy degradation through long feature-sparse stretches. The methods
      are evaluated on a subset of UAV-VisLoc and on the full 106.19 km VPAIR trajectory, which the paper reports as the first
      published flight-through mean error results for both datasets. On UAV-VisLoc single measurements, FVL-SAR achieves 32.39
      m on 62.36% of images while TVL-SAR reaches 39.44 m on 67.31%. Under EKF integration, mean errors grow to 61.00 m for
      FVL-SAR and 79.53 m for TVL-SAR.
