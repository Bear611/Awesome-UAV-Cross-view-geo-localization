  summary:
    summary_en: 'This paper addresses the challenge of cross-view image registration between UAV (drone) and satellite imagery
      under two difficult conditions: arbitrary rotational differences and significant seasonal appearance changes, such as
      snow cover and vegetation shifts. Existing UAV-satellite matching methods typically assume roughly aligned orientations
      and similar capture conditions, limiting robustness in these scenarios. To overcome this, the authors propose a feature
      extraction and matching framework designed for inherent rotation and seasonal invariance. Rotation invariance is achieved
      by integrating a polar coordinate transformation module into the feature extraction network, reducing rotation to a
      translational shift that is easier to learn. For cross-seasonal variation, a multi-scale feature fusion strategy aggregates
      multi-level semantic and structural information, while a coarse-to-fine matching scheme further enhances registration
      accuracy. Evaluation tables compare the proposed method against a range of handcrafted and learned matchers (e.g., SIFT,
      SuperPoint, SuperGlue, LoFTR, Geoformer, DKM, ASpanFormer). However, the specific datasets and benchmark protocols used
      for the reported @3px/@5px/@10px and mAUC numbers are not explicitly named in the provided text or tables, so they cannot
      be mapped to tracked leaderboard benchmarks. No code URL is provided.'
