      framework with a UGC (Unmanned aerial vehicle Graph Convolution) graph encoding module integrated into the CNN feature
      extractor, producing enriched keypoints and descriptors that better capture local geometric context. The pipeline performs
      semantic feature extraction from the real-time drone image and the geo-referenced image, aggregates features via the
      graph encoding module, applies a graph matching network for feature point matching and filtering, and finally uses the
