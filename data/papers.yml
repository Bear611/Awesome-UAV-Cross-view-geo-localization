    summary_en: Cross-view geo-localization between UAV-view and satellite-view imagery is essential for UAV navigation when
      GNSS is denied, but matching is difficult because the same targets exhibit occlusions and geometric distortions across
      capture platforms, views, and timing. Existing methods typically segment feature maps and therefore neglect holistic
      semantic distribution and structural cues, leading to lost image information. The paper proposes MMHCA, a retrieval
      framework built on a dilated neighborhood attention Transformer backbone that captures global context while exponentially
      expanding the receptive field, making it competitive with CNN-based and traditional Transformer designs. On top of this
      backbone, a multi-scale hierarchical contextual aggregation module extracts contextual information from local to global
      across granularities, associating it with both local and global image information. A multi-feature representations stage,
      including gated aggregation, then yields rich discriminative features robust to positional shifts, varying distances,
      and scale ambiguities. The authors evaluate MMHCA on the University-1652 and SUES-200 benchmarks, reporting through
