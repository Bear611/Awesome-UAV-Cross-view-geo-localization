  summary:
    summary_en: Cross-view UAV geo-localization is typically framed as image retrieval, yet a correct top-1 match does not
      guarantee an accurate final pose. This paper addresses that gap by proposing a lightweight post-retrieval verification
      framework built around a Visual Orientation Posterior (VOP) module. VOP predicts a discrete posterior over candidate
      camera orientations, and the system uses this distribution to allocate sparse geometric verification only to a small
      subset of geometry-promising orientation hypotheses rather than exhaustively testing all possibilities. This sparse
      design keeps memory usage and inference latency low enough for onboard deployment on small and medium UAVs whose edge
      processors operate under tight resource budgets, where dense matching methods are impractical. The verification head
      is trained with supervision derived from final localization quality, so the selected hypotheses are explicitly aligned
      with downstream geometric accuracy. The authors evaluate the approach on the GTA-UAV and UAV-VisLoc benchmarks, reporting
      consistent improvements over sparse and rotation-enumeration baselines as well as LoFTR on the proposed final localization
      protocol, and a narrowed gap to dense DKM while remaining much more efficient, confirming suitability for resource-constrained
      aerial platforms.
