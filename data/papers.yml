    localization across varied altitudes when only considering sparse image input. The system effectively handles diverse
    environmental conditions and viewpoint variations by integrating the cross-view transformer, deep features, and structure-from-motion
    into a unified framework. To benchmark our method and foster further research, we introduce two newly collected datasets
