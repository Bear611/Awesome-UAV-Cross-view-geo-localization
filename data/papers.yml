      visual styles between drone and satellite imagery, and inter-class confusion introduced by surrounding noise and varying
      flight altitudes. The proposed framework, SA-DOM, introduces a non-learning Style Alignment Strategy (SAS) that remaps
      the RGB cumulative distribution of drone images to match the statistical style of satellite images, producing a unified
      visual appearance without altering semantic content. A Dynamic Observation Module built on a modified ResNet-50 (ResNet-GL)
      performs dual square-ring partitioning and applies a Hierarchical Attention Block (HAB) that mimics human observation
      by selectively weighting the central region against the whole image, with Generalized-mean Pooling preserving salient
      responses. A Deconstruction loss complements cross-entropy by decorrelating predicted probability distributions across
      different geo-tags. Experiments are conducted on University-1652 for drone-to-satellite and satellite-to-drone retrieval,
      and on SUES-200 for transfer learning evaluation. The authors report that their method surpasses FSRA on University-1652
      while using roughly half the parameters, and achieves the best transfer-learning results across all SUES-200 altitude
      splits.'
    main_category: retrieval
