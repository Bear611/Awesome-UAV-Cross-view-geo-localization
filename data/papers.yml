  abstract: Drones traditionally rely on satellite signals for positioning and altitude. However, when in a special denial
    environment, satellite communication is interrupted, and the traditional positioning and height determination methods
    face challenges. We made a dataset at the height of 80-200 m and proposed a multi-scale input network. The positioning
    index RDS achieved 76.3 points, and the positioning accuracy within 20 m was 81.7%. This paper proposes a method to judge
