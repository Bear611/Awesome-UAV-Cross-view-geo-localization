  summary:
    summary_en: Thermal geo-localization (TG) aligns UAV aerial thermal images with satellite maps for GPS-denied navigation,
      yet existing deep homography estimation methods lack uncertainty estimation, making them unreliable under textureless
      thermal inputs, image corruption, geometric noise, self-similar or outdated satellite maps, and out-of-bound regions.
      This paper proposes UASTHN, a unified framework introducing a Crop-based Test-Time Augmentation (CropTTA) strategy that
      measures data uncertainty via homography consensus of cropped views, combined with Deep Ensembles (DE) for model uncertainty,
      seamlessly integrating with any DHE backbone. Experiments on the Boson-nighttime real-world dataset (10K training, 13K
      validation, 27K test pairs spanning 33 km² thermal and 216 km² satellite imagery) across DHN, IHN, and STHN baselines
      demonstrate a 7 m geo-localization error with 97% success rate within a 512 m search radius, ROC AUC up to 0.96, and
      effective detection of six challenging failure categories.
