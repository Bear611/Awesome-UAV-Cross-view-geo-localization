- id: daf790654cfb
  title: Rethinking Pooling for Multi-Granularity Features in Aerial-View Geo-Localization
  year: 2024
  venue: IEEE Signal Processing Letters
  authors:
  - Tingyu Wang
  - Zihao Yang
  - Quan Chen
  - Yaoqi Sun
  - Chenggang Yan
  abstract: Vision-based aerial-view geo-localization aims to match drone- and satellite-views of the same geographical location.
    Several feature partition strategies divide spatial features to mine contextual information. However, the compression
    from fine-grained features to visual descriptors is ill-considered, that is, classical pooling destroys discriminative
    features while increasing the sensitivity of networks to contextual information. In order to clarify this, we first review
    existing pooling layer and analyze their pros and cons when applied in feature compression. Inspired by the appearance
    of aerial views, we then summarize an ideal feature compression operation, i.e., precisely highlighting the central target
    while maximizing the use of environmental information in a feature-smoothing manner. To achieve the above process, we
    propose a distance-dependent parameter initialization strategy and form a novel pooling called <inline-formula xmlns:mml="http://www.w3.org/1998/Math/MathML"
    xmlns:xlink="http://www.w3.org/1999/xlink"><tex-math notation="LaTeX">$D^{2}$</tex-math></inline-formula>-GeM pooling,
    which can explicitly guide the network to compress fine-grained features in multiple patterns. Extensive experiments on
    public benchmark University-1652 substantiate that our strategy attains more appealing results without additional costs.
