  summary:
    summary_en: Cross-view geo-localization provides an offline visual positioning strategy for UAVs in GNSS-denied environments.
      However, existing methods primarily focus on global or local features while neglecting spatial information crucial for
      extracting consistent cross-view representations and aligning target images. Additionally, data imbalance between UAV
      and satellite images further degrades performance. To address these issues, we propose SHAA, a Spatial Hybrid Attention
      Network with an Adaptive Cross-Entropy Loss. The SHA module employs a Spatial Shift-MLP (SSM) to capture spatial geometric
      correspondences across views and a Hybrid Attention mechanism to enhance feature diversity through spatial-channel interactions.
      The Adaptive Cross-Entropy (ACE) loss assigns adaptive weights to hard samples, mitigating data imbalance. Extensive
      experiments on University-1652, SUES-200, and DenseUAV benchmarks demonstrate that SHAA achieves state-of-the-art performance,
      outperforming existing methods by over 3.92%.
