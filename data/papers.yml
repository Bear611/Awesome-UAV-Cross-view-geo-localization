- id: 2f5b6ccdd8ce
  title: Towards GNSS-Denied Geo-Positioning Using Search Area Refinement
  year: 2026
  venue: International Conference on Computer Vision Theory and Applications
  authors:
  - Signe Møller-Skuldbøl
  - Kasper B. Lauritsen
  - M. Moga
  - Omkar Korgaonkar
  - Peter Leth
  - Andreas Møgelmose
  abstract: ': An alternative for GNSS is pivotal in allowing UAVs to continue tasks without reliable satellite access. This
    work presents two novel methods capable of geo-positioning UAVs when performing operations in GNSS-denied areas. Our two
    algorithms rely on different methodologies for providing the UAV geo-position, with one (FVL-SAR) relying on two neural
    networks, one fully convolutional and one deep NN, whilst the other (TVL-SAR) utilises the attention-only structure provided
    by the vision transformer. Both methods are evaluated on a subset of UAV-VisLoc and the entirety of the 106 . 19 km VPAIR
    trajectory, with FVL-SAR providing an average measurement positioning error of 32.39 meters, on 62.36% of the UAV images.
    TVL-SAR provides an error of 39.44 meters on 67.31% of images. To ensure continuous state estimations, an EKF is used,
    which introduces search area refinement. The EKF is affected by long stretches of feature-sparse environments, which results
    in FVL-SAR achieving a mean error of 61.00 meters, while TVL-SAR achieves 79.53 meters. To the author’s knowledge, these
    are the first published results on mean error during flight through UAV-VisLoc and VPAIR. (Code: https://github.com/xdKazer/P7
    Drone Geolocalization).'
