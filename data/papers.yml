  summary:
    summary_en: This paper addresses GNSS-denied visual localization of unmanned aerial vehicles (UAVs) against georeferenced
      orthophoto maps under significant seasonal appearance variation. The method orthoprojects the UAV camera image to a
      top-down view and then uses a Siamese convolutional neural network, inspired by Zagoruyko and Komodakis, to learn a
      similarity measure between the projected image and candidate map patches. A Gaussian kernel density estimation converts
      the raw similarity score into a particle likelihood for Monte-Carlo localization (MCL), enabling tracking of multiple
      pose hypotheses. The training corpus is assembled from Goforth and Lucey's released satellite dataset plus additional
      Google Earth historical imagery, covering 18 areas with 3-15 images each, yielding 21,870 unique sampling locations
      for training, 1,392 for testing, and 5,568 for confidence estimation. Simulated flights over urban and non-urban areas
      compare the proposed scorer to six reference methods, including mutual information, Moravec, a Pearson correlation approach,
      and Samano et al.'s embedding network, reporting faster MCL convergence and lower localization error in both summer-summer
      and winter-summer scenarios. Real UAV flight experiments further demonstrate robustness to perspective changes, with
      mean errors of 26.5 m, 29.1 m, and 30.6 m after approximately 2 km of travel across three trajectories.
