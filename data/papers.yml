  summary:
    summary_en: 'This paper addresses the problem of high computational and storage cost in cross-view geo-localization methods
      that aim to match UAV imagery to ground-level or satellite references. It proposes BiCrossNet, a resource-efficient
      cross-view retrieval framework that replaces standard full-precision convolutional networks with binary neural networks,
      drastically lowering operations and model size while preserving discriminative feature quality. The main technical contributions
      are: (1) a Bi-Gradual Unfreezing strategy that improves transfer learning from full-precision teacher backbones to the
      binary student, mitigating early-training instability; (2) a Bi-Partitioned Optimization scheme that decouples updates
      of the binary encoder and the remaining real-valued components, improving training stability; and (3) a logit-based
      knowledge distillation objective that supplements the standard retrieval/classification loss with guidance from a full-precision
      teacher. Experiments are conducted on the University-1652 and SUES-200 benchmarks for cross-view image retrieval. The
      authors report that, on SUES-200, BiCrossNet achieves up to 90.87x fewer operations and 4.64x smaller disk size than
      comparable state-of-the-art models, and on University-1652, a 30x reduction in operations and 5.13x smaller disk size,
      while maintaining competitive retrieval accuracy.'
